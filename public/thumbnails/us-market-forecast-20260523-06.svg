<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101a10"/>
      <stop offset="100%" stop-color="#060c06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ad898"/>
      <stop offset="50%" stop-color="#6ba368"/>
      <stop offset="100%" stop-color="#4a8048"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="100%" stop-color="#d8b878"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="340" fill="url(#glow)"/>
  <circle cx="200" cy="580" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6ba368" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d8f0d8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6ba368">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" text-anchor="end">2026.05.23 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6ba368">— 섹터 로테이션 시나리오 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#d8f0d8">방어 로테이션 신호</text>
  <text x="80" y="338" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#green)">헬스케어·가치주 vs 반도체·빅테크</text>
  <text x="80" y="386" font-family="Pretendard, sans-serif" font-size="18" fill="#7aaa7a">5/29 Fed 회의록  ·  5/30 PCE  ·  6월 FOMC</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aaa7a">BASE · 40%</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8f0d8">로테이션 해소</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7aaa7a">회의록 중립 → 기술주 반등</text>
    </g>
    <!-- 불 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aaa7a">BULL · 20%</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8f0d8">기술주 재가속</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7aaa7a">회의록 완화 → S&amp;P 7,700+</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aaa7a">BEAR · 30%</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8f0d8">로테이션 구조화</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7aaa7a">회의록 강경 → 방어주 지속</text>
    </g>
    <!-- 핵심 지표 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aaa7a">S&amp;P · 10Y</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#d8f0d8">7,445.72</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#7aaa7a">10년물 4.57%</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#6ba368" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" opacity="0.8">MAY 23 · 2026 · SECTOR ROTATION WATCH</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" opacity="0.8" text-anchor="end">SOURCE · FRED · YAHOO FINANCE · FRANKFURTER</text>
</svg>
