<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#0f1520"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5677b0;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#5677b0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5677b0;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5080" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#5677b0" fill-opacity="0.1" stroke="#5677b0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle" letter-spacing="1">2026.06.24 · 마감</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#5677b0" fill-opacity="0.8"/>

  <!-- Stock name display -->
  <text x="640" y="158" font-family="Georgia, serif" font-size="22" fill="#7090c0" text-anchor="middle" letter-spacing="4">삼성전자 (005930)</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">340,500</text>
  <text x="640" y="302" font-family="Georgia, serif" font-size="22" fill="#7090c0" text-anchor="middle">원</text>
  <polygon points="510,318 528,300 546,318" fill="#4ade80"/>
  <text x="560" y="332" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+9.84%</text>
  <text x="640" y="360" font-family="Georgia, serif" font-size="18" fill="#304060" text-anchor="middle">전일 310,000원 → +30,500원 급반등</text>

  <!-- Divider -->
  <line x1="160" y1="388" x2="1120" y2="388" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 30-day context panel -->
  <rect x="80" y="408" width="480" height="192" rx="4" fill="#5677b0" fill-opacity="0.05" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="440" font-family="Georgia, serif" font-size="16" fill="#5677b0" text-anchor="middle" letter-spacing="2">30일 가격 경로</text>
  <text x="120" y="472" font-family="Georgia, serif" font-size="14" fill="#666666">30일 최저</text>
  <text x="520" y="472" font-family="Georgia, serif" font-size="14" fill="#aaaaaa" text-anchor="end">270,500원</text>
  <text x="120" y="498" font-family="Georgia, serif" font-size="14" fill="#666666">30일 최고</text>
  <text x="520" y="498" font-family="Georgia, serif" font-size="14" fill="#aaaaaa" text-anchor="end">362,500원</text>
  <text x="120" y="524" font-family="Georgia, serif" font-size="14" fill="#666666">전일 종가 (급락)</text>
  <text x="520" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">310,000원 (−12.3%)</text>
  <text x="120" y="550" font-family="Georgia, serif" font-size="14" fill="#666666">오늘 마감</text>
  <text x="520" y="550" font-family="Georgia, serif" font-size="15" fill="#4ade80" font-weight="bold" text-anchor="end">340,500원 (+9.84%)</text>
  <text x="320" y="582" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">고점 362,500원까지 22,000원 남음</text>

  <!-- Side panel -->
  <rect x="600" y="408" width="600" height="192" rx="4" fill="#5677b0" fill-opacity="0.04" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="440" font-family="Georgia, serif" font-size="16" fill="#5677b0" text-anchor="middle" letter-spacing="2">반도체 섹터 비교</text>
  <text x="620" y="474" font-family="Georgia, serif" font-size="15" fill="#888888">삼성전자</text>
  <text x="1170" y="474" font-family="Georgia, serif" font-size="15" fill="#4ade80" font-weight="bold" text-anchor="end">+9.84%</text>
  <text x="620" y="502" font-family="Georgia, serif" font-size="15" fill="#888888">SK하이닉스</text>
  <text x="1170" y="502" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+0.98% (반전)</text>
  <text x="620" y="530" font-family="Georgia, serif" font-size="15" fill="#888888">NVDA (전일)</text>
  <text x="1170" y="530" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−4.13%</text>
  <text x="620" y="558" font-family="Georgia, serif" font-size="13" fill="#3a5070">삼성전자가 NVDA 역풍 거슬러 급등</text>
  <text x="620" y="582" font-family="Georgia, serif" font-size="13" fill="#3a5070">KOSPI +3.26% 마감 주도</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="618" x2="1120" y2="618" stroke="#5677b0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">KOSPI 8,471.02</text>
  <text x="260" y="670" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">+3.26% · 삼성전자 주도</text>
  <text x="640" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">top12 최대 상승폭</text>
  <text x="640" y="670" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">SK하이닉스 −2.50% → +0.98% 반전</text>
  <text x="1020" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">USD/KRW 1,547.81원</text>
  <text x="1020" y="670" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">+0.57% · 원화 약세</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#5677b0" fill-opacity="0.35"/>
</svg>
