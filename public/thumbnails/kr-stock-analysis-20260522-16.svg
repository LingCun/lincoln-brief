<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ac4f0"/>
      <stop offset="50%" stop-color="#5a9fd8"/>
      <stop offset="100%" stop-color="#3a7ab8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5a9fd8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5a9fd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="140" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5a9fd8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5a9fd8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5a9fd8" text-anchor="end">2026.05.22 16:00 KST · 종목 분석</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5a9fd8">— STOCK ANALYSIS —</text>

  <!-- Main title -->
  <text x="80" y="248" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f5edd9">KB금융</text>
  <text x="80" y="312" font-family="Playfair Display, Georgia, serif" font-size="44" font-style="italic" fill="url(#blue)">이틀 연속 강세, 160,000원</text>
  <text x="80" y="360" font-family="sans-serif" font-size="17" fill="#7aabcc">은행주가 독자 모멘텀을 만들고 있다</text>

  <!-- Divider -->
  <line x1="80" y1="408" x2="1200" y2="408" stroke="#1a2a3a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 448)">
    <!-- KB금융 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9fd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6090a8">KB금융</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">160,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+2.70%</text>
    </g>
    <!-- 신한지주 -->
    <g transform="translate(300, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9fd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6090a8">신한지주</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">98,200</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+3.59%</text>
    </g>
    <!-- 30일 저점 대비 -->
    <g transform="translate(620, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9fd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6090a8">30일 저점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">+5.47%</text>
      <text x="0" y="92" font-family="monospace" font-size="12" fill="#6090a8">151,700 → 160,000원</text>
    </g>
    <!-- 30일 고점까지 -->
    <g transform="translate(930, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9fd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6090a8">30일 고점까지</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">−1.42%</text>
      <text x="0" y="92" font-family="monospace" font-size="12" fill="#6090a8">고점 162,300원</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="668" x2="1200" y2="668" stroke="#1a2a3a" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#3a6080">lincoln-brief.vercel.app</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#3a6080" text-anchor="end">종목 분석 · 2026.05.22</text>
</svg>
