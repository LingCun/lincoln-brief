      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">30일 고점</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">484,500원</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
