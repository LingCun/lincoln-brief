<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#1e0e0c"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f09080"/>
      <stop offset="50%" stop-color="#e05040"/>
      <stop offset="100%" stop-color="#a02818"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e05040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="420" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#e05040" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f8d8d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#e05040">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#e05040" text-anchor="end">2026.06.10 16:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#e05040">— 시장 예측 업데이트 —</text>

  <!-- FOMC countdown badge -->
  <rect x="80" y="176" width="480" height="30" rx="4" fill="#e05040" fill-opacity="0.18" stroke="#e05040" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#ff8070">FOMC D-8 (June 18~19) · 추세 전환 기준 미충족</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f8d8d0">KOSPI 7,730 — 저점 방어</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">다음 주 방향 탐색 구간</text>
  <text x="80" y="408" font-family="sans-serif" font-size="17" fill="#8a7878">June 8 저점(7,484) 유지 · NVDA $210 미달 · 원화 1,523원</text>

  <!-- Divider -->
  <line x1="80" y1="444" x2="1200" y2="444" stroke="#2a1810" stroke-width="1"/>

  <!-- Scenario labels -->
  <g transform="translate(80, 478)">
    <!-- Base -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e0b060" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#a88840">베이스 · 40%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f8d8d0">7,600~8,000</text>
      <text x="0" y="84" font-family="monospace" font-size="12" fill="#8a7868">박스 탐색</text>
    </g>
    <!-- Bear -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05040" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#a83020">베어 · 30%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f8d8d0">7,300~7,500</text>
      <text x="0" y="84" font-family="monospace" font-size="12" fill="#8a7868">저점 재시험</text>
    </g>
    <!-- Bull -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#40c880" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#208840">불 · 25%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f8d8d0">8,000~8,400</text>
      <text x="0" y="84" font-family="monospace" font-size="12" fill="#8a7868">FOMC 비둘기 시</text>
    </g>
    <!-- Key dates -->
    <g transform="translate(820, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05040" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#a83020">FOMC</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f8d8d0">June 18~19</text>
      <text x="0" y="84" font-family="monospace" font-size="12" fill="#8a7868">8거래일 후</text>
    </g>
  </g>

  <!-- Bottom -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#2a1810" stroke-width="1"/>
  <text x="80" y="664" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#6a4838">— Lincoln</text>
  <text x="1200" y="664" font-family="monospace" font-size="11" letter-spacing="2" fill="#3a2818" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
