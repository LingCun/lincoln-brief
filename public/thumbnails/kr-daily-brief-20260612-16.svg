<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1208"/>
      <stop offset="100%" stop-color="#0d1a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#40e880" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#40e880" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.12 16:00 KST · KR DAILY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 6월 12일 최종 시황 (SLOT 16) —</text>

  <!-- Pullback badge -->
  <rect x="80" y="176" width="880" height="30" rx="4" fill="#40e880" fill-opacity="0.14" stroke="#40e880" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#40e880">NAVER +10.27% · 삼성전자 +7.86% · 오전 고점 8,368 대비 오후 −244pt 조정</text>

  <!-- Main title -->
  <text x="80" y="310" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="500" fill="#f5edd9">KOSPI 8,123 마감</text>
  <text x="80" y="372" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">최종 +4.63% — 오후 차익 실현 소화</text>
  <text x="80" y="418" font-family="sans-serif" font-size="17" fill="#8aaa88">KOSDAQ 1,029.05 · top12 전원 플러스 · USD/KRW 1,515.21</text>

  <!-- Divider -->
  <line x1="80" y1="452" x2="1200" y2="452" stroke="#1a2a14" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 486)">
    <!-- KOSPI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">8,123.62</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+4.63%</text>
    </g>
    <!-- KOSDAQ -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSDAQ</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,029.05</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+3.22%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,515.21</text>
      <polygon points="0,88 14,72 28,88" fill="#5ab870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#5ab870">−0.65%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(820, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$83.71</text>
      <polygon points="0,88 14,72 28,88" fill="#e07050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07050">−4.56%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#4a5a48">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#4a5a48" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
