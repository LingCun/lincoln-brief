<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1510"/>
      <stop offset="100%" stop-color="#070d08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90c080"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7d50"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="160" r="370" fill="url(#glow1)"/>
  <circle cx="170" cy="590" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d5f0d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.26 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 · 새벽판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#d5f0d0">10년물·달러·WTI</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#green)">미국 금리 환경의 3중 압력 구조</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#80a878">4.558%  ·  USD/KRW 1,511  ·  WTI $96.60</text>

  <!-- 3중 압력 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 10년물 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#80a878">10년물 금리</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#d5f0d0">4.558%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#80a878">고금리 지속</text>
    </g>
    <!-- 달러 -->
    <g transform="translate(250, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#80a878">USD/KRW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#d5f0d0">1,511.48</text>
      <polygon points="0,76 14,76 7,90" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="12" fill="#d96552">+0.47%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(530, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#80a878">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#d5f0d0">$96.60</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#80a878">PCE 상방 압력</text>
    </g>
    <!-- Gold -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#80a878">Gold</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#d5f0d0">$4,523</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="12" fill="#6ba368">+0.05%</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1a3020" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#608060">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#304030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
