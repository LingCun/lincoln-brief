<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="100%" stop-color="#0f0808"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#d9655200"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line (red) -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left red bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d96552" opacity="0.6"/>

  <!-- Brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d96552" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a04030" letter-spacing="2">US MARKET · 시장예측</text>

  <!-- Edition label -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d96552" opacity="0.7" text-anchor="end">2026.07.06 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a04030" text-anchor="end">MARKET FORECAST</text>

  <!-- Main headline -->
  <text x="84" y="200" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#ffffff">재개 D-day, S&amp;P vs 코스피</text>
  <text x="84" y="252" font-family="Georgia, serif" font-size="30" fill="#d9a090">S&amp;P 500 <tspan fill="#ffffff" font-weight="bold">7,483.24</tspan> · 코스피 <tspan fill="#6ec46e" font-weight="bold">+5.76%</tspan></text>

  <!-- Divider -->
  <rect x="84" y="275" width="750" height="1" fill="#d96552" opacity="0.3"/>

  <!-- Key events timeline -->
  <text x="84" y="310" font-family="Georgia, serif" font-size="17" fill="#a04030" letter-spacing="1">향후 4주 핵심 이벤트</text>

  <!-- Event boxes -->
  <rect x="84" y="326" width="180" height="64" rx="3" fill="#d96552" opacity="0.2" stroke="#d96552" stroke-width="1.5"/>
  <text x="174" y="350" font-family="Georgia, serif" font-size="15" fill="#d96552" text-anchor="middle">7/6 (월) 22:30</text>
  <text x="174" y="372" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">미국 정규 거래 재개</text>
  <text x="174" y="388" font-family="Georgia, serif" font-size="12" fill="#a04030" text-anchor="middle">오늘 밤</text>

  <rect x="280" y="326" width="170" height="64" rx="3" fill="#d96552" opacity="0.12" stroke="#d96552" stroke-width="1" stroke-dasharray="4"/>
  <text x="365" y="350" font-family="Georgia, serif" font-size="15" fill="#d96552" text-anchor="middle">7/11경</text>
  <text x="365" y="372" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">6월 CPI</text>
  <text x="365" y="388" font-family="Georgia, serif" font-size="12" fill="#a04030" text-anchor="middle">물가 경로</text>

  <rect x="466" y="326" width="200" height="64" rx="3" fill="#d96552" opacity="0.12" stroke="#d96552" stroke-width="1" stroke-dasharray="4"/>
  <text x="566" y="350" font-family="Georgia, serif" font-size="15" fill="#d96552" text-anchor="middle">7월 하순</text>
  <text x="566" y="372" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">빅테크 Q2 실적</text>
  <text x="566" y="388" font-family="Georgia, serif" font-size="12" fill="#a04030" text-anchor="middle">AI 수요 검증</text>

  <rect x="682" y="326" width="150" height="64" rx="3" fill="#d96552" opacity="0.15" stroke="#d96552" stroke-width="1"/>
  <text x="757" y="350" font-family="Georgia, serif" font-size="15" fill="#d96552" text-anchor="middle">7/28~29</text>
  <text x="757" y="372" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">FOMC</text>
  <text x="757" y="388" font-family="Georgia, serif" font-size="12" fill="#a04030" text-anchor="middle">금리 결정</text>

  <!-- Divider -->
  <rect x="84" y="408" width="750" height="1" fill="#d96552" opacity="0.2"/>

  <!-- Key metrics -->
  <text x="84" y="444" font-family="Georgia, serif" font-size="22" fill="#d9a090">US10Y</text>
  <text x="190" y="444" font-family="Georgia, serif" font-size="22" fill="#e87050" font-weight="bold">4.485%</text>
  <text x="330" y="444" font-family="Georgia, serif" font-size="18" fill="#808080">재개 전 정지</text>

  <text x="550" y="444" font-family="Georgia, serif" font-size="22" fill="#d9a090">FOMC까지</text>
  <text x="700" y="444" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">22일</text>

  <text x="84" y="484" font-family="Georgia, serif" font-size="22" fill="#d9a090">SK하이닉스</text>
  <text x="230" y="484" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+10.88%</text>

  <text x="550" y="484" font-family="Georgia, serif" font-size="22" fill="#d9a090">USD/KRW</text>
  <text x="690" y="484" font-family="Georgia, serif" font-size="22" fill="#6ec46e">1,529.16</text>

  <!-- Divider -->
  <rect x="84" y="508" width="750" height="1" fill="#d96552" opacity="0.2"/>

  <!-- Scenario -->
  <text x="84" y="544" font-family="Georgia, serif" font-size="19" fill="#d96552" opacity="0.85">베이스(45%): S&amp;P 7,300~7,600 박스 · 불(20%): 반도체 동조 시 7,600+</text>

  <!-- Brand mark -->
  <polygon points="84,592 92,584 100,592 92,600" fill="#d96552" opacity="0.5"/>
  <text x="110" y="597" font-family="Georgia, serif" font-size="14" fill="#a04030">lincoln-brief.vercel.app</text>

  <!-- Right decorative -->
  <rect x="1200" y="60" width="1" height="600" fill="#d96552" opacity="0.15"/>
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#d96552" opacity="0.3"/>
</svg>
