<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a10"/>
      <stop offset="100%" stop-color="#080e08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8aff9a"/>
      <stop offset="50%" stop-color="#6ba368"/>
      <stop offset="100%" stop-color="#4a7a4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6ba368" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e0ffe0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6ba368">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" text-anchor="end">2026.06.19 · ECONOMY ISSUE</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#6ba368">— 달러 독주 현상 —</text>
  <text x="80" y="265" font-family="Georgia, serif" font-size="62" font-weight="500" fill="#e0ffe0">달러 1,535원</text>
  <text x="80" y="335" font-family="Georgia, serif" font-size="52" font-style="italic" fill="url(#green)">FOMC 대기 쏠림</text>
  <text x="80" y="385" font-family="sans-serif" font-size="18" fill="#70a870">Gold −2.53% · WTI $74.11(−3.49%) · BTC −4.64% 동반 약세</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#70a870">FX · USD/KRW</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e0ffe0">1,535.18</text>
      <polygon points="0,82 14,82 7,96" fill="#d96552"/>
      <text x="22" y="89" font-family="monospace" font-size="14" fill="#d96552">+1.60%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#70a870">COMMODITY · Gold</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e0ffe0">$4,248.70</text>
      <polygon points="0,82 14,82 7,96" fill="#d96552"/>
      <text x="22" y="89" font-family="monospace" font-size="14" fill="#d96552">−2.53%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#70a870">OIL · WTI</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e0ffe0">$74.11</text>
      <polygon points="0,82 14,82 7,96" fill="#d96552"/>
      <text x="22" y="89" font-family="monospace" font-size="14" fill="#d96552">−3.49% $75 이탈</text>
    </g>
    <!-- BTC -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#70a870">CRYPTO · BTC</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e0ffe0">$62,560</text>
      <polygon points="0,82 14,82 7,96" fill="#d96552"/>
      <text x="22" y="89" font-family="monospace" font-size="14" fill="#d96552">−4.64%</text>
    </g>
  </g>

  <!-- 하단 라인 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#6ba368" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#70a870">S&amp;P 7,508(+1.19%) vs Gold·WTI·BTC 동반 약세 · FOMC 앞 달러 집중</text>
</svg>
