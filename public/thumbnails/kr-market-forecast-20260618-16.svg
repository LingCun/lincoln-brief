<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c10"/>
      <stop offset="100%" style="stop-color:#101418"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="427" y1="0" x2="427" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="853" y1="0" x2="853" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar — red/gold for forecast -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7050" letter-spacing="2">KR MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1060" y="28" width="180" height="36" rx="3" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1150" y="51" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="1">2026.06.18 · 16:00</text>

  <!-- Diamond -->
  <polygon points="640,108 648,116 640,124 632,116" fill="#d8b878" fill-opacity="0.6"/>

  <!-- Eyebrow -->
  <text x="640" y="158" font-family="Georgia, serif" font-size="19" fill="#8a7050" text-anchor="middle" letter-spacing="3">9,000 돌파 — 다음 목표는?</text>

  <!-- KOSPI number -->
  <text x="640" y="260" font-family="Georgia, serif" font-size="104" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-2">9,063.84</text>

  <!-- KOSPI label -->
  <text x="640" y="302" font-family="Georgia, serif" font-size="22" fill="#d8b878" text-anchor="middle" letter-spacing="4">KOSPI</text>

  <!-- Change indicator -->
  <polygon points="556,326 568,310 580,326" fill="#4ade80"/>
  <text x="590" y="327" font-family="Georgia, serif" font-size="24" fill="#4ade80" font-weight="bold">+2.25%  불 시나리오 60%</text>

  <!-- Gold separator -->
  <line x1="160" y1="365" x2="1120" y2="365" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Scenario table -->
  <!-- Bull -->
  <rect x="160" y="382" width="960" height="36" rx="3" fill="#4ade80" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="180" y="405" font-family="Georgia, serif" font-size="16" fill="#4ade80" font-weight="bold">불 60%</text>
  <text x="320" y="405" font-family="Georgia, serif" font-size="15" fill="#9ca3af">9,000 안착 → 9,200 탐색</text>
  <text x="980" y="405" font-family="Georgia, serif" font-size="15" fill="#8a7050" text-anchor="end">USD/KRW 1,520원대 복귀 · NVDA $205+</text>

  <!-- Base -->
  <rect x="160" y="426" width="960" height="36" rx="3" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="180" y="449" font-family="Georgia, serif" font-size="16" fill="#d8b878" font-weight="bold">베이스 22%</text>
  <text x="320" y="449" font-family="Georgia, serif" font-size="15" fill="#9ca3af">9,000~9,100 박스 소화</text>
  <text x="980" y="449" font-family="Georgia, serif" font-size="15" fill="#8a7050" text-anchor="end">추가 촉매 부재</text>

  <!-- Bear -->
  <rect x="160" y="470" width="960" height="36" rx="3" fill="#f87171" fill-opacity="0.08" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="180" y="493" font-family="Georgia, serif" font-size="16" fill="#f87171" font-weight="bold">베어 13%</text>
  <text x="320" y="493" font-family="Georgia, serif" font-size="15" fill="#9ca3af">8,800~9,000 되돌림</text>
  <text x="980" y="493" font-family="Georgia, serif" font-size="15" fill="#8a7050" text-anchor="end">USD/KRW 1,550+ · NVDA $195 이탈</text>

  <!-- Black Swan -->
  <rect x="160" y="514" width="960" height="36" rx="3" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>
  <text x="180" y="537" font-family="Georgia, serif" font-size="16" fill="#a78bfa" font-weight="bold">블랙 스완 5%</text>
  <text x="320" y="537" font-family="Georgia, serif" font-size="15" fill="#9ca3af">8,000 이탈</text>
  <text x="980" y="537" font-family="Georgia, serif" font-size="15" fill="#8a7050" text-anchor="end">글로벌 신용·지정학 이벤트</text>

  <!-- Gold separator -->
  <line x1="160" y1="568" x2="1120" y2="568" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Key metrics bottom -->
  <text x="320" y="600" font-family="Georgia, serif" font-size="14" fill="#8a7050" text-anchor="middle" letter-spacing="1">USD/KRW</text>
  <text x="320" y="632" font-family="Georgia, serif" font-size="26" fill="#f87171" text-anchor="middle" font-weight="bold">1,537.19원</text>
  <text x="320" y="654" font-family="Georgia, serif" font-size="14" fill="#6b7280" text-anchor="middle">안착 최대 변수</text>

  <line x1="640" y1="575" x2="640" y2="665" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>

  <text x="960" y="600" font-family="Georgia, serif" font-size="14" fill="#8a7050" text-anchor="middle" letter-spacing="1">US10Y</text>
  <text x="960" y="632" font-family="Georgia, serif" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="bold">4.463%</text>
  <text x="960" y="654" font-family="Georgia, serif" font-size="14" fill="#6b7280" text-anchor="middle">4.4% 이하 미충족</text>

  <!-- Bottom tagline -->
  <text x="640" y="700" font-family="Georgia, serif" font-size="13" fill="#8a7050" text-anchor="middle" letter-spacing="2">lincoln-brief.vercel.app</text>
</svg>
