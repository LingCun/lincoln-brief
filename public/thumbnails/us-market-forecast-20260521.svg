<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="100%" stop-color="#0a0606"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87d6a"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b54535"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="330" fill="url(#glow)"/>
  <circle cx="200" cy="580" r="270" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5e0db">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.21 · MARKET FORECAST</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 4주 시장 전망 —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5e0db">NVDA 이후,</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="52" font-style="italic" fill="url(#red)">Fed·PCE·CPI가 결정한다</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#a08070">S&amp;P 500  7,420.91  +0.92%  ·  WTI  $99.08  −4.87%</text>

  <!-- 이벤트 타임라인 -->
  <g transform="translate(80, 460)">
    <!-- NVDA -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#a08070">5/21 · TONIGHT</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5e0db">NVDA 실적</text>
      <text x="0" y="83" font-family="monospace" font-size="12" fill="#d96552">AI 사이클 확인</text>
    </g>
    <!-- Fed 회의록 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#a08070">5/29 · FED</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5e0db">회의록 발표</text>
      <text x="0" y="83" font-family="monospace" font-size="12" fill="#d96552">7월 인하 단서</text>
    </g>
    <!-- PCE -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#a08070">5/30 · PCE</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5e0db">4월 PCE</text>
      <text x="0" y="83" font-family="monospace" font-size="12" fill="#d96552">인플레 체온계</text>
    </g>
    <!-- CPI -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#a08070">6/11 · CPI</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5e0db">5월 CPI</text>
      <text x="0" y="83" font-family="monospace" font-size="12" fill="#d96552">금리 최종 결정</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d96552" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8">MAY 21 · 2026 · THU · 4-WEEK OUTLOOK</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
