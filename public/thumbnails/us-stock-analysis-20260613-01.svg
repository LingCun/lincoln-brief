<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c14"/>
      <stop offset="100%" style="stop-color:#0e1a2a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5677b0"/>
      <stop offset="100%" style="stop-color:#7090cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left blue accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#5677b0"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#5677b0" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#5677b0" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1030" y="28" width="210" height="36" rx="4" fill="#5677b0" opacity="0.15"/>
  <rect x="1030" y="28" width="210" height="36" rx="4" fill="none" stroke="#5677b0" stroke-width="1" opacity="0.5"/>
  <text x="1135" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#5677b0" text-anchor="middle">US STOCK ANALYSIS</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">2026.06.13  |  SLOT 01  |  KST 01:00</text>

