<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0a"/>
      <stop offset="100%" stop-color="#100806"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05555" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e05555" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="200" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.25 16:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#e07a45">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="260" height="30" rx="4" fill="#e07a45" fill-opacity="0.15" stroke="#e07a45" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e07a45">USD/KRW · 원화 구조적 약세 분석</text>

  <!-- Main title -->
  <text x="80" y="288" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">원화 1,517원</text>
  <text x="80" y="346" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">구조적 약세의 3가지 배경과 역전 조건</text>
  <text x="80" y="394" font-family="sans-serif" font-size="17" fill="#d8a898">WTI $112.25 · 미국 10년물 4.57% · 금 $4,568</text>

  <!-- Divider -->
  <line x1="80" y1="430" x2="1200" y2="430" stroke="#4a2a1a" stroke-width="1"/>

  <!-- Three factors -->
  <g transform="translate(80, 466)">
    <!-- Factor 1 -->
    <g>
      <rect x="0" y="0" width="310" height="86" rx="6" fill="#e07a45" fill-opacity="0.12" stroke="#e07a45" stroke-width="0.8"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#e07a45">배경 1 · 에너지</text>
      <text x="14" y="52" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">WTI $112.25/bbl</text>
      <text x="14" y="74" font-family="monospace" font-size="12" fill="#c8988a">수입 비용 → 무역수지 압박</text>
    </g>
    <!-- Factor 2 -->
    <g transform="translate(336, 0)">
      <rect x="0" y="0" width="310" height="86" rx="6" fill="#e07a45" fill-opacity="0.12" stroke="#e07a45" stroke-width="0.8"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#e07a45">배경 2 · 금리 차</text>
      <text x="14" y="52" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">미 10년물 4.57%</text>
      <text x="14" y="74" font-family="monospace" font-size="12" fill="#c8988a">달러 자산 선호 → 원화 매도</text>
    </g>
    <!-- Factor 3 -->
    <g transform="translate(672, 0)">
      <rect x="0" y="0" width="310" height="86" rx="6" fill="#e07a45" fill-opacity="0.12" stroke="#e07a45" stroke-width="0.8"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#e07a45">배경 3 · 안전자산</text>
      <text x="14" y="52" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">금 $4,568.82</text>
      <text x="14" y="74" font-family="monospace" font-size="12" fill="#c8988a">위험회피 → 신흥국 통화 약세</text>
    </g>
  </g>

  <!-- Key stat -->
  <text x="80" y="614" font-family="monospace" font-size="14" letter-spacing="2" fill="#e07a45">역전 조건: 6/11 CPI 서프라이즈 하락 → 10년물↓ · 달러↓ · 원화 1,500원 이하</text>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#4a2a1a" stroke-width="0.5"/>
  <text x="80" y="685" font-family="monospace" font-size="11" letter-spacing="2" fill="#8a5a4a">베이스(45%): 1,500~1,520원 유지  |  강세(25%): 1,480원 이하  |  약세(25%): 1,530원+</text>
  <text x="1200" y="685" font-family="monospace" font-size="11" fill="#8a5a4a" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
