  <text x="48" y="640" font-family="'Georgia', serif" font-size="18" fill="#5677b0" opacity="0.7" font-style="italic">WTI $90 이하 복귀 여부가 반등 지속의 핵심 조건</text>

  <!-- Diamond accent -->
  <polygon points="1232,360 1242,370 1232,380 1222,370" fill="#5677b0" opacity="0.4"/>
