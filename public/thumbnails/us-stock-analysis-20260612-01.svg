  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#7a9fd8" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
