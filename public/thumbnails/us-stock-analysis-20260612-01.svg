  <text x="218" y="500" font-family="'Georgia', serif" font-size="20" fill="#22c55e" text-anchor="middle" font-weight="bold">35%</text>

  <rect x="408" y="450" width="340" height="60" rx="4" fill="#ef4444" opacity="0.12"/>
  <rect x="408" y="450" width="340" height="60" rx="4" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <text x="578" y="476" font-family="'Arial', sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">일시적 기술적 반등</text>
  <text x="578" y="500" font-family="'Georgia', serif" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">35%</text>

