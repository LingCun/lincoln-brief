  <text x="48" y="218" font-family="'Georgia', serif" font-size="52" fill="#f0f4ff" font-weight="bold">$383.10</text>
  <polygon points="280,188 300,188 290,172" fill="#22c55e"/>
  <text x="306" y="208" font-family="'Georgia', serif" font-size="42" fill="#22c55e" font-weight="bold">+2.96%</text>

