  <rect x="48" y="300" width="240" height="80" rx="6" fill="#0e1826" stroke="#5677b0" stroke-width="1" opacity="0.8"/>
  <text x="168" y="328" font-family="'Arial', sans-serif" font-size="12" fill="#6a7a9a" text-anchor="middle" letter-spacing="1">6/10 FOMC 충격</text>
  <text x="168" y="358" font-family="'Georgia', serif" font-size="28" fill="#ef4444" text-anchor="middle" font-weight="bold">$372.10</text>
  <text x="168" y="376" font-family="'Arial', sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">−5.12%</text>

  <rect x="308" y="300" width="240" height="80" rx="6" fill="#0e1826" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="428" y="328" font-family="'Arial', sans-serif" font-size="12" fill="#6a7a9a" text-anchor="middle" letter-spacing="1">6/11 오늘 현재</text>
  <text x="428" y="358" font-family="'Georgia', serif" font-size="28" fill="#22c55e" text-anchor="middle" font-weight="bold">$383.10</text>
  <text x="428" y="376" font-family="'Arial', sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">+2.96%</text>

  <rect x="568" y="300" width="240" height="80" rx="6" fill="#0e1826" stroke="#5677b0" stroke-width="1" opacity="0.8"/>
  <text x="688" y="328" font-family="'Arial', sans-serif" font-size="12" fill="#6a7a9a" text-anchor="middle" letter-spacing="1">FOMC 직전 6/9</text>
  <text x="688" y="358" font-family="'Georgia', serif" font-size="28" fill="#f0f4ff" text-anchor="middle" font-weight="bold">$392.16</text>
  <text x="688" y="376" font-family="'Arial', sans-serif" font-size="13" fill="#6a7a9a" text-anchor="middle">다음 목표선</text>

