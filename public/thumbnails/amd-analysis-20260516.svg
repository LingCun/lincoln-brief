<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="darkOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0.94"/>
      <stop offset="55%" stop-color="#150b07" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
  </defs>

  <image href="/thumbnails/photos/amd-data-center-gpu.jpg" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="720" fill="url(#darkOverlay)"/>
  <rect x="0" y="0"   width="1280" height="120" fill="url(#topFade)"/>
  <rect x="0" y="600" width="1280" height="120" fill="url(#bottomFade)"/>

  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.16 · STOCK ANALYSIS</text>

  <text x="80" y="270" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 종목 분석 · AMD —</text>

  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">펀더멘털은 신고치,</text>
  <text x="80" y="440" font-family="Playfair Display, Georgia, serif" font-size="68" font-style="italic" fill="url(#goldGrad)">가격은 NVDA</text>

  <text x="80" y="500" font-family="Pretendard, sans-serif" font-size="22" fill="#c4b89e">Q1 데이터센터 +57% · Q2 가이드 +46% 와중에 −5.69%</text>
  <text x="80" y="534" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">NVDA 5/20 실적 D-5 · MI400 사이클 2027</text>

  <g transform="translate(940, 470)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">AMD CLOSE 5/15</text>
    <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="44" fill="#f5edd9">$424.10</text>
    <text x="0" y="100" font-family="monospace" font-size="14" fill="#e87053">−5.69% / −$25.60</text>
  </g>

  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.16 SAT · 09:00 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">PHOTO · UNSPLASH</text>
</svg>
