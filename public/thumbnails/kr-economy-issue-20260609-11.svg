<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d0a"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#20a870" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#20a870" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.09 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="158" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="174" width="540" height="30" rx="4" fill="#20a870" fill-opacity="0.18" stroke="#20a870" stroke-width="0.8"/>
  <text x="92" y="194" font-family="monospace" font-size="12" letter-spacing="2" fill="#40c890">USD/KRW 9거래일 만에 의미 있는 강세 전환</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="70" font-weight="500" fill="#f5edd9">원화 1,516원</text>
  <text x="80" y="366" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">외국인 귀환인가, 기술적 되돌림인가</text>
  <text x="80" y="412" font-family="sans-serif" font-size="17" fill="#8a9898">USD/KRW −2.44% · KOSPI +7.52% 동반 상승 · 수급 확인 필요</text>

  <!-- Divider -->
  <line x1="80" y1="446" x2="1200" y2="446" stroke="#1a2a1a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 480)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#40c890" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#40c890">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,516.55</text>
      <polygon points="0,72 14,88 28,72" fill="#40d870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40d870">−2.44%</text>
    </g>
    <!-- KOSPI -->
    <g transform="translate(270, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">8,047</text>
      <polygon points="0,88 14,72 28,88" fill="#40d870" transform="rotate(180,14,80)"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40d870">+7.52%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(530, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$90.21</text>
      <polygon points="0,72 14,88 28,72" fill="#40d870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40d870">−1.19%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.552%</text>
      <polygon points="0,88 14,72 28,88" fill="#e0a030" transform="rotate(180,14,80)"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e0a030">+0.35%</text>
    </g>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#1a2a1a" stroke-width="0.5"/>
  <text x="80" y="708" font-family="monospace" font-size="10" letter-spacing="2" fill="#6a5a40">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
