  <line x1="160" y1="372" x2="1120" y2="372" stroke="#7a9d6e" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel — 빅테크 하락 -->
  <rect x="80" y="392" width="480" height="200" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="426" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">빅테크 전일 마감</text>
  <text x="120" y="462" font-family="Georgia, serif" font-size="14" fill="#888888">GOOGL</text>
  <text x="530" y="462" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−4.99%</text>
  <text x="120" y="490" font-family="Georgia, serif" font-size="14" fill="#888888">AMZN</text>
  <text x="530" y="490" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−4.75%</text>
  <text x="120" y="518" font-family="Georgia, serif" font-size="14" fill="#888888">AVGO</text>
  <text x="530" y="518" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−4.67%</text>
  <text x="120" y="546" font-family="Georgia, serif" font-size="14" fill="#888888">MSFT</text>
  <text x="530" y="546" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−3.18%</text>
  <text x="120" y="574" font-family="Georgia, serif" font-size="12" fill="#507050">HBM 최종 수요처 동반 약세</text>

  <!-- Right panel — 한국 연동 -->
  <rect x="600" y="392" width="600" height="200" rx="4" fill="#7a9d6e" fill-opacity="0.05" stroke="#7a9d6e" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="426" font-family="Georgia, serif" font-size="16" fill="#7a9d6e" text-anchor="middle" letter-spacing="2">한국 연동 현황</text>
  <text x="650" y="462" font-family="Georgia, serif" font-size="13" fill="#707070">AVGO 어제</text>
  <text x="1160" y="462" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">+4.70%</text>
  <text x="650" y="488" font-family="Georgia, serif" font-size="13" fill="#707070">→ SK하이닉스 어제</text>
  <text x="1160" y="488" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">+5.72%</text>
  <text x="650" y="520" font-family="Georgia, serif" font-size="13" fill="#707070">AVGO 오늘</text>
  <text x="1160" y="520" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−4.67%</text>
  <text x="650" y="546" font-family="Georgia, serif" font-size="13" fill="#707070">→ SK하이닉스 오늘</text>
  <text x="1160" y="546" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−7.06%</text>
  <text x="650" y="574" font-family="Georgia, serif" font-size="12" fill="#507050">레버리지 연동 구조 확인</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#7a9d6e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">US10Y 4.509%</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+1.30% · 기술주 밸류 압박</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">USD/KRW 1,533.78원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+0.16% · KOSPI −5%에도 안정</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">NASDAQ −1.32%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">기술주 집중 하락 구조</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#7a9d6e" fill-opacity="0.5"/>
</svg>
