  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle" letter-spacing="1">2026.06.23 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#7a9d6e" fill-opacity="0.7"/>

  <!-- Main headline -->
  <text x="640" y="170" font-family="Georgia, serif" font-size="20" fill="#90b080" text-anchor="middle" letter-spacing="3">미국 빅테크 급락 경제 이슈</text>
  <text x="640" y="236" font-family="Georgia, serif" font-size="60" fill="#ffffff" text-anchor="middle" font-weight="bold">GOOGL −4.99%</text>
  <text x="640" y="286" font-family="Georgia, serif" font-size="40" fill="#f87171" text-anchor="middle" font-weight="bold">AVGO −4.67%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#5a7a50" text-anchor="middle">AI 내러티브 동요 · HBM 수출 구조 취약성</text>

