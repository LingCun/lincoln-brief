      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e0ecff">$481.57</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#7090b0">피크 기준</text>
    </g>
    <!-- 이틀 합산 -->
