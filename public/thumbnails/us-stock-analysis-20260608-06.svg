      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090b0">FOMC</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e0ecff">D-3</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#5677b0">6/11(수)</text>
