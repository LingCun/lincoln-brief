      <line x1="0" y1="0" x2="50" y2="0" stroke="#c06060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090b0">2DAY DROP</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e0ecff">−19.5%</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#c06060">6/4+6/5</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(720, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#c08040" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090b0">US10Y</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e0ecff">4.536%</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#c08040">역풍</text>
    </g>
