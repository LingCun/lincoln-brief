  <!-- 하단 구분선 -->
  <line x1="80" y1="580" x2="1200" y2="580" stroke="#5677b0" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="608" font-family="monospace" font-size="11" fill="#3a5880" letter-spacing="2">6/5 CLOSE · AVGO 가이던스 쇼크 · AI ASIC 공급망 재평가 · FOMC(6/11) D-3</text>
  <text x="80" y="635" font-family="monospace" font-size="10" fill="#2a4060">SLOT 06 · STOCK ANALYSIS · lincoln-brief.vercel.app</text>
