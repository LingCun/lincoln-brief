  <line x1="160" y1="614" x2="1120" y2="614" stroke="#7a9d6e" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">GOLD $4,066.23</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#3a6030" text-anchor="middle">−1.08% · 안전자산도 매도</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">WTI $72.72 / BTC $62,519</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#3a6030" text-anchor="middle">−0.67% / −2.14% 동반 하락</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle">NASDAQ −2.21%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#3a6030" text-anchor="middle">NVDA $200.04 / TSLA $381.61</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#7a9d6e" fill-opacity="0.5"/>
