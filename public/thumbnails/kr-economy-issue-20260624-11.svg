  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#90b080" text-anchor="middle" letter-spacing="1">2026.06.24 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.7"/>

  <!-- US10Y main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#90b080" text-anchor="middle" letter-spacing="4">미국 10년물 국채 수익률</text>
  <text x="640" y="272" font-family="Georgia, serif" font-size="100" fill="#ffffff" text-anchor="middle" font-weight="bold">4.493%</text>
  <polygon points="548,292 566,310 584,292" fill="#f87171"/>
  <text x="596" y="316" font-family="Georgia, serif" font-size="32" fill="#f87171" font-weight="bold">+0.94%</text>
  <text x="640" y="356" font-family="Georgia, serif" font-size="18" fill="#804030" text-anchor="middle">고금리 장기화 재점화 — NASDAQ −2.21% 동반</text>

  <!-- Divider -->
  <line x1="160" y1="384" x2="1120" y2="384" stroke="#7a9d6e" stroke-opacity="0.2" stroke-width="1"/>

  <!-- USD/KRW panel -->
  <rect x="80" y="404" width="480" height="190" rx="4" fill="#7a9d6e" fill-opacity="0.05" stroke="#7a9d6e" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="436" font-family="Georgia, serif" font-size="16" fill="#5a8050" text-anchor="middle" letter-spacing="2">USD/KRW</text>
  <text x="320" y="498" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">1,539.28</text>
  <text x="320" y="518" font-family="Georgia, serif" font-size="14" fill="#5a8050" text-anchor="middle">원 · 사실상 보합</text>
