  <rect x="600" y="404" width="600" height="190" rx="4" fill="#7a9d6e" fill-opacity="0.04" stroke="#7a9d6e" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="436" font-family="Georgia, serif" font-size="16" fill="#5a8050" text-anchor="middle" letter-spacing="2">한국 경제 압박 경로</text>
  <text x="680" y="470" font-family="Georgia, serif" font-size="14" fill="#888888">달러 강세</text>
  <text x="1150" y="470" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">원화 약세 지속</text>
  <text x="680" y="498" font-family="Georgia, serif" font-size="14" fill="#888888">AI 성장주 밸류</text>
  <text x="1150" y="498" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">SK하이닉스 −2.50%</text>
  <text x="680" y="526" font-family="Georgia, serif" font-size="14" fill="#888888">금융 조달 비용</text>
  <text x="1150" y="526" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">KB금융 −1.37%</text>
  <text x="680" y="554" font-family="Georgia, serif" font-size="14" fill="#888888">가계 이자 부담</text>
  <text x="1150" y="554" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">내수 소비 위축 우려</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="13" fill="#3a5030">고금리 장기화의 이중 압박</text>

