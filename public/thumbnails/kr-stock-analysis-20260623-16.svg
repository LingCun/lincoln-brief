  <rect x="80" y="420" width="460" height="180" rx="4" fill="#5677b0" fill-opacity="0.05" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="310" y="454" font-family="Georgia, serif" font-size="15" fill="#7090c0" text-anchor="middle" letter-spacing="2">AVGO 연동 구조</text>
  <text x="140" y="490" font-family="Georgia, serif" font-size="13" fill="#888888">AVGO (전일)</text>
  <text x="520" y="490" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end">−4.67%</text>
  <text x="140" y="518" font-family="Georgia, serif" font-size="13" fill="#888888">SK하이닉스 반응</text>
  <text x="520" y="518" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end">−12.47%</text>
  <text x="140" y="546" font-family="Georgia, serif" font-size="13" fill="#888888">반응 배수</text>
  <text x="520" y="546" font-family="Georgia, serif" font-size="16" fill="#fb923c" text-anchor="end">×2.67</text>
