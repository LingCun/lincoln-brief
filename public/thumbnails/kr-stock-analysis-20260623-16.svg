  <text x="1170" y="518" font-family="Georgia, serif" font-size="16" fill="#ffffff" text-anchor="end">2,555,000원</text>
  <text x="610" y="546" font-family="Georgia, serif" font-size="13" fill="#888888">30일 최고가 (어제)</text>
  <text x="1170" y="546" font-family="Georgia, serif" font-size="16" fill="#fbbf24" text-anchor="end">2,919,000원</text>
