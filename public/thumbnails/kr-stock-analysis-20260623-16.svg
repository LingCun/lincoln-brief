  <text x="640" y="296" font-family="Georgia, serif" font-size="16" fill="#7090c0" text-anchor="middle">원</text>
  <polygon points="548,312 566,330 584,312" fill="#f87171"/>
  <text x="596" y="332" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−12.47%</text>
