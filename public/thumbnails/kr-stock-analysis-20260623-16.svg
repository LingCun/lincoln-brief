  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle" letter-spacing="1">2026.06.23 · 16:00</text>

  <!-- Diamond -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.7"/>

