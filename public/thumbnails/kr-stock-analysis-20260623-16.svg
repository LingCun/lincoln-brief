  <text x="640" y="706" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle" letter-spacing="1">KOSPI 8,203.84 (−9.99%) · AVGO $392.13 (−4.67%) · 2,400,000원 지지 여부가 다음 방향</text>
