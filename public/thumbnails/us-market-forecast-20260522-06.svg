<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180d0d"/>
      <stop offset="100%" stop-color="#0a0606"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e89090"/>
      <stop offset="50%" stop-color="#d86555"/>
      <stop offset="100%" stop-color="#b84535"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d86555" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d86555" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="240" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d86555" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#fde8e8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d86555">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d86555" text-anchor="end">2026.05.22 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d86555">— 시장 예측 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#fde8e8">메모리얼 데이 주간 전략</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#red)">5/29 Fed 회의록까지 대기 모드</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="17" fill="#a07070">S&amp;P 500 7,432.97  ·  DJIA 50,009  ·  10Y 4.57%</text>

  <!-- 이벤트 달력 -->
  <g transform="translate(80, 430)">
    <!-- 5/25 -->
    <rect x="0" y="0" width="240" height="80" rx="4" fill="#2a1010" stroke="#d86555" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="14" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07070">5/25 MON</text>
    <text x="14" y="54" font-family="Georgia, serif" font-size="20" fill="#fde8e8">메모리얼 데이</text>
    <text x="14" y="72" font-family="monospace" font-size="10" fill="#a07070">시장 휴장</text>

    <!-- 5/29 -->
    <rect x="260" y="0" width="240" height="80" rx="4" fill="#2a1010" stroke="#d86555" stroke-width="1.5"/>
    <text x="274" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#d86555">5/29 THU ★★★</text>
    <text x="274" y="54" font-family="Georgia, serif" font-size="20" fill="#fde8e8">Fed 회의록</text>
    <text x="274" y="72" font-family="monospace" font-size="10" fill="#d86555">7월 인하 단서</text>

    <!-- 5/30 -->
    <rect x="520" y="0" width="240" height="80" rx="4" fill="#2a1010" stroke="#d86555" stroke-width="1.5"/>
    <text x="534" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#d86555">5/30 FRI ★★★</text>
    <text x="534" y="54" font-family="Georgia, serif" font-size="20" fill="#fde8e8">4월 PCE</text>
    <text x="534" y="72" font-family="monospace" font-size="10" fill="#d86555">인플레 체온계</text>

    <!-- 6/18 -->
    <rect x="780" y="0" width="240" height="80" rx="4" fill="#2a1010" stroke="#d86555" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="794" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07070">6/18 THU</text>
    <text x="794" y="54" font-family="Georgia, serif" font-size="20" fill="#fde8e8">FOMC</text>
    <text x="794" y="72" font-family="monospace" font-size="10" fill="#a07070">금리 결정</text>
  </g>

  <!-- 하단 시나리오 요약 -->
  <text x="80" y="588" font-family="monospace" font-size="12" letter-spacing="2" fill="#a07070">베이스 40%  ·  불 케이스 25%  ·  베어 케이스 25%  ·  블랙 스완 10%</text>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d86555" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d86555" opacity="0.8">MAY 22 · 2026 · 5-WEEK MACRO CALENDAR</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d86555" opacity="0.8" text-anchor="end">SOURCE · FRED · FRANKFURTER</text>
</svg>
