  <text x="640" y="390" font-family="Arial, sans-serif" font-size="15" fill="#a09080">AMZN</text>
  <text x="640" y="418" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">$244.39</text>
