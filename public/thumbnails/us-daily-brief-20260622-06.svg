  <text x="846" y="418" font-family="Arial, sans-serif" font-size="22" fill="#4dcc88" font-weight="bold">+2.90%</text>

  <!-- Divider line -->
  <line x1="640" y1="448" x2="1220" y2="448" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

