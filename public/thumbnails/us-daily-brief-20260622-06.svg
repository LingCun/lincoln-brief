  <text x="640" y="490" font-family="Arial, sans-serif" font-size="15" fill="#a09080">JPM</text>
  <text x="640" y="518" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" font-weight="bold">$325.22</text>
  <polygon points="820,512 830,528 840,512" fill="#ff7777"/>
  <text x="846" y="518" font-family="Arial, sans-serif" font-size="22" fill="#ff7777" font-weight="bold">-2.47%</text>

