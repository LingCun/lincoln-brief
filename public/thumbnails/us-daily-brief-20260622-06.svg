  <text x="800" y="648" font-family="Arial, sans-serif" font-size="13" fill="#ff7777">↓</text>
  <text x="820" y="648" font-family="Arial, sans-serif" font-size="13" fill="#a09080">  GOLD $4,172.90</text>
  <text x="1055" y="648" font-family="Arial, sans-serif" font-size="13" fill="#ff7777">-1.21%</text>

  <!-- Bottom disclaimer -->
  <text x="640" y="688" font-family="Arial, sans-serif" font-size="11" fill="#605040" opacity="0.6">lincoln-brief.vercel.app · 정보 제공 목적 · 투자 권유 아님</text>
