<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a08"/>
      <stop offset="100%" stop-color="#200d0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.16 11:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 (SLOT 11) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="800" height="30" rx="4" fill="#d96552" fill-opacity="0.15" stroke="#d96552" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e08070">불 시나리오 45% 상향 · FOMC D-2 최종 점검 · ATH 115포인트</text>

  <!-- Main title -->
  <text x="80" y="305" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">KOSPI 8,713 — ATH 전방</text>
  <text x="80" y="368" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">불 시나리오 45% — FOMC D-2</text>
  <text x="80" y="414" font-family="sans-serif" font-size="17" fill="#c07060">3가지 조건: NVDA $210 ✓ · USD/KRW 1,510 △ · KOSPI 8,700 ✓</text>

  <!-- Divider -->
  <line x1="80" y1="448" x2="1200" y2="448" stroke="#241008" stroke-width="1"/>

  <!-- Scenario boxes -->
  <g transform="translate(80, 472)">
    <!-- 불 -->
    <rect x="0" y="0" width="240" height="90" rx="6" fill="#40e880" fill-opacity="0.12" stroke="#40e880" stroke-width="0.8"/>
    <text x="14" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#40e880">불 시나리오</text>
    <text x="14" y="50" font-family="Georgia, serif" font-size="22" fill="#f5edd9">45%</text>
    <text x="14" y="76" font-family="monospace" font-size="11" fill="#40c060">ATH(8,829) 재탈환</text>
    <!-- 베이스 -->
    <rect x="260" y="0" width="240" height="90" rx="6" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-width="0.8"/>
    <text x="274" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">베이스</text>
    <text x="274" y="50" font-family="Georgia, serif" font-size="22" fill="#f5edd9">30%</text>
    <text x="274" y="76" font-family="monospace" font-size="11" fill="#b89a60">8,600~8,900 박스</text>
    <!-- 베어 -->
    <rect x="520" y="0" width="240" height="90" rx="6" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="0.8"/>
    <text x="534" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d96552">베어</text>
    <text x="534" y="50" font-family="Georgia, serif" font-size="22" fill="#f5edd9">20%</text>
    <text x="534" y="76" font-family="monospace" font-size="11" fill="#b05040">8,200~8,600 되돌림</text>
    <!-- 블랙 스완 -->
    <rect x="780" y="0" width="200" height="90" rx="6" fill="#808080" fill-opacity="0.10" stroke="#808080" stroke-width="0.8"/>
    <text x="794" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#909090">블랙 스완</text>
    <text x="794" y="50" font-family="Georgia, serif" font-size="22" fill="#f5edd9">5%</text>
    <text x="794" y="76" font-family="monospace" font-size="11" fill="#707070">7,484 재시험</text>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#241008" stroke-width="1"/>
  <text x="80" y="682" font-family="monospace" font-size="10" letter-spacing="2" fill="#704840">※ 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="682" font-family="monospace" font-size="10" letter-spacing="2" fill="#704840" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
