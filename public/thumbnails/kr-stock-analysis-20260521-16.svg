<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="greenglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="220" r="320" fill="url(#greenglow)"/>
  <circle cx="160" cy="560" r="260" fill="url(#goldglow)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.21 16:00 KST · KR 종목분석</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#4db86b">— SK하이닉스 종목분석 —</text>

  <!-- Main title -->
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="66" font-weight="500" fill="#f5edd9">SK하이닉스</text>
  <text x="80" y="316" font-family="Playfair Display, Georgia, serif" font-size="50" font-style="italic" fill="url(#gold)">NVDA가 증명한 HBM 초수요</text>
  <text x="80" y="364" font-family="sans-serif" font-size="17" fill="#7eb89a">1,940,000원 · 하루 +195,000원 · 30일 저점 대비 +87.8%</text>

  <!-- Big number highlight -->
  <g transform="translate(80, 420)">
    <rect width="240" height="80" rx="6" fill="#1a3020" stroke="#4db86b" stroke-width="1" opacity="0.8"/>
    <text x="120" y="28" font-family="monospace" font-size="12" letter-spacing="4" fill="#7eb89a" text-anchor="middle">일변동</text>
    <text x="120" y="64" font-family="Playfair Display, Georgia, serif" font-size="40" fill="#4db86b" text-anchor="middle">+11.17%</text>
  </g>

  <g transform="translate(350, 420)">
    <rect width="260" height="80" rx="6" fill="#1a1a1a" stroke="#d8b878" stroke-width="1" opacity="0.8"/>
    <text x="130" y="28" font-family="monospace" font-size="12" letter-spacing="4" fill="#988e72" text-anchor="middle">30일 누적</text>
    <text x="130" y="64" font-family="Playfair Display, Georgia, serif" font-size="40" fill="#d8b878" text-anchor="middle">+87.8%</text>
  </g>

  <g transform="translate(640, 420)">
    <rect width="260" height="80" rx="6" fill="#1a1a1a" stroke="#988e72" stroke-width="1" opacity="0.6"/>
    <text x="130" y="28" font-family="monospace" font-size="12" letter-spacing="4" fill="#988e72" text-anchor="middle">30일 고점 대비</text>
    <text x="130" y="64" font-family="Playfair Display, Georgia, serif" font-size="40" fill="#f5edd9" text-anchor="middle">−1.8%</text>
  </g>

  <!-- Divider -->
  <line x1="80" y1="540" x2="1200" y2="540" stroke="#2a2a1a" stroke-width="1"/>

  <!-- Bottom info -->
  <text x="80" y="578" font-family="monospace" font-size="13" fill="#988e72">NVDA $223.47 (+1.30%) · HBM 최대 공급사 · 전일 1,745,000원</text>
  <text x="80" y="610" font-family="monospace" font-size="13" fill="#988e72">삼성전자 비교: 299,500원 (+8.51%) · 금일 전 종목 강세</text>

  <!-- Footer -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#2a2a1a" stroke-width="1"/>
  <text x="80" y="665" font-family="monospace" font-size="11" fill="#4a4a3a">USD/KRW 1,505.44 · 미국10년물 4.67% · 5/21 장 마감 기준</text>
  <text x="1200" y="665" font-family="monospace" font-size="10" fill="#4a4a3a" text-anchor="end">lincoln-brief.vercel.app</text>

  <!-- Diamond accent -->
  <polygon points="1210,360 1225,375 1210,390 1195,375" fill="none" stroke="#d8b878" stroke-width="1.5" opacity="0.5"/>
</svg>
