<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="100%" style="stop-color:#0e1220"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a0e8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#60a0e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a0e8;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#60a0e8" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a0e8" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#60a0e8" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3060a0" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#60a0e8" fill-opacity="0.1" stroke="#60a0e8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#80b8f0" text-anchor="middle" letter-spacing="1">2026.06.25 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a0e8" fill-opacity="0.5"/>

  <!-- MSFT main display -->
  <text x="640" y="160" font-family="Georgia, serif" font-size="22" fill="#80b8f0" text-anchor="middle" letter-spacing="4">MICROSOFT (MSFT)</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$365.46</text>
  <polygon points="548,284 566,302 584,284" fill="#f87171"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−2.27%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#504060" text-anchor="middle">12종목 최대 하락 · 30일 신저점</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#60a0e8" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 52-week low panel (left) -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#a04040" text-anchor="middle" letter-spacing="2">52주 저가 경계</text>
  <text x="320" y="470" font-family="Georgia, serif" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="bold">$356.28</text>
  <text x="320" y="508" font-family="Georgia, serif" font-size="18" fill="#f87171" text-anchor="middle">← $9.18 (−2.51%) 남음</text>
  <text x="320" y="544" font-family="Georgia, serif" font-size="14" fill="#705050" text-anchor="middle">30일 고점 $460.52 대비 −20.5%</text>
  <text x="320" y="572" font-family="Georgia, serif" font-size="14" fill="#705050" text-anchor="middle">52주 고점 $555.45 대비 −34.2%</text>

  <!-- Right panel: analysis data -->
  <rect x="600" y="386" width="600" height="208" rx="4" fill="#60a0e8" fill-opacity="0.03" stroke="#60a0e8" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="420" font-family="Georgia, serif" font-size="16" fill="#80b8f0" text-anchor="middle" letter-spacing="2">오늘 하락 배경</text>
  <text x="660" y="456" font-family="Georgia, serif" font-size="14" fill="#888888">Qualcomm</text>
  <text x="1160" y="456" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">AI 데이터센터 칩 진입</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="14" fill="#888888">CEO 경고</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">AI 집중 위험 공개 경고</text>
  <text x="660" y="512" font-family="Georgia, serif" font-size="14" fill="#888888">소매 이탈</text>
  <text x="1160" y="512" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">MSFT → SpaceX 재배분</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="14" fill="#888888">P/E (TTM)</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="14" fill="#80b8f0" text-anchor="end">21.77 · 목표가 $561.39</text>
  <text x="660" y="572" font-family="Georgia, serif" font-size="13" fill="#405060">펀더멘털 유지 · 심리 재평가 진행 중</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#60a0e8" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8f0" text-anchor="middle">시가총액 $2.715조</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#405060" text-anchor="middle">매출 TTM $318.27B</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8f0" text-anchor="middle">베이스(42%): $350~$380 박스</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#405060" text-anchor="middle">52주 저가 이탈 여부 핵심 관찰</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8f0" text-anchor="middle">US10Y 4.402%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#405060" text-anchor="middle">4.3% 이하 하락 시 반등 시나리오</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a0e8" fill-opacity="0.35"/>
</svg>
