  <text x="160" y="470" font-family="'Georgia', serif" font-size="20" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$84.29</text>
  <text x="160" y="490" font-family="'Arial', sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">−3.90% · 임계선 하회</text>

  <rect x="288" y="420" width="225" height="76" rx="4" fill="#0f0c04" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="445" font-family="'Arial', sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Gold ✓ 신규</text>
  <text x="400" y="470" font-family="'Georgia', serif" font-size="20" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$4,239</text>
  <text x="400" y="490" font-family="'Arial', sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">+3.66% · 피벗 선반영</text>

  <rect x="528" y="420" width="225" height="76" rx="4" fill="#0f0c04" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="445" font-family="'Arial', sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">US10Y △</text>
  <text x="640" y="470" font-family="'Georgia', serif" font-size="20" fill="#f5f0e8" text-anchor="middle" font-weight="bold">4.487%</text>
  <text x="640" y="490" font-family="'Arial', sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">4.4% 이하 목표</text>

  <rect x="768" y="420" width="225" height="76" rx="4" fill="#0f0c04" stroke="#888" stroke-width="1"/>
  <text x="880" y="445" font-family="'Arial', sans-serif" font-size="12" fill="#888" text-anchor="middle">파월 신호 ✗</text>
  <text x="880" y="470" font-family="'Georgia', serif" font-size="16" fill="#888" text-anchor="middle" font-weight="bold">미확인</text>
  <text x="880" y="490" font-family="'Arial', sans-serif" font-size="11" fill="#555" text-anchor="middle">의회 증언 대기</text>

  <!-- Bottom bar -->
  <rect x="0" y="630" width="1280" height="90" fill="#0f080a" opacity="0.9"/>
  <line x1="0" y1="630" x2="1280" y2="630" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <text x="48" y="668" font-family="'Arial', sans-serif" font-size="16" fill="#fbbf24">5 중 3 충족 — WTI ✓ · S&amp;P ✓ · Gold ✓</text>
  <text x="48" y="702" font-family="'Arial', sans-serif" font-size="14" fill="#666">다음 CPI 데이터가 심판 · 7,500 목표 진입 조건 형성 중</text>
  <text x="1232" y="702" font-family="'Arial', sans-serif" font-size="12" fill="#444" text-anchor="end">lincoln-brief.vercel.app</text>
