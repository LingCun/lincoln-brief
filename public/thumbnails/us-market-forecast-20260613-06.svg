  <text x="398" y="304" font-family="'Arial', sans-serif" font-size="12" fill="#f59e0b" letter-spacing="1">중립 유지</text>
  <text x="398" y="330" font-family="'Georgia', serif" font-size="24" fill="#f5f0e8" font-weight="bold">7,300~7,500</text>
  <rect x="600" y="288" width="52" height="28" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="626" y="308" font-family="'Georgia', serif" font-size="18" fill="#f59e0b" font-weight="bold" text-anchor="middle">34%</text>

