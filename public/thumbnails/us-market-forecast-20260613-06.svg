  <text x="716" y="330" font-family="'Georgia', serif" font-size="24" fill="#f5f0e8" font-weight="bold">7,000~7,200</text>
  <rect x="918" y="288" width="52" height="28" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="944" y="308" font-family="'Georgia', serif" font-size="18" fill="#ef4444" font-weight="bold" text-anchor="middle">19%</text>

