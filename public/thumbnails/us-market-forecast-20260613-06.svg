<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f080a"/>
      <stop offset="100%" style="stop-color:#1a0e10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
