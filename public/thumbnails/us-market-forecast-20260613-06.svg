  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#fbbf24" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1020" y="28" width="220" height="36" rx="4" fill="#f59e0b" opacity="0.15"/>
  <rect x="1020" y="28" width="220" height="36" rx="4" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="1130" y="52" font-family="'Arial', sans-serif" font-size="12" letter-spacing="2" fill="#fbbf24" text-anchor="middle">MARKET FORECAST</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#666" letter-spacing="1">2026.06.13  |  SLOT 06  |  KST 06:00</text>

