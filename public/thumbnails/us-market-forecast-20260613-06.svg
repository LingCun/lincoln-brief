  <rect x="48" y="278" width="300" height="70" rx="6" fill="#0a1f0d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="304" font-family="'Arial', sans-serif" font-size="12" fill="#22c55e" letter-spacing="1">비둘기 반전</text>
  <text x="80" y="330" font-family="'Georgia', serif" font-size="24" fill="#f5f0e8" font-weight="bold">7,500~7,600</text>
  <rect x="280" y="288" width="52" height="28" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="306" y="308" font-family="'Georgia', serif" font-size="18" fill="#22c55e" font-weight="bold" text-anchor="middle">41%</text>

