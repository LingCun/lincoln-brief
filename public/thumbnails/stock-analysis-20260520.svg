<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#060e06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ecf7e"/>
      <stop offset="50%" stop-color="#5bb85b"/>
      <stop offset="100%" stop-color="#3d9a3d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5bb85b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5bb85b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5bb85b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2e6e2e" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="200" cy="580" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5bb85b" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5bb85b">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5bb85b" text-anchor="end">2026.05.20 · STOCK ANALYSIS</text>

  <!-- 헤드라인 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5bb85b">— 종목 분석 · ELI LILLY —</text>
  <text x="80" y="258" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">LLY</text>
  <text x="220" y="258" font-family="Playfair Display, Georgia, serif" font-size="68" font-style="italic" fill="url(#green)"> $1,021</text>
  <text x="80" y="318" font-family="Playfair Display, Georgia, serif" font-size="42" fill="#c8e8c8">빨간 시장에서 홀로 오른</text>
  <text x="80" y="368" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#green)">GLP-1의 힘</text>
  <text x="80" y="415" font-family="Pretendard, sans-serif" font-size="17" fill="#6a8a6a">시장 −0.67% 하락 속, LLY 혼자 +3.37% — $1,000 심리선 재돌파</text>

  <!-- 데이터 패널 -->
  <g transform="translate(80, 468)">
    <!-- LLY 가격 블록 -->
    <line x1="0" y1="0" x2="60" y2="0" stroke="#5bb85b" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8a6a">HC · LLY · ELI LILLY</text>
    <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#f5edd9">$1,021.41</text>
    <polygon points="0,84 16,84 8,68" fill="#5bb85b"/>
    <text x="24" y="91" font-family="monospace" font-size="16" fill="#5bb85b">+3.37%</text>

    <!-- 저점 대비 회복 -->
    <g transform="translate(320, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#5bb85b" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8a6a">LOW → NOW</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#f5edd9">+20.0%</text>
      <text x="0" y="96" font-family="monospace" font-size="13" fill="#6a8a6a">$851.21 → $1,021</text>
    </g>

    <!-- S&P 대비 -->
    <g transform="translate(660, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#5bb85b" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8a6a">S&amp;P 500 SAME DAY</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#d96552">−0.67%</text>
      <text x="0" y="96" font-family="monospace" font-size="13" fill="#6a8a6a">역방향 강세</text>
    </g>

    <!-- GLP-1 키워드 -->
    <g transform="translate(980, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#5bb85b" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8a6a">THEME</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">GLP-1</text>
      <text x="0" y="96" font-family="monospace" font-size="13" fill="#6a8a6a">비만 치료제 슈퍼사이클</text>
    </g>
  </g>

  <!-- 하단 골드 선 -->
  <line x1="80" y1="685" x2="1200" y2="685" stroke="#5bb85b" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="703" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a5a3a">lincoln-brief.vercel.app</text>
  <text x="1200" y="703" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a5a3a" text-anchor="end">— Lincoln</text>
</svg>
