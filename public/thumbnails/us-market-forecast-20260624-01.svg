<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100606"/>
      <stop offset="100%" style="stop-color:#200f0f"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05050;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e05050;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e05050;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#e05050" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#e05050" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#e05050" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#e05050" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#803030" letter-spacing="2">US MARKET · MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#e05050" fill-opacity="0.1" stroke="#e05050" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#e07070" text-anchor="middle" letter-spacing="1">2026.06.24 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#e05050" fill-opacity="0.5"/>

  <!-- NASDAQ main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#e07070" text-anchor="middle" letter-spacing="4">NASDAQ</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">25,784</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−1.46%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#604040" text-anchor="middle">3일 −466포인트 · 26,000 이탈 · S&amp;P 7,400 직전</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#e05050" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <rect x="80" y="398" width="1100" height="196" rx="4" fill="#e05050" fill-opacity="0.03" stroke="#e05050" stroke-opacity="0.15" stroke-width="1"/>
  <text x="640" y="432" font-family="Georgia, serif" font-size="16" fill="#e05050" text-anchor="middle" letter-spacing="2">4주 시나리오</text>

  <!-- Scenario A -->
  <text x="100" y="466" font-family="Georgia, serif" font-size="14" fill="#4ade80">경로 A (10%)</text>
  <text x="360" y="466" font-family="Georgia, serif" font-size="14" fill="#606060">26,000 회복</text>
  <text x="700" y="466" font-family="Georgia, serif" font-size="13" fill="#505050">US10Y 4.2% 이하 + AI 매수 복귀</text>

  <!-- Scenario B -->
  <text x="100" y="498" font-family="Georgia, serif" font-size="14" fill="#c0a060">경로 B (35%)</text>
  <text x="360" y="498" font-family="Georgia, serif" font-size="14" fill="#808060">25,000~26,000 박스</text>
  <text x="700" y="498" font-family="Georgia, serif" font-size="13" fill="#505050">US10Y 4.4~4.6% + 추가 악재 없음</text>

  <!-- Scenario C -->
  <text x="100" y="530" font-family="Georgia, serif" font-size="14" fill="#f87171">경로 C (40%)</text>
  <text x="360" y="530" font-family="Georgia, serif" font-size="14" fill="#d06060">25,000 테스트</text>
  <text x="700" y="530" font-family="Georgia, serif" font-size="13" fill="#505050">US10Y 4.5%+ + S&amp;P 7,400 이탈</text>

  <!-- Scenario D -->
  <text x="100" y="562" font-family="Georgia, serif" font-size="14" fill="#9060a0">경로 D (15%)</text>
  <text x="360" y="562" font-family="Georgia, serif" font-size="14" fill="#705080">급락</text>
  <text x="700" y="562" font-family="Georgia, serif" font-size="13" fill="#505050">예상 외 매크로·지정학 충격</text>

  <text x="640" y="582" font-family="Georgia, serif" font-size="13" fill="#604040" text-anchor="middle">US10Y 4.477% (소폭 완화) · 핵심: S&amp;P 7,400 이탈 여부</text>

  <!-- Bottom bar -->
  <rect x="0" y="690" width="1280" height="30" fill="#e05050" fill-opacity="0.04"/>
  <text x="640" y="710" font-family="Georgia, serif" font-size="13" fill="#804040" text-anchor="middle" letter-spacing="1">경로 C(40%)·경로 B(35%) — 방향 결정의 핵심: S&amp;P 7,400</text>
</svg>
