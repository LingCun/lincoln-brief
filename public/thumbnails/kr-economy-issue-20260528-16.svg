<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150d1a"/>
      <stop offset="100%" stop-color="#0d0810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05555" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e05555" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="160" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.28 16:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 —</text>

  <!-- Top badge -->
  <rect x="80" y="176" width="400" height="30" rx="4" fill="#e05555" fill-opacity="0.15" stroke="#e05555" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e07070">KOSPI 회복 속 금융주 소외 · KB금융 −2.67%</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">한국 금융주 약세</text>
  <text x="80" y="352" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">KB금융·신한지주 2% 하락</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#8a9898">금리 하락 기대 + 경기 불확실성 · 반도체·배터리 테마 외곽 소외</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#3a2a3a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- KB금융 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05555" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#cc7070">KB금융</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">149,700원</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−2.67%</text>
    </g>
    <!-- 신한지주 -->
    <g transform="translate(300, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05555" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#cc7070">신한지주</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">92,800원</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−2.32%</text>
    </g>
    <!-- 미국 10년물 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">미국 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.481%</text>
      <polygon points="0,88 14,72 28,88" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.27%</text>
    </g>
    <!-- KOSPI 참조 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">8,185</text>
      <polygon points="0,88 14,72 28,88" fill="#e07050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07050">−0.53%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0a0808" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7870">셀트리온 −2.31% · 삼성전자 −2.44% · USD/KRW 1,500.30 · US 10Y 4.481%</text>
</svg>
