<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0f0b05"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c8982a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="120" r="420" fill="url(#glow1)"/>
  <circle cx="160" cy="640" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.29 16:00 KST · 경제 이슈</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 매크로 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="420" height="30" rx="4" fill="#f0c040" fill-opacity="0.15" stroke="#f0c040" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f0c040">금 + 주식 + 암호화폐 동반 상승</text>

  <!-- Main title -->
  <text x="80" y="292" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">GOLD $4,558</text>
  <text x="80" y="356" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#amber)">'모두가 오르는 장'의 의미</text>
  <text x="80" y="404" font-family="sans-serif" font-size="17" fill="#8a9898">KOSPI +3.55% · BTC $73,773 · 미국 10년물 4.455%</text>

  <!-- Divider -->
  <line x1="80" y1="438" x2="1200" y2="438" stroke="#4a3a10" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 472)">
    <!-- GOLD -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#f0c040" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#c09840">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$4,558</text>
      <polygon points="0,72 14,88 28,72" fill="#f0c040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#f0c040">+1.32%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">BTC</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$73,773</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+0.32%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$87.17</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−1.95%</text>
    </g>
    <!-- US 10Y -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">미국 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.455%</text>
      <polygon points="0,88 14,72 28,88" fill="#8aacaa"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#8aacaa">−0.58%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <line x1="80" y1="670" x2="600" y2="670" stroke="#4a3a10" stroke-width="0.5"/>
  <text x="80" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a6a38">lincoln-brief.vercel.app</text>
  <text x="1200" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a6a38" text-anchor="end">정보 제공 목적 · 투자 권유 아님</text>
</svg>
