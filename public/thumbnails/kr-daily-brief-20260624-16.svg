<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · DAILY BRIEF</text>

  <!-- Edition label -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.24 · 마감</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4ade80" fill-opacity="0.7"/>

  <!-- KOSPI main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">KOSPI 마감</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">8,471.02</text>
  <polygon points="520,284 538,266 556,284" fill="#4ade80"/>
  <text x="568" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+3.26%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#406050" text-anchor="middle">+267.18포인트 · 삼성전자 +9.84% 주도</text>

  <!-- Divider -->
  <line x1="160" y1="372" x2="1120" y2="372" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Samsung Electronics panel -->
  <rect x="80" y="394" width="480" height="200" rx="4" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="16" fill="#3a9060" text-anchor="middle" letter-spacing="2">삼성전자</text>
  <text x="320" y="490" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">340,500</text>
  <text x="320" y="514" font-family="Georgia, serif" font-size="14" fill="#3a9060" text-anchor="middle">원</text>
  <polygon points="264,524 280,506 296,524" fill="#4ade80"/>
  <text x="308" y="554" font-family="Georgia, serif" font-size="28" fill="#4ade80" font-weight="bold">+9.84%</text>
  <text x="320" y="578" font-family="Georgia, serif" font-size="13" fill="#3a6040" text-anchor="middle">310,000원 저점에서 반등</text>

  <!-- Side panel -->
  <rect x="600" y="394" width="600" height="200" rx="4" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#3a9060" text-anchor="middle" letter-spacing="2">오늘 주요 종목</text>
  <text x="620" y="466" font-family="Georgia, serif" font-size="15" fill="#888888">삼성바이오로직스</text>
  <text x="1170" y="466" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+8.80%</text>
  <text x="620" y="494" font-family="Georgia, serif" font-size="15" fill="#888888">셀트리온</text>
  <text x="1170" y="494" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+7.60%</text>
  <text x="620" y="522" font-family="Georgia, serif" font-size="15" fill="#888888">SK하이닉스</text>
  <text x="1170" y="522" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+0.98%</text>
  <text x="620" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">NASDAQ (전일)</text>
  <text x="1170" y="550" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−2.21%</text>
  <text x="620" y="578" font-family="Georgia, serif" font-size="13" fill="#3a6040">미국 역풍 뚫고 KOSPI 전면 반등</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">KOSDAQ 909.31</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+2.00% · 900선 회복</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,547.81원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.57% · 원화 소폭 약세</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NVDA $200.04</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−4.13% · $200선 위협</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
