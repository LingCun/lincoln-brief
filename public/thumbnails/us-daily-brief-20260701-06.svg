<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#d8b87800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left gold bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d8b878" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a08858" letter-spacing="2">US MARKET · 데일리시황</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.7" text-anchor="end">2026.07.01 · SLOT 06</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a08858" text-anchor="end">Q2 2026 FINAL · CONFIRMED</text>

  <!-- Main headline -->
  <text x="84" y="220" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff">Q2 최종 마감 확정</text>

  <!-- S&P 500 main data -->
  <text x="84" y="310" font-family="Georgia, serif" font-size="36" fill="#d8b878">S&amp;P 500</text>
  <text x="300" y="310" font-family="Georgia, serif" font-size="36" fill="#ffffff">7,499.36</text>
  <!-- Up triangle for S&P -->
  <polygon points="460,285 480,310 440,310" fill="#6ec46e"/>
  <text x="490" y="310" font-family="Georgia, serif" font-size="30" fill="#6ec46e">+0.79%</text>

  <!-- Divider line -->
  <rect x="84" y="330" width="700" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- NASDAQ row -->
  <text x="84" y="370" font-family="Georgia, serif" font-size="26" fill="#a08858">NASDAQ</text>
  <text x="270" y="370" font-family="Georgia, serif" font-size="26" fill="#ffffff">26,213.72</text>
  <polygon points="450,351 465,370 435,370" fill="#6ec46e"/>
  <text x="472" y="370" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+1.52%</text>

  <!-- DOW row -->
  <text x="640" y="370" font-family="Georgia, serif" font-size="26" fill="#a08858">DOW</text>
  <text x="710" y="370" font-family="Georgia, serif" font-size="26" fill="#ffffff">52,319.20</text>
  <polygon points="870,351 885,370 855,370" fill="#6ec46e"/>
  <text x="892" y="370" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+0.26%</text>

  <!-- Divider -->
  <rect x="84" y="390" width="700" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- Secondary data row -->
  <text x="84" y="430" font-family="Georgia, serif" font-size="22" fill="#a08858">META</text>
  <text x="174" y="430" font-family="Georgia, serif" font-size="22" fill="#ffffff">$563.29</text>
  <polygon points="320,414 334,430 306,430" fill="#6ec46e"/>
  <text x="341" y="430" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+0.12% 반등전환</text>

  <text x="700" y="430" font-family="Georgia, serif" font-size="22" fill="#a08858">US10Y</text>
  <text x="800" y="430" font-family="Georgia, serif" font-size="22" fill="#ffffff">4.418%</text>
  <polygon points="910,414 924,430 896,430" fill="#e87050"/>
  <text x="931" y="430" font-family="Georgia, serif" font-size="20" fill="#e87050">추가상승</text>

  <text x="84" y="475" font-family="Georgia, serif" font-size="22" fill="#a08858">USD/KRW</text>
  <text x="218" y="475" font-family="Georgia, serif" font-size="22" fill="#ffffff">1,546.93</text>
  <polygon points="336,475 350,459 322,459" fill="#6ec46e"/>
  <text x="357" y="475" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+0.34%</text>

  <text x="700" y="475" font-family="Georgia, serif" font-size="22" fill="#a08858">LLY</text>
  <text x="755" y="475" font-family="Georgia, serif" font-size="22" fill="#ffffff">$1,199.43</text>
  <polygon points="900,475 914,459 886,459" fill="#e87050"/>
  <text x="921" y="475" font-family="Georgia, serif" font-size="20" fill="#e87050">-2.48%</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="510" width="1116" height="1" fill="#d8b878" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="545" font-family="Georgia, serif" font-size="19" fill="#d8b878" opacity="0.85">01:00 중간집계 대비 갱신 — 8개 상승 4개 하락 · Q3 첫 분기점 7/3 고용보고서</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,600 92,592 100,600 92,608" fill="#d8b878" opacity="0.5"/>
  <text x="110" y="605" font-family="Georgia, serif" font-size="14" fill="#a08858">lincoln-brief.vercel.app</text>

  <!-- Right side decorative bar -->
  <rect x="1200" y="60" width="1" height="600" fill="#d8b878" opacity="0.15"/>

  <!-- Gold diamond accent top right -->
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#d8b878" opacity="0.3"/>
</svg>
