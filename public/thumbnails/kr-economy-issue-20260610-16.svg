<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081008"/>
      <stop offset="100%" stop-color="#0c180c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90e0a0"/>
      <stop offset="50%" stop-color="#52b452"/>
      <stop offset="100%" stop-color="#287828"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#52b452" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#52b452" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff6050" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff6050" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="440" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#52b452" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0f0d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#52b452">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#52b452" text-anchor="end">2026.06.10 16:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#52b452">— 경제 이슈 —</text>

  <!-- Paradox badge -->
  <rect x="80" y="176" width="600" height="30" rx="4" fill="#52b452" fill-opacity="0.18" stroke="#52b452" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#80e080">주가 −3.93% + 원화 강세 −0.38% 동시 발생 이틀 연속</text>

  <!-- Main title -->
  <text x="80" y="298" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#d0f0d0">원화 강세와 주가 급락</text>
  <text x="80" y="362" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#green)">수급 구조를 읽는 열쇠</text>
  <text x="80" y="410" font-family="sans-serif" font-size="17" fill="#7a9888">USD/KRW 1,523.06원 · 외국인 대규모 이탈 아닐 가능성 시사</text>

  <!-- Divider -->
  <line x1="80" y1="444" x2="1200" y2="444" stroke="#182018" stroke-width="1"/>

  <!-- Stats row -->
  <g transform="translate(80, 478)">
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#52b452" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#408840">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0f0d0">1,523.06</text>
      <polygon points="28,88 14,72 0,88" fill="#40c880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c880">−0.38%</text>
    </g>
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#52b452" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#408840">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0f0d0">7,730.82</text>
      <polygon points="0,72 14,88 28,72" fill="#ff6050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#ff6050">−3.93%</text>
    </g>
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#52b452" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#408840">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0f0d0">4.528%</text>
      <text x="0" y="87" font-family="monospace" font-size="12" fill="#7a9888">FRED 기준</text>
    </g>
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#52b452" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#408840">FOMC</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0f0d0">6/18~19</text>
      <text x="0" y="87" font-family="monospace" font-size="12" fill="#7a9888">달러 방향 결정</text>
    </g>
  </g>

  <!-- Bottom -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#182018" stroke-width="1"/>
  <text x="80" y="664" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#4a6848">— Lincoln</text>
  <text x="1200" y="664" font-family="monospace" font-size="11" letter-spacing="2" fill="#284028" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
