<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a08"/>
      <stop offset="100%" stop-color="#100606"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f08070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="380" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.02 11:00 KST · 시장 예측</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— MARKET FORECAST —</text>

  <!-- Scenario badge -->
  <rect x="80" y="176" width="360" height="30" rx="4" fill="#d96552" fill-opacity="0.16" stroke="#d96552" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#d96552">베이스 8,600~9,000 · 불 케이스 15%</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">KOSPI 8,733</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#red)">9,000 돌파 조건 재점검</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#8a9898">외국인 복귀 + 원화 안정 없이는 9,000이 멀다</text>

  <!-- Divider -->
  <line x1="80" y1="436" x2="1200" y2="436" stroke="#3a1a18" stroke-width="1"/>

  <!-- Scenario blocks -->
  <g transform="translate(80, 462)">
    <!-- 베이스 -->
    <rect x="0" y="0" width="240" height="110" rx="6" fill="#1a2a1a" stroke="#4db86b" stroke-width="1"/>
    <text x="120" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#4db86b" text-anchor="middle">베이스 45%</text>
    <text x="120" y="54" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f5edd9" text-anchor="middle">8,600~9,000</text>
    <text x="120" y="78" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">삼성 신고가 유지</text>
    <text x="120" y="96" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">원화 1,520원 미만</text>

    <!-- 불 케이스 -->
    <rect x="260" y="0" width="240" height="110" rx="6" fill="#1a1a2a" stroke="#5677b0" stroke-width="1"/>
    <text x="380" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#5677b0" text-anchor="middle">불 케이스 15%</text>
    <text x="380" y="54" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f5edd9" text-anchor="middle">9,000 돌파</text>
    <text x="380" y="78" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">미국 금리 하락</text>
    <text x="380" y="96" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">외국인 순매수 전환</text>

    <!-- 베어 케이스 -->
    <rect x="520" y="0" width="240" height="110" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
    <text x="640" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#e05555" text-anchor="middle">베어 케이스 35%</text>
    <text x="640" y="54" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f5edd9" text-anchor="middle">8,200~8,600</text>
    <text x="640" y="78" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">원화 추가 약세</text>
    <text x="640" y="96" font-family="sans-serif" font-size="11" fill="#8a9898" text-anchor="middle">반도체 차익 실현</text>

    <!-- 핵심 변수 -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#d96552">핵심 변수</text>
      <text x="0" y="50" font-family="sans-serif" font-size="14" fill="#f5edd9">USD/KRW 1,516원</text>
      <text x="0" y="70" font-family="sans-serif" font-size="14" fill="#f5edd9">US10Y 4.475%</text>
      <text x="0" y="90" font-family="sans-serif" font-size="14" fill="#f5edd9">SK하이닉스 방향</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#3a1a18" stroke-width="0.5"/>
  <text x="80" y="645" font-family="monospace" font-size="10" fill="#5a3a38" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="645" font-family="monospace" font-size="10" fill="#d96552" text-anchor="end">— Lincoln</text>
</svg>
