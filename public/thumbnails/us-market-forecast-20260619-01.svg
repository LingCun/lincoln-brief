<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1010"/>
      <stop offset="100%" stop-color="#0a0808"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9a8a"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84030"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#ffe8e0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.19 · MARKET FORECAST</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 4주 시나리오 —</text>
  <text x="80" y="265" font-family="Georgia, serif" font-size="62" font-weight="500" fill="#ffe8e0">S&amp;P 7,508</text>
  <text x="80" y="335" font-family="Georgia, serif" font-size="52" font-style="italic" fill="url(#red)">7,500 재탈환</text>
  <text x="80" y="385" font-family="sans-serif" font-size="18" fill="#b87870">FOMC 최대 촉매 · 베이스(40%) 7,450~7,550 박스권 지속</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 460)">
    <!-- A -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b87870">경로 A · BULL</text>
      <text x="0" y="64" font-family="Georgia, serif" font-size="26" fill="#ffe8e0">7,550+</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#6ba368">비둘기 FOMC · 20%</text>
    </g>
    <!-- B -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b87870">경로 B · BASE ★</text>
      <text x="0" y="64" font-family="Georgia, serif" font-size="26" fill="#ffe8e0">7,450~7,550</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#d8b878">박스 횡보 · 40%</text>
    </g>
    <!-- C -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b87870">경로 C · BEAR</text>
      <text x="0" y="64" font-family="Georgia, serif" font-size="26" fill="#ffe8e0">7,400 재테스트</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#d96552">달러 강세 심화 · 30%</text>
    </g>
    <!-- D -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b87870">경로 D · BLACK SWAN</text>
      <text x="0" y="64" font-family="Georgia, serif" font-size="26" fill="#ffe8e0">7,350 이하</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#d96552">매크로 충격 · 10%</text>
    </g>
  </g>

  <!-- 하단 라인 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#b87870">USD/KRW 1,535.18 · US10Y 4.443% · AVGO $407.155</text>
</svg>
