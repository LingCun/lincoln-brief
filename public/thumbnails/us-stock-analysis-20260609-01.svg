<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88aaee"/>
      <stop offset="50%" stop-color="#6690d8"/>
      <stop offset="100%" stop-color="#4470b8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6690d8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6690d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#60a060" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#60a060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6690d8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a8c8f0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6690d8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6690d8" text-anchor="end">2026.06.09 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6690d8">— TSLA 종목 분석 · 스페이스X IPO · 중국 판매 +22% —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="600" fill="#c8e0f8">TSLA $411.65</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#blue)">+5.28% · 스페이스X IPO 기대 · 중국 판매 반등</text>
  <text x="80" y="370" font-family="sans-serif" font-size="18" fill="#7090a0">6/5 −6.56% 낙폭 대부분 복원  |  시총 $1.2조  |  30일 고점 $445 대비 −7.5%</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 445)">
    <!-- 현재가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#60a060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">6/8 종가</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#c8e0f8">$411.65</text>
      <polygon points="0,90 14,90 7,76" fill="#60a060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#60a060">+5.28%</text>
    </g>
    <!-- 6/5 종가 -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#c06060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">6/5 종가</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#c8e0f8">$391.00</text>
      <polygon points="7,90 0,76 14,76" fill="#c06060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#c06060">−6.56%</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6690d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">30일 고점</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#c8e0f8">$445.00</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#6690d8">−7.5% 아래</text>
    </g>
    <!-- 중국 판매 -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#60a060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">중국 판매</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#c8e0f8">+22%</text>
      <polygon points="0,90 14,90 7,76" fill="#60a060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#60a060">전기 대비</text>
    </g>
    <!-- SpaceX -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6690d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">스페이스X</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#c8e0f8">IPO</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#6690d8">이번주 금요일</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="580" x2="1200" y2="580" stroke="#6690d8" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="608" font-family="monospace" font-size="11" fill="#506080" letter-spacing="2">6/8 US CLOSE · S&amp;P +0.71% · NASDAQ +1.47% · FOMC 6/11 D-2 · US10Y 4.556%</text>
  <text x="80" y="635" font-family="monospace" font-size="10" fill="#405070">SLOT 01 · 1ST UPDATE · lincoln-brief.vercel.app</text>
</svg>
