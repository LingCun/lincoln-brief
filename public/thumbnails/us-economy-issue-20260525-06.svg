<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0a04"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="50%" stop-color="#d8a040"/>
      <stop offset="100%" stop-color="#b07820"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8a040" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d8a040" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f0c060" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f0c060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="260" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8a040" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8a040">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8a040" text-anchor="end">2026.05.25 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8a040">— 경제 이슈 · 동시 고점 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="260" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">금 $4,505 · BTC $76,571</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#f5edd9">· S&amp;P 7,473</text>
  <text x="80" y="390" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#amber)">모든 것이 고점일 때 — 5/30 PCE가 분기점</text>

  <!-- 3개 자산 데이터 -->
  <g transform="translate(80, 455)">
    <!-- 금 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8a040" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08060">XAU / USD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$4,505.76</text>
      <polygon points="0,76 14,76 7,90" fill="#d8a040"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d8a040">+0.002%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#f0c060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08060">BTC / USD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$76,571</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.83%</text>
    </g>
    <!-- S&P -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8a040" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08060">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">7,473.47</text>
      <polygon points="0,76 14,76 7,90" fill="#d8a040"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d8a040">역대 고점권</text>
    </g>
    <!-- WTI 위험 -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b08060">WTI 위험</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$112.25</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d96552">PCE 상방 압력</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8a040" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8a040" opacity="0.8">MAY 25 · 2026 · EVERYTHING RALLY ANALYSIS</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8a040" opacity="0.8" text-anchor="end">SOURCE · FRED · COINGECKO · TWELVEDATA</text>
</svg>
