<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e0a"/>
      <stop offset="100%" stop-color="#060a06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8abd8e"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#608050"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="240" fill="url(#glow2)"/>

  <!-- 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a8c8a0">Lincoln</text>
  <text x="314" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.10 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="170" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 채권·원자재 거시 신호 · FOMC 전날 —</text>

  <!-- 메인 헤드 -->
  <text x="80" y="252" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#e8f0e8">US10Y 4.528%</text>
  <text x="80" y="308" font-family="Georgia, serif" font-size="32" font-weight="500" fill="url(#green)">채권 강세 + 원자재 하락의 복합 신호</text>

  <!-- 서브 헤드 -->
  <text x="80" y="358" font-family="sans-serif" font-size="17" fill="#8090a8">FOMC 오늘 밤 — 오늘 밤 결과가 방향을 결정합니다</text>

  <!-- 거시 데이터 그리드 -->
  <g transform="translate(80, 398)">
    <g>
      <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a9d6e">US10Y</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="24" fill="#d0e0d0">4.528%</text>
      <text x="0" y="68" font-family="monospace" font-size="12" fill="#7ac080">▼ −0.53%</text>
    </g>
    <g transform="translate(180, 0)">
      <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a9d6e">WTI</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="24" fill="#d0e0d0">$88.70</text>
      <text x="0" y="68" font-family="monospace" font-size="12" fill="#c04040">▼ −2.85%</text>
    </g>
    <g transform="translate(360, 0)">
      <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a9d6e">GOLD</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="24" fill="#d0e0d0">$4,284.80</text>
      <text x="0" y="68" font-family="monospace" font-size="12" fill="#c04040">▼ −1.18%</text>
    </g>
    <g transform="translate(570, 0)">
      <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a9d6e">BTC</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="24" fill="#d0e0d0">$61,812</text>
      <text x="0" y="68" font-family="monospace" font-size="12" fill="#c04040">▼ −2.03%</text>
    </g>
    <g transform="translate(760, 0)">
      <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a9d6e">USD/KRW</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="24" fill="#d0e0d0">1,525.12</text>
      <text x="0" y="68" font-family="monospace" font-size="12" fill="#7ac080">▼ −0.25%</text>
    </g>
  </g>

  <!-- 인사이트 배너 -->
  <rect x="80" y="510" width="880" height="50" rx="4" fill="#7a9d6e" fill-opacity="0.12" stroke="#7a9d6e" stroke-width="0.8"/>
  <text x="100" y="540" font-family="monospace" font-size="14" letter-spacing="2" fill="#7a9d6e">채권 강세(금리↓) + 달러 약세 = FOMC 완화 기대 선반영 가능성</text>

  <!-- 하단 -->
  <text x="80" y="620" font-family="monospace" font-size="12" fill="#607060">WTI $95.96(6/1 FRED) → $88.70 현재 — 9거래일 -$7.26 하락 추세</text>
  <text x="80" y="648" font-family="monospace" font-size="12" fill="#607060">S&amp;P 500 7,386.65(-0.26%)  |  NASDAQ 25,678.82(-0.97%)</text>

  <!-- 우하단 다이아몬드 -->
  <polygon points="1200,690 1215,678 1230,690 1215,702" fill="none" stroke="#7a9d6e" stroke-width="1.2"/>
</svg>
