  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#3a9060" text-anchor="middle" letter-spacing="2">30일 경로</text>
  <text x="680" y="462" font-family="Georgia, serif" font-size="14" fill="#888888">30일 전</text>
  <text x="1150" y="462" font-family="Georgia, serif" font-size="14" fill="#aaaaaa" text-anchor="end">~184,095원</text>
