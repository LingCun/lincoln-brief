  <text x="1150" y="518" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">159,400원</text>
  <text x="680" y="546" font-family="Georgia, serif" font-size="14" fill="#888888">전일</text>
  <text x="1150" y="546" font-family="Georgia, serif" font-size="14" fill="#aaaaaa" text-anchor="end">160,500원</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="14" fill="#888888">오늘</text>
  <text x="1150" y="578" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">174,000원 ▲</text>

