  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5070" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
