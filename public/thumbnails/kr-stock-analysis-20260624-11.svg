  <rect x="80" y="394" width="480" height="200" rx="4" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="15" fill="#3a9060" text-anchor="middle" letter-spacing="1">삼성바이오로직스 동반</text>
  <text x="320" y="486" font-family="Georgia, serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="bold">1,346,000</text>
