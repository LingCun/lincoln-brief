  <line x1="160" y1="614" x2="1120" y2="614" stroke="#5677b0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">KOSPI 8,233.24</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">+0.36% 바이오 방어</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">저점 반등 +9.2%</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle">159,400원 → 174,000원</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">NASDAQ −2.21%</text>
