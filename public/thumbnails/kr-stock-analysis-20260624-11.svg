  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">174,000원</text>
  <polygon points="548,276 566,258 584,276" fill="#4ade80"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+8.41%</text>
