<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f0c"/>
      <stop offset="100%" style="stop-color:#0f1a14"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a9d6e;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7a9d6e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7a9d6e;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#7a9d6e" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#7a9d6e" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#7a9d6e" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top green accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#greenLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5c30" letter-spacing="2">KR ECONOMY ISSUE</text>

  <!-- Edition label -->
  <rect x="1060" y="28" width="180" height="36" rx="3" fill="#7a9d6e" fill-opacity="0.15" stroke="#7a9d6e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="1150" y="51" font-family="Georgia, serif" font-size="14" fill="#7a9d6e" text-anchor="middle" letter-spacing="1">2026.06.19 · 11:00</text>

  <!-- Headline text -->
  <text x="640" y="118" font-family="Georgia, serif" font-size="20" fill="#7a9d6e" text-anchor="middle" letter-spacing="3">KOSPI vs KOSDAQ 이분화 심화</text>

  <!-- Diamond -->
  <polygon points="640,136 648,144 640,152 632,144" fill="#7a9d6e" fill-opacity="0.6"/>

  <!-- Left side: KOSPI -->
  <text x="290" y="198" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" text-anchor="middle" letter-spacing="3">KOSPI</text>
  <text x="290" y="290" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">9,069</text>
  <polygon points="238,312 252,296 266,312" fill="#4ade80"/>
  <text x="276" y="314" font-family="Georgia, serif" font-size="26" fill="#4ade80" font-weight="bold">+2.31%</text>
  <text x="290" y="344" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="middle">9,000선 돌파</text>

  <!-- VS divider -->
  <line x1="640" y1="185" x2="640" y2="360" stroke="#7a9d6e" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="604" y="248" width="72" height="36" rx="18" fill="#1a2a1a" stroke="#7a9d6e" stroke-opacity="0.5" stroke-width="1"/>
  <text x="640" y="271" font-family="Georgia, serif" font-size="20" fill="#7a9d6e" text-anchor="middle" font-weight="bold">VS</text>

  <!-- Right side: KOSDAQ -->
  <text x="970" y="198" font-family="Georgia, serif" font-size="18" fill="#f87171" text-anchor="middle" letter-spacing="3">KOSDAQ</text>
  <text x="970" y="290" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">961</text>
  <polygon points="918,312 932,328 946,312" fill="#f87171"/>
  <text x="956" y="314" font-family="Georgia, serif" font-size="26" fill="#f87171" font-weight="bold">−6.82%</text>
  <text x="970" y="344" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="middle">1,000선 붕괴</text>

  <!-- Gap highlight -->
  <rect x="340" y="368" width="600" height="48" rx="4" fill="#7a9d6e" fill-opacity="0.12" stroke="#7a9d6e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="640" y="398" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="2">격차 9.13%포인트</text>

  <!-- Separator -->
  <line x1="160" y1="440" x2="1120" y2="440" stroke="#7a9d6e" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Cause list -->
  <text x="160" y="480" font-family="Georgia, serif" font-size="15" fill="#3a5c30" letter-spacing="2">이분화 원인</text>

  <text x="170" y="510" font-family="Georgia, serif" font-size="15" fill="#a0c090">① SK하이닉스 시총 집중 — top12 유일 상승 종목</text>
  <text x="170" y="538" font-family="Georgia, serif" font-size="15" fill="#a0c090">② US10Y 4.451% — 성장주·중소형주 할인율 압박</text>
  <text x="170" y="566" font-family="Georgia, serif" font-size="15" fill="#a0c090">③ USD/KRW 1,525원 — 외국인 중소형주 이탈</text>
  <text x="170" y="594" font-family="Georgia, serif" font-size="15" fill="#a0c090">④ 삼성바이오로직스 −4.90% — 바이오 섹터 전반 조정</text>

  <!-- Separator -->
  <line x1="160" y1="618" x2="1120" y2="618" stroke="#7a9d6e" stroke-opacity="0.2" stroke-width="1"/>

  <!-- KOSDAQ 1000 recovery note -->
  <text x="640" y="650" font-family="Georgia, serif" font-size="14" fill="#7a9d6e" text-anchor="middle" letter-spacing="2">KOSDAQ 1,000 회복 = 시장 건강 지표</text>

  <!-- Bottom Lincoln mark -->
  <text x="640" y="684" font-family="Georgia, serif" font-size="13" fill="#3a5c30" text-anchor="middle" letter-spacing="2">— Lincoln Brief · 정보 제공 목적, 투자 권유 아님 —</text>
</svg>
