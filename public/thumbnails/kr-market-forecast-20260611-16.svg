<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100608"/>
      <stop offset="100%" stop-color="#1e0a0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f09090"/>
      <stop offset="50%" stop-color="#d87878"/>
      <stop offset="100%" stop-color="#c05050"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d87878" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d87878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d87878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f8e8e8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d87878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d87878" text-anchor="end">2026.06.11 16:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d87878">— 시장 예측 · FOMC D-7 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="680" height="30" rx="4" fill="#d87878" fill-opacity="0.15" stroke="#d87878" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#ff9898">세 기준선 미충족 · NVDA $200.42 · USD/KRW 1,530 · KOSDAQ 996 (+4.76%)</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f8e8e8">KOSPI 7,763 마감</text>
  <text x="80" y="357" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">오후 반등 · 세 기준선 여전히 미충족</text>
  <text x="80" y="405" font-family="sans-serif" font-size="17" fill="#986888">내일 CPI 발표 · FOMC까지 7 거래일 · 1,000포인트 직전</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#2a1010" stroke-width="1"/>

  <!-- Scenario boxes -->
  <g transform="translate(80, 468)">
    <!-- 베이스 -->
    <rect x="0" y="0" width="240" height="80" rx="4" fill="#d8b878" fill-opacity="0.10" stroke="#d8b878" stroke-width="0.6"/>
    <text x="12" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b878">베이스 40%</text>
    <text x="12" y="44" font-family="sans-serif" font-size="14" fill="#f8e8e8">7,700~8,100 박스</text>
    <text x="12" y="64" font-family="monospace" font-size="11" fill="#706050">NVDA $195~210 유지</text>

    <!-- 베어 -->
    <rect x="260" y="0" width="240" height="80" rx="4" fill="#d87878" fill-opacity="0.10" stroke="#d87878" stroke-width="0.6"/>
    <text x="272" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#d87878">베어 30%</text>
    <text x="272" y="44" font-family="sans-serif" font-size="14" fill="#f8e8e8">7,484~7,600 재시험</text>
    <text x="272" y="64" font-family="monospace" font-size="11" fill="#706050">NVDA $200 이탈</text>

    <!-- 불 -->
    <rect x="520" y="0" width="240" height="80" rx="4" fill="#40c880" fill-opacity="0.10" stroke="#40c880" stroke-width="0.6"/>
    <text x="532" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#40c880">불 25%</text>
    <text x="532" y="44" font-family="sans-serif" font-size="14" fill="#f8e8e8">8,000~8,400 회복</text>
    <text x="532" y="64" font-family="monospace" font-size="11" fill="#506050">NVDA $210 + 비둘기 FOMC</text>

    <!-- 블랙스완 -->
    <rect x="780" y="0" width="200" height="80" rx="4" fill="#505050" fill-opacity="0.10" stroke="#505050" stroke-width="0.6"/>
    <text x="792" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">블랙스완 5%</text>
    <text x="792" y="44" font-family="sans-serif" font-size="14" fill="#f8e8e8">7,000 이하</text>
    <text x="792" y="64" font-family="monospace" font-size="11" fill="#505050">글로벌 신용 이벤트</text>
  </g>

  <!-- Footer -->
  <line x1="80" y1="658" x2="1200" y2="658" stroke="#2a1010" stroke-width="1"/>
  <text x="80" y="680" font-family="monospace" font-size="10" letter-spacing="2" fill="#5a3838">lincoln-brief.vercel.app · 본 글은 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
