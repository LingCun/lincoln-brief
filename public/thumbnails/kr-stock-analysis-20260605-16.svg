<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a10"/>
      <stop offset="100%" stop-color="#080f18"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90c8f0"/>
      <stop offset="50%" stop-color="#6aabdc"/>
      <stop offset="100%" stop-color="#4888c0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#30a0e0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#30a0e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#50c878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#50c878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="420" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6aabdc" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0f4f8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6aabdc">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6aabdc" text-anchor="end">2026.06.05 16:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#6aabdc">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="540" height="30" rx="4" fill="#30a0e0" fill-opacity="0.15" stroke="#50b8e8" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#70c0f0">KOSPI −5.54% 장 · 신한지주 top12 최대 상승 · 역행 강세</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f0f4f8">신한지주</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#blue)">+7.39% · 107,500원</text>
  <text x="80" y="408" font-family="sans-serif" font-size="17" fill="#7a9ab8">KB금융 +4.51% · KOSPI 급락 속 금융 역행 강세</text>

  <!-- Divider -->
  <line x1="80" y1="444" x2="1200" y2="444" stroke="#0a1a28" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 478)">
    <!-- 신한지주 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6aabdc" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">신한지주</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f0f4f8">107,500원</text>
      <polygon points="0,74 14,88 28,74" fill="#50c878"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#50c878">+7.39%</text>
    </g>
    <!-- KB금융 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6aabdc" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">KB금융</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f0f4f8">171,600원</text>
      <polygon points="0,74 14,88 28,74" fill="#50c878"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#50c878">+4.51%</text>
    </g>
    <!-- SK하이닉스 대비 -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6aabdc" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f0f4f8">207만원</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−9.92%</text>
    </g>
    <!-- KOSPI -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6aabdc" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f0f4f8">8,161</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−5.54%</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="676" x2="1200" y2="676" stroke="#0a1a28" stroke-width="1"/>
  <text x="80" y="698" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a5a7a">lincoln-brief.vercel.app · 본 글은 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
