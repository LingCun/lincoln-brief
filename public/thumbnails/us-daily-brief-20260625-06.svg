<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · DAILY BRIEF</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.25 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- S&P 500 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">S&amp;P 500 최종 마감</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">7,358.22</text>
  <polygon points="548,284 566,302 584,284" fill="#f87171"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−0.10%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#705040" text-anchor="middle">오전 7,407 장중 고점 → 오후 전부 반납</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- MSFT panel (left) -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#a04040" text-anchor="middle" letter-spacing="2">MSFT 12종목 최대 하락</text>
  <text x="320" y="484" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">$365.46</text>
  <polygon points="272,504 288,520 304,504" fill="#f87171"/>
  <text x="316" y="522" font-family="Georgia, serif" font-size="28" fill="#f87171" font-weight="bold">−2.27%</text>
  <text x="320" y="560" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">TSLA −1.59% · META −0.81% 동반 약세</text>
  <text x="320" y="580" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">NVDA $199(−0.52%) $200 이탈 확인</text>

  <!-- Right panel: key data -->
  <rect x="600" y="386" width="600" height="208" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="420" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">원자재 · 매크로 마감</text>
  <text x="660" y="456" font-family="Georgia, serif" font-size="15" fill="#888888">DOW</text>
  <text x="1160" y="456" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">51,848.90 (+0.35%)</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="15" fill="#888888">WTI</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$69.85 (−4.59%) $70 붕괴</text>
  <text x="660" y="512" font-family="Georgia, serif" font-size="15" fill="#888888">Gold</text>
  <text x="1160" y="512" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$4,013.60 (−2.82%)</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">US10Y</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="15" fill="#c0a060" text-anchor="end">4.402%</text>
  <text x="660" y="572" font-family="Georgia, serif" font-size="13" fill="#705050">LLY +0.92% · AVGO +0.51% · BRK-B +0.41% 방어</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ 25,476.64</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#705040" text-anchor="middle">−0.43% · 기술주 하중</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="middle">반등 시도·마감 실패 반복</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">다음 관찰 7,300 지지</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,542.13</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.45% · 원화 약세 지속</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
