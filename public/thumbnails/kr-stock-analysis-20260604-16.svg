<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#10141f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Blue accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="#4a90d9"/>

  <!-- Left blue stripe -->
  <rect x="60" y="80" width="3" height="560" fill="#4a90d9" opacity="0.6"/>

  <!-- Lincoln Brief mark -->
  <text x="80" y="60" font-family="Georgia, serif" font-size="18" fill="#4a90d9" letter-spacing="4">LINCOLN BRIEF</text>
  <text x="80" y="80" font-family="Georgia, serif" font-size="13" fill="#4a90d9" opacity="0.6" letter-spacing="2">KR STOCK ANALYSIS</text>

  <!-- Edition label top right -->
  <text x="1200" y="55" font-family="Georgia, serif" font-size="14" fill="#4a90d9" text-anchor="end" opacity="0.8">2026.06.04</text>
  <text x="1200" y="75" font-family="Georgia, serif" font-size="12" fill="#4a90d9" text-anchor="end" opacity="0.5">SLOT 16:00 KST</text>

  <!-- Main company name -->
  <text x="80" y="160" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold">현대차</text>
  <text x="80" y="218" font-family="Georgia, serif" font-size="28" fill="#aaaaaa">Hyundai Motor · 005380.KS</text>

  <!-- Price and change -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="80" fill="#ffffff" font-weight="bold">700,000<tspan font-size="36" fill="#aaaaaa">원</tspan></text>

  <!-- Down arrow -->
  <polygon points="780,255 830,255 805,295" fill="#e05555"/>

  <!-- Change -->
  <text x="845" y="295" font-family="Georgia, serif" font-size="64" fill="#e05555" font-weight="bold">-3.98%</text>

  <!-- Divider -->
  <rect x="80" y="320" width="1120" height="1" fill="#4a90d9" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="80" y="355" font-family="Georgia, serif" font-size="24" fill="#cccccc">30일 고점(750,000원) 대비 −6.7% 후퇴</text>

  <!-- Stat boxes -->
  <!-- Box 1: 기아 -->
  <rect x="80" y="385" width="260" height="110" fill="#ffffff" opacity="0.05" rx="4"/>
  <text x="210" y="413" font-family="Georgia, serif" font-size="14" fill="#4a90d9" text-anchor="middle" letter-spacing="1">기아 동반 하락</text>
  <text x="210" y="448" font-family="Georgia, serif" font-size="30" fill="#e05555" text-anchor="middle" font-weight="bold">164,300원</text>
  <text x="210" y="478" font-family="Georgia, serif" font-size="18" fill="#e05555" text-anchor="middle">-2.67%</text>

  <!-- Box 2: 30d range -->
  <rect x="360" y="385" width="260" height="110" fill="#ffffff" opacity="0.05" rx="4"/>
  <text x="490" y="413" font-family="Georgia, serif" font-size="14" fill="#4a90d9" text-anchor="middle" letter-spacing="1">30일 저점</text>
  <text x="490" y="448" font-family="Georgia, serif" font-size="30" fill="#aaaaaa" text-anchor="middle" font-weight="bold">527,000원</text>
  <text x="490" y="478" font-family="Georgia, serif" font-size="18" fill="#aaaaaa" text-anchor="middle">30일 전 시작</text>

  <!-- Box 3: USD/KRW -->
  <rect x="640" y="385" width="260" height="110" fill="#ffffff" opacity="0.05" rx="4"/>
  <text x="770" y="413" font-family="Georgia, serif" font-size="14" fill="#4a90d9" text-anchor="middle" letter-spacing="1">USD/KRW</text>
  <text x="770" y="448" font-family="Georgia, serif" font-size="30" fill="#e05555" text-anchor="middle" font-weight="bold">1,536.62원</text>
  <text x="770" y="478" font-family="Georgia, serif" font-size="18" fill="#e05555" text-anchor="middle">1,530 돌파</text>

  <!-- Box 4: KOSPI -->
  <rect x="920" y="385" width="260" height="110" fill="#ffffff" opacity="0.05" rx="4"/>
  <text x="1050" y="413" font-family="Georgia, serif" font-size="14" fill="#4a90d9" text-anchor="middle" letter-spacing="1">KOSPI</text>
  <text x="1050" y="448" font-family="Georgia, serif" font-size="30" fill="#e05555" text-anchor="middle" font-weight="bold">8,639</text>
  <text x="1050" y="478" font-family="Georgia, serif" font-size="18" fill="#e05555" text-anchor="middle">-1.84%</text>

  <!-- Scenario bar -->
  <text x="80" y="540" font-family="Georgia, serif" font-size="16" fill="#4a90d9" letter-spacing="2" opacity="0.8">— 향후 3~4주 시나리오</text>

  <!-- Scenario visual bar -->
  <rect x="80" y="555" width="472" height="24" fill="#55a855" opacity="0.7" rx="2"/>
  <text x="316" y="572" font-family="Georgia, serif" font-size="13" fill="#ffffff" text-anchor="middle">베이스 45% · 680K~730K</text>

  <rect x="562" y="555" width="143" height="24" fill="#4a90d9" opacity="0.7" rx="2"/>
  <text x="633" y="572" font-family="Georgia, serif" font-size="13" fill="#ffffff" text-anchor="middle">불 15%</text>

  <rect x="715" y="555" width="357" height="24" fill="#e05555" opacity="0.7" rx="2"/>
  <text x="893" y="572" font-family="Georgia, serif" font-size="13" fill="#ffffff" text-anchor="middle">베어 35% · 650K~680K</text>

  <rect x="1082" y="555" width="48" height="24" fill="#555555" opacity="0.7" rx="2"/>
  <text x="1106" y="572" font-family="Georgia, serif" font-size="11" fill="#ffffff" text-anchor="middle">블5%</text>

  <!-- Bottom divider -->
  <rect x="0" y="600" width="1280" height="1" fill="#4a90d9" opacity="0.2"/>

  <!-- Key insight -->
  <text x="80" y="635" font-family="Georgia, serif" font-size="20" fill="#4a90d9" font-style="italic">"700,000원 심리선 — 원화 약세 호재보다 경기 우려가 더 큰 무게추"</text>

  <!-- Bottom bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#4a90d9"/>

  <!-- Small diamond -->
  <polygon points="640,710 645,705 650,710 645,715" fill="#4a90d9" opacity="0.6"/>
</svg>
