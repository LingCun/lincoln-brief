<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1810"/>
      <stop offset="100%" stop-color="#060a07"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90d8a0"/>
      <stop offset="50%" stop-color="#55b868"/>
      <stop offset="100%" stop-color="#359848"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#55b868" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#55b868" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="180" cy="560" r="240" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#55b868" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8fde8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#55b868">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#55b868" text-anchor="end">2026.05.22 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#55b868">— 경제 이슈 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#e8fde8">달러 대안 헤징 수요</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#green)">금과 BTC를 동시에 끌어올리다</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="17" fill="#70a070">10Y 4.57%  ·  USD/KRW 1,508  ·  WTI $112.25</text>

  <!-- 두 자산 데이터 -->
  <g transform="translate(80, 440)">
    <!-- 금 -->
    <rect x="0" y="0" width="400" height="120" rx="6" fill="#0d2010" stroke="#55b868" stroke-width="1"/>
    <text x="24" y="34" font-family="monospace" font-size="11" letter-spacing="4" fill="#70a070">GOLD · XAU/USD</text>
    <text x="24" y="80" font-family="Playfair Display, Georgia, serif" font-size="44" fill="#e8fde8">$4,542.48</text>
    <text x="24" y="108" font-family="monospace" font-size="12" fill="#70a070">−0.03%  ·  역사적 고점권</text>

    <!-- BTC -->
    <rect x="440" y="0" width="400" height="120" rx="6" fill="#0d2010" stroke="#55b868" stroke-width="1"/>
    <text x="464" y="34" font-family="monospace" font-size="11" letter-spacing="4" fill="#70a070">BITCOIN · BTC/USD</text>
    <text x="464" y="80" font-family="Playfair Display, Georgia, serif" font-size="44" fill="#e8fde8">$77,634</text>
    <text x="464" y="108" font-family="monospace" font-size="12" fill="#70a070">+0.17%  ·  고점권 근처</text>
  </g>

  <!-- 핵심 메시지 -->
  <text x="80" y="610" font-family="Georgia, serif" font-style="italic" font-size="18" fill="#90c890">"두 자산이 함께 오를 때 — 달러 자체에 의문이 시작된 것입니다"</text>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#55b868" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#55b868" opacity="0.8">MAY 22 · 2026 · GOLD + BTC DUAL RALLY</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#55b868" opacity="0.8" text-anchor="end">SOURCE · COINGECKO · TWELVE DATA · FRED</text>
</svg>
