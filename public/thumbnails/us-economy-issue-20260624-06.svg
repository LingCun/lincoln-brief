<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c08"/>
      <stop offset="100%" style="stop-color:#101a12"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#greenLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#4ade80" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#208040" letter-spacing="2">US MARKET · ECONOMY ISSUE</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#80c090" text-anchor="middle" letter-spacing="1">2026.06.24 · 06:00 KST</text>

  <!-- Diamond -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4ade80" fill-opacity="0.5"/>

  <!-- Main headline -->
  <text x="640" y="170" font-family="Georgia, serif" font-size="20" fill="#80c090" text-anchor="middle" letter-spacing="4">전면 리스크오프</text>
  <text x="640" y="248" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">광범위 자산 청산</text>
  <text x="640" y="304" font-family="Georgia, serif" font-size="22" fill="#f87171" text-anchor="middle">주식 · Gold · WTI · BTC 동반 하락</text>
  <text x="640" y="348" font-family="Georgia, serif" font-size="18" fill="#406050" text-anchor="middle">채권(US10Y)도 외면 — 성장 둔화 우려 vs Fed 경로 딜레마</text>

  <!-- Divider -->
  <line x1="160" y1="374" x2="1120" y2="374" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Asset table (left) -->
  <rect x="80" y="394" width="540" height="200" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="350" y="424" font-family="Georgia, serif" font-size="15" fill="#d06060" text-anchor="middle" letter-spacing="2">전면 약세 — 오늘의 자산 현황</text>
  <text x="120" y="456" font-family="Georgia, serif" font-size="15" fill="#888888">S&amp;P 500</text>
  <text x="600" y="456" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">7,365.46  −1.44%</text>
  <text x="120" y="484" font-family="Georgia, serif" font-size="15" fill="#888888">Gold</text>
  <text x="600" y="484" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$4,129.00  −1.26%</text>
  <text x="120" y="512" font-family="Georgia, serif" font-size="15" fill="#888888">WTI</text>
  <text x="600" y="512" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$73.05  −2.37%</text>
  <text x="120" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">BTC</text>
  <text x="600" y="540" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$62,499  −2.70%</text>
  <text x="120" y="572" font-family="Georgia, serif" font-size="13" fill="#406050">US10Y 4.493% — 채권도 매수 없음</text>

  <!-- Macro insight (right) -->
  <rect x="660" y="394" width="540" height="200" rx="4" fill="#4ade80" fill-opacity="0.03" stroke="#4ade80" stroke-opacity="0.15" stroke-width="1"/>
  <text x="930" y="424" font-family="Georgia, serif" font-size="15" fill="#80c090" text-anchor="middle" letter-spacing="2">거시 해석</text>
  <text x="700" y="456" font-family="Georgia, serif" font-size="14" fill="#888888">USD/KRW</text>
  <text x="1170" y="456" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">1,531.04  −0.52%</text>
  <text x="700" y="484" font-family="Georgia, serif" font-size="14" fill="#888888">원화 강세 전환</text>
  <text x="1170" y="484" font-family="Georgia, serif" font-size="14" fill="#80c090" text-anchor="end">외국인 유입 여건↑</text>
  <text x="700" y="512" font-family="Georgia, serif" font-size="14" fill="#888888">S&amp;P 7,400 이탈</text>
  <text x="1170" y="512" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">Fed 경로 재논의</text>
  <text x="700" y="540" font-family="Georgia, serif" font-size="14" fill="#888888">WTI 수요 신호</text>
  <text x="1170" y="540" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">성장 둔화 우려</text>
  <text x="700" y="572" font-family="Georgia, serif" font-size="13" fill="#406050">디레버리지 패턴 — 내일 지속 여부 관찰</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#4ade80" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#80c090" text-anchor="middle">DOW 하락 전환</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#305040" text-anchor="middle">+0.20% → −0.09% · 방어 섹터 매도 확산</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#80c090" text-anchor="middle">US10Y 4.493%</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#305040" text-anchor="middle">금리 하락 없음 · 성장주 압박 유지</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#80c090" text-anchor="middle">NASDAQ 25,587.04</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#305040" text-anchor="middle">−2.21% · 다음 지지 25,000</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#4ade80" fill-opacity="0.35"/>
</svg>
