<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081408"/>
      <stop offset="100%" style="stop-color:#101e10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#52c47a"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="600" fill="#52c47a" opacity="0.3"/>

  <!-- Edition label top right -->
  <rect x="1020" y="36" width="220" height="32" rx="4" fill="#52c47a" opacity="0.12"/>
  <text x="1130" y="57" font-family="Georgia, serif" font-size="13" fill="#52c47a" text-anchor="middle" letter-spacing="2">US ECONOMY ISSUE</text>

  <!-- Date -->
  <text x="88" y="100" font-family="Georgia, serif" font-size="16" fill="#52c47a" opacity="0.7" letter-spacing="3">2026.06.27 · SLOT 01</text>

  <!-- Diamond separator -->
  <polygon points="88,118 95,125 88,132 81,125" fill="#52c47a"/>

  <!-- Main subject -->
  <text x="88" y="190" font-family="Georgia, serif" font-size="28" fill="#a0d0a0">WTI CRUDE OIL</text>

  <!-- Big price + change -->
  <text x="88" y="285" font-family="Georgia, serif" font-size="88" font-weight="bold" fill="#f0f8f0">$69.12</text>
  <polygon points="88,320 120,352 56,352" fill="#e05252"/>
  <text x="136" y="350" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#e05252">−3.89%</text>

  <!-- $70 line crossed -->
  <text x="88" y="395" font-family="Georgia, serif" font-size="20" fill="#a0d0a0" opacity="0.9">$70 심리적 지지선 이탈 · 호르무즈 공급 우려 완화</text>

  <!-- Divider -->
  <line x1="88" y1="422" x2="740" y2="422" stroke="#52c47a" stroke-width="1" opacity="0.4"/>

  <!-- Data comparison -->
  <!-- WTI trend -->
  <text x="88" y="462" font-family="Georgia, serif" font-size="13" fill="#52c47a" opacity="0.6" letter-spacing="1">WTI 추세</text>
  <text x="88" y="488" font-family="Georgia, serif" font-size="20" fill="#e05252">1개월 −9.66%   6개월 −26.3%</text>

  <!-- vs Gold -->
  <text x="88" y="532" font-family="Georgia, serif" font-size="13" fill="#52c47a" opacity="0.6" letter-spacing="1">오늘 실물자산 비교</text>

  <text x="88" y="558" font-family="Georgia, serif" font-size="16" fill="#a0d0a0">WTI</text>
  <polygon points="148,548 160,562 136,562" fill="#e05252"/>
  <text x="168" y="558" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#e05252">−3.89%</text>
  <text x="310" y="558" font-family="Georgia, serif" font-size="16" fill="#c0c0c0" opacity="0.5">vs</text>
  <text x="360" y="558" font-family="Georgia, serif" font-size="16" fill="#a0d0a0">GOLD</text>
  <polygon points="420,544 432,558 408,558" fill="#52c47a"/>
  <text x="438" y="558" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#52c47a">+1.80%</text>
  <text x="540" y="558" font-family="Georgia, serif" font-size="14" fill="#a0d0a0" opacity="0.7">$4,103.20</text>

  <!-- USD/KRW note -->
  <text x="88" y="598" font-family="Georgia, serif" font-size="16" fill="#a0d0a0">USD/KRW</text>
  <polygon points="192,588 204,602 180,602" fill="#52c47a"/>
  <text x="210" y="598" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#52c47a">−0.52%</text>
  <text x="310" y="598" font-family="Georgia, serif" font-size="14" fill="#a0d0a0" opacity="0.7">1,534.74 원화 강세</text>

  <!-- PCE implication -->
  <rect x="88" y="628" width="600" height="50" rx="4" fill="#52c47a" opacity="0.10"/>
  <text x="104" y="646" font-family="Georgia, serif" font-size="13" fill="#52c47a" opacity="0.7">Fed 인하 방정식</text>
  <text x="104" y="665" font-family="Georgia, serif" font-size="15" fill="#f0f8f0">에너지 디플레이션 → PCE 완화 → 인하 시계 재가동 가능</text>

  <!-- Right decorative - oil barrel abstract -->
  <circle cx="1040" cy="360" r="160" fill="none" stroke="#52c47a" stroke-width="1" opacity="0.08"/>
  <circle cx="1040" cy="360" r="120" fill="none" stroke="#52c47a" stroke-width="1" opacity="0.08"/>
  <circle cx="1040" cy="360" r="80" fill="none" stroke="#e05252" stroke-width="1" opacity="0.10"/>

  <text x="1040" y="330" font-family="Georgia, serif" font-size="16" fill="#52c47a" opacity="0.5" text-anchor="middle" letter-spacing="1">PCE 오늘 발표</text>
  <text x="1040" y="375" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#f0f8f0" text-anchor="middle">US10Y</text>
  <text x="1040" y="415" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#52c47a" text-anchor="middle">4.376%</text>
  <text x="1040" y="448" font-family="Georgia, serif" font-size="14" fill="#a0d0a0" text-anchor="middle" opacity="0.7">소폭 하락</text>

  <!-- Lincoln Brief branding -->
  <text x="1220" y="700" font-family="Georgia, serif" font-size="13" fill="#52c47a" opacity="0.5" text-anchor="end" letter-spacing="2">LINCOLN BRIEF</text>
</svg>
