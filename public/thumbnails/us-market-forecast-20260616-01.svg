<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#1a1010"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#d96552"/>

  <!-- Left red glow -->
  <rect x="0" y="0" width="520" height="720" fill="url(#red-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#d96552" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1100" y="28" width="132" height="36" rx="4" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1166" y="52" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="1">2026.06.16 — 4주 전망</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#d96552" fill-opacity="0.2"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="1">시장 예측</text>

  <!-- Main headline: S&P level -->
  <text x="48" y="220" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold">S&amp;P 7,557</text>
  <polygon points="340,193 358,193 349,176" fill="#4adc7a"/>
  <text x="365" y="220" font-family="Georgia, serif" font-size="30" fill="#4adc7a" font-weight="bold">+1.70%</text>

  <!-- 7,500 achievement banner -->
  <rect x="48" y="240" width="440" height="46" rx="6" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-width="1" stroke-opacity="0.4"/>
  <text x="268" y="269" font-family="Georgia, serif" font-size="20" fill="#d8b878" text-anchor="middle" font-weight="bold">✓ 7,500 저항선 돌파 달성</text>

  <!-- Scenario probability bars -->
  <text x="48" y="320" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="2">4주 시나리오 확률</text>
  <rect x="48" y="330" width="100" height="1" fill="#d96552" opacity="0.4"/>

  <!-- Scenario 1: Dovish -->
  <text x="48" y="366" font-family="Georgia, serif" font-size="14" fill="#4adc7a">비둘기 반전</text>
  <rect x="160" y="350" width="280" height="24" rx="3" fill="#4adc7a" fill-opacity="0.7"/>
  <text x="448" y="368" font-family="Georgia, serif" font-size="16" fill="#4adc7a" font-weight="bold">46%</text>
  <text x="510" y="368" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,600~7,700</text>

  <!-- Scenario 2: Neutral -->
  <text x="48" y="408" font-family="Georgia, serif" font-size="14" fill="#c0b090">중립 유지</text>
  <rect x="160" y="392" width="192" height="24" rx="3" fill="#c0b090" fill-opacity="0.5"/>
  <text x="360" y="410" font-family="Georgia, serif" font-size="16" fill="#c0b090" font-weight="bold">31%</text>
  <text x="410" y="410" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,400~7,600</text>

  <!-- Scenario 3: Hawkish -->
  <text x="48" y="450" font-family="Georgia, serif" font-size="14" fill="#ff8870">매파 고착</text>
  <rect x="160" y="434" width="104" height="24" rx="3" fill="#ff8870" fill-opacity="0.5"/>
  <text x="272" y="452" font-family="Georgia, serif" font-size="16" fill="#ff8870" font-weight="bold">17%</text>
  <text x="330" y="452" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,000~7,300</text>

  <!-- Scenario 4: Black Swan -->
  <text x="48" y="492" font-family="Georgia, serif" font-size="14" fill="#cc6666">블랙 스완</text>
  <rect x="160" y="476" width="38" height="24" rx="3" fill="#cc6666" fill-opacity="0.5"/>
  <text x="206" y="494" font-family="Georgia, serif" font-size="16" fill="#cc6666" font-weight="bold">6%</text>
  <text x="260" y="494" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">6,800 이하</text>

  <!-- Right panel divider -->
  <rect x="580" y="90" width="2" height="540" fill="#d96552" opacity="0.2"/>

  <!-- Right: Key levels -->
  <text x="620" y="140" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="2">핵심 레벨</text>
  <rect x="620" y="150" width="80" height="1" fill="#d96552" opacity="0.4"/>

  <!-- Price levels visual -->
  <!-- Target 2 -->
  <text x="620" y="196" font-family="Georgia, serif" font-size="14" fill="#4adc7a">▲ 목표 2</text>
  <text x="730" y="196" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">7,700</text>
  <rect x="620" y="202" width="620" height="1" fill="#4adc7a" opacity="0.2"/>

  <!-- Target 1 -->
  <text x="620" y="240" font-family="Georgia, serif" font-size="14" fill="#7aee9a">▲ 목표 1</text>
  <text x="730" y="240" font-family="Georgia, serif" font-size="22" fill="#7aee9a" font-weight="bold">7,600</text>
  <rect x="620" y="246" width="620" height="1" fill="#7aee9a" opacity="0.2"/>

  <!-- Current -->
  <rect x="620" y="258" width="620" height="46" rx="4" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
  <text x="640" y="278" font-family="Georgia, serif" font-size="13" fill="#d96552">● 현재</text>
  <text x="730" y="282" font-family="Georgia, serif" font-size="26" fill="#ffffff" font-weight="bold">7,557.66</text>

  <!-- Support 1 -->
  <text x="620" y="326" font-family="Georgia, serif" font-size="14" fill="#ff9090">▼ 지지 1</text>
  <text x="730" y="326" font-family="Georgia, serif" font-size="22" fill="#ff9090" font-weight="bold">7,500</text>
  <rect x="620" y="332" width="620" height="1" fill="#ff9090" opacity="0.2"/>

  <!-- Support 2 -->
  <text x="620" y="370" font-family="Georgia, serif" font-size="14" fill="#cc7070">▼ 지지 2</text>
  <text x="730" y="370" font-family="Georgia, serif" font-size="22" fill="#cc7070" font-weight="bold">7,431</text>
  <rect x="620" y="376" width="620" height="1" fill="#cc7070" opacity="0.2"/>

  <!-- Divider -->
  <rect x="620" y="400" width="620" height="1" fill="#d96552" opacity="0.2"/>

  <!-- Key watch -->
  <text x="620" y="438" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="2">핵심 관찰 포인트</text>

  <text x="620" y="476" font-family="Georgia, serif" font-size="15" fill="#c0b090">US10Y</text>
  <text x="710" y="476" font-family="Georgia, serif" font-size="20" fill="#ffffff">4.471%</text>
  <text x="820" y="476" font-family="Georgia, serif" font-size="16" fill="#4adc7a">→ 4.4% 이하 진입 임박</text>

  <text x="620" y="516" font-family="Georgia, serif" font-size="15" fill="#c0b090">WTI</text>
  <text x="680" y="516" font-family="Georgia, serif" font-size="20" fill="#ffffff">$80.61</text>
  <text x="790" y="516" font-family="Georgia, serif" font-size="16" fill="#4adc7a">→ $78 이하 시 CPI 확실화</text>

  <!-- Bottom highlight -->
  <rect x="620" y="548" width="620" height="88" rx="6" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-width="1" stroke-opacity="0.3"/>
  <text x="648" y="582" font-family="Georgia, serif" font-size="15" fill="#d96552">비둘기 반전 확률 업데이트</text>
  <text x="648" y="618" font-family="Georgia, serif" font-size="28" fill="#ffffff" font-weight="bold">41% → 46% <tspan fill="#4adc7a" font-size="22">↑</tspan></text>

  <!-- Bottom bar -->
  <rect x="0" y="694" width="1280" height="26" fill="#d96552" fill-opacity="0.06"/>
  <text x="640" y="712" font-family="Georgia, serif" font-size="12" fill="#8a6a5a" text-anchor="middle" letter-spacing="2">lincoln-brief.vercel.app — 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
