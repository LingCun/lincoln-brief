<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060e08"/>
      <stop offset="100%" stop-color="#040a06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88c888"/>
      <stop offset="50%" stop-color="#6ba368"/>
      <stop offset="100%" stop-color="#4a8348"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b858" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b858" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6ba368" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a8d8a8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6ba368">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" text-anchor="end">2026.06.02 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6ba368">— 원자재 디버전스 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="600" fill="#a8d8a8">Gold vs WTI</text>
  <text x="80" y="325" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="url(#green)">에너지와 안전자산의 역방향 신호</text>
  <text x="80" y="377" font-family="Pretendard, sans-serif" font-size="17" fill="#608068">공포 없는 에너지 강세 → 수요 기반 가능성 · FOMC(6/11) 인플레이션 핵심 변수</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 440)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#608068">WTI (원유)</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8d8a8">$92.23</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+5.57%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#608068">Gold (금)</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8d8a8">$4,512</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−1.05%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#608068">BTC</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8d8a8">$71,197</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−3.24%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(660, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#608068">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8d8a8">4.475%</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#6ba368">↑ 상승</text>
    </g>
    <!-- 해석 -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#608068">해석 신호</text>
      <text x="0" y="65" font-family="Pretendard, sans-serif" font-size="15" fill="#a8d8a8">수요 기반</text>
      <text x="0" y="88" font-family="Pretendard, sans-serif" font-size="13" fill="#608068">공포 아닌 강세</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#6ba368" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#406050">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
