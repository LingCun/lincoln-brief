<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a090"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#a84030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="330" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="260" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.27 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 경제 이슈 · AI 인프라 실물화 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#f5edd9">Micron +19.29%</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">AI 인프라는 실물 경제다</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#c0907a">AMD +7.78%  ·  10Y 금리 4.493%  ·  한국 반도체 수출 파급</text>

  <!-- 수치 카드 -->
  <g transform="translate(80, 440)">
    <!-- Micron 급등 -->
    <g>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d96552" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#c0907a">Micron MU</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">+19.29%</text>
      <polygon points="0,82 18,82 9,98" fill="#6ba368"/>
      <text x="26" y="99" font-family="monospace" font-size="14" fill="#6ba368">단일 거래일</text>
    </g>
    <!-- AMD -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#c0907a">AMD</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">+7.78%</text>
      <polygon points="0,82 18,82 9,98" fill="#6ba368"/>
      <text x="26" y="99" font-family="monospace" font-size="14" fill="#d8b878">AI칩 동반 강세</text>
    </g>
    <!-- 10Y 금리 -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#4a90d9" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#c0907a">10Y 금리</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">4.493%</text>
      <polygon points="0,90 18,90 9,76" fill="#4a90d9"/>
      <text x="26" y="99" font-family="monospace" font-size="14" fill="#4a90d9">완화 방향</text>
    </g>
    <!-- SK하이닉스 -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#6ba368" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#c0907a">SK하이닉스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">+5.72%</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="99" font-family="monospace" font-size="13" fill="#6ba368">HBM 수혜</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#2e1810" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#c0907a">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a3020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
