<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a12"/>
      <stop offset="100%" stop-color="#0a0d09"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#7a9d6e00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left green bar -->
  <rect x="60" y="60" width="4" height="600" fill="#7a9d6e" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#a3c398" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" letter-spacing="2">US MARKET · 경제 이슈</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#a3c398" opacity="0.7" text-anchor="end">2026.07.09 · SLOT 06</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="end">유가 소폭 되돌림</text>

  <!-- Main headline -->
  <text x="84" y="196" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">WTI 고점서 되돌림</text>
  <text x="84" y="236" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">그래도 $74선 유지</text>

  <!-- WTI main data -->
  <text x="84" y="304" font-family="Georgia, serif" font-size="26" fill="#a3c398">WTI</text>
  <text x="220" y="304" font-family="Georgia, serif" font-size="28" fill="#ffffff">$74.76</text>
  <polygon points="380,286 400,286 390,304" fill="#6ec46e"/>
  <text x="408" y="304" font-family="Georgia, serif" font-size="24" fill="#6ec46e">+6.13%</text>

  <!-- Divider line -->
  <rect x="84" y="324" width="700" height="1" fill="#7a9d6e" opacity="0.3"/>

  <!-- Target price row -->
  <text x="84" y="366" font-family="Georgia, serif" font-size="24" fill="#a3c398">Gold</text>
  <text x="240" y="366" font-family="Georgia, serif" font-size="26" fill="#ffffff" font-weight="bold">$4,086.60</text>
  <text x="84" y="400" font-family="Georgia, serif" font-size="20" fill="#e87050">-1.42% — 유가 급등에도 하락 지속</text>

  <!-- Secondary row -->
  <text x="84" y="440" font-family="Georgia, serif" font-size="22" fill="#a3c398">US10Y</text>
  <text x="240" y="440" font-family="Georgia, serif" font-size="22" fill="#ffffff">4.569%</text>
  <polygon points="400,424 412,424 406,440" fill="#e87050"/>
  <text x="419" y="440" font-family="Georgia, serif" font-size="20" fill="#e87050">+0.88%</text>

  <text x="84" y="476" font-family="Georgia, serif" font-size="22" fill="#a3c398">DOW</text>
  <text x="240" y="476" font-family="Georgia, serif" font-size="22" fill="#ffffff">52,348.39</text>
  <polygon points="420,460 432,460 426,476" fill="#e87050"/>
  <text x="439" y="476" font-family="Georgia, serif" font-size="20" fill="#e87050">-1.09%</text>

  <!-- Divider -->
  <rect x="84" y="500" width="700" height="1" fill="#7a9d6e" opacity="0.2"/>

  <!-- Footer note -->
  <text x="84" y="536" font-family="Georgia, serif" font-size="18" fill="#a3c398" opacity="0.9">장중 고점 $75.11 대비 소폭 되돌림, 리스크는 여전</text>
  <text x="84" y="566" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" opacity="0.85">이란-미국 긴장發 급등세 자체는 유지</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,610 92,602 100,610 92,618" fill="#7a9d6e" opacity="0.5"/>
</svg>
