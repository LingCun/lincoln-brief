<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e160e"/>
      <stop offset="100%" stop-color="#080d08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90c084"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7d52"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="350" fill="url(#glow)"/>
  <circle cx="200" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f0e6">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.22 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 카테고리 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="262" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#e8f0e6">관세 · 유가 · 달러</text>
  <text x="80" y="332" font-family="Playfair Display, Georgia, serif" font-size="50" font-style="italic" fill="url(#green)">3중 인플레 압박</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#7a9060">WMT 실적 쇼크가 드러낸 2026년 봄 소비 현실</text>

  <!-- 3가지 지표 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 관세 / WMT -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9060">관세 · WMT</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#d96552">−7.05%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7a9060">공급망 마진 충격</text>
    </g>
    <!-- WTI 유가 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9060">WTI 원유</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#e8f0e6">$112.25</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7a9060">물류 비용 상방 압력</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9060">USD/KRW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#e8f0e6">1,508.74</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7a9060">달러 강세 유지</text>
    </g>
    <!-- 10년물 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9060">10년물 금리</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#e8f0e6">4.67%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7a9060">Fed 딜레마 구간</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#7a9d6e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" opacity="0.8">MAY 22 · 2026 · FRI · TARIFF INFLATION</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" opacity="0.8" text-anchor="end">SOURCE · FRED · FRANKFURTER · YAHOO</text>
</svg>
