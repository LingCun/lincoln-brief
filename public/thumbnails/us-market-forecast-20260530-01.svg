<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0c"/>
      <stop offset="100%" stop-color="#0d0806"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e89080"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04535"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0dbd8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.30 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— PCE 전야 · 4주 시나리오 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#f5e8e6">PCE 발표 — 내일 21:30 KST</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">10년물 4.437% — 이틀 연속 하락</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#b08878">S&amp;P 7,582.23(+0.25%)  ·  WTI −2.13%  ·  금 +2.11%</text>

  <!-- 시나리오 표 -->
  <g transform="translate(80, 455)">
    <!-- 불 케이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08878">불 케이스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#6ba368">33%</text>
      <text x="0" y="95" font-family="monospace" font-size="12" fill="#6ba368">PCE 완화</text>
    </g>
    <!-- 베이스 케이스 -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08878">베이스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#d8b878">34%</text>
      <text x="0" y="95" font-family="monospace" font-size="12" fill="#d8b878">박스권 유지</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(470, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08878">베어 케이스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#d96552">23%</text>
      <text x="0" y="95" font-family="monospace" font-size="12" fill="#d96552">PCE 상회</text>
    </g>
    <!-- FOMC -->
    <g transform="translate(710, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08878">다음 관문</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e8e6">6/11 FOMC</text>
      <text x="0" y="95" font-family="monospace" font-size="12" fill="#b08878">금리 결정</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a1810" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#b08878">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a3828" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
