<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0a"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87862"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84535"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1000" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="230" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5e8e4">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.27 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 · 새벽판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#f5e8e4">S&amp;P 7,504 신고가 이후</text>
  <text x="80" y="340" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">FOMC 회의록 · PCE 더블 이벤트</text>
  <text x="80" y="388" font-family="Pretendard, sans-serif" font-size="18" fill="#9a8078">베이스 45% · 불 케이스 25% · 베어 케이스 25%</text>

  <!-- 시나리오 바 차트 -->
  <g transform="translate(80, 448)">
    <!-- 베이스 -->
    <rect x="0" y="0" width="360" height="32" fill="#d8b878" rx="3"/>
    <text x="12" y="22" font-family="monospace" font-size="13" fill="#1a1510">베이스 45% — S&amp;P 7,300~7,700 박스</text>
    <!-- 불 케이스 -->
    <rect x="0" y="44" width="200" height="32" fill="#6ba368" rx="3"/>
    <text x="12" y="66" font-family="monospace" font-size="13" fill="#1a1510">불 25% — 7,800+ 시야</text>
    <!-- 베어 케이스 -->
    <rect x="0" y="88" width="200" height="32" fill="#d96552" rx="3"/>
    <text x="12" y="110" font-family="monospace" font-size="13" fill="#f5e8e4">베어 25% — 7,100~7,300 테스트</text>
    <!-- 블랙 스완 -->
    <rect x="0" y="132" width="40" height="32" fill="#5a3a30" rx="3"/>
    <text x="52" y="154" font-family="monospace" font-size="12" fill="#9a8078">블랙 스완 5%</text>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a2018" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#9a8078">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a4030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
