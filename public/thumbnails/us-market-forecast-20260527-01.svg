<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab8e8"/>
      <stop offset="50%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2a6aaa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="340" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="260" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#4a90d9" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#4a90d9">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a90d9" text-anchor="end">2026.05.27 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#4a90d9">— 시장 예측 · 2주 시나리오 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#f5edd9">FOMC · PCE D-2</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#blue)">재개장이 드러낸 3가지 포지셔닝 신호</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#7a9aba">5/29 FOMC 회의록  ·  5/30 PCE  ·  S&amp;P 7,503</text>

  <!-- 이벤트 카드 3개 -->
  <g transform="translate(80, 440)">
    <!-- 신호 1 -->
    <g>
      <rect x="0" y="0" width="230" height="110" rx="4" fill="#1a2535" stroke="#4a90d9" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#4a90d9">신호 1</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="14" fill="#f5edd9">고금리 현재진행형</text>
      <text x="12" y="75" font-family="monospace" font-size="12" fill="#7a9aba">DOW −0.40%</text>
      <text x="12" y="95" font-family="monospace" font-size="12" fill="#7a9aba">WMT −1.80%</text>
    </g>
    <!-- 신호 2 -->
    <g transform="translate(250, 0)">
      <rect x="0" y="0" width="230" height="110" rx="4" fill="#1a2535" stroke="#6ba368" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#6ba368">신호 2</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="14" fill="#f5edd9">AI 사이클 생존</text>
      <text x="12" y="75" font-family="monospace" font-size="12" fill="#88a485">AVGO +2.03%</text>
      <text x="12" y="95" font-family="monospace" font-size="12" fill="#88a485">GOOGL +0.80%</text>
    </g>
    <!-- 신호 3 -->
    <g transform="translate(500, 0)">
      <rect x="0" y="0" width="230" height="110" rx="4" fill="#1a2535" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
      <text x="12" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#d96552">신호 3</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="14" fill="#f5edd9">실물 경기 우려</text>
      <text x="12" y="75" font-family="monospace" font-size="12" fill="#d98472">WTI −2.71%</text>
      <text x="12" y="95" font-family="monospace" font-size="12" fill="#d98472">$93.98</text>
    </g>
    <!-- 시나리오 확률 -->
    <g transform="translate(760, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="2" fill="#988e72">베이스 케이스</text>
      <text x="0" y="56" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">45%</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#d8b878">7,400~7,600 박스</text>
      <text x="0" y="105" font-family="monospace" font-size="10" fill="#988e72">PCE 2.5~2.7%</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1e2535" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#7a9aba">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#3a4560" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
