<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0e1420"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa4d8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5590"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#40c880" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#40c880" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="440" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0e0f0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.11 11:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 · 6월 11일 —</text>

  <!-- Highlight badge -->
  <rect x="80" y="176" width="680" height="30" rx="4" fill="#40c880" fill-opacity="0.15" stroke="#40c880" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#40c880">SK하이닉스 +1.42% 역방향 — NVDA −3.94% · AVGO −6.18% · KOSPI −4.92%</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#d0e0f0">SK하이닉스 2,077,000원</text>
  <text x="80" y="362" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#blue)">NVDA 역방향 상승 +1.42%</text>
  <text x="80" y="410" font-family="sans-serif" font-size="17" fill="#7090a8">June 10(2,048,000원) 대비 +29,000원 · 30일 고점(2,363,000원) 대비 −12.1%</text>

  <!-- Divider -->
  <line x1="80" y1="444" x2="1200" y2="444" stroke="#1a2030" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 478)">
    <!-- SK하이닉스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">SK하이닉스</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d0e0f0">2,077,000</text>
      <polygon points="28,68 14,52 0,68" fill="#40c880"/>
      <text x="36" y="83" font-family="monospace" font-size="16" fill="#40c880">+1.42%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">NVDA</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d0e0f0">$200.42</text>
      <polygon points="0,68 14,84 28,68" fill="#ff6050"/>
      <text x="36" y="83" font-family="monospace" font-size="16" fill="#ff6050">−3.94%</text>
    </g>
    <!-- AVGO -->
    <g transform="translate(500, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">AVGO</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d0e0f0">$372.10</text>
      <polygon points="0,68 14,84 28,68" fill="#ff6050"/>
      <text x="36" y="83" font-family="monospace" font-size="16" fill="#ff6050">−6.18%</text>
    </g>
    <!-- 삼성전자 -->
    <g transform="translate(740, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">삼성전자</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d0e0f0">297,500</text>
      <polygon points="0,68 14,84 28,68" fill="#ff6050"/>
      <text x="36" y="83" font-family="monospace" font-size="16" fill="#ff6050">−1.65%</text>
    </g>
  </g>

  <!-- Bottom signature -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1a2030" stroke-width="1"/>
  <text x="80" y="664" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#507090">— Lincoln</text>
  <text x="1200" y="664" font-family="monospace" font-size="11" letter-spacing="2" fill="#384858" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
