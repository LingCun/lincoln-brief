      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#080909"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="50%" stop-color="#c8a858"/>
      <stop offset="100%" stop-color="#b89840"/>
