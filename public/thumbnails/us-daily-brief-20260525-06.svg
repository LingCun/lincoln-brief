<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="350" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="250" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.25 · DAILY BRIEF · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 메모리얼 데이 종합 결산 · 저녁판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">헬스케어·EV 강세</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">vs 기술주 소화 — 6:6 혼조의 실체</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">S&amp;P 7,473.47  ·  LLY +2.24%  ·  TSLA +1.95%  ·  NVDA −1.90%</text>

  <!-- 4종목 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- LLY -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">LLY</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">$1,065</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+2.24%</text>
    </g>
    <!-- TSLA -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">TSLA</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">$426.01</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+1.95%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(490, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">NVDA</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">$215.33</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d96552">−1.90%</text>
    </g>
    <!-- 10Y -->
    <g transform="translate(750, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">10Y YIELD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">4.57%</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#988e72">고금리 유지</text>
    </g>
    <!-- 5/29 카운트다운 -->
    <g transform="translate(1010, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#988e72">NEXT EVENT</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5edd9">5/29 회의록</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#d8b878">KST 03:00</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">MAY 25 · 2026 · MEMORIAL DAY WRAP</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">SOURCE · FRED · YAHOO · FRANKFURTER</text>
</svg>
