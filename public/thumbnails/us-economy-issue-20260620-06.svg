<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081208;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101e10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6cd896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6cd896;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)" />

  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#green-line)" />

  <!-- Lincoln Brief logo -->
  <text x="60" y="65" font-family="Georgia, serif" font-size="20" fill="#6cd896" letter-spacing="4" opacity="0.9">LINCOLN BRIEF</text>
  <polygon points="52,58 57,48 62,58" fill="#6cd896" opacity="0.9"/>

  <!-- Edition label -->
  <rect x="1050" y="32" width="200" height="36" rx="4" fill="#6cd896" fill-opacity="0.15" stroke="#6cd896" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1150" y="55" font-family="Arial, sans-serif" font-size="14" fill="#6cd896" text-anchor="middle" letter-spacing="2">6/20 · 06:00 KST</text>

  <!-- Category label -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="13" fill="#6cd896" letter-spacing="3" opacity="0.7">ECONOMY ISSUE · 경제 이슈</text>

  <!-- Main headline -->
  <text x="60" y="210" font-family="Georgia, serif" font-size="68" fill="#ffffff" font-weight="bold">USD/KRW</text>
  <text x="60" y="278" font-family="Arial, sans-serif" font-size="52" fill="#6cd896" font-weight="bold">1,530.20</text>
  <text x="380" y="278" font-family="Arial, sans-serif" font-size="34" fill="#4dcc88"> −0.48%</text>

  <!-- Subtitle -->
  <text x="60" y="328" font-family="Georgia, serif" font-size="28" fill="#d8b878">달러 강세 정점 — FOMC가 결정할 것들</text>

  <!-- Divider -->
  <rect x="60" y="356" width="580" height="2" fill="#6cd896" opacity="0.5"/>

  <!-- Dollar trend table -->
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="13" fill="#6cd896" letter-spacing="2" opacity="0.8">USD/KRW 최근 흐름</text>

  <rect x="60" y="412" width="560" height="200" rx="6" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Row headers -->
  <text x="80" y="445" font-family="Arial, sans-serif" font-size="13" fill="#a09080">날짜</text>
  <text x="250" y="445" font-family="Arial, sans-serif" font-size="13" fill="#a09080">USD/KRW</text>
  <text x="430" y="445" font-family="Arial, sans-serif" font-size="13" fill="#a09080">변화</text>

  <line x1="80" y1="455" x2="580" y2="455" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <text x="80" y="483" font-family="Arial, sans-serif" font-size="16" fill="#a09080">6/17</text>
  <text x="250" y="483" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">~1,527</text>
  <text x="430" y="483" font-family="Arial, sans-serif" font-size="16" fill="#cc6666">↑ 달러 강세</text>

  <text x="80" y="518" font-family="Arial, sans-serif" font-size="16" fill="#a09080">6/18</text>
  <text x="250" y="518" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">~1,537</text>
  <text x="430" y="518" font-family="Arial, sans-serif" font-size="16" fill="#cc6666">↑ 고점 형성</text>

  <text x="80" y="553" font-family="Arial, sans-serif" font-size="16" fill="#6cd896" font-weight="bold">6/19</text>
  <text x="250" y="553" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">1,530.20</text>
  <text x="430" y="553" font-family="Arial, sans-serif" font-size="18" fill="#4dcc88" font-weight="bold">↓ −0.48%</text>

  <line x1="80" y1="565" x2="580" y2="565" stroke="#6cd896" stroke-opacity="0.3" stroke-width="1"/>

  <text x="80" y="592" font-family="Arial, sans-serif" font-size="13" fill="#6cd896">→ 고점 이탈, 방향 전환 초입 신호</text>

  <!-- Right panel: FOMC scenario -->
  <rect x="660" y="140" width="570" height="540" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#6cd896" stroke-width="1" stroke-opacity="0.2"/>

  <text x="685" y="180" font-family="Arial, sans-serif" font-size="13" fill="#6cd896" letter-spacing="2" opacity="0.8">FOMC 이후 시나리오</text>

  <!-- FOMC Dovish -->
  <rect x="675" y="194" width="540" height="100" rx="4" fill="#4dcc88" fill-opacity="0.08" stroke="#4dcc88" stroke-width="1" stroke-opacity="0.3"/>
  <text x="695" y="220" font-family="Arial, sans-serif" font-size="14" fill="#4dcc88" letter-spacing="1">비둘기 (완화 시사)</text>
  <text x="695" y="252" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">USD/KRW → <tspan fill="#4dcc88" font-weight="bold">1,510~1,520</tspan></text>
  <text x="695" y="278" font-family="Arial, sans-serif" font-size="15" fill="#4dcc88">US10Y 4.3% 이하 · Gold $4,250+ · S&amp;P 7,550+</text>

  <!-- FOMC Neutral -->
  <rect x="675" y="302" width="540" height="100" rx="4" fill="#d8b878" fill-opacity="0.06" stroke="#d8b878" stroke-width="1" stroke-opacity="0.3"/>
  <text x="695" y="328" font-family="Arial, sans-serif" font-size="14" fill="#d8b878" letter-spacing="1">동결 + 중립</text>
  <text x="695" y="360" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">USD/KRW → <tspan fill="#d8b878" font-weight="bold">1,520~1,540</tspan></text>
  <text x="695" y="386" font-family="Arial, sans-serif" font-size="15" fill="#d8b878">US10Y 4.4~4.5% · Gold 횡보 · S&amp;P 박스</text>

  <!-- FOMC Hawkish -->
  <rect x="675" y="410" width="540" height="100" rx="4" fill="#d86c6c" fill-opacity="0.08" stroke="#d86c6c" stroke-width="1" stroke-opacity="0.3"/>
  <text x="695" y="436" font-family="Arial, sans-serif" font-size="14" fill="#d86c6c" letter-spacing="1">매파 (추가 긴축 언급)</text>
  <text x="695" y="468" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">USD/KRW → <tspan fill="#d86c6c" font-weight="bold">1,550+</tspan></text>
  <text x="695" y="494" font-family="Arial, sans-serif" font-size="15" fill="#d86c6c">US10Y 4.6%+ · Gold $4,050 이하 · S&amp;P 7,400</text>

  <!-- US10Y & Gold current -->
  <text x="685" y="546" font-family="Arial, sans-serif" font-size="13" fill="#6cd896" letter-spacing="2" opacity="0.8">현재 신호</text>
  <rect x="675" y="557" width="540" height="100" rx="4" fill="#ffffff" fill-opacity="0.04"/>
  <text x="695" y="588" font-family="Arial, sans-serif" font-size="16" fill="#a09080">US10Y</text>
  <text x="800" y="588" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">4.451%</text>
  <text x="940" y="588" font-family="Arial, sans-serif" font-size="16" fill="#4dcc88">↓ 하락 방향</text>
  <text x="695" y="620" font-family="Arial, sans-serif" font-size="16" fill="#a09080">Gold</text>
  <text x="760" y="620" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">$4,172.90</text>
  <text x="940" y="620" font-family="Arial, sans-serif" font-size="16" fill="#cc6666">−1.21% 낙세</text>
  <text x="695" y="650" font-family="Arial, sans-serif" font-size="13" fill="#6cd896">→ 중립~비둘기 초입 반영 중</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#000000" fill-opacity="0.3"/>
  <text x="60" y="705" font-family="Arial, sans-serif" font-size="13" fill="#a09080">데이터: Yahoo Finance · Frankfurter · FRED</text>
  <text x="1220" y="705" font-family="Arial, sans-serif" font-size="13" fill="#6cd896" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
