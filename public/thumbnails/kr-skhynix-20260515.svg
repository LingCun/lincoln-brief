<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 HBM 칩 모티프 (장식) -->
  <g transform="translate(880, 200)" opacity="0.5">
    <rect x="0" y="0"   width="280" height="55" rx="3" fill="url(#chipGrad)" stroke="#d8b878" stroke-width="1"/>
    <rect x="0" y="65"  width="280" height="55" rx="3" fill="url(#chipGrad)" stroke="#d8b878" stroke-width="1"/>
    <rect x="0" y="130" width="280" height="55" rx="3" fill="url(#chipGrad)" stroke="#d8b878" stroke-width="1"/>
    <rect x="0" y="195" width="280" height="55" rx="3" fill="url(#chipGrad)" stroke="#d8b878" stroke-width="1"/>
    <rect x="-15" y="260" width="310" height="22" rx="2" fill="#0a0907" stroke="#d8b878" stroke-width="1.5"/>
    <line x1="-25" y1="271" x2="-15" y2="271" stroke="#d8b878" stroke-width="1"/>
    <line x1="295" y1="271" x2="305" y2="271" stroke="#d8b878" stroke-width="1"/>
    <text x="140" y="32" font-family="monospace" font-size="14" letter-spacing="4" fill="#d8b878" text-anchor="middle">HBM3E</text>
    <text x="140" y="97" font-family="monospace" font-size="14" letter-spacing="4" fill="#d8b878" text-anchor="middle">HBM3E</text>
    <text x="140" y="162" font-family="monospace" font-size="14" letter-spacing="4" fill="#d8b878" text-anchor="middle">HBM3E</text>
    <text x="140" y="227" font-family="monospace" font-size="14" letter-spacing="4" fill="#d8b878" text-anchor="middle">HBM4 ?</text>
  </g>

  <!-- 200만원 라인 표시 -->
  <line x1="80" y1="500" x2="800" y2="500" stroke="#d8b878" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"/>
  <text x="800" y="496" font-family="monospace" font-size="10" letter-spacing="2" fill="#988e72" text-anchor="end">— 2,000,000원 LINE</text>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · STOCK ANALYSIS</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#e8856b">— SK HYNIX · 000660 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">SK하이닉스</text>
  <text x="80" y="370" font-family="Playfair Display, Georgia, serif" font-size="64" fill="url(#goldGrad)">1,819,000원</text>
  <text x="80" y="430" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="#c4b89e">200만원 직전, −7.66%로 거부당한 자리</text>

  <!-- 부제 -->
  <text x="80" y="475" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">장중 1,995,000원 (200만원 −5,000원) · 종가 −151,000원</text>

  <!-- 좌하단 데이터 -->
  <g transform="translate(80, 555)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">CLOSE</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#e8856b">−7.66%</text>
  </g>

  <g transform="translate(260, 555)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">FWD PER</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">12배</text>
  </g>

  <g transform="translate(440, 555)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">목표가 (컨센)</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">230만원</text>
  </g>

  <g transform="translate(640, 555)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">YTD</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#7ec27e">+40%</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.15 · KOSPI</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">SEMICONDUCTOR · MEMORY</text>
</svg>
