<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · DAILY BRIEF</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.23 · 01:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- S&P 500 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">S&amp;P 500</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">7,482.29</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−0.24%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">NASDAQ −1.01% · DOW +0.38% · 빅테크 역풍</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- GOOGL panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">GOOGL 최대 낙폭</text>
  <text x="320" y="496" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">$348.31</text>
  <polygon points="272,520 288,536 304,520" fill="#f87171"/>
  <text x="316" y="538" font-family="Georgia, serif" font-size="28" fill="#f87171" font-weight="bold">−5.36%</text>
  <text x="320" y="572" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">AI 인재 이탈 · Waymo 3,800대 리콜</text>

  <!-- Right panel: key movers -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">섹터 분화</text>
  <text x="680" y="468" font-family="Georgia, serif" font-size="15" fill="#888888">AMZN</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−4.12%</text>
  <text x="680" y="496" font-family="Georgia, serif" font-size="15" fill="#888888">AVGO</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−3.54%</text>
  <text x="680" y="524" font-family="Georgia, serif" font-size="15" fill="#888888">JPM</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+2.06%</text>
  <text x="680" y="552" font-family="Georgia, serif" font-size="15" fill="#888888">TSLA</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+1.74%</text>
  <text x="680" y="580" font-family="Georgia, serif" font-size="13" fill="#705050">빅테크 후퇴 · 금융·EV 역행</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ 26,251.03</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−1.01% · AI 기술주 약세</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">US10Y 4.507%</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">재반등 · 성장주 밸류에이션 압박</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">WTI $73.75</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−3.72% · 미-이란 긴장 완화</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
