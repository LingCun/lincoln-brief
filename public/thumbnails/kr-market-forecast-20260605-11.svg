<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#150a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#c82020" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c82020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1000" cy="200" r="450" fill="url(#glow1)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.05 11:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시장 예측 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="380" height="30" rx="4" fill="#c82020" fill-opacity="0.18" stroke="#c82020" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e05555">8,600 지지 붕괴 확인 · 베어 케이스 44%</text>

  <!-- Main title -->
  <text x="80" y="292" font-family="Playfair Display, Georgia, serif" font-size="66" font-weight="500" fill="#f5edd9">KOSPI 8,234</text>
  <text x="80" y="354" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">다음 감시 레벨 8,200 · 8,000</text>
  <text x="80" y="402" font-family="sans-serif" font-size="17" fill="#8a9898">ATH(8,829)에서 −6.74% · USD/KRW 1,543원 · AVGO 쇼크</text>

  <!-- Divider -->
  <line x1="80" y1="436" x2="1200" y2="436" stroke="#2a1a1a" stroke-width="1"/>

  <!-- Scenario row -->
  <g transform="translate(80, 466)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#a89060">베이스</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8d0c0">8,000~8,400</text>
      <text x="0" y="86" font-family="monospace" font-size="20" fill="#d8c060">40%</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#a89060">불 케이스</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8d0c0">8,400~8,600</text>
      <text x="0" y="86" font-family="monospace" font-size="20" fill="#4db86b">10%</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#a89060">베어 케이스</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8d0c0">7,800~8,100</text>
      <text x="0" y="86" font-family="monospace" font-size="20" fill="#e05555">44%</text>
    </g>
    <!-- 블랙 스완 -->
    <g transform="translate(860, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#a89060">블랙 스완</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8d0c0">7,500 이하</text>
      <text x="0" y="86" font-family="monospace" font-size="20" fill="#884444">6%</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#2a1a1a" stroke-width="1"/>
  <text x="80" y="680" font-family="monospace" font-size="10" letter-spacing="2" fill="#4a3a3a">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="680" font-family="monospace" font-size="10" letter-spacing="1" fill="#4a3a3a" text-anchor="end">Yahoo Finance · KRX</text>
</svg>
