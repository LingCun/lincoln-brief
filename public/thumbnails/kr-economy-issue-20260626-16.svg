<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0800"/>
      <stop offset="100%" style="stop-color:#1a1000"/>
    </linearGradient>
    <linearGradient id="orangeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#f97316" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#f97316" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#f97316" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top orange accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#orangeLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#f97316" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#a05010" letter-spacing="2">KR MARKET · 경제 이슈</text>

  <!-- Edition label -->
  <rect x="1010" y="28" width="230" height="36" rx="3" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1125" y="51" font-family="Georgia, serif" font-size="14" fill="#e08040" text-anchor="middle" letter-spacing="1">2026.06.26 · 마감 후 분석</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4ade80" fill-opacity="0.8"/>

  <!-- Headline: The paradox -->
  <text x="640" y="162" font-family="Georgia, serif" font-size="18" fill="#e08040" text-anchor="middle" letter-spacing="3">KOSPI -5.81% 폭락 속 원화 강세</text>

  <!-- Big forex display -->
  <text x="640" y="244" font-family="Georgia, serif" font-size="82" fill="#ffffff" text-anchor="middle" font-weight="bold">1,536.41</text>
  <text x="640" y="274" font-family="Georgia, serif" font-size="22" fill="#9090a0" text-anchor="middle">USD/KRW 원</text>
  <!-- Up triangle for KRW (showing strengthening = down USD/KRW) -->
  <polygon points="478,290 496,310 514,290" fill="#4ade80"/>
  <text x="528" y="315" font-family="Georgia, serif" font-size="32" fill="#4ade80" font-weight="bold">원화 강세  -0.41%</text>
  <text x="640" y="350" font-family="Georgia, serif" font-size="15" fill="#504030" text-anchor="middle">장중 1,545원대 → 마감 1,536원 역전 · KOSPI -5.81% 동시 발생</text>

  <!-- Divider -->
  <line x1="160" y1="375" x2="1120" y2="375" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: market data -->
  <rect x="80" y="393" width="480" height="240" rx="4" fill="#f97316" fill-opacity="0.04" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="422" font-family="Georgia, serif" font-size="15" fill="#f97316" text-anchor="middle" letter-spacing="2">오늘 시장 데이터</text>
  <text x="100" y="450" font-family="Georgia, serif" font-size="13" fill="#808060">KOSPI</text>
  <text x="548" y="450" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">8,411.21  -5.81%</text>
  <text x="100" y="475" font-family="Georgia, serif" font-size="13" fill="#808060">SK하이닉스</text>
  <text x="548" y="475" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">2,673,000원  -8.36%</text>
  <text x="100" y="500" font-family="Georgia, serif" font-size="13" fill="#808060">삼성전자</text>
  <text x="548" y="500" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">339,500원  -5.30%</text>
  <text x="100" y="525" font-family="Georgia, serif" font-size="14" fill="#ffffff" font-weight="bold">USD/KRW</text>
  <text x="548" y="525" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end" font-weight="bold">1,536.41원  -0.41%</text>
  <text x="100" y="550" font-family="Georgia, serif" font-size="13" fill="#808060">WTI</text>
  <text x="548" y="550" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">$69.40  -3.50%</text>
  <text x="100" y="575" font-family="Georgia, serif" font-size="13" fill="#808060">GOLD</text>
  <text x="548" y="575" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">$4,060.80  +0.75%</text>
  <text x="100" y="600" font-family="Georgia, serif" font-size="13" fill="#808060">BTC</text>
  <text x="548" y="600" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">$60,034  +0.52%</text>

  <!-- Right panel: analysis -->
  <rect x="600" y="393" width="600" height="240" rx="4" fill="#f97316" fill-opacity="0.04" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="422" font-family="Georgia, serif" font-size="15" fill="#f97316" text-anchor="middle" letter-spacing="2">역방향의 해석</text>
  <text x="620" y="452" font-family="Georgia, serif" font-size="13" fill="#d8b878">해석 1.</text>
  <text x="700" y="452" font-family="Georgia, serif" font-size="13" fill="#c0c0d0">외국인 저점 매수 유입 (달러 매도)</text>
  <text x="620" y="480" font-family="Georgia, serif" font-size="13" fill="#d8b878">해석 2.</text>
  <text x="700" y="480" font-family="Georgia, serif" font-size="13" fill="#c0c0d0">글로벌 달러 약세 (GOLD +0.75%)</text>
  <text x="620" y="508" font-family="Georgia, serif" font-size="13" fill="#d8b878">해석 3.</text>
  <text x="700" y="508" font-family="Georgia, serif" font-size="13" fill="#c0c0d0">월말 수출기업 달러 환전 집중</text>
  <line x1="620" y1="525" x2="1180" y2="525" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>
  <text x="620" y="550" font-family="Georgia, serif" font-size="13" fill="#f97316">시사점:</text>
  <text x="620" y="572" font-family="Georgia, serif" font-size="12" fill="#c0c0d0">오늘 하락 = 극단적 패닉이 아닌</text>
  <text x="620" y="592" font-family="Georgia, serif" font-size="12" fill="#c0c0d0">빅테크 섹터 재평가 성격</text>
  <text x="620" y="618" font-family="Georgia, serif" font-size="12" fill="#808060">WTI -3.50%: 글로벌 수요 둔화 경고</text>

  <!-- Bottom note -->
  <text x="640" y="690" font-family="Georgia, serif" font-size="12" fill="#402010" text-anchor="middle">본 콘텐츠는 정보 제공 목적이며 투자 권유가 아닙니다 · lincoln-brief.vercel.app</text>
</svg>
