<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar (market-forecast = blue) -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · MARKET FORECAST</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#80b0e0" text-anchor="middle" letter-spacing="1">2026.06.23 · 01:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a5fa" fill-opacity="0.5"/>

  <!-- NASDAQ main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#80b0e0" text-anchor="middle" letter-spacing="4">NASDAQ</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="80" fill="#ffffff" text-anchor="middle" font-weight="bold">26,251.03</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−1.01%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#405870" text-anchor="middle">전일 +1.91% AI 랠리 하루 만에 반전 · US10Y 4.507%</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#60a5fa" fill-opacity="0.04" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#80b0e0" text-anchor="middle" letter-spacing="2">4주 시나리오</text>
  <text x="108" y="468" font-family="Georgia, serif" font-size="14" fill="#c0a060">경로 A · 27,000+</text>
  <text x="520" y="468" font-family="Georgia, serif" font-size="14" fill="#80b0e0" text-anchor="end">15%</text>
  <text x="108" y="496" font-family="Georgia, serif" font-size="14" fill="#c0a060">경로 B · 박스 횡보</text>
  <text x="520" y="496" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">40%</text>
  <text x="108" y="524" font-family="Georgia, serif" font-size="14" fill="#c0a060">경로 C · 26,000 이탈</text>
  <text x="520" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">35%</text>
  <text x="108" y="552" font-family="Georgia, serif" font-size="14" fill="#c0a060">경로 D · 급락</text>
  <text x="520" y="552" font-family="Georgia, serif" font-size="14" fill="#888888" text-anchor="end">10%</text>
  <text x="320" y="582" font-family="Georgia, serif" font-size="13" fill="#405870" text-anchor="middle">핵심: US10Y 4.6% 돌파 여부</text>

  <!-- Right panel: key levels -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">핵심 관찰 레벨</text>
  <text x="628" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">NASDAQ 상방</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">27,000 돌파</text>
  <text x="628" y="496" font-family="Georgia, serif" font-size="14" fill="#888888">NASDAQ 하방</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">26,000 이탈</text>
  <text x="628" y="524" font-family="Georgia, serif" font-size="14" fill="#888888">US10Y 경계</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">4.6% 돌파</text>
  <text x="628" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">S&amp;P 하방</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">7,400 이탈</text>
  <text x="628" y="578" font-family="Georgia, serif" font-size="13" fill="#705050">전일 대비 경로 C 확률 30%→35% 상향</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">S&amp;P 500</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">7,482.29 (−0.24%)</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">US10Y 4.507%</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">9bp 추가 상승 시 경로 C 확률↑</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">DOW 51,758.11</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.38% · 가치주 역행</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a5fa" fill-opacity="0.35"/>
</svg>
