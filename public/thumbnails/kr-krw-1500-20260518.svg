<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8856b"/>
      <stop offset="100%" stop-color="#a04a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 장식: 역사적 1,500원 시도 3번 -->
  <g transform="translate(870, 215)" opacity="0.75">
    <!-- 1,500 기준선 -->
    <line x1="0" y1="80" x2="340" y2="80" stroke="#f0d88c" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="345" y="84" font-family="monospace" font-size="11" letter-spacing="2" fill="#f0d88c">1,500</text>

    <!-- 라인: 2009 (피크) → 2022 (피크) → 2026 (피크 + 안착) -->
    <polyline points="0,55 80,150 160,60 240,150 320,72"
              fill="none" stroke="url(#redGrad)" stroke-width="2" stroke-linecap="round"/>

    <!-- 2009 -->
    <circle cx="0" cy="55" r="4" fill="#a04a3a" opacity="0.8"/>
    <text x="0" y="40" font-family="monospace" font-size="9" letter-spacing="2" fill="#a04a3a" text-anchor="middle" opacity="0.85">2009</text>
    <text x="0" y="180" font-family="monospace" font-size="8" letter-spacing="2" fill="#988e72" text-anchor="middle" opacity="0.6">금융위기</text>

    <!-- 2022 -->
    <circle cx="160" cy="60" r="4" fill="#a04a3a" opacity="0.8"/>
    <text x="160" y="45" font-family="monospace" font-size="9" letter-spacing="2" fill="#a04a3a" text-anchor="middle" opacity="0.85">2022</text>
    <text x="160" y="180" font-family="monospace" font-size="8" letter-spacing="2" fill="#988e72" text-anchor="middle" opacity="0.6">미 긴축</text>

    <!-- 2026 (현재) -->
    <circle cx="320" cy="72" r="7" fill="#f5edd9"/>
    <circle cx="320" cy="72" r="12" fill="none" stroke="#f0d88c" stroke-width="1" opacity="0.5"/>
    <text x="320" y="50" font-family="monospace" font-size="10" letter-spacing="2" fill="#f5edd9" text-anchor="middle">2026 · NOW</text>
    <text x="320" y="180" font-family="monospace" font-size="8" letter-spacing="2" fill="#988e72" text-anchor="middle" opacity="0.7">3rd TRY</text>
  </g>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · ECONOMY ISSUE</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 2026.05.18 · KRW WATCH —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">원/달러 1,500원</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#goldGrad)">가격이 아니라 *체제* 의 라인</text>

  <!-- 부제 -->
  <text x="80" y="425" font-family="Pretendard, sans-serif" font-size="20" fill="#c4b89e">17년 만의 세 번째 시도 · 3개월 안착 시 한국 경제 좌표가 다시 그려진다</text>

  <!-- 좌하단 데이터 -->
  <g transform="translate(80, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">USD/KRW</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">1,501.50</text>
    <polygon points="0,76 12,82 12,70" fill="#e8856b"/>
    <text x="20" y="80" font-family="monospace" font-size="13" fill="#e8856b">YTD +6.4%</text>
  </g>

  <g transform="translate(290, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">역사적 시도</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f0d88c">3rd</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">'09 · '22 · '26</text>
  </g>

  <g transform="translate(460, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">CPI 압력</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#e8856b">+0.20%p</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">3개월 시차</text>
  </g>

  <g transform="translate(660, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">외인 환차손</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#e8856b">−13%</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">평균 매입 기준</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.18 · 15:30 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">KRW · REGIME LINE</text>
</svg>
