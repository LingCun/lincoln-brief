<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · DAILY BRIEF</text>

  <!-- Edition label -->
  <rect x="1010" y="28" width="230" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1125" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.25 · 오전 시황</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4ade80" fill-opacity="0.7"/>

  <!-- KOSPI main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">KOSPI 장중</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">8,959.57</text>
  <polygon points="510,284 528,266 546,284" fill="#4ade80"/>
  <text x="558" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+5.77%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#406050" text-anchor="middle">+488.55포인트 · 9,000선 40포인트 앞</text>

  <!-- Divider -->
  <line x1="160" y1="372" x2="1120" y2="372" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- SK Hynix panel -->
  <rect x="80" y="394" width="480" height="200" rx="4" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="16" fill="#3a9060" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="320" y="488" font-family="Georgia, serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="bold">2,917,000</text>
  <text x="320" y="512" font-family="Georgia, serif" font-size="14" fill="#3a9060" text-anchor="middle">원</text>
  <polygon points="254,524 270,506 286,524" fill="#4ade80"/>
  <text x="298" y="554" font-family="Georgia, serif" font-size="28" fill="#4ade80" font-weight="bold">+11.29%</text>
  <text x="320" y="578" font-family="Georgia, serif" font-size="13" fill="#3a6040" text-anchor="middle">30일 고점(2,919,000) 2,000원 전</text>

  <!-- Side panel -->
  <rect x="600" y="394" width="600" height="200" rx="4" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#3a9060" text-anchor="middle" letter-spacing="2">오늘 주요 종목</text>
  <text x="620" y="466" font-family="Georgia, serif" font-size="15" fill="#888888">삼성전자</text>
  <text x="1170" y="466" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+5.29%</text>
  <text x="620" y="494" font-family="Georgia, serif" font-size="15" fill="#888888">셀트리온</text>
  <text x="1170" y="494" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+2.20%</text>
  <text x="620" y="522" font-family="Georgia, serif" font-size="15" fill="#888888">LG에너지솔루션</text>
  <text x="1170" y="522" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−2.74%</text>
  <text x="620" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">NVDA (전일)</text>
  <text x="1170" y="550" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$199 · −0.52%</text>
  <text x="620" y="578" font-family="Georgia, serif" font-size="13" fill="#3a6040">KOSDAQ −1.68% 역행 · 대형주 편향</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">KOSDAQ 894.06</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−1.68% · 대형주 역행</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,545.01원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.64% · 원화 약세</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">US10Y 4.402%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">전일 4.493% → 금리 하락</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
