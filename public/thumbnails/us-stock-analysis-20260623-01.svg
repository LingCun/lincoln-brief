<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#f87171;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar (stock-analysis = red/alert) -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#e08080" text-anchor="middle" letter-spacing="1">2026.06.23 · 01:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.5"/>

  <!-- GOOGL ticker label -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="24" fill="#e08080" text-anchor="middle" letter-spacing="6">GOOGL</text>

  <!-- Price display -->
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$348.31</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−5.36%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">30일 고점 $402.62 대비 −13.5% · 섹터 최대 낙폭</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: dual bad news -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">이중 악재</text>
  <text x="108" y="468" font-family="Georgia, serif" font-size="14" fill="#c0a060">① AI 인재 이탈</text>
  <text x="108" y="490" font-family="Georgia, serif" font-size="13" fill="#706060">핵심 개발인력 경쟁사 이동 보도</text>
  <line x1="108" y1="506" x2="520" y2="506" stroke="#f87171" stroke-opacity="0.15" stroke-width="1"/>
  <text x="108" y="530" font-family="Georgia, serif" font-size="14" fill="#c0a060">② Waymo 3,800대 리콜</text>
  <text x="108" y="552" font-family="Georgia, serif" font-size="13" fill="#706060">자율주행 신뢰성 우려 재부상</text>
  <text x="320" y="582" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">AI + 자율주행 내러티브 동시 균열</text>

  <!-- Right panel: 30-day context -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">30일 가격 궤적</text>
  <text x="628" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">30일 시작가</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">$400.80</text>
  <text x="628" y="496" font-family="Georgia, serif" font-size="14" fill="#888888">30일 고점</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">$402.62</text>
  <text x="628" y="524" font-family="Georgia, serif" font-size="14" fill="#888888">현재 (30일 저점)</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$348.31</text>
  <text x="628" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">NVDA 당일 낙폭</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">−0.85% (비교)</text>
  <text x="628" y="578" font-family="Georgia, serif" font-size="13" fill="#705050">베이스(45%): $340~$355 박스 소화</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">섹터 평균 낙폭</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−1.99% · GOOGL 초과 −3.4%p</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">$350 심리선</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">이탈 확인 · 다음 지지 $330~$340</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">26,251.03 (−1.01%)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#f87171" fill-opacity="0.35"/>
</svg>
