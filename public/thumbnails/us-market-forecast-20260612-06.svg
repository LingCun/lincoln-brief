<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110806"/>
      <stop offset="100%" style="stop-color:#1e100a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left red accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d96552"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#d96552" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#d96552" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1020" y="28" width="220" height="36" rx="4" fill="#d96552" opacity="0.15"/>
  <rect x="1020" y="28" width="220" height="36" rx="4" fill="none" stroke="#d96552" stroke-width="1" opacity="0.5"/>
  <text x="1130" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#d96552" text-anchor="middle">US MARKET FORECAST</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">2026.06.12  |  SLOT 06  |  KST 07:00</text>

  <!-- Divider line -->
  <line x1="48" y1="110" x2="700" y2="110" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <!-- Main headline -->
  <text x="48" y="185" font-family="'Georgia', serif" font-size="44" fill="#f5f0e8" font-weight="bold">비둘기 반전 조건 충족</text>
  <text x="48" y="238" font-family="'Georgia', serif" font-size="28" fill="#d96552">WTI $86.42(−4%) — $87 임계선 하향 돌파</text>

  <!-- Divider -->
  <line x1="48" y1="260" x2="740" y2="260" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <!-- Scenario probability table -->
  <text x="48" y="292" font-family="'Arial', sans-serif" font-size="13" fill="#888" letter-spacing="2">4주 시나리오 (업데이트)</text>

  <!-- Scenario 1: Dovish -->
  <rect x="48" y="308" width="330" height="72" rx="6" fill="#0d1208" stroke="#22c55e" stroke-width="2" opacity="0.9"/>
  <text x="68" y="332" font-family="'Arial', sans-serif" font-size="13" fill="#22c55e" font-weight="bold">비둘기 반전</text>
  <text x="68" y="354" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">WTI $87 이하 안착 + CPI 완화</text>
  <text x="68" y="372" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">S&amp;P 7,500~7,600 회복 시도</text>
  <text x="355" y="360" font-family="'Georgia', serif" font-size="30" fill="#22c55e" text-anchor="end" font-weight="bold">32%</text>
  <text x="355" y="376" font-family="'Arial', sans-serif" font-size="12" fill="#22c55e" text-anchor="end">↑ +12%p</text>

  <!-- Scenario 2: Neutral -->
  <rect x="48" y="392" width="330" height="72" rx="6" fill="#13100a" stroke="#d96552" stroke-width="1" opacity="0.8"/>
  <text x="68" y="416" font-family="'Arial', sans-serif" font-size="13" fill="#d96552" font-weight="bold">중립 유지</text>
  <text x="68" y="438" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">WTI $86~90 박스 + 데이터 혼재</text>
  <text x="68" y="456" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">S&amp;P 7,200~7,400 횡보</text>
  <text x="355" y="444" font-family="'Georgia', serif" font-size="30" fill="#d96552" text-anchor="end" font-weight="bold">38%</text>

  <!-- Scenario 3: Hawkish -->
  <rect x="48" y="476" width="330" height="72" rx="6" fill="#13100a" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <text x="68" y="500" font-family="'Arial', sans-serif" font-size="13" fill="#ef4444">매파 고착</text>
  <text x="68" y="522" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">WTI $90 재반등 + CPI 반등</text>
  <text x="68" y="540" font-family="'Arial', sans-serif" font-size="12" fill="#aaa">S&amp;P 7,000~7,200 하방</text>
  <text x="355" y="528" font-family="'Georgia', serif" font-size="30" fill="#ef4444" text-anchor="end">22%</text>
  <text x="355" y="544" font-family="'Arial', sans-serif" font-size="12" fill="#ef4444" text-anchor="end">↓ −6%p</text>

  <!-- Scenario 4: Black Swan -->
  <rect x="48" y="560" width="330" height="72" rx="6" fill="#13100a" stroke="#666" stroke-width="1" opacity="0.5"/>
  <text x="68" y="584" font-family="'Arial', sans-serif" font-size="13" fill="#666">블랙스완</text>
  <text x="68" y="606" font-family="'Arial', sans-serif" font-size="12" fill="#777">중동 충돌 확대</text>
  <text x="68" y="624" font-family="'Arial', sans-serif" font-size="12" fill="#777">S&amp;P 6,800 이하</text>
  <text x="355" y="612" font-family="'Georgia', serif" font-size="30" fill="#666" text-anchor="end">8%</text>
  <text x="355" y="628" font-family="'Arial', sans-serif" font-size="12" fill="#666" text-anchor="end">↓ −4%p</text>

  <!-- Right decorative panel -->
  <rect x="820" y="100" width="420" height="560" rx="8" fill="#110808" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <text x="1030" y="158" font-family="'Georgia', serif" font-size="18" fill="#d96552" text-anchor="middle" opacity="0.8">지표 현황</text>
  <line x1="860" y1="175" x2="1200" y2="175" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <text x="860" y="215" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">S&amp;P 500</text>
  <text x="1195" y="215" font-family="'Georgia', serif" font-size="20" fill="#22c55e" text-anchor="end" font-weight="bold">7,394.30</text>

  <text x="860" y="255" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">WTI</text>
  <text x="1195" y="255" font-family="'Georgia', serif" font-size="20" fill="#ef4444" text-anchor="end" font-weight="bold">$86.42 ↓</text>

  <text x="860" y="295" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">US10Y</text>
  <text x="1195" y="295" font-family="'Georgia', serif" font-size="20" fill="#22c55e" text-anchor="end" font-weight="bold">4.463% ↓</text>

  <text x="860" y="335" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">Gold</text>
  <text x="1195" y="335" font-family="'Georgia', serif" font-size="20" fill="#d8b878" text-anchor="end" font-weight="bold">$4,233 ↑</text>

  <line x1="860" y1="360" x2="1200" y2="360" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <text x="1030" y="410" font-family="'Georgia', serif" font-size="18" fill="#d96552" text-anchor="middle" opacity="0.8">다음 체크포인트</text>

  <text x="860" y="448" font-family="'Arial', sans-serif" font-size="13" fill="#aaa">WTI $86 안착 여부</text>
  <text x="860" y="478" font-family="'Arial', sans-serif" font-size="13" fill="#aaa">S&amp;P 7,400 돌파 여부</text>
  <text x="860" y="508" font-family="'Arial', sans-serif" font-size="13" fill="#aaa">US10Y 4.4% 이하 접근</text>
  <text x="860" y="538" font-family="'Arial', sans-serif" font-size="13" fill="#aaa">7월 CPI 데이터 확인</text>

  <line x1="860" y1="560" x2="1200" y2="560" stroke="#d96552" stroke-width="1" opacity="0.2"/>
  <text x="1030" y="600" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle">이전 비둘기 반전 확률: 20%</text>
  <text x="1030" y="628" font-family="'Arial', sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">현재 비둘기 반전 확률: 32% ↑</text>
  <text x="1030" y="655" font-family="'Georgia', serif" font-size="14" fill="#d96552" text-anchor="middle" opacity="0.8">Lincoln Brief — 06:00 KST</text>
</svg>
