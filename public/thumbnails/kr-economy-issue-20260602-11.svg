<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d120a"/>
      <stop offset="100%" stop-color="#080d06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ac08a"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7a50"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e09040" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e09040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.02 11:00 KST · 경제 이슈</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— ECONOMY ISSUE —</text>

  <!-- Alert badge -->
  <rect x="80" y="176" width="400" height="30" rx="4" fill="#e09040" fill-opacity="0.18" stroke="#e09040" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e09040">원화 사흘 연속 약세 · 미국 10년물 4.475%</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">원화 1,516원</text>
  <text x="80" y="352" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#green)">달러·금 동시 강세의 신호</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#8a9898">GOLD +1.75% · BTC −4.38% · US10Y 4.475%</text>

  <!-- Divider -->
  <line x1="80" y1="436" x2="1200" y2="436" stroke="#1a2a18" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 470)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#709060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,515.88</text>
      <polygon points="0,88 14,72 28,88" fill="#e09040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e09040">+0.60%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#709060">US 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.475%</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">+0.49%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#709060">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$4,553</text>
      <polygon points="0,72 14,88 28,72" fill="#d8b878"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#d8b878">+1.75%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#709060">BTC</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$70,353</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−4.38%</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#1a2a18" stroke-width="0.5"/>
  <text x="80" y="645" font-family="monospace" font-size="10" fill="#3a5a38" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="645" font-family="monospace" font-size="10" fill="#7a9d6e" text-anchor="end">— Lincoln</text>
</svg>
