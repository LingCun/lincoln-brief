<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#d8b87800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left gold bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d8b878" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a08858" letter-spacing="2">US MARKET · 데일리 시황</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.7" text-anchor="end">2026.07.08 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a08858" text-anchor="end">반도체 셀오프</text>

  <!-- Main headline -->
  <text x="84" y="200" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#ffffff">코스피 -5.34% 급락</text>
  <text x="84" y="240" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#ffffff">뉴욕도 숨고르기</text>

  <!-- S&P 500 main data -->
  <text x="84" y="308" font-family="Georgia, serif" font-size="28" fill="#d8b878">S&amp;P 500</text>
  <text x="250" y="308" font-family="Georgia, serif" font-size="28" fill="#ffffff">7,516.18</text>
  <polygon points="440,308 460,308 450,290" fill="#e87050"/>
  <text x="468" y="308" font-family="Georgia, serif" font-size="24" fill="#e87050">-0.28%</text>

  <!-- Divider line -->
  <rect x="84" y="328" width="700" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- KOSPI row (headline mover) -->
  <text x="84" y="376" font-family="Georgia, serif" font-size="26" fill="#a08858">코스피</text>
  <text x="240" y="376" font-family="Georgia, serif" font-size="30" fill="#ffffff" font-weight="bold">7,656.31</text>
  <polygon points="450,376 470,376 460,358" fill="#e87050"/>
  <text x="478" y="376" font-family="Georgia, serif" font-size="26" fill="#e87050" font-weight="bold">-5.34%</text>

  <!-- Secondary row -->
  <text x="84" y="418" font-family="Georgia, serif" font-size="22" fill="#a08858">KOSDAQ</text>
  <text x="220" y="418" font-family="Georgia, serif" font-size="22" fill="#ffffff">831.23</text>
  <polygon points="380,418 392,418 386,402" fill="#e87050"/>
  <text x="399" y="418" font-family="Georgia, serif" font-size="20" fill="#e87050">-4.28%</text>

  <text x="84" y="454" font-family="Georgia, serif" font-size="22" fill="#a08858">USD/KRW</text>
  <text x="220" y="454" font-family="Georgia, serif" font-size="22" fill="#ffffff">1,514.13</text>
  <polygon points="390,454 402,454 396,438" fill="#e87050"/>
  <text x="409" y="454" font-family="Georgia, serif" font-size="20" fill="#e87050">-1.10% 원화 강세</text>

  <!-- Divider -->
  <rect x="84" y="478" width="700" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- Secondary data row -->
  <text x="84" y="516" font-family="Georgia, serif" font-size="20" fill="#a08858">TSLA</text>
  <text x="180" y="516" font-family="Georgia, serif" font-size="20" fill="#ffffff">$407.63</text>
  <polygon points="360,516 372,516 366,500" fill="#e87050"/>
  <text x="379" y="516" font-family="Georgia, serif" font-size="18" fill="#e87050">-2.89% 로보택시 되돌림</text>

  <text x="84" y="550" font-family="Georgia, serif" font-size="20" fill="#a08858">NVDA</text>
  <text x="180" y="550" font-family="Georgia, serif" font-size="20" fill="#ffffff">$198.12</text>
  <polygon points="420,534 432,534 426,550" fill="#6ec46e"/>
  <text x="439" y="550" font-family="Georgia, serif" font-size="18" fill="#6ec46e">+1.31% 반도체 셀오프 속 선방</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="578" width="700" height="1" fill="#d8b878" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="612" font-family="Georgia, serif" font-size="18" fill="#d8b878" opacity="0.85">삼성전자發 반도체 밸류에이션 재평가, 인텔·AMD로 확산</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,650 92,642 100,650 92,658" fill="#d8b878" opacity="0.5"/>
</svg>
