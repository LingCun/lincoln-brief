  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 6/4 US 마감 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="48" font-weight="600" fill="#e8d8a0">S&amp;P 7,587.65 · DOW +1.61%</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="url(#gold)">AVGO −12.07% AI 가이던스 쇼크</text>
  <text x="80" y="370" font-family="Pretendard, sans-serif" font-size="18" fill="#a09060">WTI $92.49 (−3.68%)  ·  US10Y 4.469%  ·  USD/KRW 1,532.04</text>

