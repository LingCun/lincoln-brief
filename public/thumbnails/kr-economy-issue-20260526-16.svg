<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1418"/>
      <stop offset="100%" stop-color="#060c10"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88ddcc"/>
      <stop offset="50%" stop-color="#44bbaa"/>
      <stop offset="100%" stop-color="#228877"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#44bbaa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#44bbaa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="160" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#44bbaa" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f5f3">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#44bbaa">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#44bbaa" text-anchor="end">2026.05.26 16:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#44bbaa">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="310" height="30" rx="4" fill="#44bbaa" fill-opacity="0.18" stroke="#44bbaa" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#44bbaa">1,500원 심리선 3.88원 거리</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#e8f5f3">원화 1,503원</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#teal)">1,500선 심리 지지 테스트</text>
  <text x="80" y="398" font-family="sans-serif" font-size="17" fill="#60a898">WTI $92.80 하락 + 달러 약세 → 외국인 수급·수입물가 구조 변화</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#1a2e2c" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#44bbaa" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#40887a">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f5f3">1,503.88</text>
      <polygon points="0,88 14,72 28,88" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.59%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#44bbaa" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#40887a">WTI 원유</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f5f3">$92.80</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−3.93%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#44bbaa" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#40887a">US 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f5f3">4.558%</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−0.61%</text>
    </g>
    <!-- 심리선 거리 -->
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#44bbaa" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#40887a">심리선까지</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f5f3">−3.88원</text>
      <text x="0" y="90" font-family="monospace" font-size="14" fill="#44bbaa">1,500원 지지선</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#060c0a" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#306858">KOSPI 8,047.51 · SK하이닉스 +5.72% · 현대차 +5.19% · 금 $4,524.20</text>
</svg>
