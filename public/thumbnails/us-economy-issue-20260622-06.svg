<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101810;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a9d6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a9d6e;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)" />

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#green-line)" />

  <!-- Lincoln Brief logo -->
  <text x="60" y="65" font-family="Georgia, serif" font-size="20" fill="#7a9d6e" letter-spacing="4" opacity="0.9">LINCOLN BRIEF</text>
  <polygon points="52,58 57,48 62,58" fill="#7a9d6e" opacity="0.9"/>

  <!-- Edition label -->
  <rect x="1030" y="32" width="220" height="36" rx="4" fill="#7a9d6e" fill-opacity="0.15" stroke="#7a9d6e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1140" y="55" font-family="Arial, sans-serif" font-size="14" fill="#7a9d6e" text-anchor="middle" letter-spacing="2">6/22 · 06:00 KST</text>

  <!-- Category label -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="13" fill="#7a9d6e" letter-spacing="3" opacity="0.7">ECONOMY ISSUE · 경제 이슈</text>

  <!-- Main headline -->
  <text x="60" y="205" font-family="Georgia, serif" font-size="48" fill="#ffffff" font-weight="bold">달러·금리·금</text>
  <text x="60" y="265" font-family="Georgia, serif" font-size="36" fill="#7a9d6e">트리플 하락이 말하는 것</text>

  <!-- Divider -->
  <rect x="60" y="292" width="560" height="2" fill="#7a9d6e" opacity="0.5"/>

  <!-- Three assets -->
  <!-- USD/KRW -->
  <text x="60" y="348" font-family="Arial, sans-serif" font-size="13" fill="#608060" letter-spacing="1">USD/KRW</text>
  <text x="60" y="384" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" font-weight="bold">1,529.89</text>
  <polygon points="256,372 266,388 276,372" fill="#ff7777"/>
  <text x="284" y="384" font-family="Arial, sans-serif" font-size="24" fill="#ff7777" font-weight="bold">-0.50%</text>

  <!-- US10Y -->
  <text x="60" y="436" font-family="Arial, sans-serif" font-size="13" fill="#608060" letter-spacing="1">US10Y</text>
  <text x="60" y="472" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" font-weight="bold">4.451%</text>
  <polygon points="186,460 196,476 206,460" fill="#ff7777"/>
  <text x="214" y="472" font-family="Arial, sans-serif" font-size="24" fill="#ff7777" font-weight="bold">소폭 하락</text>

  <!-- Gold -->
  <text x="60" y="524" font-family="Arial, sans-serif" font-size="13" fill="#608060" letter-spacing="1">GOLD</text>
  <text x="60" y="560" font-family="Arial, sans-serif" font-size="36" fill="#ffffff" font-weight="bold">$4,172.90</text>
  <polygon points="256,548 266,564 276,548" fill="#ff7777"/>
  <text x="284" y="560" font-family="Arial, sans-serif" font-size="24" fill="#ff7777" font-weight="bold">-1.21%</text>

  <!-- Key message -->
  <rect x="60" y="598" width="560" height="52" rx="6" fill="#7a9d6e" fill-opacity="0.12" stroke="#7a9d6e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="80" y="622" font-family="Arial, sans-serif" font-size="14" fill="#90c080">달러 약세에도 금이 오르지 않는 역설</text>
  <text x="80" y="644" font-family="Arial, sans-serif" font-size="13" fill="#608060">AI 테크로의 자금 집중이 안전자산 수요를 대체</text>

  <!-- Right panel -->
  <rect x="660" y="140" width="580" height="540" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#7a9d6e" stroke-width="1" stroke-opacity="0.2"/>
  <text x="680" y="178" font-family="Arial, sans-serif" font-size="13" fill="#7a9d6e" letter-spacing="2" opacity="0.8">자금 흐름 구조</text>

  <!-- Flow: AI Tech absorbs capital -->
  <text x="680" y="218" font-family="Arial, sans-serif" font-size="14" fill="#608060">자금 유입 (AI 테크)</text>
  <text x="680" y="248" font-family="Arial, sans-serif" font-size="18" fill="#4dcc88" font-weight="bold">AVGO +4.70%</text>
  <text x="680" y="274" font-family="Arial, sans-serif" font-size="18" fill="#4dcc88" font-weight="bold">NVDA +2.95%</text>
  <text x="680" y="300" font-family="Arial, sans-serif" font-size="18" fill="#4dcc88" font-weight="bold">AMZN +2.90%</text>

  <!-- Arrow down -->
  <line x1="950" y1="200" x2="950" y2="440" stroke="#7a9d6e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="980" y="218" font-family="Arial, sans-serif" font-size="14" fill="#608060">자금 유출 (안전자산)</text>
  <text x="980" y="248" font-family="Arial, sans-serif" font-size="18" fill="#ff7777">Gold -1.21%</text>
  <text x="980" y="274" font-family="Arial, sans-serif" font-size="18" fill="#ff7777">달러 -0.50%</text>
  <text x="980" y="300" font-family="Arial, sans-serif" font-size="18" fill="#ff7777">BTC -0.30%</text>

  <!-- Divider -->
  <line x1="680" y1="330" x2="1220" y2="330" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- USD/KRW implications for Korea -->
  <text x="680" y="368" font-family="Arial, sans-serif" font-size="13" fill="#7a9d6e" letter-spacing="1">한국 투자자 핵심 변수</text>

  <text x="680" y="404" font-family="Arial, sans-serif" font-size="15" fill="#a0b090">USD/KRW 1,510 이하</text>
  <text x="1050" y="404" font-family="Arial, sans-serif" font-size="15" fill="#4dcc88">→ 외국인 순매수↑</text>

  <text x="680" y="434" font-family="Arial, sans-serif" font-size="15" fill="#a0b090">USD/KRW 1,550 이상</text>
  <text x="1050" y="434" font-family="Arial, sans-serif" font-size="15" fill="#ff7777">→ 외국인 유출↑</text>

  <text x="680" y="464" font-family="Arial, sans-serif" font-size="15" fill="#a0b090">Gold $4,250 반등</text>
  <text x="1050" y="464" font-family="Arial, sans-serif" font-size="15" fill="#d8b878">→ AI 피로감 신호</text>

  <!-- Divider -->
  <line x1="680" y1="490" x2="1220" y2="490" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- KOSPI signal -->
  <text x="680" y="526" font-family="Arial, sans-serif" font-size="13" fill="#608060">KOSPI 영향</text>
  <text x="680" y="558" font-family="Arial, sans-serif" font-size="17" fill="#ffffff">달러 약세 → 외국인 원화 매력</text>
  <text x="680" y="586" font-family="Arial, sans-serif" font-size="17" fill="#ffffff">AI 강세 → 반도체 HBM 수혜</text>
  <text x="680" y="614" font-family="Arial, sans-serif" font-size="17" fill="#ff7777">Gold 약세 → 금 ETF 단기 부정</text>

  <!-- Bottom disclaimer -->
  <text x="680" y="680" font-family="Arial, sans-serif" font-size="11" fill="#406040" opacity="0.6">lincoln-brief.vercel.app · 정보 제공 목적 · 투자 권유 아님</text>
</svg>
