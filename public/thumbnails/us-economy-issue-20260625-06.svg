<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060e0a"/>
      <stop offset="100%" style="stop-color:#0c1810"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50c880;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#50c880;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#50c880;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#50c880" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#50c880" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#50c880" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top green accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#greenLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#50c880" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#307850" letter-spacing="2">US MARKET · ECONOMY ISSUE</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#50c880" fill-opacity="0.1" stroke="#50c880" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#70d890" text-anchor="middle" letter-spacing="1">2026.06.25 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,100 649,109 640,118 631,109" fill="#50c880" fill-opacity="0.5"/>

  <!-- Main headline -->
  <text x="640" y="152" font-family="Georgia, serif" font-size="20" fill="#70d890" text-anchor="middle" letter-spacing="2">AI 투자 생태계 전환 신호</text>
  <text x="640" y="208" font-family="Georgia, serif" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold">1라운드 → 2라운드</text>
  <text x="640" y="254" font-family="Georgia, serif" font-size="20" fill="#408060" text-anchor="middle">독점 집중 → 경쟁 분산</text>

  <!-- Divider -->
  <line x1="160" y1="278" x2="1120" y2="278" stroke="#50c880" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Three signals (3 columns) -->
  <!-- Signal 1: Qualcomm -->
  <rect x="80" y="298" width="340" height="240" rx="4" fill="#50c880" fill-opacity="0.04" stroke="#50c880" stroke-opacity="0.2" stroke-width="1"/>
  <text x="250" y="334" font-family="Georgia, serif" font-size="15" fill="#70d890" text-anchor="middle" letter-spacing="1">신호 ①</text>
  <text x="250" y="368" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Qualcomm</text>
  <text x="250" y="396" font-family="Georgia, serif" font-size="16" fill="#50c880" text-anchor="middle">AI 데이터센터 칩 진입</text>
  <line x1="120" y1="410" x2="380" y2="410" stroke="#50c880" stroke-opacity="0.2" stroke-width="1"/>
  <text x="250" y="436" font-family="Georgia, serif" font-size="13" fill="#608060" text-anchor="middle">NVIDIA 독점 도전</text>
  <text x="250" y="458" font-family="Georgia, serif" font-size="13" fill="#608060" text-anchor="middle">MSFT · Meta 채택 예정</text>
  <text x="250" y="480" font-family="Georgia, serif" font-size="13" fill="#608060" text-anchor="middle">AI 칩 경쟁 체제 개막</text>
  <text x="250" y="514" font-family="Georgia, serif" font-size="22" fill="#50c880" text-anchor="middle" font-weight="bold">↓ NVDA $199</text>

  <!-- Signal 2: CEO Warning -->
  <rect x="470" y="298" width="340" height="240" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.18" stroke-width="1"/>
  <text x="640" y="334" font-family="Georgia, serif" font-size="15" fill="#e09080" text-anchor="middle" letter-spacing="1">신호 ②</text>
  <text x="640" y="368" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">MSFT CEO 경고</text>
  <text x="640" y="396" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="middle">AI 집중 위험 공개 발언</text>
  <line x1="510" y1="410" x2="770" y2="410" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="640" y="436" font-family="Georgia, serif" font-size="13" fill="#806060" text-anchor="middle">소수 빅테크 AI 집중 문제</text>
  <text x="640" y="458" font-family="Georgia, serif" font-size="13" fill="#806060" text-anchor="middle">AI 투자 속도 조절 신호?</text>
  <text x="640" y="480" font-family="Georgia, serif" font-size="13" fill="#806060" text-anchor="middle">내러티브 자기 부정의 역설</text>
  <text x="640" y="514" font-family="Georgia, serif" font-size="22" fill="#f87171" text-anchor="middle" font-weight="bold">↓ MSFT $365.46</text>

  <!-- Signal 3: Retail Rotation -->
  <rect x="860" y="298" width="340" height="240" rx="4" fill="#60a0e8" fill-opacity="0.04" stroke="#60a0e8" stroke-opacity="0.18" stroke-width="1"/>
  <text x="1030" y="334" font-family="Georgia, serif" font-size="15" fill="#80b8f0" text-anchor="middle" letter-spacing="1">신호 ③</text>
  <text x="1030" y="368" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">소매 자본 이동</text>
  <text x="1030" y="396" font-family="Georgia, serif" font-size="16" fill="#60a0e8" text-anchor="middle">MSFT → SpaceX</text>
  <line x1="900" y1="410" x2="1160" y2="410" stroke="#60a0e8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1030" y="436" font-family="Georgia, serif" font-size="13" fill="#406080" text-anchor="middle">확립된 AI 빅테크 매각</text>
  <text x="1030" y="458" font-family="Georgia, serif" font-size="13" fill="#406080" text-anchor="middle">미래 성장 프런티어 재배분</text>
  <text x="1030" y="480" font-family="Georgia, serif" font-size="13" fill="#406080" text-anchor="middle">AI 1세대 → 다음 내러티브</text>
  <text x="1030" y="514" font-family="Georgia, serif" font-size="22" fill="#60a0e8" text-anchor="middle" font-weight="bold">심리 전환 신호</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="558" x2="1120" y2="558" stroke="#50c880" stroke-opacity="0.15" stroke-width="1"/>

  <text x="640" y="594" font-family="Georgia, serif" font-size="17" fill="#70d890" text-anchor="middle">세 신호가 하루에 겹쳤다 — AI 투자 사이클 전환의 구조적 징후</text>
  <text x="640" y="622" font-family="Georgia, serif" font-size="15" fill="#407060" text-anchor="middle">한국 HBM 수혜 다변화 가능성 · AI 인프라 투자 속도 조절 주시</text>

  <line x1="160" y1="648" x2="1120" y2="648" stroke="#50c880" stroke-opacity="0.12" stroke-width="1"/>
  <text x="320" y="676" font-family="Georgia, serif" font-size="13" fill="#70d890" text-anchor="middle">S&amp;P 500 7,358.22 (−0.10%)</text>
  <text x="640" y="676" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="middle">MSFT $365.46 (−2.27%)</text>
  <text x="960" y="676" font-family="Georgia, serif" font-size="13" fill="#70d890" text-anchor="middle">AVGO $382.07 (+0.51%)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#50c880" fill-opacity="0.35"/>
</svg>
