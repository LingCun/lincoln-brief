<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08090f"/>
      <stop offset="100%" stop-color="#0a0e1c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4080f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4080f0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="280" r="400" fill="url(#glow1)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.09 16:00 KST · 종목 분석</text>

  <!-- Ticker label -->
  <rect x="80" y="118" width="220" height="28" rx="4" fill="#4080f0" fill-opacity="0.20" stroke="#4080f0" stroke-width="0.8"/>
  <text x="92" y="136" font-family="monospace" font-size="12" letter-spacing="2" fill="#88aaff">005930.KS · 삼성전자</text>

  <!-- Main price -->
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="86" font-weight="500" fill="#f5edd9">322,000원</text>
  <g transform="translate(80, 270)">
    <polygon points="0,20 18,0 36,20" fill="#40d870"/>
    <text x="46" y="18" font-family="monospace" font-size="32" fill="#40d870">+8.97%</text>
    <text x="230" y="18" font-family="monospace" font-size="20" fill="#8a9898">+26,500원</text>
  </g>

  <!-- Subtitle -->
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="30" font-style="italic" fill="url(#gold)">ATH 360,500원 대비 −10.7%</text>

  <!-- Divider -->
  <line x1="80" y1="400" x2="740" y2="400" stroke="#1a2030" stroke-width="1"/>

  <!-- Comparison metrics -->
  <g transform="translate(80, 430)">
    <text x="0" y="20" font-family="monospace" font-size="13" letter-spacing="3" fill="#a89060">비교 — 오늘 반등</text>

    <!-- Samsung row -->
    <g transform="translate(0, 40)">
      <text x="0" y="20" font-family="monospace" font-size="14" fill="#aaccff">삼성전자</text>
      <text x="140" y="20" font-family="monospace" font-size="22" fill="#40d870">+8.97%</text>
      <text x="310" y="20" font-family="monospace" font-size="13" fill="#6a7a9a">ATH 대비 −10.7%</text>
    </g>

    <!-- SK Hynix row -->
    <g transform="translate(0, 80)">
      <text x="0" y="20" font-family="monospace" font-size="14" fill="#aaccff">SK하이닉스</text>
      <text x="140" y="20" font-family="monospace" font-size="22" fill="#40d870">+15.91%</text>
      <text x="310" y="20" font-family="monospace" font-size="13" fill="#6a7a9a">ATH 대비 −8.1%</text>
    </g>

    <!-- KOSPI row -->
    <g transform="translate(0, 120)">
      <text x="0" y="20" font-family="monospace" font-size="14" fill="#aaccff">KOSPI</text>
      <text x="140" y="20" font-family="monospace" font-size="22" fill="#40d870">+8.18%</text>
      <text x="310" y="20" font-family="monospace" font-size="13" fill="#6a7a9a">지수 평균</text>
    </g>
  </g>

  <!-- Sparkline area (Samsung 30-day) -->
  <g transform="translate(780, 200)">
    <text x="0" y="-15" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">30일 추이</text>
    <rect x="0" y="0" width="400" height="250" rx="4" fill="#0f1420" stroke="#1a2040" stroke-width="1"/>
    <!-- Sparkline path (normalized) -->
    <polyline
      points="0,236.5 13.8,240 27.6,236.5 41.4,238.2 55.2,235.4 69,239.3 82.8,230.8 96.6,197 110.4,193.1 124.1,195.3 137.9,183.2 151.7,188 165.5,184.3 179.3,175.7 193.1,193.8 206.9,186.7 220.7,190.3 234.5,189.9 248.3,173.3 262.1,178.2 275.9,173.6 289.7,167.9 303.4,173.3 317.2,160.5 331,138.2 344.8,130 358.6,133.8 372.4,152.3 386.2,176.1 400,157.3"
      fill="none" stroke="#4080f0" stroke-width="2" stroke-linejoin="round"/>
    <!-- ATH marker -->
    <circle cx="344.8" cy="130" r="4" fill="#f0d878"/>
    <text x="330" y="122" font-family="monospace" font-size="10" fill="#d8b878">ATH</text>
    <!-- Today marker -->
    <circle cx="400" cy="157.3" r="4" fill="#40d870"/>
    <!-- Price labels -->
    <text x="0" y="244" font-family="monospace" font-size="10" fill="#6a7a9a">219,500</text>
    <text x="320" y="244" font-family="monospace" font-size="10" fill="#d8b878">360,500</text>
    <text x="340" y="168" font-family="monospace" font-size="10" fill="#40d870" text-anchor="end">322,000</text>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#1a2030" stroke-width="0.5"/>
  <text x="80" y="708" font-family="monospace" font-size="10" letter-spacing="2" fill="#6a5a40">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
