<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a10"/>
      <stop offset="100%" style="stop-color:#101520"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5677b0;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#5677b0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5677b0;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#5677b0" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5080" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#5677b0" fill-opacity="0.1" stroke="#5677b0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle" letter-spacing="1">2026.06.23 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.7"/>

  <!-- 현대차 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#7090c0" text-anchor="middle" letter-spacing="4">현대차 005380</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">529,000</text>
  <text x="640" y="294" font-family="Georgia, serif" font-size="22" fill="#7090c0" text-anchor="middle">원</text>
  <polygon points="548,310 566,328 584,310" fill="#f87171"/>
  <text x="596" y="332" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−8.95%</text>
  <text x="640" y="368" font-family="Georgia, serif" font-size="18" fill="#904040" text-anchor="middle">−52,000원 · top12 최대 낙폭</text>

