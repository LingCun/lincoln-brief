  <line x1="160" y1="618" x2="1120" y2="618" stroke="#5677b0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">KOSPI −5.04%</text>
  <text x="260" y="670" font-family="Georgia, serif" font-size="13" fill="#506070" text-anchor="middle">전체 시장 급락 배경</text>
  <text x="640" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">US10Y 4.509%</text>
