  <line x1="160" y1="396" x2="1120" y2="396" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 30일 추세 panel -->
  <rect x="80" y="416" width="480" height="180" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="450" font-family="Georgia, serif" font-size="16" fill="#c06060" text-anchor="middle" letter-spacing="2">30일 추세</text>
  <text x="130" y="488" font-family="Georgia, serif" font-size="13" fill="#708090">30일 고점</text>
  <text x="530" y="488" font-family="Georgia, serif" font-size="15" fill="#ffffff" text-anchor="end">750,000원</text>
  <text x="130" y="516" font-family="Georgia, serif" font-size="13" fill="#708090">고점 대비</text>
  <text x="530" y="516" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−221,000원 (−29.5%)</text>
  <text x="130" y="544" font-family="Georgia, serif" font-size="13" fill="#708090">전일 종가</text>
  <text x="530" y="544" font-family="Georgia, serif" font-size="15" fill="#ffffff" text-anchor="end">581,000원</text>
  <text x="130" y="572" font-family="Georgia, serif" font-size="13" fill="#708090">500,000원까지</text>
  <text x="530" y="572" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−29,000원 (−5.5%)</text>

  <!-- 기아 panel -->
  <rect x="600" y="416" width="600" height="180" rx="4" fill="#5677b0" fill-opacity="0.05" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="450" font-family="Georgia, serif" font-size="16" fill="#5677b0" text-anchor="middle" letter-spacing="2">기아 동반 하락</text>
  <text x="660" y="490" font-family="Georgia, serif" font-size="15" fill="#888888">기아 현재가</text>
  <text x="1160" y="490" font-family="Georgia, serif" font-size="17" fill="#ffffff" text-anchor="end">141,300원</text>
  <text x="660" y="520" font-family="Georgia, serif" font-size="15" fill="#888888">전일 대비</text>
  <text x="1160" y="520" font-family="Georgia, serif" font-size="17" fill="#f87171" text-anchor="end">−10,100원 (−6.67%)</text>
  <text x="660" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">30일 고점</text>
  <text x="1160" y="550" font-family="Georgia, serif" font-size="15" fill="#888888" text-anchor="end">179,500원</text>
  <text x="660" y="578" font-family="Georgia, serif" font-size="13" fill="#506070">자동차 섹터 동반 약세</text>

