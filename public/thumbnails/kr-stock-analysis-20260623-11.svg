  <text x="1020" y="648" font-family="Georgia, serif" font-size="14" fill="#7090c0" text-anchor="middle">500,000원 심리선</text>
  <text x="1020" y="670" font-family="Georgia, serif" font-size="13" fill="#506070" text-anchor="middle">다음 핵심 지지 테스트</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#5677b0" fill-opacity="0.5"/>
</svg>
