<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0608"/>
      <stop offset="100%" style="stop-color:#18100f"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e07060;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e07060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e07060;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#e07060" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#e07060" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#e07060" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#e07060" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#806050" letter-spacing="2">US MARKET · FORECAST</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#e07060" fill-opacity="0.1" stroke="#e07060" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#e07060" text-anchor="middle" letter-spacing="1">2026.06.23 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#e07060" fill-opacity="0.5"/>

  <!-- NASDAQ main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c08880" text-anchor="middle" letter-spacing="4">NASDAQ · 4주 시나리오</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">26,166</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−1.32%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">최종 확인 · 01시 대비 −84p · 26,000 지지선까지 −167p</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#e07060" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#e07060" fill-opacity="0.05" stroke="#e07060" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#c08070" text-anchor="middle" letter-spacing="2">경로 확률 업데이트</text>
  <text x="140" y="468" font-family="Georgia, serif" font-size="14" fill="#4ade80">경로 A 27,000+</text>
  <text x="530" y="468" font-family="Georgia, serif" font-size="16" fill="#4ade80" text-anchor="end" font-weight="bold">12%</text>
  <text x="140" y="496" font-family="Georgia, serif" font-size="14" fill="#d8b878">경로 B 박스 유지</text>
  <text x="530" y="496" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="end" font-weight="bold">38%</text>
  <text x="140" y="524" font-family="Georgia, serif" font-size="15" fill="#f87171" font-weight="bold">경로 C 26,000 이탈 ▲</text>
  <text x="530" y="524" font-family="Georgia, serif" font-size="18" fill="#f87171" text-anchor="end" font-weight="bold">40%</text>
  <text x="140" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">경로 D 급락</text>
  <text x="530" y="552" font-family="Georgia, serif" font-size="16" fill="#888888" text-anchor="end" font-weight="bold">10%</text>
  <text x="320" y="580" font-family="Georgia, serif" font-size="12" fill="#705050" text-anchor="middle">01시 C=35% → 40% 상향</text>

  <!-- Right panel: key watch levels -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#e07060" fill-opacity="0.03" stroke="#e07060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c08880" text-anchor="middle" letter-spacing="2">핵심 관찰 레벨</text>
  <text x="680" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">NASDAQ 하방</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">26,000 이탈</text>
  <text x="680" y="496" font-family="Georgia, serif" font-size="14" fill="#888888">MSFT 하방</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$356.28 이탈</text>
  <text x="680" y="524" font-family="Georgia, serif" font-size="14" fill="#888888">US10Y 상방</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">4.6% 돌파</text>
  <text x="680" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">JPM (경기 신호)</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">$331 유지</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="12" fill="#605050">USD/KRW 1,534.13 · Gold $4,172.90</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#e07060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c08880" text-anchor="middle">S&amp;P 500</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">7,472.79 (−0.37%)</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c08880" text-anchor="middle">DOW</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle">51,712.71 (+0.29%)</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c08880" text-anchor="middle">US10Y</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="middle">4.509% 고공</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#e07060" fill-opacity="0.35"/>
</svg>
