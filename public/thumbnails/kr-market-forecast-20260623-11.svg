<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100806"/>
      <stop offset="100%" style="stop-color:#1a1010"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d96552;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d96552;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a4030" letter-spacing="2">KR MARKET · MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#d08070" text-anchor="middle" letter-spacing="1">2026.06.23 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d96552" fill-opacity="0.7"/>

  <!-- Main headline -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#d08070" text-anchor="middle" letter-spacing="4">KOSPI 시장 예측</text>
  <text x="640" y="250" font-family="Georgia, serif" font-size="68" fill="#ffffff" text-anchor="middle" font-weight="bold">8,654</text>
  <text x="640" y="296" font-family="Georgia, serif" font-size="28" fill="#d96552" text-anchor="middle">9,000선 재붕괴</text>
  <text x="640" y="342" font-family="Georgia, serif" font-size="18" fill="#804030" text-anchor="middle">3일 안착 시도 → 하루 만에 반납</text>

  <!-- Divider -->
  <line x1="160" y1="372" x2="1120" y2="372" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <rect x="80" y="392" width="1120" height="200" rx="4" fill="#d96552" fill-opacity="0.04" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>
  <text x="640" y="426" font-family="Georgia, serif" font-size="16" fill="#d08070" text-anchor="middle" letter-spacing="2">향후 1~2주 시나리오</text>

  <!-- Scenario rows -->
  <text x="120" y="462" font-family="Georgia, serif" font-size="14" fill="#4ade80">불</text>
  <text x="180" y="462" font-family="Georgia, serif" font-size="13" fill="#888888">9,000 재탈환</text>
  <text x="600" y="462" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">25%</text>
  <text x="640" y="462" font-family="Georgia, serif" font-size="12" fill="#707070">미국 빅테크 반등·US10Y 4.4% 이하</text>

  <text x="120" y="496" font-family="Georgia, serif" font-size="14" fill="#d8b878">베이스</text>
  <text x="220" y="496" font-family="Georgia, serif" font-size="13" fill="#888888">8,500~8,800 박스</text>
  <text x="600" y="496" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="end">45%</text>
  <text x="640" y="496" font-family="Georgia, serif" font-size="12" fill="#707070">환율 안정·빅테크 하락 진정·저점 매수</text>

  <text x="120" y="530" font-family="Georgia, serif" font-size="14" fill="#f87171">베어</text>
  <text x="190" y="530" font-family="Georgia, serif" font-size="13" fill="#888888">8,000~8,500 탐색</text>
  <text x="600" y="530" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">25%</text>
  <text x="640" y="530" font-family="Georgia, serif" font-size="12" fill="#707070">빅테크 추가 하락·US10Y 4.7% 돌파</text>

  <text x="120" y="564" font-family="Georgia, serif" font-size="14" fill="#c084fc">블랙스완</text>
  <text x="230" y="564" font-family="Georgia, serif" font-size="13" fill="#888888">8,000 이탈</text>
  <text x="600" y="564" font-family="Georgia, serif" font-size="13" fill="#c084fc" text-anchor="end">5%</text>
  <text x="640" y="564" font-family="Georgia, serif" font-size="12" fill="#707070">글로벌 매크로 충격·외국인 패닉 이탈</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d96552" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#d08070" text-anchor="middle">8,500선 다음 지지</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−155pt (−1.8%) 아래</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#d08070" text-anchor="middle">USD/KRW 1,533원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">환율 안정 = 안전망</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#d08070" text-anchor="middle">US10Y 4.509%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">금리 방향이 핵심 변수</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d96552" fill-opacity="0.5"/>
</svg>
