<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f08"/>
      <stop offset="100%" style="stop-color:#101810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Green accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="#55a855"/>

  <!-- Left green stripe -->
  <rect x="60" y="80" width="3" height="560" fill="#55a855" opacity="0.6"/>

  <!-- Lincoln Brief mark -->
  <text x="80" y="60" font-family="Georgia, serif" font-size="18" fill="#55a855" letter-spacing="4">LINCOLN BRIEF</text>
  <text x="80" y="80" font-family="Georgia, serif" font-size="13" fill="#55a855" opacity="0.6" letter-spacing="2">KR ECONOMY ISSUE</text>

  <!-- Edition label -->
  <text x="1200" y="55" font-family="Georgia, serif" font-size="14" fill="#55a855" text-anchor="end" opacity="0.8">2026.06.04</text>
  <text x="1200" y="75" font-family="Georgia, serif" font-size="12" fill="#55a855" text-anchor="end" opacity="0.5">SLOT 16:00 KST</text>

  <!-- Main headline -->
  <text x="80" y="155" font-family="Georgia, serif" font-size="38" fill="#aaaaaa">USD/KRW 최종 마감</text>

  <!-- Rate -->
  <text x="80" y="250" font-family="Georgia, serif" font-size="100" fill="#ffffff" font-weight="bold">1,536<tspan font-size="48" fill="#aaaaaa">원</tspan></text>

  <!-- Up arrow -->
  <polygon points="700,185 740,185 720,155" fill="#e05555"/>
  <text x="750" y="245" font-family="Georgia, serif" font-size="72" fill="#e05555" font-weight="bold">+1.32%</text>

  <!-- Divider -->
