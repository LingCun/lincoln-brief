<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#070c14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4d9db8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4d9db8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.25 16:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#4d9db8">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="200" height="30" rx="4" fill="#4d9db8" fill-opacity="0.15" stroke="#4d9db8" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4d9db8">KB금융 (105560.KS)</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f5edd9">KB금융 160,000원</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">금융주 사이클의 속도와 한계</text>
  <text x="80" y="398" font-family="sans-serif" font-size="17" fill="#8ab8d8">30일 최고가 · 신한지주 +3.59% 동반 · 주주환원 테마</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- KB금융 price -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4d9db8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ab8d8">종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#f5edd9">160,000원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+2.70% (+4,200원)</text>
    </g>
    <!-- 30d low -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4d9db8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ab8d8">30일 저점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#f5edd9">+3.8%</text>
      <text x="0" y="98" font-family="monospace" font-size="14" fill="#8a9ab8">154,200원 → 160,000원</text>
    </g>
    <!-- Shinhan -->
    <g transform="translate(920, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4d9db8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ab8d8">신한지주</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="38" fill="#f5edd9">98,200원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+3.59%</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#2a3a4a" stroke-width="0.5"/>
  <text x="80" y="685" font-family="monospace" font-size="11" letter-spacing="2" fill="#5a7a8a">다음 분기점: 163,000원 고점 탈환 · 외국인 복귀 조건</text>
  <text x="1200" y="685" font-family="monospace" font-size="11" fill="#5a7a8a" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
