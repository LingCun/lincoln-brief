<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a04"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#907840" letter-spacing="2">KR MARKET · 데일리 시황</text>

  <!-- Edition label -->
  <rect x="970" y="28" width="270" height="36" rx="3" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1105" y="51" font-family="Georgia, serif" font-size="14" fill="#b09050" text-anchor="middle" letter-spacing="1">2026.07.06 · 16:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,104 651,115 640,126 629,115" fill="#d8b878" fill-opacity="0.9"/>

  <!-- Main headline -->
  <text x="640" y="162" font-family="Georgia, serif" font-size="17" fill="#907840" text-anchor="middle" letter-spacing="2">마감 — 낙폭 축소, 종목별 격차는 확대</text>

  <!-- KOSPI / KOSDAQ split display -->
  <text x="320" y="230" font-family="Georgia, serif" font-size="14" fill="#807040" text-anchor="middle" letter-spacing="2">KOSPI</text>
  <text x="320" y="295" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">8,051</text>
  <text x="320" y="325" font-family="Georgia, serif" font-size="18" fill="#909090" text-anchor="middle">.33</text>
  <!-- Down triangle for KOSPI -->
  <polygon points="224,320 236,334 248,320" fill="#f87171"/>
  <text x="258" y="339" font-family="Georgia, serif" font-size="26" fill="#f87171" font-weight="bold">-0.46%</text>
  <text x="320" y="375" font-family="Georgia, serif" font-size="12" fill="#503030" text-anchor="middle">11시 -0.61% → 마감 -0.46%</text>

  <!-- Vertical divider -->
  <line x1="640" y1="195" x2="640" y2="395" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- KOSDAQ -->
  <text x="960" y="230" font-family="Georgia, serif" font-size="14" fill="#807040" text-anchor="middle" letter-spacing="2">KOSDAQ</text>
  <text x="960" y="295" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">847</text>
  <text x="960" y="325" font-family="Georgia, serif" font-size="18" fill="#909090" text-anchor="middle">.07</text>
  <!-- Down triangle for KOSDAQ -->
  <polygon points="890,320 902,334 914,320" fill="#f87171"/>
  <text x="924" y="339" font-family="Georgia, serif" font-size="26" fill="#f87171" font-weight="bold">-2.46%</text>
  <text x="960" y="375" font-family="Georgia, serif" font-size="12" fill="#503030" text-anchor="middle">11시와 거의 동일 · 반등 없었다</text>

  <!-- Divider line -->
  <line x1="80" y1="410" x2="1200" y2="410" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stats panels -->
  <rect x="80" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="260" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">삼성전자 vs SK하이닉스</text>
  <text x="150" y="500" font-family="Georgia, serif" font-size="22" fill="#4ade80" font-weight="bold">+2.75%</text>
  <text x="370" y="500" font-family="Georgia, serif" font-size="22" fill="#f87171" text-anchor="end" font-weight="bold">-3.38%</text>
  <text x="260" y="530" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">11시보다 격차 더 벌어짐</text>
  <text x="260" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">삼성전자 +1.78%→+2.75%</text>
  <text x="260" y="622" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">SK하이닉스 -2.06%→-3.38%</text>

  <rect x="460" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="640" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">기아</text>
  <text x="640" y="500" font-family="Georgia, serif" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="bold">160,700원</text>
  <polygon points="560,522 572,508 584,522" fill="#4ade80"/>
  <text x="598" y="527" font-family="Georgia, serif" font-size="22" fill="#4ade80" font-weight="bold">+5.72%</text>
  <text x="640" y="558" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">top12 최대 상승 · 11시보다 더 강함</text>
  <text x="640" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">지수 하락 속 홀로 강세</text>

  <rect x="840" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1020" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">USD/KRW</text>
  <text x="1020" y="500" font-family="Georgia, serif" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="bold">1,532.05원</text>
  <polygon points="940,320 952,334 964,320" fill="#4ade80" transform="translate(0,202)"/>
  <text x="978" y="527" font-family="Georgia, serif" font-size="22" fill="#4ade80" font-weight="bold">-0.65%</text>
  <text x="1020" y="558" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">원화 강세 유지</text>
  <text x="1020" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">셀트리온 -4.19% 최대 낙폭</text>

  <!-- Bottom signature -->
  <text x="640" y="696" font-family="Georgia, serif" font-size="12" fill="#605030" text-anchor="middle" letter-spacing="1">lincoln-brief.vercel.app · KR Daily Brief</text>
</svg>
