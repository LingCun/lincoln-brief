<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d0a"/>
      <stop offset="100%" stop-color="#0a0605"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f07a68"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04438"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5ddd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.29 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— PCE 전야 최종 점검 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#f5ddd9">불 케이스 34% 상향</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">내일 PCE가 비둘기 서사 검증</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#b8907a">S&amp;P 7,563.63(+0.58%)  ·  LLY +4.05%  ·  MSFT +3.47%</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#988e72" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b8907a">베이스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5ddd9">35%</text>
      <text x="0" y="90" font-family="monospace" font-size="12" fill="#988e72">7,400~7,600</text>
    </g>
    <!-- 불 -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b8907a">불 케이스</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#6ba368">34%</text>
      <polygon points="0,70 14,70 7,84" fill="#6ba368"/>
      <text x="22" y="90" font-family="monospace" font-size="12" fill="#6ba368">7,750~7,900</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(500, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b8907a">베어</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d96552">22%</text>
      <polygon points="7,70 14,84 0,84" fill="#d96552"/>
      <text x="22" y="90" font-family="monospace" font-size="12" fill="#d96552">7,000~7,200</text>
    </g>
    <!-- PCE -->
    <g transform="translate(760, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b8907a">다음 이벤트</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5ddd9">5/30 PCE</text>
      <text x="0" y="90" font-family="monospace" font-size="12" fill="#d8b878">21:30 KST ★★★</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a1a12" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#785040">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a3020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
