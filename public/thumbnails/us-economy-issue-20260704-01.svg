<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a0e"/>
      <stop offset="100%" stop-color="#080f08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#7a9d6e00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line (green) -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left green bar -->
  <rect x="60" y="60" width="4" height="600" fill="#7a9d6e" opacity="0.6"/>

  <!-- Brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#7a9d6e" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#4a6d3e" letter-spacing="2">US MARKET · 경제 이슈</text>

  <!-- Edition label -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#7a9d6e" opacity="0.7" text-anchor="end">2026.07.04 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#4a6d3e" text-anchor="end">ECONOMY ISSUE</text>

  <!-- Main headline -->
  <text x="84" y="200" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#ffffff">주식은 쉬어도 환율·금은 계속</text>
  <text x="84" y="240" font-family="Georgia, serif" font-size="22" fill="#9abf8e">USD/KRW 1,530원대 · Gold 추가 상승</text>

  <!-- Primary metric: USD/KRW -->
  <text x="84" y="300" font-family="Georgia, serif" font-size="28" fill="#9abf8e">USD/KRW</text>
  <text x="280" y="300" font-family="Georgia, serif" font-size="46" fill="#ffffff" font-weight="bold">1,530.39</text>
  <polygon points="620,296 640,272 600,272" fill="#6ec46e"/>
  <text x="650" y="296" font-family="Georgia, serif" font-size="30" fill="#6ec46e" font-weight="bold">-1.38%</text>

  <!-- Divider -->
  <rect x="84" y="318" width="750" height="1" fill="#7a9d6e" opacity="0.3"/>

  <!-- Gold -->
  <text x="84" y="356" font-family="Georgia, serif" font-size="26" fill="#9abf8e">Gold</text>
  <text x="200" y="356" font-family="Georgia, serif" font-size="26" fill="#ffffff" font-weight="bold">$4,182.60</text>
  <polygon points="440,336 458,356 422,356" fill="#6ec46e"/>
  <text x="466" y="356" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+1.70% · 연휴 중에도 상승</text>

  <!-- Divider -->
  <rect x="84" y="376" width="750" height="1" fill="#7a9d6e" opacity="0.2"/>

  <!-- Secondary metrics row -->
  <text x="84" y="412" font-family="Georgia, serif" font-size="22" fill="#9abf8e">US10Y</text>
  <text x="200" y="412" font-family="Georgia, serif" font-size="22" fill="#ffffff">4.485%</text>
  <text x="340" y="412" font-family="Georgia, serif" font-size="18" fill="#808080">거의 정지</text>

  <text x="600" y="412" font-family="Georgia, serif" font-size="22" fill="#9abf8e">BTC</text>
  <text x="670" y="412" font-family="Georgia, serif" font-size="22" fill="#ffffff">$61,947</text>
  <polygon points="810,412 826,396 794,396" fill="#6ec46e"/>
  <text x="833" y="412" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+0.75%</text>

  <text x="84" y="452" font-family="Georgia, serif" font-size="22" fill="#9abf8e">코스피</text>
  <text x="160" y="452" font-family="Georgia, serif" font-size="22" fill="#ffffff">8,088.34</text>
  <polygon points="320,452 336,436 304,436" fill="#e87050"/>
  <text x="343" y="452" font-family="Georgia, serif" font-size="20" fill="#e87050">-2.59%</text>

  <text x="600" y="452" font-family="Georgia, serif" font-size="22" fill="#9abf8e">SK하이닉스</text>
  <text x="740" y="452" font-family="Georgia, serif" font-size="20" fill="#e87050">-5.27%</text>

  <!-- Divider -->
  <rect x="84" y="474" width="750" height="1" fill="#7a9d6e" opacity="0.2"/>

  <!-- Interpretation box -->
  <text x="84" y="508" font-family="Georgia, serif" font-size="18" fill="#9abf8e" letter-spacing="1">쉬는 자산 vs 안 쉬는 자산</text>

  <text x="84" y="536" font-family="Georgia, serif" font-size="18" fill="#c0d8b8">주식·채권은 연휴로 정지, 환율·금·크립토는 계속 거래</text>
  <text x="84" y="562" font-family="Georgia, serif" font-size="18" fill="#c0d8b8">코스피는 반도체가 끌어내려도 은행·자동차주는 강세</text>

  <!-- Divider -->
  <rect x="84" y="580" width="750" height="1" fill="#7a9d6e" opacity="0.2"/>

  <!-- Footer note -->
  <text x="84" y="612" font-family="Georgia, serif" font-size="19" fill="#7a9d6e" opacity="0.85">다음 확인 지점: 7/6(월) 정규 거래 재개</text>

  <!-- Brand mark -->
  <polygon points="84,650 92,642 100,650 92,658" fill="#7a9d6e" opacity="0.5"/>
  <text x="110" y="655" font-family="Georgia, serif" font-size="14" fill="#4a6d3e">lincoln-brief.vercel.app</text>

  <!-- Right decorative -->
  <rect x="1200" y="60" width="1" height="600" fill="#7a9d6e" opacity="0.15"/>
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#7a9d6e" opacity="0.3"/>
</svg>
