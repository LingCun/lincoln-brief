<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · DAILY BRIEF</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.26 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- S&P 500 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">S&amp;P 500</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">7,365.21</text>
  <polygon points="548,284 566,266 584,284" fill="#4ade80"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+0.09%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#507050" text-anchor="middle">NASDAQ −0.48% · DOW +0.57% · 엇갈린 세션</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- AAPL panel (left) — red, biggest loser -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#c05050" text-anchor="middle" letter-spacing="2">AAPL 12종목 최대 낙폭</text>
  <text x="320" y="484" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">$274.45</text>
  <polygon points="272,508 288,524 304,508" fill="#f87171"/>
  <text x="316" y="528" font-family="Georgia, serif" font-size="28" fill="#f87171" font-weight="bold">−6.36%</text>
  <text x="320" y="562" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">메모리 '100년 홍수' 가격 인상 쇼크</text>
  <text x="320" y="580" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">MSFT −3.69% · AMZN −2.85% 동반 약세</text>

  <!-- Right panel: macro data -->
  <rect x="600" y="386" width="600" height="208" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="420" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">방어주 · 원자재 강세</text>
  <text x="660" y="456" font-family="Georgia, serif" font-size="15" fill="#888888">JPM</text>
  <text x="1160" y="456" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$337.98 (+1.36%)</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="15" fill="#888888">Gold</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$4,056.40 (+1.66%)</text>
  <text x="660" y="512" font-family="Georgia, serif" font-size="15" fill="#888888">WTI</text>
  <text x="1160" y="512" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$71.66 (+1.88%)</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">US10Y</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">4.382% (↓ 11.8bp)</text>
  <text x="660" y="572" font-family="Georgia, serif" font-size="13" fill="#507050">BTC $59,392 (−2.63%) · USD/KRW 1,541.32</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ 25,354.76</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">−0.48% · 기술주 약세</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">DOW 52,142.60</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+0.57% · 방어주 지탱</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,541.32</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.40% · 원화 소폭 약세</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
