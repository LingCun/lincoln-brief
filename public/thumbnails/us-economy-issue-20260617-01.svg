<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f0a"/>
      <stop offset="100%" stop-color="#101810"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#7a9d6e"/>

  <!-- Left glow panel -->
  <rect x="0" y="0" width="500" height="720" fill="url(#green-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#7a9d6e" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1092" y="28" width="140" height="36" rx="4" fill="#7a9d6e" fill-opacity="0.15" stroke="#7a9d6e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1162" y="52" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#5a7a5a" letter-spacing="1">2026.06.17 — 경제 이슈</text>

  <!-- Category label -->
  <rect x="48" y="128" width="130" height="28" rx="3" fill="#7a9d6e" fill-opacity="0.2"/>
  <text x="113" y="147" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="middle" letter-spacing="1">경제 이슈</text>

  <!-- Main headline WTI -->
  <text x="48" y="210" font-family="Georgia, serif" font-size="26" fill="#7a9d6e" letter-spacing="2">WTI 원유</text>
  <text x="48" y="288" font-family="Georgia, serif" font-size="72" fill="#ffffff" font-weight="bold">$75.07</text>

  <!-- Change line -->
  <polygon points="48,312 68,312 58,296" fill="#e05c5c" transform="rotate(180 58 304)"/>
  <text x="78" y="328" font-family="Georgia, serif" font-size="36" fill="#e05c5c" font-weight="bold">−7.03%</text>

  <!-- 6-day context -->
  <rect x="48" y="348" width="480" height="54" rx="5" fill="#e05c5c" fill-opacity="0.08" stroke="#e05c5c" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="68" y="374" font-family="Georgia, serif" font-size="15" fill="#c08080">6/10 이란 쇼크 $91.85 →</text>
  <text x="68" y="394" font-family="Georgia, serif" font-size="15" fill="#ffffff" font-weight="bold">6거래일 만에 −18.3% (−$16.78)</text>

  <!-- Question -->
  <text x="48" y="440" font-family="Georgia, serif" font-size="19" fill="#7a9d6e" font-weight="bold">골디락스인가 / 수요 붕괴인가?</text>

  <!-- Key threshold -->
  <rect x="48" y="460" width="480" height="44" rx="4" fill="#7a9d6e" fill-opacity="0.10" stroke="#7a9d6e" stroke-width="0.5"/>
  <text x="68" y="480" font-family="Georgia, serif" font-size="14" fill="#5a7a5a">임계점 — WTI</text>
  <text x="160" y="480" font-family="Georgia, serif" font-size="16" fill="#e05c5c" font-weight="bold">$70 이하</text>
  <text x="250" y="480" font-family="Georgia, serif" font-size="14" fill="#5a7a5a">→ 수요 붕괴 내러티브 전환</text>
  <text x="68" y="498" font-family="Georgia, serif" font-size="13" fill="#7a9d6e">현재 $75.07 — 아직 골디락스 해석 우세</text>

  <!-- Right column divider -->
  <rect x="570" y="90" width="2" height="540" fill="#7a9d6e" opacity="0.2"/>

  <!-- Right header -->
  <text x="610" y="140" font-family="Georgia, serif" font-size="14" fill="#5a7a5a" letter-spacing="2">관련 지표 비교</text>
  <rect x="610" y="150" width="80" height="1" fill="#7a9d6e" opacity="0.4"/>

  <!-- Gold -->
  <text x="610" y="200" font-family="Georgia, serif" font-size="16" fill="#90b090">Gold</text>
  <text x="700" y="200" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$4,362</text>
  <polygon points="874,185 886,185 880,174" fill="#4adc7a"/>
  <text x="894" y="200" font-family="Georgia, serif" font-size="16" fill="#4adc7a">+0.79%</text>
  <text x="610" y="222" font-family="Georgia, serif" font-size="12" fill="#5a7a5a">6거래일 누적 +6.8%</text>

  <!-- US10Y -->
  <text x="610" y="268" font-family="Georgia, serif" font-size="16" fill="#90b090">US10Y</text>
  <text x="700" y="268" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">4.426%</text>
  <polygon points="874,252 886,252 880,241" fill="#4adc7a" transform="rotate(180 880 246.5)"/>
  <text x="894" y="268" font-family="Georgia, serif" font-size="16" fill="#4adc7a">−0.043%p</text>
  <text x="610" y="290" font-family="Georgia, serif" font-size="12" fill="#5a7a5a">6거래일 누적 −0.116%p</text>

  <!-- S&P -->
  <text x="610" y="336" font-family="Georgia, serif" font-size="16" fill="#90b090">S&amp;P 500</text>
  <text x="700" y="336" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">7,529.87</text>
  <text x="610" y="358" font-family="Georgia, serif" font-size="12" fill="#5a7a5a">6거래일 누적 +4.0%</text>

  <!-- Divider -->
  <rect x="610" y="376" width="620" height="1" fill="#7a9d6e" opacity="0.3"/>

  <!-- Narrative box -->
  <text x="610" y="416" font-family="Georgia, serif" font-size="15" fill="#7a9d6e" font-weight="bold">골디락스 내러티브 로직</text>
  <text x="610" y="444" font-family="Georgia, serif" font-size="13" fill="#5a7a5a">WTI ↓ → CPI 완화 → 연준 피벗 기대</text>
  <text x="610" y="466" font-family="Georgia, serif" font-size="13" fill="#5a7a5a">→ 실질 금리 ↓ → Gold ↑</text>
  <text x="610" y="492" font-family="Georgia, serif" font-size="14" fill="#7a9d6e">Gold 상승 = 경기침체 아닌 인플레이션 완화 해석</text>

  <!-- CPI timeline -->
  <rect x="610" y="512" width="620" height="72" rx="4" fill="#7a9d6e" fill-opacity="0.08" stroke="#7a9d6e" stroke-width="0.5"/>
  <text x="630" y="536" font-family="Georgia, serif" font-size="14" fill="#7a9d6e" font-weight="bold">CPI 반영 타임라인</text>
  <text x="630" y="558" font-family="Georgia, serif" font-size="13" fill="#90b090">7월 CPI (6월 데이터) — 에너지 항목 대폭 하락 기대</text>
  <text x="630" y="578" font-family="Georgia, serif" font-size="13" fill="#90b090">→ 9월 FOMC 금리 인하 가능성 부상</text>

  <!-- Bottom signature -->
  <text x="610" y="640" font-family="Georgia, serif" font-size="13" fill="#3a5a3a" letter-spacing="1">lincoln-brief.vercel.app</text>
  <text x="48" y="680" font-family="Georgia, serif" font-size="12" fill="#203020">※ 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
