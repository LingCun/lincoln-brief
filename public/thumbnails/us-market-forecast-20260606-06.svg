<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#06080a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4080d0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4080d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="150" cy="600" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.06 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시장 예측 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="600" fill="#e8d8a0">S&amp;P 7,383 이후</text>
  <text x="80" y="318" font-family="Playfair Display, Georgia, serif" font-size="30" font-style="italic" fill="url(#gold)">NFP · FOMC(6/11)까지 2주 시나리오</text>
  <text x="80" y="368" font-family="sans-serif" font-size="18" fill="#a09060">US10Y 4.536%  |  기술적 지지선 7,200~7,300</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 415)">
    <!-- 헤더 -->
    <line x1="0" y1="0" x2="1100" y2="0" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="0" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">시나리오</text>
    <text x="280" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">S&amp;P 방향</text>
    <text x="560" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">조건</text>
    <text x="900" y="24" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">확률</text>
    <line x1="0" y1="32" x2="1100" y2="32" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.3"/>

    <!-- 안도 반등 -->
    <text x="0" y="60" font-family="monospace" font-size="14" fill="#60c080">A. 안도 반등</text>
    <text x="280" y="60" font-family="monospace" font-size="14" fill="#60c080">7,500~7,600</text>
    <text x="560" y="60" font-family="monospace" font-size="13" fill="#a09060">NFP 약세 + FOMC 비둘기</text>
    <text x="900" y="60" font-family="monospace" font-size="14" font-weight="700" fill="#60c080">25%</text>

    <!-- 박스권 소화 -->
    <text x="0" y="92" font-family="monospace" font-size="14" fill="#d8b878">B. 박스권 소화</text>
    <text x="280" y="92" font-family="monospace" font-size="14" fill="#d8b878">7,300~7,500</text>
    <text x="560" y="92" font-family="monospace" font-size="13" fill="#a09060">NFP 컨센서스 + FOMC 중립</text>
    <text x="900" y="92" font-family="monospace" font-size="14" font-weight="700" fill="#d8b878">45%</text>

    <!-- 추가 하락 -->
    <text x="0" y="124" font-family="monospace" font-size="14" fill="#c06060">C. 추가 하락</text>
    <text x="280" y="124" font-family="monospace" font-size="14" fill="#c06060">7,200~7,300</text>
    <text x="560" y="124" font-family="monospace" font-size="13" fill="#a09060">NFP 강세 + FOMC 매파</text>
    <text x="900" y="124" font-family="monospace" font-size="14" font-weight="700" fill="#c06060">25%</text>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="648" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">US10Y 4.5% 위냐 아래냐 — 분기점</text>
  <text x="80" y="672" font-family="monospace" font-size="11" fill="#806040">lincoln-brief.vercel.app</text>
</svg>
