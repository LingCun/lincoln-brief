<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180a06"/>
      <stop offset="100%" stop-color="#0e0504"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a060"/>
      <stop offset="50%" stop-color="#d06830"/>
      <stop offset="100%" stop-color="#a04010"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d06830" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d06830" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05050" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#e05050" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="420" fill="url(#glow1)"/>
  <circle cx="180" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d06830" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d06830">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d06830" text-anchor="end">2026.06.01 16:00 KST · KR ECONOMY</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d06830">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="360" height="30" rx="4" fill="#d06830" fill-opacity="0.18" stroke="#d06830" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f0a060">에너지·환율 이중 압박 현실화</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">WTI $90 돌파</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#orange)">원화 1,508원 — 이중 압박 동시 출현</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#8a9898">유가 +3.55% · 원화 약세 +0.90% · POSCO홀딩스 −2.48%</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#2a1008" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 474)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d06830" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#805030">WTI 원유</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$90.46</text>
      <polygon points="0,72 14,88 28,72" fill="#e8a040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e8a040">+3.55%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(340, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d06830" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#805030">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,508.79원</text>
      <polygon points="0,72 14,88 28,72" fill="#e05050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05050">원화 약세</text>
    </g>
    <!-- POSCO -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d06830" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#805030">POSCO홀딩스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">413,000원</text>
      <polygon points="0,88 14,72 28,88" fill="#e05050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05050">−2.48%</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#2a1008" stroke-width="0.5"/>
  <text x="80" y="645" font-family="monospace" font-size="10" fill="#4a2818" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="645" font-family="monospace" font-size="10" fill="#d06830" text-anchor="end">— Lincoln</text>
</svg>
