<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0c"/>
      <stop offset="100%" stop-color="#0f0806"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88878"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84838"/>
    </linearGradient>
    <radialGradient id="redglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="360" fill="url(#redglow)"/>
  <circle cx="180" cy="580" r="280" fill="url(#goldglow)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5e0dc">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.22 11:00 KST · 시장 예측</text>

  <!-- Label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 4주 시나리오 업데이트 —</text>

  <!-- Main title -->
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5e0dc">대반등 다음 날</text>
  <text x="80" y="314" font-family="Playfair Display, Georgia, serif" font-size="44" font-style="italic" fill="url(#red)">섹터 교체가 말하는 것</text>
  <text x="80" y="362" font-family="sans-serif" font-size="17" fill="#b08880">베이스 45% · 불 25% · 베어 25% · 블랙 스완 5%</text>

  <!-- Divider -->
  <line x1="80" y1="410" x2="1200" y2="410" stroke="#3a1e1a" stroke-width="1"/>

  <!-- Scenario boxes -->
  <g transform="translate(80, 445)">
    <!-- 베이스 -->
    <g>
      <rect x="0" y="0" width="240" height="80" rx="4" fill="#1e1410" stroke="#3a2010" stroke-width="1"/>
      <text x="12" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b878">베이스 케이스</text>
      <text x="12" y="50" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0dc">45%</text>
      <text x="12" y="70" font-family="monospace" font-size="10" fill="#907060">7,500~7,900 점진 회복</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="240" height="80" rx="4" fill="#0e1e10" stroke="#1a3018" stroke-width="1"/>
      <text x="12" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#4db86b">불 케이스</text>
      <text x="12" y="50" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0dc">25%</text>
      <text x="12" y="70" font-family="monospace" font-size="10" fill="#507050">6/11 CPI 하락 + 신고점</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="240" height="80" rx="4" fill="#1e0e0e" stroke="#381818" stroke-width="1"/>
      <text x="12" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#e05555">베어 케이스</text>
      <text x="12" y="50" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0dc">25%</text>
      <text x="12" y="70" font-family="monospace" font-size="10" fill="#905050">금리 재상승 + 재조정</text>
    </g>
    <!-- 핵심 변수 -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#907060">다음 분기점</text>
      <text x="0" y="54" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5e0dc">6/11 미국 CPI</text>
      <text x="0" y="74" font-family="monospace" font-size="11" fill="#907060">10년물 4.57% → 4.5% 접근 중</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="668" x2="1200" y2="668" stroke="#3a1e1a" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a4040">lincoln-brief.vercel.app</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a4040" text-anchor="end">시장 예측 · 2026.05.22</text>
</svg>
