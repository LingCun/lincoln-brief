  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#904040" text-anchor="middle" letter-spacing="2">전종목 하락</text>
  <text x="620" y="466" font-family="Georgia, serif" font-size="15" fill="#888888">삼성전자</text>
  <text x="1170" y="466" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">-9.21%</text>
  <text x="620" y="494" font-family="Georgia, serif" font-size="15" fill="#888888">현대차</text>
  <text x="1170" y="494" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">-7.36%</text>
  <text x="620" y="522" font-family="Georgia, serif" font-size="15" fill="#888888">셀트리온</text>
  <text x="1170" y="522" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">-5.60%</text>
  <text x="620" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">AAPL (전일)</text>
  <text x="1170" y="550" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$275.15 · -6.12%</text>
  <text x="620" y="578" font-family="Georgia, serif" font-size="13" fill="#604040">KOSDAQ 839.25 (-5.47%) · 전종목 동반 하락</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">KOSDAQ 839.25</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">-5.47% · 전종목 동반</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,545.34원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.17% · 보합</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NVDA $195.74</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">-1.64% · WTI $70.41(-2.10%)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
