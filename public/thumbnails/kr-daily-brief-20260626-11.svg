  <rect x="80" y="394" width="480" height="200" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="16" fill="#904040" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="320" y="488" font-family="Georgia, serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="bold">2,600,000</text>
