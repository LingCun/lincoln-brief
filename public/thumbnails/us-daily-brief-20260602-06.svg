<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0a04"/>
      <stop offset="100%" stop-color="#080600"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c878"/>
      <stop offset="50%" stop-color="#d8b858"/>
      <stop offset="100%" stop-color="#b89838"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b858" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b858" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b858" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b858" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b858" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d898">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b858">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b858" text-anchor="end">2026.06.02 · DAILY BRIEF · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b858">— 6/1 US 최종 마감 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="600" fill="#e8d898">S&amp;P 7,599.96</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" fill="url(#gold)">NVDA $224.36 · META $600.47</text>
  <text x="80" y="382" font-family="Pretendard, sans-serif" font-size="18" fill="#a09060">AI 인프라 강세 vs 소비·광고 기술주 약세 · WTI $92.23(+5.57%)</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 450)">
    <!-- S&P 500 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b858" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8d898">7,599.96</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.26%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b858" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">NVDA</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8d898">$224.36</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+6.26%</text>
    </g>
    <!-- META -->
    <g transform="translate(420, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b858" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">META</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8d898">$600.47</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−5.07%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b858" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8d898">$92.23</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+5.57%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b858" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">BTC</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8d898">$71,197</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−3.24%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#d8b858" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#706040">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
