<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e08"/>
      <stop offset="100%" stop-color="#141408"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e8c050" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8c050" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.15 16:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 (SLOT 16) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="860" height="30" rx="4" fill="#e8c050" fill-opacity="0.14" stroke="#e8c050" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f8d870">$80 심리선 72센트 전방 · GOLD $4,360.90(+3.46%) 오전 대비 추가 상승</text>

  <!-- Main title -->
  <text x="80" y="302" font-family="Playfair Display, Georgia, serif" font-size="74" font-weight="500" fill="#f5edd9">WTI $80.28</text>
  <text x="80" y="362" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">−5.42% — $80 심리선 72센트 전방</text>
  <text x="80" y="408" font-family="sans-serif" font-size="17" fill="#a89868">달러 약세 + GOLD $4,360.90 — 에너지 수입국 한국 3중 수혜 구조</text>

  <!-- Divider -->
  <line x1="80" y1="446" x2="1200" y2="446" stroke="#222208" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 480)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$80.28</text>
      <polygon points="0,88 14,72 28,88" fill="#e07050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07050">−5.42%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$4,360.90</text>
      <polygon points="28,88 14,72 0,88" fill="#f8d870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#f8d870">+3.46%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,514.96</text>
      <polygon points="0,88 14,72 28,88" fill="#5ab870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#5ab870">−0.16%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">BTC</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$66,225</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+0.78%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#5a5030">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#5a5030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
