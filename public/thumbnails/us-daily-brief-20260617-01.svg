<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a04"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="gold-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#d8b878"/>

  <!-- Left gold glow -->
  <rect x="0" y="0" width="520" height="720" fill="url(#gold-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#d8b878" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1100" y="28" width="132" height="36" rx="4" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1166" y="52" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#8a7a50" letter-spacing="1">2026.06.17 — 6/16 세션</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#d8b878" fill-opacity="0.2"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle" letter-spacing="1">데일리 시황</text>

  <!-- Main headline — DOW new milestone -->
  <text x="48" y="220" font-family="Georgia, serif" font-size="48" fill="#ffffff" font-weight="bold">DOW 52,075</text>
  <polygon points="368,193 388,193 378,176" fill="#4adc7a"/>
  <text x="395" y="220" font-family="Georgia, serif" font-size="30" fill="#4adc7a" font-weight="bold">+0.78%</text>

  <!-- S&P and NASDAQ divergence banner -->
  <rect x="48" y="238" width="480" height="44" rx="5" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="1" stroke-opacity="0.35"/>
  <text x="60" y="255" font-family="Georgia, serif" font-size="14" fill="#d96552">S&amp;P 7,529</text>
  <polygon points="172,258 184,258 178,270" fill="#d96552"/>
  <text x="190" y="270" font-family="Georgia, serif" font-size="13" fill="#d96552">−0.32%</text>
  <text x="280" y="255" font-family="Georgia, serif" font-size="14" fill="#d96552">NASDAQ 26,530</text>
  <polygon points="430,258 442,258 436,270" fill="#d96552"/>
  <text x="448" y="270" font-family="Georgia, serif" font-size="13" fill="#d96552">−0.57%</text>

  <!-- Key movers section -->
  <text x="48" y="322" font-family="Georgia, serif" font-size="14" fill="#8a7a50" letter-spacing="2">주요 종목</text>
  <rect x="48" y="330" width="80" height="1" fill="#d8b878" opacity="0.4"/>

  <!-- JPM winner -->
  <rect x="48" y="344" width="200" height="52" rx="4" fill="#4adc7a" fill-opacity="0.10" stroke="#4adc7a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="58" y="364" font-family="Georgia, serif" font-size="16" fill="#c0c0c0">JPM</text>
  <text x="58" y="386" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">+3.35%</text>

  <!-- AVGO loser -->
  <rect x="264" y="344" width="200" height="52" rx="4" fill="#d96552" fill-opacity="0.10" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
  <text x="274" y="364" font-family="Georgia, serif" font-size="16" fill="#c0c0c0">AVGO</text>
  <text x="274" y="386" font-family="Georgia, serif" font-size="22" fill="#d96552" font-weight="bold">−3.26%</text>

  <!-- Macro indicators section -->
  <text x="48" y="438" font-family="Georgia, serif" font-size="14" fill="#8a7a50" letter-spacing="2">거시 지표</text>
  <rect x="48" y="446" width="80" height="1" fill="#d8b878" opacity="0.4"/>

  <!-- WTI big drop highlight -->
  <rect x="48" y="460" width="310" height="64" rx="5" fill="#d96552" fill-opacity="0.14" stroke="#d96552" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="64" y="483" font-family="Georgia, serif" font-size="15" fill="#8a7a50">WTI 원유</text>
  <text x="64" y="512" font-family="Georgia, serif" font-size="26" fill="#d96552" font-weight="bold">$75.07</text>
  <polygon points="210,510 226,510 218,524" fill="#d96552"/>
  <text x="232" y="521" font-family="Georgia, serif" font-size="20" fill="#d96552" font-weight="bold">−7.03%</text>

  <!-- US10Y -->
  <rect x="370" y="460" width="170" height="64" rx="4" fill="#4adc7a" fill-opacity="0.08" stroke="#4adc7a" stroke-width="1" stroke-opacity="0.35"/>
  <text x="386" y="483" font-family="Georgia, serif" font-size="14" fill="#8a7a50">US10Y</text>
  <text x="386" y="511" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">4.426%</text>
  <text x="386" y="527" font-family="Georgia, serif" font-size="12" fill="#4adc7a">↓ 4.4% 목전</text>

  <!-- Gold -->
  <rect x="552" y="460" width="160" height="64" rx="4" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-width="1" stroke-opacity="0.3"/>
  <text x="568" y="483" font-family="Georgia, serif" font-size="14" fill="#8a7a50">Gold</text>
  <text x="568" y="511" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold">$4,362.10</text>
  <text x="568" y="527" font-family="Georgia, serif" font-size="12" fill="#4adc7a">+0.79%</text>

  <!-- Right side decoration -->
  <rect x="780" y="80" width="1" height="560" fill="#d8b878" opacity="0.1"/>

  <!-- Right side — divergence diagram label -->
  <text x="820" y="160" font-family="Georgia, serif" font-size="20" fill="#d8b878" font-weight="bold">섹터 디버전스</text>
  <rect x="820" y="172" width="200" height="1.5" fill="#d8b878" opacity="0.3"/>

  <!-- DOW bar -->
  <text x="820" y="210" font-family="Georgia, serif" font-size="14" fill="#8a7a50">DOW</text>
  <rect x="880" y="195" width="200" height="22" rx="3" fill="#4adc7a" fill-opacity="0.7"/>
  <text x="1088" y="212" font-family="Georgia, serif" font-size="14" fill="#4adc7a" font-weight="bold">+0.78%</text>

  <!-- S&P bar -->
  <text x="820" y="252" font-family="Georgia, serif" font-size="14" fill="#8a7a50">S&amp;P</text>
  <rect x="880" y="237" width="18" height="22" rx="3" fill="#d96552" fill-opacity="0.7"/>
  <text x="906" y="254" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">−0.32%</text>

  <!-- NASDAQ bar -->
  <text x="820" y="294" font-family="Georgia, serif" font-size="14" fill="#8a7a50">NASDAQ</text>
  <rect x="920" y="279" width="32" height="22" rx="3" fill="#d96552" fill-opacity="0.7"/>
  <text x="960" y="296" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">−0.57%</text>

  <!-- USD/KRW -->
  <text x="820" y="380" font-family="Georgia, serif" font-size="14" fill="#8a7a50">USD/KRW</text>
  <text x="820" y="408" font-family="Georgia, serif" font-size="26" fill="#c0b090" font-weight="bold">1,508.67</text>

  <!-- BTC -->
  <text x="820" y="450" font-family="Georgia, serif" font-size="14" fill="#8a7a50">BTC</text>
  <text x="820" y="478" font-family="Georgia, serif" font-size="22" fill="#c0b090" font-weight="bold">$65,843</text>

  <!-- Bottom tagline -->
  <rect x="0" y="648" width="1280" height="72" fill="#000000" fill-opacity="0.3"/>
  <text x="640" y="690" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="middle" letter-spacing="2">DOW 52,075 신기록 — S&amp;P·NASDAQ 혼조 — WTI $75 급락</text>
</svg>
