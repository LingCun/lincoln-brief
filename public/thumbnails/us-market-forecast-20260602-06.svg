<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120806"/>
      <stop offset="100%" stop-color="#0a0402"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87858"/>
      <stop offset="50%" stop-color="#c85a3a"/>
      <stop offset="100%" stop-color="#a84020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c85a3a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c85a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c85a3a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c85a3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#c85a3a" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8a888">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#c85a3a">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#c85a3a" text-anchor="end">2026.06.02 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#c85a3a">— 6월 1주차 시나리오 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="600" fill="#e8a888">ADP · NFP · FOMC</text>
  <text x="80" y="325" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="url(#red)">AI 인프라 강세 vs 에너지 인플레이션</text>
  <text x="80" y="377" font-family="Pretendard, sans-serif" font-size="17" fill="#906858">베어(32%) · 베이스(33%) · 불(20%) · 블랙스완(15%)</text>

  <!-- 시나리오 박스 -->
  <g transform="translate(80, 430)">
    <!-- 불 케이스 -->
    <rect x="0" y="0" width="240" height="100" rx="4" fill="#6ba368" fill-opacity="0.15" stroke="#6ba368" stroke-width="1" stroke-opacity="0.4"/>
    <text x="16" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#6ba368">불 케이스</text>
    <text x="16" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="700" fill="#6ba368">20%</text>
    <text x="16" y="84" font-family="monospace" font-size="10" fill="#6ba368">약한 고용 + WTI 안정화</text>
    <!-- 베이스 -->
    <rect x="260" y="0" width="240" height="100" rx="4" fill="#d8b858" fill-opacity="0.15" stroke="#d8b858" stroke-width="1" stroke-opacity="0.4"/>
    <text x="276" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b858">베이스</text>
    <text x="276" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="700" fill="#d8b858">33%</text>
    <text x="276" y="84" font-family="monospace" font-size="10" fill="#d8b858">컨센서스 고용 + 동결</text>
    <!-- 베어 케이스 -->
    <rect x="520" y="0" width="240" height="100" rx="4" fill="#c85a3a" fill-opacity="0.20" stroke="#c85a3a" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="536" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#c85a3a">베어 케이스</text>
    <text x="536" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="700" fill="#c85a3a">32%</text>
    <text x="536" y="84" font-family="monospace" font-size="10" fill="#c85a3a">강한 고용 + WTI 지속</text>
    <!-- 블랙스완 -->
    <rect x="780" y="0" width="240" height="100" rx="4" fill="#888888" fill-opacity="0.10" stroke="#888888" stroke-width="1" stroke-opacity="0.3"/>
    <text x="796" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#888888">블랙 스완</text>
    <text x="796" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" font-weight="700" fill="#888888">15%</text>
    <text x="796" y="84" font-family="monospace" font-size="10" fill="#888888">지정학 에스컬레이션</text>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#c85a3a" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#705040">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
