<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#070d16"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ab8f0"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2878d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="340" fill="url(#glow)"/>
  <circle cx="200" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#4a9eff" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f0fa">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#4a9eff">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" text-anchor="end">2026.05.21 · STOCK ANALYSIS · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#4a9eff">— 종목 분석 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="255" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#e8f0fa">TSLA</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="52" font-style="italic" fill="url(#blue)">$417.26 · +3.25%</text>
  <text x="80" y="382" font-family="Pretendard, sans-serif" font-size="18" fill="#7090b8">30일 최대 상승주 · 저점 $345.62 대비 +20.8%</text>

  <!-- 3가지 힘 박스 -->
  <g transform="translate(80, 440)">
    <!-- 힘 1 -->
    <rect x="0" y="0" width="330" height="90" rx="4" fill="none" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="16" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#4a9eff">CATALYST 1</text>
    <text x="16" y="56" font-family="Pretendard, sans-serif" font-size="16" fill="#e8f0fa">NVDA 실적 확인</text>
    <text x="16" y="76" font-family="monospace" font-size="12" fill="#7090b8">기술 섹터 안도 반등</text>

    <!-- 힘 2 -->
    <rect x="355" y="0" width="330" height="90" rx="4" fill="none" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="371" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#4a9eff">CATALYST 2</text>
    <text x="371" y="56" font-family="Pretendard, sans-serif" font-size="16" fill="#e8f0fa">AI 에너지 수요</text>
    <text x="371" y="76" font-family="monospace" font-size="12" fill="#7090b8">Megapack × 데이터센터</text>

    <!-- 힘 3 -->
    <rect x="710" y="0" width="330" height="90" rx="4" fill="none" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.5"/>
    <text x="726" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#4a9eff">CATALYST 3</text>
    <text x="726" y="56" font-family="Pretendard, sans-serif" font-size="16" fill="#e8f0fa">Robotaxi 기대</text>
    <text x="726" y="76" font-family="monospace" font-size="12" fill="#7090b8">2026 하반기 상용화</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#4a9eff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" opacity="0.8">MAY 21 · 2026 · THU · TOP MOVER</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE · FRED</text>
</svg>
