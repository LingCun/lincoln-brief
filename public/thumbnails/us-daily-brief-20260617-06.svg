<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c08"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d8b878"/>

  <!-- Top horizontal line -->
  <rect x="6" y="72" width="900" height="1" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="36" y="48" font-family="Georgia, serif" font-size="22" fill="#d8b878" letter-spacing="3" font-weight="bold">LINCOLN BRIEF</text>

  <!-- Edition label (top right) -->
  <text x="1244" y="40" font-family="Georgia, serif" font-size="18" fill="#8a7a60" text-anchor="end">2026.06.17 — SLOT 06</text>
  <text x="1244" y="62" font-family="Georgia, serif" font-size="14" fill="#6a5a40" text-anchor="end">미국 시황 최종 업데이트</text>

  <!-- Category label -->
  <rect x="36" y="90" width="160" height="32" rx="4" fill="#d8b878" fill-opacity="0.15" stroke="#d8b878" stroke-width="1"/>
  <text x="116" y="111" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">DAILY BRIEF</text>

  <!-- Main headline -->
  <text x="36" y="200" font-family="Georgia, serif" font-size="58" fill="#f0e8d0" font-weight="bold">6/16 최종 시황</text>

  <!-- Divider diamond -->
  <polygon points="36,230 44,238 36,246 28,238" fill="#d8b878"/>

  <!-- S&P value + change -->
  <text x="36" y="305" font-family="Georgia, serif" font-size="28" fill="#8a7a60" letter-spacing="1">S&amp;P 500</text>
  <text x="36" y="360" font-family="Georgia, serif" font-size="72" fill="#f0e8d0" font-weight="bold">7,511.35</text>
  <!-- Down triangle -->
  <polygon points="340,330 360,330 350,350" fill="#e05555"/>
  <text x="368" y="348" font-family="Georgia, serif" font-size="32" fill="#e05555" font-weight="bold">−0.57%</text>

  <!-- Divider line -->
  <rect x="36" y="385" width="560" height="1" fill="#3a3020"/>

  <!-- Secondary indices row -->
  <text x="36" y="425" font-family="Georgia, serif" font-size="20" fill="#8a7a60">NASDAQ</text>
  <text x="36" y="455" font-family="Georgia, serif" font-size="32" fill="#f0e8d0" font-weight="bold">26,376.34</text>
  <polygon points="194,430 210,430 202,445" fill="#e05555"/>
  <text x="216" y="446" font-family="Georgia, serif" font-size="22" fill="#e05555">−1.15%</text>

  <text x="380" y="425" font-family="Georgia, serif" font-size="20" fill="#8a7a60">DOW</text>
  <text x="380" y="455" font-family="Georgia, serif" font-size="32" fill="#f0e8d0" font-weight="bold">51,999.67</text>
  <polygon points="530,445 546,445 538,430" fill="#55aa77"/>
  <text x="552" y="446" font-family="Georgia, serif" font-size="22" fill="#55aa77">+0.64%</text>

  <!-- Right panel — macro data -->
  <rect x="720" y="90" width="524" height="590" rx="8" fill="#1a1510" stroke="#3a3020" stroke-width="1"/>

  <text x="982" y="140" font-family="Georgia, serif" font-size="22" fill="#d8b878" text-anchor="middle" letter-spacing="2">MACRO SNAPSHOT</text>
  <rect x="760" y="152" width="444" height="1" fill="#3a3020"/>

  <!-- WTI -->
  <text x="760" y="200" font-family="Georgia, serif" font-size="18" fill="#8a7a60">WTI 원유</text>
  <text x="760" y="235" font-family="Georgia, serif" font-size="38" fill="#f0e8d0" font-weight="bold">$75.83</text>
  <polygon points="858,208 876,208 867,224" fill="#e05555"/>
  <text x="882" y="224" font-family="Georgia, serif" font-size="24" fill="#e05555" font-weight="bold">−6.09%</text>

  <!-- Gold -->
  <text x="760" y="290" font-family="Georgia, serif" font-size="18" fill="#8a7a60">Gold</text>
  <text x="760" y="325" font-family="Georgia, serif" font-size="38" fill="#f0e8d0" font-weight="bold">$4,353</text>
  <polygon points="868,298 884,314 868,314" fill="#55aa77"/>
  <text x="890" y="316" font-family="Georgia, serif" font-size="24" fill="#55aa77" font-weight="bold">+0.58%</text>

  <!-- US10Y -->
  <text x="760" y="375" font-family="Georgia, serif" font-size="18" fill="#8a7a60">US 10Y</text>
  <text x="760" y="410" font-family="Georgia, serif" font-size="38" fill="#f0e8d0" font-weight="bold">4.428%</text>
  <polygon points="878,382 896,382 887,398" fill="#55aa77"/>
  <text x="902" y="399" font-family="Georgia, serif" font-size="24" fill="#55aa77">−0.042%p</text>

  <!-- USD/KRW -->
  <text x="760" y="460" font-family="Georgia, serif" font-size="18" fill="#8a7a60">USD/KRW</text>
  <text x="760" y="495" font-family="Georgia, serif" font-size="38" fill="#f0e8d0" font-weight="bold">1,508.32</text>
  <polygon points="890,466 908,466 899,482" fill="#55aa77"/>
  <text x="914" y="483" font-family="Georgia, serif" font-size="24" fill="#55aa77">−0.33%</text>

  <!-- Movers -->
  <rect x="760" y="520" width="444" height="1" fill="#3a3020"/>
  <text x="760" y="553" font-family="Georgia, serif" font-size="16" fill="#8a7a60">최대 상승: JPM</text>
  <text x="982" y="553" font-family="Georgia, serif" font-size="16" fill="#55aa77" text-anchor="end">+3.68%</text>
  <text x="760" y="578" font-family="Georgia, serif" font-size="16" fill="#8a7a60">최대 하락: AVGO</text>
  <text x="982" y="578" font-family="Georgia, serif" font-size="16" fill="#e05555" text-anchor="end">−4.37%</text>

  <!-- Key insight bottom left -->
  <text x="36" y="545" font-family="Georgia, serif" font-size="18" fill="#8a7a60">섹터 로테이션 — 오후 세션 심화</text>
  <text x="36" y="580" font-family="Georgia, serif" font-size="28" fill="#d8b878" font-weight="bold">NASDAQ −1.15%  ·  DOW +0.64%</text>

  <!-- Bottom bar -->
  <rect x="0" y="700" width="1280" height="20" fill="#0a0805"/>
  <text x="640" y="714" font-family="Georgia, serif" font-size="11" fill="#4a3a20" text-anchor="middle" letter-spacing="1">※ 본 글은 정보 제공 목적이며 투자 권유가 아닙니다 — LINCOLN BRIEF</text>
</svg>
