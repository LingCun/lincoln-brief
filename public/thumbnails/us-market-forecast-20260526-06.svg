<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#0d0805"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8806a"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84a38"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="360" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5ddd5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.26 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 재개장 시나리오 · 오전판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5ddd5">오늘 밤 22:30 재개장</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">첫 30분이 알려줄 4가지 시그널</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#a07868">5/29 FOMC 회의록  ·  5/30 PCE  ·  저유동성 경계</text>

  <!-- 시나리오 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07868">베이스</text>
      <text x="0" y="63" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5ddd5">45%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#a07868">고점 박스 유지</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07868">불 케이스</text>
      <text x="0" y="63" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#6ba368">20%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#6ba368">7,600~7,700</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(490, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07868">베어 케이스</text>
      <text x="0" y="63" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d96552">30%</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#d96552">7,200 테스트</text>
    </g>
    <!-- S&P 현재 -->
    <g transform="translate(760, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#a07868">S&amp;P 현재</text>
      <text x="0" y="63" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5ddd5">7,473</text>
      <polygon points="0,71 14,71 7,85" fill="#6ba368"/>
      <text x="22" y="88" font-family="monospace" font-size="12" fill="#6ba368">+0.37%</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a1810" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#907060">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#504030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
