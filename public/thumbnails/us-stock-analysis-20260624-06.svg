  <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#60a5fa" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3060a0" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#90b8f0" text-anchor="middle" letter-spacing="1">2026.06.24 · 06:00 KST</text>

  <!-- Diamond -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a5fa" fill-opacity="0.5"/>

  <!-- NVDA main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#90b8f0" text-anchor="middle" letter-spacing="4">NVDA · NVIDIA</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$200.04</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−4.13%</text>
