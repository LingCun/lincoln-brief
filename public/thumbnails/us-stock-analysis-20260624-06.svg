  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Key level panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">$200 심리선 — 경계 레벨</text>
  <text x="320" y="478" font-family="Georgia, serif" font-size="22" fill="#aaaaaa" text-anchor="middle">전일 종가</text>
  <text x="320" y="516" font-family="Georgia, serif" font-size="36" fill="#ffffff" text-anchor="middle" font-weight="bold">$208.65</text>
