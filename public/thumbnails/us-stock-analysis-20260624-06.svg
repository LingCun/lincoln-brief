  <rect x="600" y="398" width="600" height="196" rx="4" fill="#4060a0" fill-opacity="0.05" stroke="#60a5fa" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#90b8f0" text-anchor="middle" letter-spacing="2">4주 시나리오</text>
  <text x="680" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">경로 A — $220+ 반등</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#6090c8" text-anchor="end">15%</text>
  <text x="680" y="496" font-family="Georgia, serif" font-size="14" fill="#aaaaaa">경로 B — $195~$210 박스</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="14" fill="#90b8f0" text-anchor="end">40%</text>
  <text x="680" y="524" font-family="Georgia, serif" font-size="14" fill="#888888">경로 C — $175~$195 하락</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">32%</text>
  <text x="680" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">경로 D — $160 이하</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">13%</text>
  <text x="680" y="580" font-family="Georgia, serif" font-size="13" fill="#504060">US10Y 4.493% · AI 칩 수요는 훼손 없음</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#60a5fa" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#90b8f0" text-anchor="middle">AVGO $380.15</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#405070" text-anchor="middle">−3.06% · AI칩 공급 동반 약세</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#90b8f0" text-anchor="middle">NASDAQ 25,587.04</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#405070" text-anchor="middle">−2.21% · 26,000 이탈 확인</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#90b8f0" text-anchor="middle">핵심 관찰</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#405070" text-anchor="middle">$200 이탈 여부 · 내일 시가 확인</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a5fa" fill-opacity="0.35"/>
</svg>
