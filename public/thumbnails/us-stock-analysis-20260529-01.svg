<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#080c15"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9fd0"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5a8a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="150" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0e0f5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.05.29 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 · 5/28 마감 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#d0e0f5">LLY $1,122.47</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#blue)">+3.65% — 30일 신고가 경신</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#7a8aa0">30일 저점 $851.21 대비 +31.9%  ·  GLP-1 비만치료제 모멘텀</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 오늘 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8aa0">종가</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">$1,122</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+3.65%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(220, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8aa0">30일저점</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">$851</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#7a8aa0">저점</text>
    </g>
    <!-- 30일 상승률 -->
    <g transform="translate(460, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8aa0">저점대비</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">+31.9%</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">30일</text>
    </g>
    <!-- S&P 대비 -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8aa0">S&amp;P대비</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">×6.6</text>
      <text x="0" y="93" font-family="monospace" font-size="13" fill="#6ba368">아웃퍼폼</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1e2d45" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#5677b0">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#3a4a60" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
