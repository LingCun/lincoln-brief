<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0d08"/>
      <stop offset="100%" stop-color="#0f0705"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f08070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="400" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.01 11:00 KST · KR FORECAST</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="340" height="30" rx="4" fill="#d96552" fill-opacity="0.20" stroke="#d96552" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f08070">9,000 관문 · 원화 약세가 변수</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">KOSPI 8,829</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#red)">9,000까지 1.9%</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#8a9898">불 케이스 진입 · 원화 1,512원(+1.13%) 역풍</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#3a1a10" stroke-width="1"/>

  <!-- Scenario table headers -->
  <g transform="translate(80, 474)">
    <text x="0" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552">시나리오</text>
    <text x="240" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552">확률</text>
    <text x="360" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552">KOSPI 경로</text>

    <!-- Base -->
    <rect x="0" y="30" width="1100" height="32" rx="3" fill="#d96552" fill-opacity="0.10"/>
    <text x="10" y="52" font-family="monospace" font-size="13" fill="#f5edd9">베이스 — 8,600~9,000 소화</text>
    <text x="240" y="52" font-family="monospace" font-size="13" fill="#d8b878">40%</text>
    <text x="360" y="52" font-family="monospace" font-size="13" fill="#8a9898">원화 안정 + KOSDAQ 역방향 완화</text>

    <!-- Bull -->
    <text x="10" y="87" font-family="monospace" font-size="13" fill="#4db86b">불 케이스 — 9,000 돌파</text>
    <text x="240" y="87" font-family="monospace" font-size="13" fill="#4db86b">20%</text>
    <text x="360" y="87" font-family="monospace" font-size="13" fill="#8a9898">외국인 복귀 + 원화 1,490원 이하</text>

    <!-- Bear -->
    <text x="10" y="122" font-family="monospace" font-size="13" fill="#e05555">베어 케이스 — 8,200~8,600 되돌림</text>
    <text x="240" y="122" font-family="monospace" font-size="13" fill="#e05555">35%</text>
    <text x="360" y="122" font-family="monospace" font-size="13" fill="#8a9898">국내 수급 차익 실현 + 원화 추가 약세</text>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="650" x2="1200" y2="650" stroke="#3a1a10" stroke-width="0.5"/>
  <text x="80" y="670" font-family="monospace" font-size="10" fill="#5a3a2a" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="670" font-family="monospace" font-size="10" fill="#d96552" text-anchor="end">— Lincoln</text>
</svg>
