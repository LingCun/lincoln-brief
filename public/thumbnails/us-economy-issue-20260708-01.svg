<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a12"/>
      <stop offset="100%" stop-color="#0a0d09"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#7a9d6e00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left green bar -->
  <rect x="60" y="60" width="4" height="600" fill="#7a9d6e" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#a3c398" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" letter-spacing="2">US MARKET · 경제 이슈</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#a3c398" opacity="0.7" text-anchor="end">2026.07.08 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="end">반도체 밸류에이션</text>

  <!-- Main headline -->
  <text x="84" y="196" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">실적 서프라이즈에도</text>
  <text x="84" y="236" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff">삼성전자 급락, 왜</text>

  <!-- Samsung main data -->
  <text x="84" y="304" font-family="Georgia, serif" font-size="26" fill="#a3c398">삼성전자</text>
  <text x="260" y="304" font-family="Georgia, serif" font-size="28" fill="#ffffff">296,000원</text>
  <polygon points="470,304 490,304 480,286" fill="#e87050"/>
  <text x="498" y="304" font-family="Georgia, serif" font-size="24" fill="#e87050">-4.36%</text>

  <!-- Divider line -->
  <rect x="84" y="324" width="700" height="1" fill="#7a9d6e" opacity="0.3"/>

  <!-- Target price row -->
  <text x="84" y="366" font-family="Georgia, serif" font-size="24" fill="#a3c398">SK하이닉스</text>
  <text x="290" y="366" font-family="Georgia, serif" font-size="26" fill="#ffffff" font-weight="bold">2,201,000원</text>
  <text x="84" y="400" font-family="Georgia, serif" font-size="20" fill="#e87050">-9.24% — 코스피 최대 낙폭권</text>

  <!-- Secondary row -->
  <text x="84" y="440" font-family="Georgia, serif" font-size="22" fill="#a3c398">코스피</text>
  <text x="240" y="440" font-family="Georgia, serif" font-size="22" fill="#ffffff">7,656.31</text>
  <polygon points="400,440 412,440 406,424" fill="#e87050"/>
  <text x="419" y="440" font-family="Georgia, serif" font-size="20" fill="#e87050">-5.34%</text>

  <text x="84" y="476" font-family="Georgia, serif" font-size="22" fill="#a3c398">USD/KRW</text>
  <text x="240" y="476" font-family="Georgia, serif" font-size="22" fill="#ffffff">1,514.13</text>
  <polygon points="400,476 412,476 406,460" fill="#e87050"/>
  <text x="419" y="476" font-family="Georgia, serif" font-size="20" fill="#e87050">-1.10% (원화 강세)</text>

  <!-- Divider -->
  <rect x="84" y="500" width="700" height="1" fill="#7a9d6e" opacity="0.2"/>

  <!-- Footer note -->
  <text x="84" y="536" font-family="Georgia, serif" font-size="18" fill="#a3c398" opacity="0.9">여진은 인텔(-8.77%)·AMD(-5.67%)로 확산</text>
  <text x="84" y="566" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" opacity="0.85">증시 급락에도 원화 강세 — 섹터 내 재평가 성격</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,610 92,602 100,610 92,618" fill="#7a9d6e" opacity="0.5"/>
</svg>
