<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9fd8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3d5a8e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="180" cy="560" r="280" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#dce8f5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.05.21 · STOCK ANALYSIS</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— NVIDIA 종목 분석 —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#dce8f5">NVDA</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="60" font-style="italic" fill="url(#blue)">$224.99</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#7a8fa8">실적 당일 +1.99%  ·  30일 저점 대비 +22.3%</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- 현재가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8fa8">TODAY CLOSE</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dce8f5">$224.99</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#6ba368">+1.99%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8fa8">30D LOW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dce8f5">$183.91</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#7a8fa8">저점</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8fa8">30D HIGH</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dce8f5">$235.74</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#7a8fa8">고점</text>
    </g>
    <!-- 실적 발표 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a8fa8">EARNINGS</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#dce8f5">TODAY</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#5677b0">5PM EDT</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#5677b0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8">MAY 21 · 2026 · THU · AI SEMICONDUCTOR</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
