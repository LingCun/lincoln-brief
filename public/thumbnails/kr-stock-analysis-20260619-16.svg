<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#101824"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5677b0;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#5677b0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5677b0;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#5677b0" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#5677b0" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#5677b0" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5070" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#5677b0" fill-opacity="0.15" stroke="#5677b0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#7899d0" text-anchor="middle" letter-spacing="1">2026.06.19 · 16:00</text>

  <!-- Diamond decorative element -->
  <polygon points="640,110 648,118 640,126 632,118" fill="#5677b0" fill-opacity="0.6"/>

  <!-- Main label -->
  <text x="640" y="164" font-family="Georgia, serif" font-size="22" fill="#7899d0" text-anchor="middle" letter-spacing="4">삼성전자 vs SK하이닉스</text>

  <!-- Left panel: 삼성전자 -->
  <rect x="80" y="200" width="500" height="280" rx="4" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="330" y="240" font-family="Georgia, serif" font-size="18" fill="#f87171" text-anchor="middle" letter-spacing="2">삼성전자</text>
  <text x="330" y="308" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">354,000</text>
  <text x="330" y="338" font-family="Georgia, serif" font-size="18" fill="#f87171" text-anchor="middle">원</text>
  <polygon points="290,368 306,386 322,368" fill="#f87171"/>
  <text x="332" y="388" font-family="Georgia, serif" font-size="34" fill="#f87171" font-weight="bold">−2.34%</text>
  <text x="330" y="432" font-family="Georgia, serif" font-size="16" fill="#a06060" text-anchor="middle">30일 고점(362,500원) 대비</text>
  <text x="330" y="458" font-family="Georgia, serif" font-size="16" fill="#a06060" text-anchor="middle">−8,500원 (−2.34%)</text>

  <!-- VS divider -->
  <text x="640" y="360" font-family="Georgia, serif" font-size="36" fill="#5677b0" text-anchor="middle" font-weight="bold">VS</text>
  <line x1="640" y1="240" x2="640" y2="460" stroke="#5677b0" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Right panel: SK하이닉스 -->
  <rect x="700" y="200" width="500" height="280" rx="4" fill="#4ade80" fill-opacity="0.06" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="950" y="240" font-family="Georgia, serif" font-size="18" fill="#4ade80" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="950" y="308" font-family="Georgia, serif" font-size="54" fill="#ffffff" text-anchor="middle" font-weight="bold">2,764,000</text>
  <text x="950" y="338" font-family="Georgia, serif" font-size="18" fill="#4ade80" text-anchor="middle">원</text>
  <polygon points="910,368 926,352 942,368" fill="#4ade80"/>
  <text x="952" y="388" font-family="Georgia, serif" font-size="34" fill="#4ade80" font-weight="bold">+2.94%</text>
  <text x="950" y="432" font-family="Georgia, serif" font-size="16" fill="#60a080" text-anchor="middle">30일 저점(1,654,000원) 대비</text>
  <text x="950" y="458" font-family="Georgia, serif" font-size="16" fill="#60a080" text-anchor="middle">+67.11% 누적 상승</text>

  <!-- Gap highlight -->
  <rect x="420" y="498" width="440" height="44" rx="4" fill="#5677b0" fill-opacity="0.15" stroke="#5677b0" stroke-opacity="0.5" stroke-width="1"/>
  <text x="640" y="526" font-family="Georgia, serif" font-size="20" fill="#7899d0" text-anchor="middle" font-weight="bold" letter-spacing="1">하루 수익률 격차 5.28%포인트</text>

  <!-- Bottom note -->
  <line x1="160" y1="580" x2="1120" y2="580" stroke="#5677b0" stroke-opacity="0.15" stroke-width="1"/>
  <text x="640" y="610" font-family="Georgia, serif" font-size="14" fill="#5677b0" text-anchor="middle" letter-spacing="1">HBM 공급망 포지셔닝 격차 · AVGO +9.20% · NVDA +1.58%</text>
  <text x="640" y="636" font-family="Georgia, serif" font-size="13" fill="#3a5070" text-anchor="middle" letter-spacing="1">KOSPI +2.12% 상승일에 삼성전자는 하락 · 350,000원 지지선 1.13% 아래</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#5677b0" fill-opacity="0.4"/>
</svg>
