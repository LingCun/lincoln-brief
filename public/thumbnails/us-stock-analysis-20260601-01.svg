<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1420"/>
      <stop offset="100%" stop-color="#07090e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9fd0"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5890"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0e0f5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.01 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— MSFT · 종목 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="270" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="600" fill="#d0e0f5">MSFT $450.24</text>
  <text x="80" y="345" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#blue)">+5.44% — 30일 신고가 경신</text>
  <text x="80" y="395" font-family="Pretendard, sans-serif" font-size="18" fill="#7090a8">Azure AI 클라우드  ·  30일 저점 $405.21 대비 +11.1%</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a8">종가</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">$450.24</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+5.44%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(220, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a8">30일 저점</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">$405.21</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+11.1%↑</text>
    </g>
    <!-- S&P -->
    <g transform="translate(460, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a8">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">7,580</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.22%</text>
    </g>
    <!-- 10Y -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a8">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d0e0f5">4.453%</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−0.04%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="608" x2="1200" y2="608" stroke="#1a2840" stroke-width="1"/>
  <text x="80" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#3a5070">AVGO +4.73% 동반 강세  ·  NVDA −1.45%  ·  AI 인프라 공급망 차별화</text>
  <text x="1200" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#3a5070" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
