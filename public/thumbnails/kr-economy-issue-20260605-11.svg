<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080d"/>
      <stop offset="100%" stop-color="#100c18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="65%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#6030c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6030c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#e03030" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e03030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="960" cy="240" r="420" fill="url(#glow1)"/>
  <circle cx="240" cy="520" r="320" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.05 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="400" height="30" rx="4" fill="#6030c0" fill-opacity="0.20" stroke="#8050e0" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#a080f0">AVGO −13% · AI 반도체 밸류에이션 재조정</text>

  <!-- Main title -->
  <text x="80" y="292" font-family="Playfair Display, Georgia, serif" font-size="70" font-weight="500" fill="#f5edd9">AVGO −13%</text>
  <text x="80" y="354" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#gold)">AI 반도체 공급망 재평가 · 한국 전이</text>
  <text x="80" y="404" font-family="sans-serif" font-size="17" fill="#8a9898">SK하이닉스 −7.83% · 삼성전자 −4.84% · USD/KRW 1,543원</text>

  <!-- Divider -->
  <line x1="80" y1="438" x2="1200" y2="438" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 472)">
    <!-- AVGO -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">AVGO</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$418.91</text>
      <polygon points="0,88 14,72 28,88" fill="#e03030"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e03030">−13.01%</text>
    </g>
    <!-- META -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">META</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$627.57</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+5.01%</text>
    </g>
    <!-- SK하이닉스 -->
    <g transform="translate(520, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">2,118,000</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−7.83%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,542.98</text>
      <polygon points="0,88 14,72 28,88" fill="#e09040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e09040">+0.84%</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#1a1a2a" stroke-width="1"/>
  <text x="80" y="680" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a3a4a">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="680" font-family="monospace" font-size="10" letter-spacing="1" fill="#3a3a4a" text-anchor="end">Yahoo Finance · KRX</text>
</svg>
