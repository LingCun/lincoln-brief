  <text x="320" y="418" font-family="Georgia, serif" font-size="15" fill="#40a060" text-anchor="middle" letter-spacing="1">30일 가격 궤적</text>
  <text x="180" y="454" font-family="Georgia, serif" font-size="13" fill="#607080">30일 고점</text>
  <text x="500" y="454" font-family="Georgia, serif" font-size="16" fill="#c0d0e0" text-anchor="end" font-weight="bold">$274.00</text>
  <text x="180" y="484" font-family="Georgia, serif" font-size="13" fill="#607080">30일 저점</text>
  <text x="500" y="484" font-family="Georgia, serif" font-size="16" fill="#c0d0e0" text-anchor="end" font-weight="bold">$232.79</text>
  <text x="180" y="514" font-family="Georgia, serif" font-size="13" fill="#607080">고점 대비</text>
  <text x="500" y="514" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end" font-weight="bold">−12.2%</text>
  <text x="180" y="544" font-family="Georgia, serif" font-size="13" fill="#607080">저점 대비</text>
  <text x="500" y="544" font-family="Georgia, serif" font-size="16" fill="#4ade80" text-anchor="end" font-weight="bold">+3.4%</text>
  <text x="180" y="576" font-family="Georgia, serif" font-size="12" fill="#405060">저점 부근 반등 · 추세 전환 여부 확인 필요</text>

