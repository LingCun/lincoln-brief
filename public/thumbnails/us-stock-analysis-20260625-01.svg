  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#80b8d8" text-anchor="middle" letter-spacing="1">2026.06.25 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a8d8" fill-opacity="0.5"/>

  <!-- AMZN main display -->
  <text x="640" y="168" font-family="Georgia, serif" font-size="22" fill="#80b8d8" text-anchor="middle" letter-spacing="4">AMAZON · AMZN</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$240.72</text>
  <polygon points="548,284 566,266 584,284" fill="#4ade80"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+2.82%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#406050" text-anchor="middle">12종목 최대 상승 · 전일 $234.11 → $240.72</text>

