  <text x="900" y="418" font-family="Georgia, serif" font-size="15" fill="#80b8d8" text-anchor="middle" letter-spacing="1">반등 배경</text>
  <text x="660" y="454" font-family="Georgia, serif" font-size="14" fill="#888888">WTI</text>
  <text x="1160" y="454" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">$70.62 (−3.54%) 물류 비용 완화</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="14" fill="#888888">US10Y</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">4.402% (−9.1bp) 성장주 공간</text>
  <text x="660" y="514" font-family="Georgia, serif" font-size="14" fill="#888888">AWS 클라우드</text>
  <text x="1160" y="514" font-family="Georgia, serif" font-size="14" fill="#80b8d8" text-anchor="end">AI 인프라 수요 내러티브 유지</text>
  <text x="660" y="544" font-family="Georgia, serif" font-size="14" fill="#888888">AVGO</text>
  <text x="1160" y="544" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">+1.48% AI 칩 공급 동반 강세</text>
  <text x="660" y="574" font-family="Georgia, serif" font-size="12" fill="#405060">4주 베이스(45%): $230~$255 박스 소화</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#60a8d8" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8d8" text-anchor="middle">S&amp;P 500 7,407.12</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#406888" text-anchor="middle">+0.57% 전일 대비 회복</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8d8" text-anchor="middle">반등 트리거</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#406888" text-anchor="middle">US10Y 4.402% + WTI −3.54%</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#80b8d8" text-anchor="middle">NVDA $200.49</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#406888" text-anchor="middle">+0.22% $200 방어 성공</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a8d8" fill-opacity="0.35"/>
</svg>
