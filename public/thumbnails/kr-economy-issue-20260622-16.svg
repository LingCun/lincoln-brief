<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0906"/>
      <stop offset="100%" style="stop-color:#1a1008"/>
    </linearGradient>
    <linearGradient id="amberLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#fb923c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#fb923c" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#fb923c" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#fb923c" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#amberLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · ECONOMY ISSUE</text>

  <!-- Edition label -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#e07030" text-anchor="middle" letter-spacing="1">2026.06.22 · 16:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#fb923c" fill-opacity="0.5"/>

  <!-- Main headline -->
  <text x="640" y="168" font-family="Georgia, serif" font-size="20" fill="#e07030" text-anchor="middle" letter-spacing="3">자동차 섹터 소외 구조</text>
  <text x="640" y="250" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">현대차 −22.5%</text>
  <text x="640" y="296" font-family="Georgia, serif" font-size="22" fill="#c06030" text-anchor="middle">30일 고점(750,000원) 대비</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="16" fill="#805030" text-anchor="middle">오늘 종가 581,000원 (−5.22%) · 기아 151,400원 (−2.26%)</text>

  <!-- Divider -->
  <line x1="160" y1="368" x2="1120" y2="368" stroke="#fb923c" stroke-opacity="0.2" stroke-width="1"/>

  <!-- AI vs 자동차 comparison -->
  <text x="640" y="402" font-family="Georgia, serif" font-size="16" fill="#e07030" text-anchor="middle" letter-spacing="2">같은 KOSPI — 다른 방향</text>

  <!-- Left: SK하이닉스 green -->
  <rect x="80" y="416" width="500" height="170" rx="4" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="330" y="448" font-family="Georgia, serif" font-size="15" fill="#6ab880" text-anchor="middle" letter-spacing="1">SK하이닉스 (AI·HBM)</text>
  <text x="330" y="496" font-family="Georgia, serif" font-size="52" fill="#4ade80" text-anchor="middle" font-weight="bold">+73.3%</text>
  <text x="330" y="526" font-family="Georgia, serif" font-size="13" fill="#507050" text-anchor="middle">30일 저점 1,686,000원 대비</text>
  <text x="330" y="548" font-family="Georgia, serif" font-size="13" fill="#507050" text-anchor="middle">오늘 종가 2,919,000원</text>
  <text x="330" y="570" font-family="Georgia, serif" font-size="12" fill="#405040" text-anchor="middle">AI 수요 직접 수혜</text>

  <!-- Right: 현대차 red -->
  <rect x="620" y="416" width="560" height="170" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="900" y="448" font-family="Georgia, serif" font-size="15" fill="#d06060" text-anchor="middle" letter-spacing="1">자동차·배터리·바이오</text>
  <text x="900" y="484" font-family="Georgia, serif" font-size="18" fill="#888888" text-anchor="middle">현대차 고점 대비</text>
  <text x="900" y="516" font-family="Georgia, serif" font-size="44" fill="#f87171" text-anchor="middle" font-weight="bold">−22.5%</text>
  <text x="900" y="548" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">LG에너지솔루션 −19.0%</text>
  <text x="900" y="568" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">삼성바이오로직스 −12.0%</text>

  <!-- Bottom stats -->
  <line x1="160" y1="606" x2="1120" y2="606" stroke="#fb923c" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="636" font-family="Georgia, serif" font-size="14" fill="#e07030" text-anchor="middle">압력 ①</text>
  <text x="260" y="658" font-family="Georgia, serif" font-size="12" fill="#705030" text-anchor="middle">미국 관세 불확실성</text>
  <text x="640" y="636" font-family="Georgia, serif" font-size="14" fill="#e07030" text-anchor="middle">압력 ②</text>
  <text x="640" y="658" font-family="Georgia, serif" font-size="12" fill="#705030" text-anchor="middle">EV 수요 둔화 우려</text>
  <text x="1020" y="636" font-family="Georgia, serif" font-size="14" fill="#e07030" text-anchor="middle">압력 ③</text>
  <text x="1020" y="658" font-family="Georgia, serif" font-size="12" fill="#705030" text-anchor="middle">AI 테마 상대적 소외</text>

  <text x="640" y="696" font-family="Georgia, serif" font-size="12" fill="#504030" text-anchor="middle">AI 모멘텀 전환 시점이 자동차 섹터 반등의 촉매</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#fb923c" fill-opacity="0.35"/>
</svg>
