<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131720"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#5677b000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left blue bar -->
  <rect x="60" y="60" width="4" height="600" fill="#5677b0" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#7d9bd4" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#5677b0" letter-spacing="2">US MARKET · 종목 분석</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#7d9bd4" opacity="0.7" text-anchor="end">2026.07.09 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#5677b0" text-anchor="end">애플 반도체 계약</text>

  <!-- Main headline -->
  <text x="84" y="200" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="#ffffff">AVGO, 5%대 급등</text>

  <!-- AVGO main data -->
  <text x="84" y="288" font-family="Georgia, serif" font-size="32" fill="#7d9bd4">AVGO</text>
  <text x="240" y="288" font-family="Georgia, serif" font-size="32" fill="#ffffff" font-weight="bold">$391.61</text>
  <polygon points="470,270 492,270 481,290" fill="#6ec46e"/>
  <text x="501" y="288" font-family="Georgia, serif" font-size="28" fill="#6ec46e" font-weight="bold">+5.62%</text>

  <!-- Divider line -->
  <rect x="84" y="312" width="700" height="1" fill="#5677b0" opacity="0.3"/>

  <!-- Target price row -->
  <text x="84" y="356" font-family="Georgia, serif" font-size="22" fill="#7d9bd4">애널리스트 목표가</text>
  <text x="340" y="356" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$523.73</text>
  <text x="84" y="392" font-family="Georgia, serif" font-size="20" fill="#8a94a6">현재가 대비 +33.7% 여력</text>

  <!-- Divider -->
  <rect x="84" y="418" width="700" height="1" fill="#5677b0" opacity="0.2"/>

  <!-- Secondary data rows -->
  <text x="84" y="456" font-family="Georgia, serif" font-size="20" fill="#7d9bd4">애플 계약 규모</text>
  <text x="290" y="456" font-family="Georgia, serif" font-size="20" fill="#ffffff">$30억+ 미국산 반도체</text>

  <text x="84" y="492" font-family="Georgia, serif" font-size="20" fill="#7d9bd4">시가총액</text>
  <text x="270" y="492" font-family="Georgia, serif" font-size="20" fill="#ffffff">약 $1.8조</text>

  <text x="84" y="528" font-family="Georgia, serif" font-size="20" fill="#7d9bd4">다음 실적</text>
  <text x="270" y="528" font-family="Georgia, serif" font-size="20" fill="#ffffff">9월 3일</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="558" width="700" height="1" fill="#5677b0" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="592" font-family="Georgia, serif" font-size="18" fill="#7d9bd4" opacity="0.85">다우 급락 속에서도 정반대로 급등</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,630 92,622 100,630 92,638" fill="#5677b0" opacity="0.5"/>
</svg>
