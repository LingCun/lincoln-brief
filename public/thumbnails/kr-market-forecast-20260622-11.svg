  <text x="1030" y="530" font-family="Georgia, serif" font-size="13" fill="#e08070" text-anchor="middle">KOSDAQ 목표</text>
  <text x="1030" y="558" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">968 → 1,000</text>
