<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100808"/>
      <stop offset="100%" style="stop-color:#1a0f0f"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d96552;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d96552;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d96552" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d96552" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="427" y1="0" x2="427" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="853" y1="0" x2="853" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#7a3020" letter-spacing="2">KR MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1060" y="28" width="180" height="36" rx="3" fill="#d96552" fill-opacity="0.15" stroke="#d96552" stroke-opacity="0.5" stroke-width="1"/>
  <text x="1150" y="51" font-family="Georgia, serif" font-size="14" fill="#d96552" text-anchor="middle" letter-spacing="1">2026.06.19 · 11:00</text>

  <!-- Main headline -->
  <text x="640" y="128" font-family="Georgia, serif" font-size="22" fill="#d96552" text-anchor="middle" letter-spacing="3">KOSPI 9,000 돌파 이후</text>

  <!-- Diamond -->
  <polygon points="640,148 648,156 640,164 632,156" fill="#d96552" fill-opacity="0.6"/>

  <!-- KOSPI value big -->
  <text x="640" y="260" font-family="Georgia, serif" font-size="96" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-2">9,069.17</text>
  <text x="640" y="304" font-family="Georgia, serif" font-size="22" fill="#d96552" text-anchor="middle" letter-spacing="4">KOSPI · 9,000 돌파</text>

  <!-- Change -->
  <polygon points="560,328 572,312 584,328" fill="#4ade80"/>
  <text x="594" y="330" font-family="Georgia, serif" font-size="24" fill="#4ade80" font-weight="bold">+2.31%   +204.93pt</text>

  <!-- Separator -->
  <line x1="160" y1="368" x2="1120" y2="368" stroke="#d96552" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Scenario bars -->
  <text x="160" y="412" font-family="Georgia, serif" font-size="16" fill="#7a3020" letter-spacing="2">시나리오 분포</text>

  <!-- Bull scenario -->
  <rect x="160" y="426" width="768" height="32" rx="3" fill="#4ade80" fill-opacity="0.25"/>
  <rect x="160" y="426" width="768" height="32" rx="3" fill="none" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
  <text x="170" y="447" font-family="Georgia, serif" font-size="16" fill="#4ade80" font-weight="bold">불 (9,200 탐색)</text>
  <text x="918" y="447" font-family="Georgia, serif" font-size="18" fill="#4ade80" font-weight="bold">60%</text>

  <!-- Base scenario -->
  <rect x="160" y="468" width="282" height="30" rx="3" fill="#a0a0a0" fill-opacity="0.2"/>
  <rect x="160" y="468" width="282" height="30" rx="3" fill="none" stroke="#a0a0a0" stroke-opacity="0.35" stroke-width="1"/>
  <text x="170" y="488" font-family="Georgia, serif" font-size="15" fill="#a0a0a0">베이스 (9,000~9,100 박스)</text>
  <text x="450" y="488" font-family="Georgia, serif" font-size="16" fill="#a0a0a0">22%</text>

  <!-- Bear scenario -->
  <rect x="160" y="508" width="166" height="30" rx="3" fill="#f87171" fill-opacity="0.18"/>
  <rect x="160" y="508" width="166" height="30" rx="3" fill="none" stroke="#f87171" stroke-opacity="0.35" stroke-width="1"/>
  <text x="170" y="528" font-family="Georgia, serif" font-size="15" fill="#f87171">베어 (되돌림)</text>
  <text x="336" y="528" font-family="Georgia, serif" font-size="16" fill="#f87171">13%</text>

  <!-- Black swan -->
  <rect x="160" y="548" width="64" height="28" rx="3" fill="#6b21a8" fill-opacity="0.3"/>
  <text x="170" y="566" font-family="Georgia, serif" font-size="14" fill="#a855f7">블랙 스완 5%</text>

  <!-- Separator -->
  <line x1="160" y1="592" x2="1120" y2="592" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Key conditions right column -->
  <text x="940" y="412" font-family="Georgia, serif" font-size="15" fill="#7a3020" letter-spacing="1" text-anchor="middle">안착 조건</text>
  <text x="940" y="445" font-family="Georgia, serif" font-size="14" fill="#4ade80">✓ KOSPI 9,000 종가</text>
  <text x="940" y="468" font-family="Georgia, serif" font-size="14" fill="#f87171">✗ USD/KRW 1,520↓</text>
  <text x="940" y="491" font-family="Georgia, serif" font-size="14" fill="#fbbf24">△ US10Y 4.4%↓ (근접)</text>
  <text x="940" y="514" font-family="Georgia, serif" font-size="14" fill="#f87171">✗ KOSDAQ 1,000 회복</text>

  <line x1="860" y1="405" x2="860" y2="540" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Bottom -->
  <text x="640" y="632" font-family="Georgia, serif" font-size="14" fill="#7a3020" text-anchor="middle" letter-spacing="2">US10Y 4.451% · USD/KRW 1,525.78원 · AVGO +9.20%</text>

  <text x="640" y="684" font-family="Georgia, serif" font-size="13" fill="#7a3020" text-anchor="middle" letter-spacing="2">— Lincoln Brief · 정보 제공 목적, 투자 권유 아님 —</text>
</svg>
