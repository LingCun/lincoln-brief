  <text x="80" y="450" font-family="Pretendard, sans-serif" font-size="18" fill="#6888b0">30일 +22.6%  ·  저점 $851.21 대비 +32.2%  ·  6/4 12종목 최대 상승</text>

  <!-- 스파크라인 영역 (단순화된 선형) -->
  <g transform="translate(80, 490)">
    <line x1="0" y1="60" x2="1100" y2="60" stroke="#2a3448" stroke-width="1"/>
    <!-- 30일 추세선 (단순 상승 표현) -->
    <polyline points="0,55 37,58 73,60 110,57 147,63 183,48 220,44 257,43 293,40 330,41 367,43 403,46 440,44 477,40 513,35 550,37 587,37 623,42 660,34 697,35 733,30 770,24 807,24 843,19 880,8 917,12 953,16 990,22 1027,17 1063,5" fill="none" stroke="#5677b0" stroke-width="2.5"/>
    <!-- 현재 포인트 -->
    <circle cx="1063" cy="5" r="5" fill="#7898d8"/>
    <text x="0" y="78" font-family="monospace" font-size="10" fill="#3a4a6a">30일 전 $917</text>
    <text x="500" y="78" font-family="monospace" font-size="10" fill="#3a4a6a" text-anchor="middle">저점 $851</text>
