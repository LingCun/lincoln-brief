  <text x="80" y="648" font-family="monospace" font-size="11" fill="#3a4a6a">GLP-1 비만 치료 프랜차이즈  ·  AVGO −12.59% 반대 방향  ·  NFP(6/6) 주목</text>
  <text x="1200" y="648" font-family="monospace" font-size="11" fill="#3a4a6a" text-anchor="end">lincoln-brief.vercel.app</text>
