<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100806"/>
      <stop offset="100%" style="stop-color:#1a0e0c"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d96552;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d96552;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a4030" letter-spacing="2">KR MARKET · MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1010" y="28" width="230" height="36" rx="3" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1125" y="51" font-family="Georgia, serif" font-size="14" fill="#d98070" text-anchor="middle" letter-spacing="1">2026.06.25 · 시장 예측</text>

  <!-- Main headline -->
  <text x="640" y="148" font-family="Georgia, serif" font-size="22" fill="#d98070" text-anchor="middle" letter-spacing="2">KOSPI 9,000선 탐색</text>

  <!-- KOSPI value -->
  <text x="640" y="248" font-family="Georgia, serif" font-size="96" fill="#ffffff" text-anchor="middle" font-weight="bold">8,959.57</text>
  <polygon points="480,272 498,254 516,272" fill="#4ade80"/>
  <text x="528" y="286" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+5.77%</text>
  <text x="640" y="336" font-family="Georgia, serif" font-size="18" fill="#805040" text-anchor="middle">9,000선까지 40.43포인트</text>

  <!-- Divider -->
  <line x1="160" y1="368" x2="1120" y2="368" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <text x="640" y="408" font-family="Georgia, serif" font-size="16" fill="#d98070" text-anchor="middle" letter-spacing="3">4주 시나리오</text>

  <!-- Bull -->
  <rect x="80" y="420" width="260" height="170" rx="4" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="210" y="448" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="middle">🔺 불 · 20%</text>
  <text x="210" y="472" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">9,300~9,500</text>
  <text x="210" y="494" font-family="Georgia, serif" font-size="13" fill="#3a7050" text-anchor="middle">NVDA $200 회복</text>
  <text x="210" y="514" font-family="Georgia, serif" font-size="13" fill="#3a7050" text-anchor="middle">USD/KRW 1,530원대</text>
  <text x="210" y="534" font-family="Georgia, serif" font-size="13" fill="#3a7050" text-anchor="middle">외국인 순매수 전환</text>
  <text x="210" y="574" font-family="Georgia, serif" font-size="12" fill="#2a5040" text-anchor="middle">9,000 돌파 → 탐색</text>

  <!-- Base -->
  <rect x="360" y="420" width="260" height="170" rx="4" fill="#d8b878" fill-opacity="0.04" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="490" y="448" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle">⬛ 베이스 · 45%</text>
  <text x="490" y="472" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">8,700~9,100</text>
  <text x="490" y="494" font-family="Georgia, serif" font-size="13" fill="#907040" text-anchor="middle">고점 저항</text>
  <text x="490" y="514" font-family="Georgia, serif" font-size="13" fill="#907040" text-anchor="middle">NVDA $195~205 박스</text>
  <text x="490" y="534" font-family="Georgia, serif" font-size="13" fill="#907040" text-anchor="middle">추가 촉매 없음</text>
  <text x="490" y="574" font-family="Georgia, serif" font-size="12" fill="#706030" text-anchor="middle">8,959 → 박스 등락</text>

  <!-- Bear -->
  <rect x="640" y="420" width="260" height="170" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="770" y="448" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="middle">🔻 베어 · 30%</text>
  <text x="770" y="472" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">8,400 재테스트</text>
  <text x="770" y="494" font-family="Georgia, serif" font-size="13" fill="#804040" text-anchor="middle">NVDA $190 이하</text>
  <text x="770" y="514" font-family="Georgia, serif" font-size="13" fill="#804040" text-anchor="middle">USD/KRW 1,560원+</text>
  <text x="770" y="534" font-family="Georgia, serif" font-size="13" fill="#804040" text-anchor="middle">외국인 매도 재개</text>
  <text x="770" y="574" font-family="Georgia, serif" font-size="12" fill="#603030" text-anchor="middle">8,959 → 8,700 → 8,400</text>

  <!-- Black Swan -->
  <rect x="920" y="420" width="260" height="170" rx="4" fill="#888888" fill-opacity="0.03" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1050" y="448" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">⬛ 블랙스완 · 5%</text>
  <text x="1050" y="472" font-family="Georgia, serif" font-size="22" fill="#aaaaaa" text-anchor="middle" font-weight="bold">8,000 이하</text>
  <text x="1050" y="494" font-family="Georgia, serif" font-size="13" fill="#555555" text-anchor="middle">글로벌 패닉</text>
  <text x="1050" y="514" font-family="Georgia, serif" font-size="13" fill="#555555" text-anchor="middle">미국 경기 급락</text>

  <!-- Bottom -->
  <line x1="160" y1="612" x2="1120" y2="612" stroke="#d96552" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#d98070" text-anchor="middle">1순위 변수</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#7a4030" text-anchor="middle">USD/KRW 1,545 고착화</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#d98070" text-anchor="middle">2순위 변수</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#7a4030" text-anchor="middle">NVDA $200 회복 여부</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#d98070" text-anchor="middle">3순위 변수</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#7a4030" text-anchor="middle">SK하이닉스 2,919,000 돌파</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d96552" fill-opacity="0.5"/>
</svg>
