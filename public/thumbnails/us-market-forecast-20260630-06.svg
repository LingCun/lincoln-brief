<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0808"/>
      <stop offset="100%" style="stop-color:#1a1010"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#e08040"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="600" fill="#e08040" opacity="0.3"/>

  <!-- Edition label top right -->
  <rect x="990" y="36" width="250" height="32" rx="4" fill="#e08040" opacity="0.15"/>
  <text x="1115" y="57" font-family="Georgia, serif" font-size="13" fill="#e08040" text-anchor="middle" letter-spacing="2">US MARKET FORECAST</text>

  <!-- Date + slot -->
  <text x="88" y="100" font-family="Georgia, serif" font-size="16" fill="#e08040" opacity="0.7" letter-spacing="3">2026.06.30 · SLOT 06</text>

  <!-- Diamond separator -->
  <polygon points="88,118 95,125 88,132 81,125" fill="#e08040"/>

  <!-- Main headline -->
  <text x="88" y="185" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#f0d0b0">Q2 최종일 — Q3 개막</text>
  <text x="88" y="265" font-family="Georgia, serif" font-size="66" font-weight="bold" fill="#e08040">7,440.43</text>
  <text x="88" y="308" font-family="Georgia, serif" font-size="22" fill="#c09070" opacity="0.9">S&amp;P 500 Q2 최종 마감 레벨</text>

  <!-- Divider -->
  <line x1="88" y1="340" x2="720" y2="340" stroke="#e08040" stroke-width="1" opacity="0.4"/>

  <!-- Q2→Q3 badge -->
  <rect x="88" y="352" width="200" height="34" rx="4" fill="#e08040" opacity="0.18"/>
  <text x="188" y="374" font-family="Georgia, serif" font-size="15" fill="#e08040" text-anchor="middle" font-weight="bold">Q2 → Q3 전환</text>

  <!-- FOMC countdown badge -->
  <rect x="308" y="352" width="220" height="34" rx="4" fill="#d8b878" opacity="0.15"/>
  <text x="418" y="374" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="middle" font-weight="bold">FOMC까지 28일</text>

  <!-- Data rows -->
  <text x="88" y="430" font-family="Georgia, serif" font-size="18" fill="#e08040">7/3(목)</text>
  <text x="260" y="430" font-family="Georgia, serif" font-size="18" fill="#f0d8b8">6월 고용보고서</text>
  <text x="560" y="430" font-family="Georgia, serif" font-size="15" fill="#d0a880">Q3 첫 분기점</text>

  <text x="88" y="466" font-family="Georgia, serif" font-size="18" fill="#e08040">US10Y</text>
  <text x="260" y="466" font-family="Georgia, serif" font-size="18" fill="#f0d8b8">4.38%</text>
  <text x="380" y="466" font-family="Georgia, serif" font-size="16" fill="#c0a080">긴축 기조 유지</text>

  <text x="88" y="502" font-family="Georgia, serif" font-size="18" fill="#e08040">WTI</text>
  <text x="260" y="502" font-family="Georgia, serif" font-size="18" fill="#f0d8b8">$70.42</text>
  <polygon points="380,483 398,507 362,507" fill="#52c87a"/>
  <text x="406" y="502" font-family="Georgia, serif" font-size="16" fill="#52c87a">+1.72% (이란 변수)</text>

  <!-- Scenario table header -->
  <text x="88" y="548" font-family="Georgia, serif" font-size="16" fill="#e08040" opacity="0.8">베이스(45%): S&amp;P 7,300~7,600 박스 · 실적 시즌이 방향 결정</text>

  <text x="88" y="580" font-family="Georgia, serif" font-size="16" fill="#c09070" opacity="0.7">불(20%): 7,600~7,800 · AI 실적 서프라이즈</text>
  <text x="88" y="608" font-family="Georgia, serif" font-size="16" fill="#c09070" opacity="0.7">이란 확전(25%): 7,000~7,200 · WTI $73+ 돌파</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#e08040" opacity="0.07"/>
  <text x="88" y="706" font-family="Georgia, serif" font-size="14" fill="#e08040" opacity="0.6">lincoln-brief.vercel.app</text>
  <text x="1192" y="706" font-family="Georgia, serif" font-size="14" fill="#e08040" opacity="0.6" text-anchor="end">— Lincoln</text>
</svg>
