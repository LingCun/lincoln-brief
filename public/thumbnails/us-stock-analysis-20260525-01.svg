  <text x="80" y="345" font-family="Playfair Display, Georgia, serif" font-size="44" font-style="italic" fill="url(#blue)">52주 고점 $311.40 직전 · AI 재평가</text>
  <text x="80" y="395" font-family="Pretendard, sans-serif" font-size="18" fill="#7a9ab8">+1.26%  ·  30일 +19.1%  ·  시총 $4.54조  ·  P/E 37.43</text>

