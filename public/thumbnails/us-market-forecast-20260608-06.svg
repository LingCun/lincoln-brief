<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180808"/>
      <stop offset="100%" stop-color="#0a0505"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87868"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04838"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8b0a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.08 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— FOMC(6/11) D-3 시나리오 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="700" fill="#ffe0d8">FOMC(6/11) D-3</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#red)">점도표 4가지 시나리오 · S&amp;P 500 방향 예측</text>
  <text x="80" y="370" font-family="sans-serif" font-size="18" fill="#b07868">금리 동결 확정  |  연내 인하 횟수가 변수  |  파월 발언 방향</text>

  <!-- 시나리오 테이블 -->
  <g transform="translate(80, 430)">
    <!-- 강한 비둘기 -->
    <g>
      <rect x="0" y="0" width="240" height="110" rx="6" fill="#1a1010" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.5"/>
      <text x="12" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#d96552">DOVISH</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="24" fill="#ffe0d8">10%</text>
      <text x="12" y="76" font-family="monospace" font-size="11" fill="#b07868">연내 2회+ 인하 신호</text>
      <text x="12" y="98" font-family="monospace" font-size="10" fill="#907060">강한 기술주 랠리</text>
    </g>
    <!-- 온건 비둘기 -->
    <g transform="translate(255, 0)">
      <rect x="0" y="0" width="240" height="110" rx="6" fill="#1a1010" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.7"/>
      <text x="12" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#d96552">MILD DOVE</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="24" fill="#ffe0d8">30%</text>
      <text x="12" y="76" font-family="monospace" font-size="11" fill="#b07868">연내 1회 인하 점도표</text>
      <text x="12" y="98" font-family="monospace" font-size="10" fill="#907060">7,400~7,500 방향</text>
    </g>
    <!-- 중립 (베이스) -->
    <g transform="translate(510, 0)">
      <rect x="0" y="0" width="240" height="110" rx="6" fill="#251510" stroke="#d96552" stroke-width="1.5"/>
      <text x="12" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#d96552">NEUTRAL ★베이스</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="24" fill="#ffe0d8">45%</text>
      <text x="12" y="76" font-family="monospace" font-size="11" fill="#d08878">0회 + 데이터 의존</text>
      <text x="12" y="98" font-family="monospace" font-size="10" fill="#b08070">7,200~7,400 횡보</text>
    </g>
    <!-- 매파 -->
    <g transform="translate(765, 0)">
      <rect x="0" y="0" width="240" height="110" rx="6" fill="#1a1010" stroke="#c06060" stroke-width="0.5" stroke-opacity="0.7"/>
      <text x="12" y="24" font-family="monospace" font-size="10" letter-spacing="2" fill="#c06060">HAWKISH</text>
      <text x="12" y="52" font-family="Georgia, serif" font-size="24" fill="#ffe0d8">15%</text>
      <text x="12" y="76" font-family="monospace" font-size="11" fill="#a06060">0회 + 인상 여지 언급</text>
      <text x="12" y="98" font-family="monospace" font-size="10" fill="#804040">7,200 이하 테스트</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="580" x2="1200" y2="580" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="608" font-family="monospace" font-size="11" fill="#704838" letter-spacing="2">S&amp;P 7,383.74 · NASDAQ 25,709.43 · US10Y 4.536% · AVGO −7.92%</text>
  <text x="80" y="635" font-family="monospace" font-size="10" fill="#503028">SLOT 06 · MARKET FORECAST · lincoln-brief.vercel.app</text>
</svg>
