<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18100d"/>
      <stop offset="100%" stop-color="#100807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#cc8844" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc8844" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="140" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.28 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="380" height="30" rx="4" fill="#cc8844" fill-opacity="0.20" stroke="#cc8844" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#cc8844">원화 1,500원 재이탈 · 3일 강세 반전</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">USD/KRW 1,507</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">원화 강세 모멘텀 반전</text>
  <text x="80" y="398" font-family="sans-serif" font-size="17" fill="#a88a78">Frankfurter 전일 1,499.7원 → 오늘 1,507.88원 · KOSPI 동반 하락</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#4a3020" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- USD/KRW 오늘 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW 오늘</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,507원</text>
      <polygon points="0,72 14,88 28,72" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#cc8844">+0.16%</text>
    </g>
    <!-- 전일 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">전일 (Frankfurter)</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,499원</text>
    </g>
    <!-- KOSPI -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI 당일</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">7,939</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−3.51%</text>
    </g>
    <!-- 10년물 -->
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">미국 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.481%</text>
      <polygon points="0,88 14,72 28,88" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.27%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#100a08" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#7a6858">1,500원 재돌파 여부가 외국인 수급 방향 선행 지표 · WTI $92.32 +4.10%</text>
</svg>
