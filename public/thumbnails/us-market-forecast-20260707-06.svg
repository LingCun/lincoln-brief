<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1512"/>
      <stop offset="100%" stop-color="#120b09"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#d9655200"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left red bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d96552" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#e8917f" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#d96552" letter-spacing="2">US MARKET · 시장 예측</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#e8917f" opacity="0.7" text-anchor="end">2026.07.07 · SLOT 06</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="end">금리 재조정 경고음</text>

  <!-- Main headline -->
  <text x="84" y="200" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff">52주 고점 더 가까이</text>
  <text x="84" y="240" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff">금리 변수 재부각</text>

  <!-- S&P 500 main data -->
  <text x="84" y="308" font-family="Georgia, serif" font-size="28" fill="#e8917f">S&amp;P 500</text>
  <text x="250" y="308" font-family="Georgia, serif" font-size="28" fill="#ffffff">7,537.43</text>
  <polygon points="440,290 460,290 450,308" fill="#6ec46e"/>
  <text x="468" y="308" font-family="Georgia, serif" font-size="24" fill="#6ec46e">+0.72%</text>

  <!-- Divider line -->
  <rect x="84" y="328" width="700" height="1" fill="#d96552" opacity="0.3"/>

  <!-- Level map -->
  <text x="84" y="368" font-family="Georgia, serif" font-size="20" fill="#8a94a6">52주 고점권</text>
  <text x="280" y="368" font-family="Georgia, serif" font-size="20" fill="#ffffff">7,620</text>

  <text x="84" y="402" font-family="Georgia, serif" font-size="20" fill="#e8917f">현재 위치</text>
  <text x="280" y="402" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">7,537.43</text>

  <text x="84" y="436" font-family="Georgia, serif" font-size="20" fill="#8a94a6">ISM 고용지수</text>
  <text x="280" y="436" font-family="Georgia, serif" font-size="20" fill="#ffffff">47.9 → 51.2</text>

  <!-- Divider -->
  <rect x="84" y="462" width="700" height="1" fill="#d96552" opacity="0.2"/>

  <!-- Schedule -->
  <text x="84" y="500" font-family="Georgia, serif" font-size="20" fill="#e8917f">연내 상단 시나리오</text>
  <text x="340" y="500" font-family="Georgia, serif" font-size="20" fill="#ffffff">8,800</text>

  <text x="84" y="534" font-family="Georgia, serif" font-size="20" fill="#e8917f">FOMC</text>
  <text x="240" y="534" font-family="Georgia, serif" font-size="20" fill="#ffffff">7/28~29</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="562" width="700" height="1" fill="#d96552" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="596" font-family="Georgia, serif" font-size="18" fill="#e8917f" opacity="0.85">베이스(40%) S&amp;P 7,450~7,650 · 사전 10~20% 조정 경고도 공존</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,634 92,626 100,634 92,642" fill="#d96552" opacity="0.5"/>
</svg>
