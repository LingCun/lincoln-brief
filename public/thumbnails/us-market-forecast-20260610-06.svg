<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87060"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#c05040"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="150" r="380" fill="url(#glow1)"/>

  <!-- 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8a890">Lincoln</text>
  <text x="314" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.10 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="170" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— FOMC 오늘 밤 · 시나리오 시뮬레이션 —</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="252" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#f0e0d8">FOMC</text>
  <text x="80" y="318" font-family="Georgia, serif" font-size="36" font-weight="500" fill="url(#red)">점도표 4가지 시나리오</text>

  <!-- 서브 헤드라인 -->
  <text x="80" y="370" font-family="sans-serif" font-size="18" fill="#b09088">S&amp;P 7,386.65 기준  |  US10Y 4.528%  |  결과 6/11 KST 새벽</text>

  <!-- 시나리오 테이블 -->
  <g transform="translate(80, 410)">
    <!-- 비둘기 -->
    <rect x="0" y="0" width="260" height="72" rx="4" fill="#2a4020" fill-opacity="0.8" stroke="#7ac080" stroke-width="0.8"/>
    <text x="12" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#7ac080">온건 비둘기  25%</text>
    <text x="12" y="48" font-family="Georgia, serif" font-size="20" fill="#e0f0e0">7,450~7,500</text>
    <text x="12" y="65" font-family="monospace" font-size="11" fill="#7ac080">연내 2회+ 인하 시사</text>

    <!-- 중립 -->
    <rect x="280" y="0" width="260" height="72" rx="4" fill="#282820" fill-opacity="0.8" stroke="#d8b878" stroke-width="0.8"/>
    <text x="292" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b878">중립 (베이스)  50%</text>
    <text x="292" y="48" font-family="Georgia, serif" font-size="20" fill="#f0e8d0">7,350~7,420</text>
    <text x="292" y="65" font-family="monospace" font-size="11" fill="#d8b878">동결 + 데이터 의존</text>

    <!-- 매파 -->
    <rect x="560" y="0" width="260" height="72" rx="4" fill="#2a1414" fill-opacity="0.8" stroke="#c04040" stroke-width="0.8"/>
    <text x="572" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#c04040">매파  20%</text>
    <text x="572" y="48" font-family="Georgia, serif" font-size="20" fill="#f0d0d0">7,200~7,300</text>
    <text x="572" y="65" font-family="monospace" font-size="11" fill="#c04040">인하 시그널 없음</text>

    <!-- 블랙스완 -->
    <rect x="840" y="0" width="200" height="72" rx="4" fill="#161616" fill-opacity="0.8" stroke="#808080" stroke-width="0.8"/>
    <text x="852" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#909090">블랙스완  5%</text>
    <text x="852" y="48" font-family="Georgia, serif" font-size="20" fill="#d0d0d0">7,000↓</text>
    <text x="852" y="65" font-family="monospace" font-size="11" fill="#808080">급변동 시나리오</text>
  </g>

  <!-- 파월 기자회견 -->
  <rect x="80" y="530" width="700" height="46" rx="4" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="0.8"/>
  <text x="100" y="559" font-family="monospace" font-size="14" letter-spacing="2" fill="#d96552">파월 기자회견  6/11 KST 03:30  |  점도표 연내 인하 횟수가 핵심</text>

  <!-- 하단 보조 수치 -->
  <text x="80" y="642" font-family="monospace" font-size="12" fill="#706060">WTI $88.70(-2.85%)  |  USD/KRW 1,525.12(-0.25%)  |  BTC $61,812(-2.03%)</text>
  <text x="80" y="672" font-family="monospace" font-size="12" fill="#706060">AAPL $290.55(-3.64%)  |  TSLA $396.68(-3.00%)  |  NVDA $208.19(-0.22%)</text>

  <!-- 우하단 다이아몬드 -->
  <polygon points="1200,690 1215,678 1230,690 1215,702" fill="none" stroke="#d96552" stroke-width="1.2"/>
</svg>
