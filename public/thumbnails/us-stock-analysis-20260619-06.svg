<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1320"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2d8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5590"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="240" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#dce8f5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.19 · STOCK ANALYSIS · 06:00</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— JPMorgan Chase —</text>
  <text x="80" y="265" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#dce8f5">JPM $325.22</text>
  <text x="80" y="335" font-family="Georgia, serif" font-size="54" font-style="italic" fill="url(#blue)">−2.47% 최대 낙폭</text>
  <text x="80" y="390" font-family="sans-serif" font-size="18" fill="#7a92b0">AI 랠리 속 은행 대장주 역행 — 섹터 분화 신호</text>

  <!-- 3종목 비교 -->
  <g transform="translate(80, 450)">
    <!-- JPM -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a92b0">FINANCE · JPM</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="36" fill="#dce8f5">$325.22</text>
      <polygon points="0,82 14,82 7,96" fill="#d96552"/>
      <text x="22" y="89" font-family="monospace" font-size="16" fill="#d96552">−2.47%</text>
    </g>
    <!-- AVGO 비교 -->
    <g transform="translate(320, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a92b0">AI CHIP · AVGO</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="36" fill="#dce8f5">$411.35</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="16" fill="#6ba368">+4.70%</text>
    </g>
    <!-- S&P 500 -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a92b0">INDEX · S&amp;P 500</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="36" fill="#dce8f5">7,500.58</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="16" fill="#6ba368">+1.08%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(960, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a92b0">RATE · US10Y</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="36" fill="#dce8f5">4.451%</text>
      <polygon points="0,82 14,82 7,96" fill="#6ba368"/>
      <text x="22" y="89" font-family="monospace" font-size="16" fill="#6ba368">−0.80%</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#5677b0" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a92b0">JPM 30일 고점 $333.46 · 30일 저점 $295.70 · 현재 $325.22(−2.5% from 고점)</text>
</svg>
