<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8856b"/>
      <stop offset="100%" stop-color="#a04a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 장식: 5/15 폭락 → 5/18 박스 진입 라인 -->
  <g transform="translate(860, 235)" opacity="0.65">
    <!-- 5/14 8000 / 5/15 폭락 7493 / 5/18 박스 7418 -->
    <polyline points="0,40 80,5 160,150 240,170 320,165"
              fill="none" stroke="url(#redGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 5/14 -->
    <circle cx="0" cy="40" r="4" fill="#d8b878" opacity="0.7"/>
    <text x="0" y="25" font-family="monospace" font-size="10" letter-spacing="2" fill="#d8b878" text-anchor="middle" opacity="0.7">5/14</text>
    <!-- 5/15 고점 -->
    <circle cx="80" cy="5" r="5" fill="#f0d88c"/>
    <text x="80" y="-10" font-family="monospace" font-size="11" letter-spacing="2" fill="#f0d88c" text-anchor="middle">8,046 HIGH</text>
    <!-- 5/15 종가 -->
    <circle cx="160" cy="150" r="4" fill="#e8856b" opacity="0.8"/>
    <text x="160" y="170" font-family="monospace" font-size="10" letter-spacing="2" fill="#e8856b" text-anchor="middle" opacity="0.85">7,493</text>
    <!-- 5/18 종가 (오늘) -->
    <circle cx="320" cy="165" r="6" fill="#f5edd9"/>
    <text x="320" y="148" font-family="monospace" font-size="11" letter-spacing="2" fill="#f5edd9" text-anchor="middle">5/18 · 7,418</text>
  </g>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · DAILY BRIEF</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 2026.05.18 · MONDAY AFTER —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">공포의 다음 날</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="48" font-style="italic" fill="url(#goldGrad)">7,418, 박스의 첫 자리</text>

  <!-- 부제 -->
  <text x="80" y="425" font-family="Pretendard, sans-serif" font-size="20" fill="#c4b89e">외국인 매도 강도 -78% 약화 · 27만·180만 라인 *시험 후 사수*</text>

  <!-- 좌하단 데이터 -->
  <g transform="translate(80, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">KOSPI</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">7,418</text>
    <polygon points="0,76 12,76 6,90" fill="#e8856b"/>
    <text x="20" y="88" font-family="monospace" font-size="13" fill="#e8856b">−1.00%</text>
  </g>

  <g transform="translate(260, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">KOSDAQ</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">1,118</text>
    <polygon points="0,76 12,76 6,90" fill="#e8856b"/>
    <text x="20" y="88" font-family="monospace" font-size="13" fill="#e8856b">−1.01%</text>
  </g>

  <g transform="translate(440, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">USD/KRW</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">1,501</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">1,500 안착 중</text>
  </g>

  <g transform="translate(640, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">외국인 매도</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#e8856b">−1.20조</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">8거래일 연속</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.18 · 15:30 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">KOSPI · BOX ENTRY</text>
</svg>
