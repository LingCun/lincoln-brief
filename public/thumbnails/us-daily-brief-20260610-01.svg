      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">WTI</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">$86.54</text>
      <polygon points="0,90 14,90 7,104" fill="#c04040"/>
      <text x="22" y="103" font-family="monospace" font-size="13" fill="#c04040">−5.21%</text>
    </g>
    <!-- BRK-B -->
    <g transform="translate(620, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#60a060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">BRK-B</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">$490.57</text>
      <polygon points="0,90 14,90 7,76" fill="#60a060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#60a060">+0.73%</text>
