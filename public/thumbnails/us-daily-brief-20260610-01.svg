      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">25,160</text>
      <polygon points="0,90 14,90 7,104" fill="#c04040"/>
      <text x="22" y="103" font-family="monospace" font-size="13" fill="#c04040">−2.97%</text>
    </g>
    <!-- WTI -->
