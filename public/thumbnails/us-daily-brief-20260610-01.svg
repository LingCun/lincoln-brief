  <text x="80" y="650" font-family="monospace" font-size="11" fill="#a09060">방어주 선방 (BRK-B +0.73% · WMT +0.48%) — 기술주 전면 후퇴</text>
  <text x="1200" y="650" font-family="monospace" font-size="11" fill="#d8b878" text-anchor="end">© Lincoln Brief</text>
