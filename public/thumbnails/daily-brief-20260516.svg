<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="darkOverlay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0.94"/>
      <stop offset="55%" stop-color="#140a08" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a0907" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0907" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4a06a"/>
      <stop offset="60%" stop-color="#e87053"/>
      <stop offset="100%" stop-color="#b8442e"/>
    </linearGradient>
  </defs>

  <image href="/thumbnails/photos/nasdaq-marketsite.jpg" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="720" fill="url(#darkOverlay)"/>
  <rect x="0" y="0"   width="1280" height="120" fill="url(#topFade)"/>
  <rect x="0" y="600" width="1280" height="120" fill="url(#bottomFade)"/>

  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.16 · DAILY BRIEF</text>

  <text x="80" y="270" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 美 5월 15일 NY 마감 —</text>

  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="500" fill="#f5edd9">신고가에서</text>
  <text x="80" y="445" font-family="Playfair Display, Georgia, serif" font-size="92" font-style="italic" fill="url(#redAccent)">−1.5%</text>

  <text x="80" y="510" font-family="Pretendard, sans-serif" font-size="22" fill="#c4b89e">반도체 직격, VIX 18선 복귀, 10년물 4.6% 근접</text>
  <text x="80" y="544" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">봄 랠리 시작 이후 3대 지수 첫 동반 −1% 마감</text>

  <g transform="translate(940, 470)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#e87053" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">S&amp;P 500 CLOSE</text>
    <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="44" fill="#f5edd9">7,408.50</text>
    <text x="0" y="100" font-family="monospace" font-size="14" fill="#e87053">−1.24% / −92.74</text>
  </g>

  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.16 SAT · 07:00 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">PHOTO · UNSPLASH</text>
