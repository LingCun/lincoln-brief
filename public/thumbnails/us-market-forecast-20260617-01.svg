<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#1a1010"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#d96552"/>

  <!-- Left red glow -->
  <rect x="0" y="0" width="520" height="720" fill="url(#red-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#d96552" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1100" y="28" width="132" height="36" rx="4" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1166" y="52" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="1">2026.06.17 — 4주 전망</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#d96552" fill-opacity="0.2"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="1">시장 예측</text>

  <!-- S&P current level -->
  <text x="48" y="220" font-family="Georgia, serif" font-size="52" fill="#ffffff" font-weight="bold">S&amp;P 7,529</text>
  <polygon points="332,225 350,225 341,244" fill="#d96552"/>
  <text x="357" y="218" font-family="Georgia, serif" font-size="28" fill="#d96552" font-weight="bold">−0.32%</text>

  <!-- 7,500 breakout context -->
  <rect x="48" y="240" width="380" height="44" rx="5" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-width="1" stroke-opacity="0.35"/>
  <text x="238" y="268" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="middle">7,500 돌파 이후 첫 조정 세션</text>

  <!-- Scenario probability bars -->
  <text x="48" y="324" font-family="Georgia, serif" font-size="14" fill="#8a6a5a" letter-spacing="2">4주 시나리오 확률</text>
  <rect x="48" y="332" width="80" height="1" fill="#d96552" opacity="0.4"/>

  <!-- Scenario 1: Bull -->
  <text x="48" y="368" font-family="Georgia, serif" font-size="14" fill="#4adc7a">비둘기 랠리</text>
  <rect x="168" y="352" width="220" height="24" rx="3" fill="#4adc7a" fill-opacity="0.65"/>
  <text x="396" y="370" font-family="Georgia, serif" font-size="16" fill="#4adc7a" font-weight="bold">35%</text>
  <text x="444" y="370" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,600~7,800</text>

  <!-- Scenario 2: Base -->
  <text x="48" y="410" font-family="Georgia, serif" font-size="14" fill="#c0b090">박스권 조정</text>
  <rect x="168" y="394" width="248" height="24" rx="3" fill="#c0b090" fill-opacity="0.5"/>
  <text x="424" y="412" font-family="Georgia, serif" font-size="16" fill="#c0b090" font-weight="bold">40%</text>
  <text x="472" y="412" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,400~7,600</text>

  <!-- Scenario 3: Bear -->
  <text x="48" y="452" font-family="Georgia, serif" font-size="14" fill="#d96552">테크 주도 조정</text>
  <rect x="168" y="436" width="124" height="24" rx="3" fill="#d96552" fill-opacity="0.5"/>
  <text x="300" y="454" font-family="Georgia, serif" font-size="16" fill="#d96552" font-weight="bold">20%</text>
  <text x="348" y="454" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,200~7,400</text>

  <!-- Scenario 4: Black Swan -->
  <text x="48" y="494" font-family="Georgia, serif" font-size="14" fill="#888888">블랙 스완</text>
  <rect x="168" y="478" width="32" height="24" rx="3" fill="#888888" fill-opacity="0.4"/>
  <text x="208" y="496" font-family="Georgia, serif" font-size="16" fill="#888888" font-weight="bold">5%</text>
  <text x="248" y="496" font-family="Georgia, serif" font-size="13" fill="#8a6a5a">7,000 이하</text>

  <!-- Key variables -->
  <text x="48" y="550" font-family="Georgia, serif" font-size="13" fill="#8a6a5a" letter-spacing="1">핵심 관찰 변수</text>
  <text x="48" y="574" font-family="Georgia, serif" font-size="14" fill="#c0b090">① US10Y 4.4% 이하 진입 여부</text>
  <text x="48" y="598" font-family="Georgia, serif" font-size="14" fill="#c0b090">② AVGO·NVDA 반등 vs 추가 하락</text>
  <text x="48" y="622" font-family="Georgia, serif" font-size="14" fill="#c0b090">③ WTI $75 지지 여부</text>

  <!-- Right panel -->
  <rect x="780" y="80" width="1" height="560" fill="#d96552" opacity="0.1"/>

  <!-- Right: DOW vs NASDAQ divergence context -->
  <text x="820" y="155" font-family="Georgia, serif" font-size="19" fill="#d96552" font-weight="bold">디버전스 해소 방향</text>
  <rect x="820" y="167" width="200" height="1.5" fill="#d96552" opacity="0.3"/>

  <text x="820" y="206" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">DOW</text>
  <rect x="870" y="191" width="200" height="22" rx="3" fill="#4adc7a" fill-opacity="0.7"/>
  <text x="1078" y="208" font-family="Georgia, serif" font-size="14" fill="#4adc7a" font-weight="bold">+0.78%</text>

  <text x="820" y="250" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">S&amp;P</text>
  <rect x="870" y="235" width="18" height="22" rx="3" fill="#d96552" fill-opacity="0.7"/>
  <text x="896" y="252" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">−0.32%</text>

  <text x="820" y="294" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">NASDAQ</text>
  <rect x="900" y="279" width="34" height="22" rx="3" fill="#d96552" fill-opacity="0.7"/>
  <text x="942" y="296" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">−0.57%</text>

  <!-- Key macro support -->
  <rect x="820" y="330" width="400" height="80" rx="5" fill="#d8b878" fill-opacity="0.06" stroke="#d8b878" stroke-width="1" stroke-opacity="0.25"/>
  <text x="836" y="356" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">WTI</text>
  <text x="880" y="356" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold">$75.07</text>
  <text x="980" y="356" font-family="Georgia, serif" font-size="14" fill="#d96552">−7.03%</text>
  <text x="836" y="388" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">US10Y</text>
  <text x="900" y="388" font-family="Georgia, serif" font-size="18" fill="#4adc7a" font-weight="bold">4.426%</text>
  <text x="990" y="388" font-family="Georgia, serif" font-size="12" fill="#4adc7a">→ 4.4% 목전</text>

  <!-- DOW milestone -->
  <rect x="820" y="440" width="380" height="60" rx="5" fill="#4adc7a" fill-opacity="0.06" stroke="#4adc7a" stroke-width="1" stroke-opacity="0.25"/>
  <text x="836" y="466" font-family="Georgia, serif" font-size="14" fill="#8a6a5a">DOW 마일스톤</text>
  <text x="836" y="490" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">52,075</text>
  <text x="990" y="490" font-family="Georgia, serif" font-size="14" fill="#4adc7a">52,000 첫 돌파</text>

  <!-- Bottom bar -->
  <rect x="0" y="648" width="1280" height="72" fill="#000000" fill-opacity="0.3"/>
  <text x="640" y="690" font-family="Georgia, serif" font-size="16" fill="#d96552" text-anchor="middle" letter-spacing="2">7,500 이후 첫 조정 — 비둘기 랠리(35%) vs 박스권(40%) 분기점</text>
</svg>
