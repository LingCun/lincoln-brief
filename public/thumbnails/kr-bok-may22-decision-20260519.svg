  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.19 · MARKET FORECAST</text>

  <text x="80" y="170" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 · BOK D-3 —</text>
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">한은 D-3,</text>
  <text x="80" y="318" font-family="Playfair Display, Georgia, serif" font-size="56" font-style="italic" fill="url(#red)">KOSPI 7,000~7,500 박스</text>
  <text x="80" y="360" font-family="Pretendard, sans-serif" font-size="17" fill="#988e72">5/22 한은의 한 문장이 다음 한 달 박스 높이를 정한다</text>

  <g transform="translate(80, 410)" font-family="monospace">
