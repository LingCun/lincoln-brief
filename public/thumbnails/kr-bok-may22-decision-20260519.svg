    <g transform="translate(0, 30)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f5edd9">BASE · 박스 정착</text>
      <rect x="220" y="0" width="450" height="18" fill="url(#barRed)" rx="2"/>
      <text x="685" y="14" font-size="14" fill="#e88477" font-weight="600">45%</text>
      <text x="745" y="14" font-size="11" fill="#988e72">→ 7,100 ~ 7,500</text>
    </g>

    <g transform="translate(0, 60)">
