      <rect x="220" y="0" width="250" height="18" fill="url(#barRed)" rx="2"/>
      <text x="485" y="14" font-size="14" fill="#e88477" font-weight="600">25%</text>
      <text x="545" y="14" font-size="11" fill="#988e72">→ 6,500 ~ 7,000</text>
    </g>

    <g transform="translate(0, 90)">
