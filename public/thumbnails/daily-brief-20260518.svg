<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.18 · DAILY BRIEF</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 5월 18일 미국 시장 —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f5edd9">NVDA D-2,</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="62" font-style="italic" fill="url(#gold)">4섹터가 갈라섰다</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">방향성이 아니라 분기점이 가격에 들어온 하루</text>

  <!-- 4섹터 데이터 그리드 (좌 2 × 우 2) -->
  <g transform="translate(80, 460)">
    <!-- NVDA -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">TECH · NVDA</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">$222.32</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#d96552">−1.33%</text>
    </g>
    <!-- JPM -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">FIN · JPM</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">$300.73</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#6ba368">+0.98%</text>
    </g>
    <!-- UNH -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">HC · UNH</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">$391.13</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#d96552">−0.69%</text>
    </g>
    <!-- XOM -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">ENERGY · XOM</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">$160.49</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#6ba368">+1.63%</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">MAY 18 · 2026 · MON · POST-CLOSE</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
