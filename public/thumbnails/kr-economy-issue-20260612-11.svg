<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081410"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#40c8a0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#40c8a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="440" fill="url(#glow1)"/>
  <circle cx="180" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.12 11:00 KST · KR 경제이슈</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— ECONOMY ISSUE —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="720" height="30" rx="4" fill="#40c8a0" fill-opacity="0.15" stroke="#40c8a0" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#60e8b0">美 CPI 완화 · US10Y -1.74% · 달러 약세 → 원화 강세 구조 전환</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#f5edd9">미국 CPI 완화</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">US10Y 4.463% — 달러가 약해졌다</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#88aaa0">USD/KRW 1,521.57원 · WTI $86.11(-1.82%) · FOMC D-6</text>

  <!-- Divider -->
  <line x1="80" y1="442" x2="1200" y2="442" stroke="#101e18" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 476)">
    <!-- US10Y -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.463%</text>
      <polygon points="0,88 14,72 28,88" fill="#40c8a0"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c8a0">−1.74%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,521.57</text>
      <polygon points="0,88 14,72 28,88" fill="#40c8a0"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c8a0">원화 강세</text>
    </g>
    <!-- WTI -->
    <g transform="translate(500, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$86.11</text>
      <polygon points="0,88 14,72 28,88" fill="#40c8a0"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c8a0">−1.82%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(740, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$4,209.70</text>
      <polygon points="28,88 14,72 0,88" fill="#d8b878"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#d8b878">+2.92%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#304840">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#304840" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
