<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08100a"/>
      <stop offset="100%" stop-color="#101810"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#7a9d6e"/>

  <!-- Left green glow panel -->
  <rect x="0" y="0" width="520" height="720" fill="url(#green-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#7a9d6e" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#7a9d6e" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1092" y="28" width="140" height="36" rx="4" fill="#7a9d6e" fill-opacity="0.12" stroke="#7a9d6e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1162" y="52" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#6a8a6a" letter-spacing="1">2026.06.18 — 6/17 마감</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#7a9d6e" fill-opacity="0.22"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#7a9d6e" text-anchor="middle" letter-spacing="1">경제 이슈</text>

  <!-- Gold hero -->
  <text x="48" y="210" font-family="Georgia, serif" font-size="26" fill="#a0c090" font-weight="bold">Gold 실질금리 하락</text>
  <text x="48" y="276" font-family="Georgia, serif" font-size="64" fill="#ffffff" font-weight="bold">$4,382.60</text>
  <polygon points="48,298 62,298 55,286" fill="#4adc7a"/>
  <text x="72" y="302" font-family="Georgia, serif" font-size="24" fill="#4adc7a" font-weight="bold">+1.19%</text>

  <!-- Divider -->
  <rect x="48" y="328" width="460" height="1" fill="#7a9d6e" opacity="0.3"/>

  <!-- Narrative box -->
  <rect x="48" y="344" width="460" height="90" rx="6" fill="#7a9d6e" fill-opacity="0.08" stroke="#7a9d6e" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="68" y="372" font-family="Georgia, serif" font-size="14" fill="#6a8a6a">골디락스 내러티브</text>
  <text x="68" y="398" font-family="Georgia, serif" font-size="17" fill="#ffffff" font-weight="bold">WTI↓ → CPI↓ → 연준 피벗 기대↑</text>
  <text x="68" y="420" font-family="Georgia, serif" font-size="15" fill="#a0c090">→ 실질금리↓  →  Gold↑</text>

  <!-- US10Y line -->
  <text x="48" y="466" font-family="Georgia, serif" font-size="15" fill="#6a8a6a">US10Y</text>
  <text x="120" y="466" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">4.434%</text>
  <polygon points="274,449 286,449 280,438" fill="#4adc7a" transform="rotate(180 280 443.5)"/>
  <text x="294" y="466" font-family="Georgia, serif" font-size="18" fill="#4adc7a">하락 (6/10 이후 −0.108%p)</text>

  <!-- WTI stable -->
  <text x="48" y="504" font-family="Georgia, serif" font-size="15" fill="#6a8a6a">WTI</text>
  <text x="98" y="504" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">$75.58</text>
  <text x="220" y="504" font-family="Georgia, serif" font-size="16" fill="#c0c0c0">안정 유지 (6/10: $91.85 대비 −17.7%)</text>

  <!-- Right column divider -->
  <rect x="570" y="90" width="2" height="540" fill="#7a9d6e" opacity="0.2"/>

  <!-- Right: three asset matrix -->
  <text x="610" y="140" font-family="Georgia, serif" font-size="14" fill="#6a8a6a" letter-spacing="2">6/10 이후 자산 반응</text>
  <rect x="610" y="150" width="80" height="1" fill="#7a9d6e" opacity="0.4"/>

  <text x="610" y="198" font-family="Georgia, serif" font-size="16" fill="#a0c090">WTI</text>
  <text x="700" y="198" font-family="Georgia, serif" font-size="24" fill="#e05c5c" font-weight="bold">−17.7%</text>
  <text x="610" y="220" font-family="Georgia, serif" font-size="13" fill="#6a8a6a">에너지 공급 정상화 → 인플레이션 완화</text>

  <rect x="610" y="236" width="590" height="1" fill="#7a9d6e" opacity="0.15"/>

  <text x="610" y="270" font-family="Georgia, serif" font-size="16" fill="#a0c090">US10Y</text>
  <text x="700" y="270" font-family="Georgia, serif" font-size="24" fill="#4adc7a" font-weight="bold">−0.108%p</text>
  <text x="610" y="292" font-family="Georgia, serif" font-size="13" fill="#6a8a6a">연준 피벗 기대 선행 반영</text>

  <rect x="610" y="308" width="590" height="1" fill="#7a9d6e" opacity="0.15"/>

  <text x="610" y="342" font-family="Georgia, serif" font-size="16" fill="#a0c090">Gold</text>
  <text x="700" y="342" font-family="Georgia, serif" font-size="24" fill="#4adc7a" font-weight="bold">+7.8%</text>
  <text x="610" y="364" font-family="Georgia, serif" font-size="13" fill="#6a8a6a">실질금리 하락 → 안전자산 수요 증가</text>

  <rect x="610" y="380" width="590" height="1" fill="#7a9d6e" opacity="0.25"/>

  <!-- Risk threshold -->
  <text x="610" y="415" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">역전 임계점</text>
  <text x="610" y="440" font-family="Georgia, serif" font-size="14" fill="#6a8a6a">WTI $80+ 반등 → 인플레이션 재발 우려</text>
  <text x="610" y="464" font-family="Georgia, serif" font-size="14" fill="#6a8a6a">US10Y 4.55%+ 상승 → 골디락스 역전</text>

  <rect x="610" y="482" width="590" height="1" fill="#7a9d6e" opacity="0.15"/>

  <!-- BTC note -->
  <text x="610" y="516" font-family="Georgia, serif" font-size="14" fill="#6a8a6a">BTC $65,936 (+0.51%) · USD/KRW 1,514.94</text>

  <!-- Bottom signature -->
  <text x="610" y="640" font-family="Georgia, serif" font-size="13" fill="#3a6a3a" letter-spacing="1">lincoln-brief.vercel.app</text>
  <text x="48" y="680" font-family="Georgia, serif" font-size="12" fill="#203020">※ 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
