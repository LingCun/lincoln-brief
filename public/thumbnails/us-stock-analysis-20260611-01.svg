  <rect x="346" y="390" width="280" height="100" rx="6" fill="#0d1828" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="486" y="420" font-family="'Arial', sans-serif" font-size="12" fill="#888" text-anchor="middle" letter-spacing="1">30일 시작가</text>
  <text x="486" y="458" font-family="'Georgia', serif" font-size="30" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$405.45</text>
  <text x="486" y="480" font-family="'Arial', sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">시작가 대비 −7.7%</text>

