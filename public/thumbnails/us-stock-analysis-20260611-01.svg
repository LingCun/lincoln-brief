  <text x="68" y="625" font-family="'Arial', sans-serif" font-size="10" fill="#666" text-anchor="middle">418</text>
  <rect x="102" y="589" width="40" height="25" rx="2" fill="#ef4444" opacity="0.7"/>
  <text x="122" y="625" font-family="'Arial', sans-serif" font-size="10" fill="#666" text-anchor="middle">385</text>
  <rect x="156" y="577" width="40" height="37" rx="2" fill="#ef4444" opacity="0.5"/>
  <text x="176" y="625" font-family="'Arial', sans-serif" font-size="10" fill="#666" text-anchor="middle">396</text>
  <rect x="210" y="580" width="40" height="34" rx="2" fill="#ef4444" opacity="0.5"/>
  <text x="230" y="625" font-family="'Arial', sans-serif" font-size="10" fill="#666" text-anchor="middle">392</text>
  <rect x="264" y="614" width="40" height="0" rx="2" fill="#ef4444" opacity="0.9"/>
  <rect x="264" y="614" width="40" height="1" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="284" y="625" font-family="'Arial', sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">374 ▼</text>

