  <text x="188" y="458" font-family="'Georgia', serif" font-size="30" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$481.57</text>
  <text x="188" y="480" font-family="'Arial', sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">고점 대비 −22.3%</text>

