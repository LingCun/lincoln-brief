  <rect x="960" y="160" width="280" height="500" rx="8" fill="#080f1c" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="1100" y="195" font-family="'Arial', sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" letter-spacing="2">MACRO CONTEXT</text>
  <line x1="980" y1="205" x2="1220" y2="205" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

  <text x="980" y="235" font-family="'Arial', sans-serif" font-size="13" fill="#888">FOMC</text>
  <text x="1220" y="235" font-family="'Arial', sans-serif" font-size="14" fill="#ef4444" text-anchor="end">매파 점도표</text>
  <text x="980" y="270" font-family="'Arial', sans-serif" font-size="13" fill="#888">US10Y</text>
  <text x="1220" y="270" font-family="'Arial', sans-serif" font-size="14" fill="#d8b878" text-anchor="end">4.542%</text>
  <text x="980" y="305" font-family="'Arial', sans-serif" font-size="13" fill="#888">WTI</text>
  <text x="1220" y="305" font-family="'Arial', sans-serif" font-size="14" fill="#f97316" text-anchor="end">$91.34 +3.56%</text>
  <text x="980" y="340" font-family="'Arial', sans-serif" font-size="13" fill="#888">S&amp;P 500</text>
  <text x="1220" y="340" font-family="'Arial', sans-serif" font-size="14" fill="#ef4444" text-anchor="end">7,302 −1.14%</text>

  <line x1="980" y1="360" x2="1220" y2="360" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <text x="980" y="390" font-family="'Arial', sans-serif" font-size="12" fill="#666">고PER 반도체 할인율 압박</text>
  <text x="980" y="415" font-family="'Arial', sans-serif" font-size="12" fill="#666">AI 인프라 투자 사이클</text>
  <text x="980" y="440" font-family="'Arial', sans-serif" font-size="12" fill="#666">경계감 고조</text>

  <!-- Bottom -->
  <rect x="0" y="717" width="1280" height="3" fill="#3b82f6" opacity="0.4"/>
  <text x="1232" y="700" font-family="'Georgia', serif" font-size="16" fill="#3b82f6" text-anchor="end" opacity="0.7">— Lincoln</text>
