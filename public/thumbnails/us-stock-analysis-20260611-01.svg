  <!-- LINCOLN BRIEF -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#3b82f6" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label -->
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="#3b82f6" opacity="0.15"/>
