<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#120806"/>
      <stop offset="100%" style="stop-color:#1e100c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left red accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d96552"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#d96552" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#d96552" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="#d96552" opacity="0.15"/>
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="none" stroke="#d96552" stroke-width="1" opacity="0.5"/>
  <text x="1140" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#d96552" text-anchor="middle">MARKET FORECAST</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#8a6a66" letter-spacing="1">2026.06.12  |  SLOT 01  |  KST 01:00</text>

  <!-- Divider line -->
  <line x1="48" y1="110" x2="640" y2="110" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <!-- Main headline -->
  <text x="48" y="190" font-family="'Georgia', serif" font-size="50" fill="#f5ede8" font-weight="bold">S&amp;P 7,350 반등</text>
  <text x="48" y="248" font-family="'Georgia', serif" font-size="34" fill="#d96552">4주 시나리오 재보정</text>

  <!-- Current S&P box -->
  <rect x="48" y="278" width="280" height="80" rx="6" fill="#1a0e0c" stroke="#d96552" stroke-width="1" opacity="0.7"/>
  <text x="188" y="306" font-family="'Arial', sans-serif" font-size="13" fill="#8a6a66" text-anchor="middle" letter-spacing="1">S&amp;P 500 현재</text>
  <text x="188" y="338" font-family="'Georgia', serif" font-size="30" fill="#f5ede8" text-anchor="middle" font-weight="bold">7,349.99</text>
  <polygon points="175,350 185,338 195,350" fill="#22c55e"/>
  <text x="200" y="355" font-family="'Arial', sans-serif" font-size="14" fill="#22c55e">+1.14%</text>

  <!-- WTI box -->
  <rect x="348" y="278" width="240" height="80" rx="6" fill="#1a0e0c" stroke="#d96552" stroke-width="1" opacity="0.5"/>
  <text x="468" y="306" font-family="'Arial', sans-serif" font-size="13" fill="#8a6a66" text-anchor="middle" letter-spacing="1">WTI 원유</text>
  <text x="468" y="338" font-family="'Georgia', serif" font-size="30" fill="#f5ede8" text-anchor="middle" font-weight="bold">$90.21</text>
  <text x="468" y="355" font-family="'Arial', sans-serif" font-size="13" fill="#8a6a66" text-anchor="middle">$91.85 → 소폭 안정</text>

  <!-- Scenario table -->
  <text x="48" y="406" font-family="'Arial', sans-serif" font-size="13" fill="#8a6a66" letter-spacing="2">4주 시나리오</text>
  <line x1="48" y1="415" x2="900" y2="415" stroke="#d96552" stroke-width="1" opacity="0.2"/>

  <!-- Row 1: 비둘기 -->
  <rect x="48" y="424" width="840" height="48" rx="3" fill="#22c55e" opacity="0.08"/>
  <text x="68" y="452" font-family="'Arial', sans-serif" font-size="15" fill="#22c55e">비둘기 반전</text>
  <text x="300" y="452" font-family="'Arial', sans-serif" font-size="14" fill="#b0c8b0">WTI $88↓ + CPI 안정</text>
  <text x="640" y="452" font-family="'Arial', sans-serif" font-size="14" fill="#b0c8b0">7,400~7,600</text>
  <text x="820" y="452" font-family="'Georgia', serif" font-size="18" fill="#22c55e" font-weight="bold" text-anchor="middle">25%</text>

  <!-- Row 2: 중립 -->
  <rect x="48" y="476" width="840" height="48" rx="3" fill="#d8b878" opacity="0.08"/>
  <text x="68" y="504" font-family="'Arial', sans-serif" font-size="15" fill="#d8b878">중립 회복 (베이스)</text>
  <text x="300" y="504" font-family="'Arial', sans-serif" font-size="14" fill="#c8b888">WTI $88~92 안정</text>
  <text x="640" y="504" font-family="'Arial', sans-serif" font-size="14" fill="#c8b888">7,300~7,500</text>
  <text x="820" y="504" font-family="'Georgia', serif" font-size="18" fill="#d8b878" font-weight="bold" text-anchor="middle">40%</text>

  <!-- Row 3: 매파 -->
  <rect x="48" y="528" width="840" height="48" rx="3" fill="#d96552" opacity="0.08"/>
  <text x="68" y="556" font-family="'Arial', sans-serif" font-size="15" fill="#d96552">매파 재압박</text>
  <text x="300" y="556" font-family="'Arial', sans-serif" font-size="14" fill="#c88878">WTI $92↑ + CPI 반등</text>
  <text x="640" y="556" font-family="'Arial', sans-serif" font-size="14" fill="#c88878">7,100~7,200</text>
  <text x="820" y="556" font-family="'Georgia', serif" font-size="18" fill="#d96552" font-weight="bold" text-anchor="middle">25%</text>

  <!-- Row 4: 블랙스완 -->
  <rect x="48" y="580" width="840" height="48" rx="3" fill="#ef4444" opacity="0.06"/>
  <text x="68" y="608" font-family="'Arial', sans-serif" font-size="15" fill="#ef4444">블랙스완</text>
  <text x="300" y="608" font-family="'Arial', sans-serif" font-size="14" fill="#b87878">이란 에스컬레이션</text>
  <text x="640" y="608" font-family="'Arial', sans-serif" font-size="14" fill="#b87878">6,800 이하</text>
  <text x="820" y="608" font-family="'Georgia', serif" font-size="18" fill="#ef4444" font-weight="bold" text-anchor="middle">10%</text>

  <!-- Bottom tagline -->
  <text x="48" y="660" font-family="'Georgia', serif" font-size="16" fill="#d96552" opacity="0.7" font-style="italic">WTI $90.21 방향 + S&amp;P 7,386 돌파 여부 — 향후 2주의 핵심 지표</text>

  <!-- Diamond accent -->
  <polygon points="1232,420 1242,430 1232,440 1222,430" fill="#d96552" opacity="0.4"/>
</svg>
