<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081408"/>
      <stop offset="100%" stop-color="#0a180c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90be88"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7a50"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="500" fill="url(#glow1)"/>
  <circle cx="180" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0eed0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.12 16:00 KST · 경제 이슈</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 에너지·달러·금 · SLOT 16 —</text>

  <!-- Info badge -->
  <rect x="80" y="176" width="840" height="30" rx="4" fill="#7a9d6e" fill-opacity="0.16" stroke="#7a9d6e" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#90be88">WTI −4.56% 급락 · GOLD +3.81% 급등 · USD/KRW 1,515원 원화 강세</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#e8f4e8">WTI $83.71</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#accent)">에너지 쇼크 반전 — 한국 무역 구조 재편</text>
  <text x="80" y="403" font-family="sans-serif" font-size="17" fill="#6a8a68">GOLD $4,246.10(+3.81%) · 달러 약세 복합 신호 · 에너지 수입국 이중 수혜</text>

  <!-- Divider -->
  <line x1="80" y1="438" x2="1200" y2="438" stroke="#14200e" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#507048">WTI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8f4e8">$83.71</text>
      <polygon points="0,88 14,72 28,88" fill="#e07050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07050">−4.56%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(250, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#507048">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8f4e8">$4,246.10</text>
      <polygon points="28,88 14,72 0,88" fill="#d8b878"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#d8b878">+3.81%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(550, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#507048">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8f4e8">1,515.21</text>
      <polygon points="0,88 14,72 28,88" fill="#60b870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#60b870">−0.65%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#507048">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8f4e8">4.463%</text>
      <polygon points="0,88 14,72 28,88" fill="#60b870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#60b870">−1.74%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#405838">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#405838" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
