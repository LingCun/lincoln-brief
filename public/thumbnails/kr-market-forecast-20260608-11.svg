<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#1a0a08"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f09880"/>
      <stop offset="50%" stop-color="#e07060"/>
      <stop offset="100%" stop-color="#c05040"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c04030" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c04030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="160" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#e07060" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f8e8e4">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#e07060">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#e07060" text-anchor="end">2026.06.08 11:00 KST · KR 시장 예측</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#e07060">— MARKET FORECAST —</text>

  <!-- Scenario badge -->
  <rect x="80" y="176" width="520" height="30" rx="4" fill="#c04030" fill-opacity="0.18" stroke="#c04030" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e05555">8,000선 붕괴 · 7,500 지지 관건 · 복합 악재 지속</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f8e8e4">KOSPI 7,651 이후</text>
  <text x="80" y="355" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">7,500 지지 여부 vs 베어 케이스</text>
  <text x="80" y="403" font-family="sans-serif" font-size="17" fill="#9a7a74">베이스 40% · 불 15% · 베어 35% · 블랙스완 10%</text>

  <!-- Divider -->
  <line x1="80" y1="435" x2="1200" y2="435" stroke="#2a1010" stroke-width="1"/>

  <!-- Scenario row -->
  <g transform="translate(80, 466)">
    <!-- Base scenario -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b878">베이스 40%</text>
      <text x="0" y="58" font-family="monospace" font-size="15" fill="#f8e8e4">7,400~7,800</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#9a7a74">나스닥 반등 + 원화 안정</text>
    </g>
    <!-- Bull scenario -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5aaa80" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#5aaa80">불 15%</text>
      <text x="0" y="58" font-family="monospace" font-size="15" fill="#f8e8e4">7,800~8,200</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#9a7a74">NVDA 반등 + 원화 강세</text>
    </g>
    <!-- Bear scenario -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05555" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#e05555">베어 35%</text>
      <text x="0" y="58" font-family="monospace" font-size="15" fill="#f8e8e4">7,100~7,400</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#9a7a74">나스닥 추가↓ + 원화 1,560</text>
    </g>
    <!-- Black swan -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#a04040" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a04040">블랙스완 10%</text>
      <text x="0" y="58" font-family="monospace" font-size="15" fill="#f8e8e4">7,000 이하</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#9a7a74">글로벌 충격 복합</text>
    </g>
  </g>

  <!-- Watch level -->
  <text x="80" y="620" font-family="monospace" font-size="13" letter-spacing="3" fill="#e07060">핵심 감시 레벨: 7,500 · USD/KRW 1,550 · WTI $95</text>

  <!-- Footer line -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#2a1010" stroke-width="0.5"/>
  <text x="80" y="708" font-family="monospace" font-size="10" letter-spacing="2" fill="#705050">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
