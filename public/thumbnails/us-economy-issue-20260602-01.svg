<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a04"/>
      <stop offset="100%" stop-color="#0c0604"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c080"/>
      <stop offset="50%" stop-color="#e09840"/>
      <stop offset="100%" stop-color="#c07020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e09840" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e09840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e09840" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#e09840" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#e09840" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0c880">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#e09840">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#e09840" text-anchor="end">2026.06.02 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#e09840">— 경제 이슈 · 유가 급등 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="600" fill="#f0c880">WTI $92.24</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#orange)">하루 +5.59% 급등 — 인플레이션 재부상</text>
  <text x="80" y="382" font-family="Pretendard, sans-serif" font-size="18" fill="#b08040">FOMC(6/11) 금리 인하 여지 축소  ·  USD/KRW 1,513 달러 강세</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 450)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e09840" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08040">WTI 유가</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f0c880">$92.24</text>
      <polygon points="0,76 14,76 7,90" fill="#c87040"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c87040">+5.59%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e09840" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08040">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f0c880">4.475%</text>
      <polygon points="0,76 14,76 7,90" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">상승</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e09840" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08040">USD/KRW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f0c880">1,513.34</text>
      <polygon points="0,76 14,76 7,90" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">+1.21%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e09840" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08040">GOLD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f0c880">$4,515</text>
      <polygon points="0,90 14,90 7,76" fill="#686868"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#888868">−0.98%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e09840" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b08040">BTC</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f0c880">$71,527</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−2.79%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="608" x2="1200" y2="608" stroke="#281408" stroke-width="1"/>
  <text x="80" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#584020">OPEC+ 감산 또는 지정학 리스크 — WTI $90대 유지 시 FOMC 금리 인하 여지 축소</text>
  <text x="1200" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#584020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
