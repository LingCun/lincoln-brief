<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f0a"/>
      <stop offset="100%" stop-color="#040808"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ac88e"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7d4e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="360" fill="url(#glow1)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#c8e0c0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.02 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="700" fill="#c8e0c0">WTI +5.59%</text>
  <text x="80" y="325" font-family="Playfair Display, Georgia, serif" font-size="38" fill="url(#green)">유가 급등, 인플레이션 리스크 복귀</text>
  <text x="80" y="378" font-family="Pretendard, sans-serif" font-size="18" fill="#80a878">FOMC(6/11) 10일 전 · US10Y 4.475%(+0.49%) · USD/KRW 1,513.34(+1.21%)</text>

  <!-- 핵심 지표 -->
  <g transform="translate(80, 440)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#80a878">WTI 원유</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#c8e0c0">$92.24</text>
      <polygon points="0,70 14,70 7,84" fill="#d96552"/>
      <text x="22" y="87" font-family="monospace" font-size="14" fill="#d96552">+5.59%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(200, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#80a878">US10Y</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#c8e0c0">4.475%</text>
      <polygon points="0,70 14,70 7,84" fill="#d96552"/>
      <text x="22" y="87" font-family="monospace" font-size="14" fill="#d96552">+0.49%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(420, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#80a878">USD/KRW</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#c8e0c0">1,513</text>
      <polygon points="0,70 14,70 7,84" fill="#d96552"/>
      <text x="22" y="87" font-family="monospace" font-size="14" fill="#d96552">+1.21%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#80a878">Gold</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#c8e0c0">$4,515</text>
      <polygon points="0,84 14,84 7,70" fill="#6ba368"/>
      <text x="22" y="87" font-family="monospace" font-size="14" fill="#6ba368">−0.98%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(860, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="10" letter-spacing="3" fill="#80a878">BTC</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#c8e0c0">$71,527</text>
      <polygon points="0,84 14,84 7,70" fill="#6ba368"/>
      <text x="22" y="87" font-family="monospace" font-size="14" fill="#6ba368">−2.79%</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#7a9d6e" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="710" font-family="monospace" font-size="11" fill="#80a878" letter-spacing="2">lincoln-brief.vercel.app</text>
  <text x="1200" y="710" font-family="monospace" font-size="11" fill="#80a878" letter-spacing="2" text-anchor="end">※ 투자 권유 아님</text>
</svg>
