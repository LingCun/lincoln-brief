<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0806"/>
      <stop offset="100%" style="stop-color:#1a0f0f"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#f87171;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#f87171" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#f87171" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#f87171" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#d06060" text-anchor="middle" letter-spacing="1">2026.06.22 · 16:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.5"/>

  <!-- Stock main display -->
  <text x="640" y="170" font-family="Georgia, serif" font-size="22" fill="#d06060" text-anchor="middle" letter-spacing="3">삼성바이오로직스 (207940)</text>
  <text x="640" y="260" font-family="Georgia, serif" font-size="84" fill="#ffffff" text-anchor="middle" font-weight="bold">1,295,000</text>
  <text x="640" y="292" font-family="Georgia, serif" font-size="22" fill="#aaaaaa" text-anchor="middle">원</text>
  <polygon points="560,316 576,332 592,316" fill="#f87171"/>
  <text x="605" y="330" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−5.75%</text>
  <text x="640" y="368" font-family="Georgia, serif" font-size="16" fill="#805050" text-anchor="middle">−79,000원 · 전일 1,374,000원</text>

  <!-- Divider -->
  <line x1="160" y1="394" x2="1120" y2="394" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Key level panel left -->
  <rect x="80" y="414" width="480" height="180" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="446" font-family="Georgia, serif" font-size="15" fill="#c06060" text-anchor="middle" letter-spacing="2">가격 수준 요약</text>
  <text x="120" y="478" font-family="Georgia, serif" font-size="14" fill="#888888">3일 전 고점</text>
  <text x="520" y="478" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">1,430,000원 (−9.4%)</text>
  <text x="120" y="506" font-family="Georgia, serif" font-size="14" fill="#888888">30일 고점</text>
  <text x="520" y="506" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">1,472,000원 (−12.0%)</text>
  <text x="120" y="534" font-family="Georgia, serif" font-size="14" fill="#888888">30일 저점 (지지)</text>
  <text x="520" y="534" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">1,243,000원 (−4.0%↓)</text>
  <text x="120" y="562" font-family="Georgia, serif" font-size="14" fill="#888888">1차 지지</text>
  <text x="520" y="562" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">1,250,000원 (−3.5%↓)</text>

  <!-- Context panel right -->
  <rect x="600" y="414" width="600" height="180" rx="4" fill="#d8b878" fill-opacity="0.03" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="446" font-family="Georgia, serif" font-size="15" fill="#b09040" text-anchor="middle" letter-spacing="2">하락 원인</text>
  <text x="640" y="480" font-family="Georgia, serif" font-size="14" fill="#888888">전일 미국 LLY</text>
  <text x="1150" y="480" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$1,098.57 (−1.21%)</text>
  <text x="640" y="508" font-family="Georgia, serif" font-size="14" fill="#888888">셀트리온 (동반)</text>
  <text x="1150" y="508" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">168,500원 (−1.06%)</text>
  <text x="640" y="536" font-family="Georgia, serif" font-size="14" fill="#888888">AI 테마 자금 집중</text>
  <text x="1150" y="536" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">바이오 상대 소외</text>
  <text x="640" y="564" font-family="Georgia, serif" font-size="14" fill="#888888">SK하이닉스 (비교)</text>
  <text x="1150" y="564" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">+5.61%</text>

  <!-- Bottom stats -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">저점 반등분</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">대부분 반납</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">베이스 시나리오</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">1,250,000~1,320,000원 박스 (45%)</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">LLY 방향이 선행지표</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">다음 주 바이오 섹터 촉매</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#f87171" fill-opacity="0.35"/>
</svg>
