<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#0a0607"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84535"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="160" r="380" fill="url(#glow1)"/>
  <circle cx="140" cy="580" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8b0a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.03 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 · ADP·NFP·FOMC —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="600" fill="#f0c0b0">채권 강세 vs 에너지 지속</text>
  <text x="80" y="328" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" fill="url(#red)">US10Y −0.49% · WTI $93.73 · BTC −5.81%</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="17" fill="#a07868">ADP(6/4) · NFP(6/6) · FOMC(6/11) — 이번 주 3대 이벤트가 6월 방향을 결정합니다</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 430)">
    <!-- 불 케이스 -->
    <rect x="0" y="0" width="260" height="130" rx="4" fill="#1a2810" stroke="#6ba368" stroke-width="1" stroke-opacity="0.6"/>
    <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#6ba368">불 케이스 20%</text>
    <text x="14" y="56" font-family="Georgia, serif" font-size="15" fill="#c0e0b0">약한 고용 + FOMC 인하</text>
    <text x="14" y="80" font-family="monospace" font-size="12" fill="#6ba368">S&amp;P → 7,700 이상</text>
    <text x="14" y="104" font-family="monospace" font-size="12" fill="#6ba368">MSFT 반등 · BTC $70K+</text>

    <!-- 베이스 케이스 -->
    <rect x="280" y="0" width="260" height="130" rx="4" fill="#181810" stroke="#d8b878" stroke-width="1" stroke-opacity="0.6"/>
    <text x="294" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#d8b878">베이스 35%</text>
    <text x="294" y="56" font-family="Georgia, serif" font-size="15" fill="#e0d8a0">컨센서스 + 동결·비둘기</text>
    <text x="294" y="80" font-family="monospace" font-size="12" fill="#d8b878">S&amp;P 7,500~7,700 박스</text>
    <text x="294" y="104" font-family="monospace" font-size="12" fill="#d8b878">AVGO 강세 지속</text>

    <!-- 베어 케이스 -->
    <rect x="560" y="0" width="260" height="130" rx="4" fill="#200e0a" stroke="#d96552" stroke-width="1.5" stroke-opacity="0.8"/>
    <text x="574" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#d96552">베어 케이스 32%</text>
    <text x="574" y="56" font-family="Georgia, serif" font-size="15" fill="#f0b0a0">강한 고용 + WTI 지속</text>
    <text x="574" y="80" font-family="monospace" font-size="12" fill="#d96552">MSFT $415 이하 위험</text>
    <text x="574" y="104" font-family="monospace" font-size="12" fill="#d96552">USD/KRW 1,530+ 달러강세</text>

    <!-- 블랙 스완 -->
    <rect x="840" y="0" width="260" height="130" rx="4" fill="#181018" stroke="#886090" stroke-width="1" stroke-opacity="0.5"/>
    <text x="854" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#886090">블랙 스완 13%</text>
    <text x="854" y="56" font-family="Georgia, serif" font-size="15" fill="#c0a0d0">거시 충격 · 지정학</text>
    <text x="854" y="80" font-family="monospace" font-size="12" fill="#886090">WTI $100 돌파</text>
    <text x="854" y="104" font-family="monospace" font-size="12" fill="#886090">전 자산 변동성 급증</text>
  </g>

  <!-- 핵심 메시지 -->
  <text x="80" y="620" font-family="monospace" font-size="13" letter-spacing="2" fill="#d96552">▶  베어(32%) + 베이스(35%) = 67% · 불 케이스(20%)보다 높습니다</text>

  <!-- 하단 구분선 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="660" font-family="monospace" font-size="10" letter-spacing="2" fill="#704840">Lincoln Brief · lincoln-brief.vercel.app · 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
