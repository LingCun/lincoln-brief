<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#0f0c05"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="150" r="400" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.29 16:00 KST · 시장 예측</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 종가 기준 업데이트 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="400" height="30" rx="4" fill="#d8b878" fill-opacity="0.15" stroke="#d8b878" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">베이스 레인지 상단 접근 · 8,600까지 124p</text>

  <!-- Main title -->
  <text x="80" y="285" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">KOSPI 8,476</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">다음 관문 8,600</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#8a9898">다음 주 3대 변수: USD/KRW · KOSDAQ · 삼성전자</text>

  <!-- Divider -->
  <line x1="80" y1="436" x2="1200" y2="436" stroke="#4a3a20" stroke-width="1"/>

  <!-- Scenario row -->
  <g transform="translate(80, 468)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">베이스 45%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">8,300~8,600</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4db86b" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#4db86b">불 케이스 25%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">8,600~9,000</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05555" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#e05555">베어 케이스 25%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">8,000~8,300</text>
    </g>
    <!-- 핵심 변수 -->
    <g transform="translate(900, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="24" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">USD/KRW</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9">1,507.88</text>
      <polygon points="0,68 14,84 28,68" fill="#e05555"/>
      <text x="36" y="83" font-family="monospace" font-size="14" fill="#e05555">+0.32%</text>
    </g>
  </g>

  <!-- 8600 label -->
  <text x="80" y="590" font-family="monospace" font-size="13" fill="#d8b878">▶ 8,600 돌파 조건: KOSDAQ 반등 + USD/KRW 1,500 이하 복귀</text>

  <!-- Bottom bar -->
  <line x1="80" y1="670" x2="600" y2="670" stroke="#4a3a20" stroke-width="0.5"/>
  <text x="80" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a6a48">lincoln-brief.vercel.app</text>
  <text x="1200" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a6a48" text-anchor="end">정보 제공 목적 · 투자 권유 아님</text>
</svg>
