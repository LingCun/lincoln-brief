<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#d8b87800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left gold bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d8b878" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a08858" letter-spacing="2">US MARKET · 데일리 시황</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.7" text-anchor="end">2026.07.06 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a08858" text-anchor="end">코스피 급반등</text>

  <!-- Main headline -->
  <text x="84" y="210" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#ffffff">미국은 정지, 코스피는 급반등</text>

  <!-- S&P 500 main data -->
  <text x="84" y="290" font-family="Georgia, serif" font-size="30" fill="#d8b878">S&amp;P 500</text>
  <text x="270" y="290" font-family="Georgia, serif" font-size="30" fill="#ffffff">7,483.24</text>
  <polygon points="430,272 450,272 440,290" fill="#a0a0a0"/>
  <text x="460" y="290" font-family="Georgia, serif" font-size="24" fill="#a0a0a0">보합·정지</text>

  <!-- Divider line -->
  <rect x="84" y="310" width="700" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- KOSPI row (headline mover) -->
  <text x="84" y="358" font-family="Georgia, serif" font-size="26" fill="#a08858">코스피</text>
  <text x="240" y="358" font-family="Georgia, serif" font-size="30" fill="#ffffff" font-weight="bold">8,088.34</text>
  <polygon points="440,340 460,340 450,358" fill="#6ec46e"/>
  <text x="468" y="358" font-family="Georgia, serif" font-size="26" fill="#6ec46e" font-weight="bold">+5.76%</text>

  <!-- SK Hynix / Samsung row -->
  <text x="84" y="400" font-family="Georgia, serif" font-size="22" fill="#a08858">SK하이닉스</text>
  <text x="260" y="400" font-family="Georgia, serif" font-size="22" fill="#ffffff">2,425,000원</text>
  <polygon points="500,384 514,384 507,400" fill="#6ec46e"/>
  <text x="521" y="400" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+10.88%</text>

  <text x="84" y="436" font-family="Georgia, serif" font-size="22" fill="#a08858">삼성전자</text>
  <text x="260" y="436" font-family="Georgia, serif" font-size="22" fill="#ffffff">309,500원</text>
  <polygon points="480,420 494,420 487,436" fill="#6ec46e"/>
  <text x="501" y="436" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+8.22%</text>

  <!-- Divider -->
  <rect x="84" y="460" width="700" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- Secondary data row -->
  <text x="84" y="498" font-family="Georgia, serif" font-size="20" fill="#a08858">USD/KRW</text>
  <text x="220" y="498" font-family="Georgia, serif" font-size="20" fill="#ffffff">1,529.16</text>
  <polygon points="390,484 402,484 396,498" fill="#6ec46e"/>
  <text x="409" y="498" font-family="Georgia, serif" font-size="18" fill="#6ec46e">-0.84% (원화 강세)</text>

  <text x="84" y="532" font-family="Georgia, serif" font-size="20" fill="#a08858">Gold</text>
  <text x="180" y="532" font-family="Georgia, serif" font-size="20" fill="#ffffff">$4,187.30</text>
  <polygon points="360,518 372,518 366,532" fill="#6ec46e"/>
  <text x="379" y="532" font-family="Georgia, serif" font-size="18" fill="#6ec46e">+1.81%</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="558" width="700" height="1" fill="#d8b878" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="592" font-family="Georgia, serif" font-size="18" fill="#d8b878" opacity="0.85">미국 재개 22:30 KST · 나흘째 목요일(7/2) 마감치 그대로</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,630 92,622 100,630 92,638" fill="#d8b878" opacity="0.5"/>
  <text x="110" y="635" font-family="Georgia, serif" font-size="14" fill="#a08858">lincoln-brief.vercel.app</text>

  <!-- Right side decorative bar -->
  <rect x="1200" y="60" width="1" height="600" fill="#d8b878" opacity="0.15"/>

  <!-- Gold diamond accent top right -->
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#d8b878" opacity="0.3"/>
</svg>
