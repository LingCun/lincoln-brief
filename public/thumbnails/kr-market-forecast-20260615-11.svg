<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a14"/>
      <stop offset="100%" stop-color="#140d20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88c0f8"/>
      <stop offset="100%" stop-color="#5090e0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8060e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8060e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.15 11:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시장 예측 (SLOT 11) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="780" height="30" rx="4" fill="#8060e0" fill-opacity="0.18" stroke="#8060e0" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#b0a0f0">FOMC D-3 · 불 시나리오 40% · ATH(8,829) 293포인트 전방</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">KOSPI 8,535</text>
  <text x="80" y="365" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">ATH 293포인트 전방 — FOMC D-3</text>
  <text x="80" y="415" font-family="sans-serif" font-size="17" fill="#9888c8">불 40% · 베이스 35% · 베어 20% · 블랙스완 5%</text>
  <text x="80" y="445" font-family="sans-serif" font-size="15" fill="#6858a8">NVDA $210 · USD/KRW 1,510 · 8,500 지지 — ATH 돌파 3가지 조건</text>

  <!-- Divider -->
  <line x1="80" y1="478" x2="1200" y2="478" stroke="#1a102a" stroke-width="1"/>

  <!-- Scenario bar visualization -->
  <g transform="translate(80, 510)">
    <!-- Bull -->
    <rect x="0" y="0" width="440" height="34" rx="3" fill="#40e880" fill-opacity="0.20"/>
    <rect x="0" y="0" width="440" height="34" rx="3" fill="none" stroke="#40e880" stroke-width="0.8"/>
    <text x="10" y="22" font-family="monospace" font-size="13" fill="#40e880">불 40% — ATH(8,829) 재도전 · FOMC 비둘기 · NVDA $210</text>
    <!-- Base -->
    <rect x="0" y="44" width="385" height="34" rx="3" fill="#5090e0" fill-opacity="0.15"/>
    <rect x="0" y="44" width="385" height="34" rx="3" fill="none" stroke="#5090e0" stroke-width="0.8"/>
    <text x="10" y="66" font-family="monospace" font-size="13" fill="#88b8f0">베이스 35% — 8,300~8,700 박스 · FOMC 중립</text>
    <!-- Bear -->
    <rect x="0" y="88" width="220" height="34" rx="3" fill="#e07050" fill-opacity="0.15"/>
    <rect x="0" y="88" width="220" height="34" rx="3" fill="none" stroke="#e07050" stroke-width="0.8"/>
    <text x="10" y="110" font-family="monospace" font-size="13" fill="#e09070">베어 20% — 7,900~8,300 · FOMC 매파</text>
    <!-- Black Swan -->
    <rect x="0" y="132" width="55" height="34" rx="3" fill="#808080" fill-opacity="0.15"/>
    <rect x="0" y="132" width="55" height="34" rx="3" fill="none" stroke="#808080" stroke-width="0.8"/>
    <text x="10" y="154" font-family="monospace" font-size="13" fill="#a0a0a0">5%</text>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#3a2a5a">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#3a2a5a" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
