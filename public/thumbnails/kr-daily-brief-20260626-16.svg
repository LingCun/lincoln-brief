  <text x="1180" y="586" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">$60,034  +0.52%</text>
  <text x="640" y="611" font-family="Georgia, serif" font-size="13" fill="#808060">US10Y</text>
  <text x="1180" y="611" font-family="Georgia, serif" font-size="13" fill="#c0c0d0" text-anchor="end">4.392%</text>

  <!-- Bottom note -->
