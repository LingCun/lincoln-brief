  <text x="640" y="377" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="1">장중 저점 8,173.00(-8.48%) → 237포인트 회복 마감 · 8,000선 방어</text>

