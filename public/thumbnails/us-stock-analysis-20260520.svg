<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1520"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8aaed4"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5588"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2e4878" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a4a62" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1e2a3a" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="380" fill="url(#glow)"/>
  <circle cx="200" cy="560" r="240" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d8e4f0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.05.20 · STOCK ANALYSIS</text>

  <!-- 헤드라인 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 · ELI LILLY —</text>
  <text x="80" y="258" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#d8e4f0">LLY</text>
  <text x="200" y="258" font-family="Playfair Display, Georgia, serif" font-size="64" font-style="italic" fill="url(#blue)"> $1,021</text>
  <text x="80" y="308" font-family="Pretendard, sans-serif" font-size="18" fill="#7890a8">GLP-1 시대 — $1,000 위에서 가속도 붙다</text>

  <!-- 핵심 데이터 바 -->
  <g transform="translate(80, 370)" font-family="monospace">
    <!-- 오늘 변동 +3.37% -->
    <text x="0" y="14" font-size="13" letter-spacing="2" fill="#d8e4f0">TODAY +3.37%</text>
    <rect x="230" y="0" width="320" height="18" fill="url(#barBlue)" rx="2"/>
    <text x="565" y="14" font-size="14" fill="#8aaed4" font-weight="600">+$33.32</text>

    <!-- 30일 저점 대비 +20% -->
    <g transform="translate(0, 40)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#d8e4f0">30D LOW +20.0%</text>
      <rect x="230" y="0" width="500" height="18" fill="url(#barBlue)" rx="2"/>
      <text x="745" y="14" font-size="14" fill="#8aaed4" font-weight="600">$851 → $1,021</text>
    </g>

    <!-- 30일 전체 +7.1% -->
    <g transform="translate(0, 80)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#7890a8">30D TOTAL +7.1%</text>
      <rect x="230" y="0" width="178" height="18" fill="url(#barDim)" rx="2"/>
      <text x="423" y="14" font-size="13" fill="#7890a8">$953 → $1,021</text>
    </g>
  </g>

  <!-- 제품 라인 -->
  <g transform="translate(80, 540)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#5677b0" stroke-width="1.5"/>
    <text x="55" y="14" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">MOUNJARO</text>
    <text x="220" y="14" font-family="monospace" font-size="12" fill="#7890a8">당뇨</text>

    <text x="310" y="14" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">ZEPBOUND</text>
    <text x="480" y="14" font-family="monospace" font-size="12" fill="#7890a8">비만</text>

    <text x="570" y="14" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">GLP-1</text>
    <text x="640" y="14" font-family="monospace" font-size="12" fill="#7890a8">다음 확장 = 경구형</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#5677b0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8">MAY 20 · 2026 · #1 GAINER IN TOP-12</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
