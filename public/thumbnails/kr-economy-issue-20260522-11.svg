<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1510"/>
      <stop offset="100%" stop-color="#070d08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9abf8e"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7a50"/>
    </linearGradient>
    <radialGradient id="greenglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="180" r="360" fill="url(#greenglow)"/>
  <circle cx="180" cy="580" r="260" fill="url(#goldglow)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#ddeedd">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.22 11:00 KST · 경제 이슈</text>

  <!-- Label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 원화 약세 진단 —</text>

  <!-- Main title -->
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#ddeedd">달러/원 1,508원</text>
  <text x="80" y="314" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#green)">원화 약세 세 가지 이유</text>
  <text x="80" y="362" font-family="sans-serif" font-size="17" fill="#6a9060">미국 금리 차 · 에너지 수입 비용 · 외국인 자본 유출</text>

  <!-- Divider -->
  <line x1="80" y1="408" x2="1200" y2="408" stroke="#1a3020" stroke-width="1"/>

  <!-- Metrics -->
  <g transform="translate(80, 448)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506840">USD/KRW</text>
      <text x="0" y="70" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#ddeedd">1,508.74원</text>
      <polygon points="0,76 14,92 28,76" fill="#e05555"/>
      <text x="36" y="91" font-family="monospace" font-size="16" fill="#e05555">원화 약세</text>
    </g>
    <!-- 미국 10년물 -->
    <g transform="translate(360, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506840">미국 10년물</text>
      <text x="0" y="70" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#ddeedd">4.57%</text>
      <text x="0" y="94" font-family="monospace" font-size="13" fill="#8aaa80">고금리 달러 구조 지속</text>
    </g>
    <!-- WTI -->
    <g transform="translate(680, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506840">WTI 원유</text>
      <text x="0" y="70" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#ddeedd">$112.25</text>
      <text x="0" y="94" font-family="monospace" font-size="13" fill="#8aaa80">에너지 수입 압박 지속</text>
    </g>
    <!-- 분기점 -->
    <g transform="translate(960, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506840">전환 조건</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#ddeedd">6/11 CPI</text>
      <text x="0" y="80" font-family="monospace" font-size="11" fill="#8aaa80">달러 약세 전환의 분기점</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="668" x2="1200" y2="668" stroke="#1a3020" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#406050">lincoln-brief.vercel.app</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="2" fill="#406050" text-anchor="end">경제 이슈 · 2026.05.22</text>
</svg>
