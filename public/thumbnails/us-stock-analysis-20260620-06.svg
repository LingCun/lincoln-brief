<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6ca9d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ca9d8;stop-opacity:0" />
    </linearGradient>
    <!-- Sparkline path for AMZN 30-day -->
    <linearGradient id="spark-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ca9d8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6ca9d8;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)" />

  <!-- Blue accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blue-line)" />

  <!-- Lincoln Brief logo -->
  <text x="60" y="65" font-family="Georgia, serif" font-size="20" fill="#6ca9d8" letter-spacing="4" opacity="0.9">LINCOLN BRIEF</text>
  <polygon points="52,58 57,48 62,58" fill="#6ca9d8" opacity="0.9"/>

  <!-- Edition label -->
  <rect x="1050" y="32" width="200" height="36" rx="4" fill="#6ca9d8" fill-opacity="0.15" stroke="#6ca9d8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1150" y="55" font-family="Arial, sans-serif" font-size="14" fill="#6ca9d8" text-anchor="middle" letter-spacing="2">6/20 · 06:00 KST</text>

  <!-- Category label -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="13" fill="#6ca9d8" letter-spacing="3" opacity="0.7">STOCK ANALYSIS · 종목 분석</text>

  <!-- Main ticker headline -->
  <text x="60" y="210" font-family="Georgia, serif" font-size="80" fill="#ffffff" font-weight="bold">AMZN</text>
  <text x="360" y="210" font-family="Arial, sans-serif" font-size="60" fill="#4dcc88" font-weight="bold">+2.90%</text>

  <!-- Price -->
  <text x="60" y="268" font-family="Arial, sans-serif" font-size="36" fill="#c0d8f0">$244.39</text>
  <text x="260" y="268" font-family="Arial, sans-serif" font-size="20" fill="#a09080">  +$6.89</text>

  <!-- Subtitle -->
  <text x="60" y="318" font-family="Georgia, serif" font-size="26" fill="#d8b878">AI 소비자의 저점 반등 — AWS 수익화 기대</text>

  <!-- Divider -->
  <rect x="60" y="342" width="560" height="2" fill="#6ca9d8" opacity="0.5"/>

  <!-- Key stats -->
  <rect x="60" y="360" width="560" height="200" rx="6" fill="#ffffff" fill-opacity="0.04"/>

  <text x="80" y="398" font-family="Arial, sans-serif" font-size="14" fill="#a09080" letter-spacing="1">30일 고점</text>
  <text x="80" y="428" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="bold">$274.00</text>
  <text x="270" y="428" font-family="Arial, sans-serif" font-size="16" fill="#cc6666">현재 −10.8%</text>

  <line x1="80" y1="450" x2="590" y2="450" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <text x="80" y="480" font-family="Arial, sans-serif" font-size="14" fill="#a09080" letter-spacing="1">30일 저점</text>
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="bold">$237.50</text>
  <text x="270" y="510" font-family="Arial, sans-serif" font-size="16" fill="#4dcc88">오늘 반등 +2.90%</text>

  <line x1="80" y1="530" x2="590" y2="530" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <text x="80" y="560" font-family="Arial, sans-serif" font-size="14" fill="#a09080" letter-spacing="1">NASDAQ 세션</text>
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="30" fill="#ffffff" font-weight="bold">+1.91%</text>
  <text x="220" y="590" font-family="Arial, sans-serif" font-size="16" fill="#a09080">  12종목 중 3위 상승</text>

  <!-- Right panel: sparkline visualization (simplified) -->
  <rect x="660" y="140" width="570" height="400" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#6ca9d8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="685" y="178" font-family="Arial, sans-serif" font-size="13" fill="#6ca9d8" letter-spacing="2" opacity="0.8">30-DAY PRICE CHART</text>

  <!-- Simplified sparkline (AMZN 30-day: starts ~271, peaks ~274, drops to 237.50, bounces to 244.39) -->
  <!-- Scale: y range 220-280, height=300 (y:200-500), x range 680-1210 (530px for 30 points, ~18px each) -->
  <!-- y = 200 + (280 - price) / (280-220) * 300 -->
  <!-- Approximate the sparkline -->
  <polyline
    points="685,229 703,232 721,239 739,247 757,241 775,243 793,248 811,247 829,258 847,243 865,239 883,241 901,243 919,230 937,228 955,232 973,246 991,254 1009,262 1027,257 1045,263 1063,263 1081,264 1099,276 1117,270 1135,270 1153,261 1171,262 1189,277 1207,271"
    fill="none" stroke="#6ca9d8" stroke-width="2.5" stroke-opacity="0.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Fill under the line -->
  <polygon
    points="685,229 703,232 721,239 739,247 757,241 775,243 793,248 811,247 829,258 847,243 865,239 883,241 901,243 919,230 937,228 955,232 973,246 991,254 1009,262 1027,257 1045,263 1063,263 1081,264 1099,276 1117,270 1135,270 1153,261 1171,262 1189,277 1207,271 1207,500 685,500"
    fill="url(#spark-fill)"/>

  <!-- Highlight last point (today) -->
  <circle cx="1207" cy="271" r="6" fill="#4dcc88" stroke="#ffffff" stroke-width="2"/>

  <!-- Price labels on chart -->
  <text x="680" y="198" font-family="Arial, sans-serif" font-size="12" fill="#a09080">$274</text>
  <line x1="685" y1="200" x2="1215" y2="200" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="680" y="278" font-family="Arial, sans-serif" font-size="12" fill="#a09080">$244</text>
  <text x="680" y="354" font-family="Arial, sans-serif" font-size="12" fill="#a09080">$237</text>
  <line x1="685" y1="350" x2="1215" y2="350" stroke="#cc6666" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- AI Supply/Demand context -->
  <rect x="660" y="565" width="570" height="115" rx="6" fill="#6ca9d8" fill-opacity="0.08" stroke="#6ca9d8" stroke-width="1" stroke-opacity="0.2"/>
  <text x="685" y="598" font-family="Arial, sans-serif" font-size="13" fill="#6ca9d8" letter-spacing="1">AI 공급자 vs 소비자 동반 강세</text>
  <text x="685" y="628" font-family="Arial, sans-serif" font-size="20" fill="#4dcc88" font-weight="bold">AVGO +4.70%</text>
  <text x="880" y="628" font-family="Arial, sans-serif" font-size="16" fill="#a09080">공급자</text>
  <text x="685" y="658" font-family="Arial, sans-serif" font-size="20" fill="#4dcc88" font-weight="bold">AMZN +2.90%</text>
  <text x="880" y="658" font-family="Arial, sans-serif" font-size="16" fill="#a09080">소비자</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#000000" fill-opacity="0.3"/>
  <text x="60" y="705" font-family="Arial, sans-serif" font-size="13" fill="#a09080">데이터: Yahoo Finance · 6/19 확정 종가 기준</text>
  <text x="1220" y="705" font-family="Arial, sans-serif" font-size="13" fill="#6ca9d8" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
