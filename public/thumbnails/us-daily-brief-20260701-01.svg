<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#d8b87800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left gold bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d8b878" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a08858" letter-spacing="2">US MARKET · 데일리시황</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.7" text-anchor="end">2026.07.01 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a08858" text-anchor="end">Q2 2026 FINAL CLOSE</text>

  <!-- Main headline -->
  <text x="84" y="220" font-family="Georgia, serif" font-size="62" font-weight="bold" fill="#ffffff">Q2 2026 최종 마감</text>

  <!-- S&P 500 main data -->
  <text x="84" y="310" font-family="Georgia, serif" font-size="36" fill="#d8b878">S&amp;P 500</text>
  <text x="300" y="310" font-family="Georgia, serif" font-size="36" fill="#ffffff">7,491.38</text>
  <!-- Up triangle for S&P -->
  <polygon points="460,285 480,310 440,310" fill="#6ec46e"/>
  <text x="490" y="310" font-family="Georgia, serif" font-size="30" fill="#6ec46e">+0.68%</text>

  <!-- Divider line -->
  <rect x="84" y="330" width="700" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- NASDAQ row -->
  <text x="84" y="370" font-family="Georgia, serif" font-size="26" fill="#a08858">NASDAQ</text>
  <text x="270" y="370" font-family="Georgia, serif" font-size="26" fill="#ffffff">26,146.55</text>
  <polygon points="430,351 445,370 415,370" fill="#6ec46e"/>
  <text x="452" y="370" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+1.26%</text>

  <!-- DOW row -->
  <text x="620" y="370" font-family="Georgia, serif" font-size="26" fill="#a08858">DOW</text>
  <text x="690" y="370" font-family="Georgia, serif" font-size="26" fill="#ffffff">52,331.67</text>
  <polygon points="850,351 865,370 835,370" fill="#6ec46e"/>
  <text x="872" y="370" font-family="Georgia, serif" font-size="22" fill="#6ec46e">+0.29%</text>

  <!-- Divider -->
  <rect x="84" y="390" width="700" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- Secondary data row -->
  <text x="84" y="430" font-family="Georgia, serif" font-size="22" fill="#a08858">AAPL</text>
  <text x="174" y="430" font-family="Georgia, serif" font-size="22" fill="#ffffff">$288.19</text>
  <polygon points="294,414 308,430 280,430" fill="#6ec46e"/>
  <text x="315" y="430" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+2.29%</text>

  <text x="480" y="430" font-family="Georgia, serif" font-size="22" fill="#a08858">US10Y</text>
  <text x="580" y="430" font-family="Georgia, serif" font-size="22" fill="#ffffff">4.404%</text>
  <polygon points="690,414 704,430 676,430" fill="#e87050"/>
  <text x="711" y="430" font-family="Georgia, serif" font-size="20" fill="#e87050">+0.73%</text>

  <text x="84" y="475" font-family="Georgia, serif" font-size="22" fill="#a08858">USD/KRW</text>
  <text x="218" y="475" font-family="Georgia, serif" font-size="22" fill="#ffffff">1,551.00</text>
  <polygon points="336,459 350,475 322,475" fill="#e87050"/>
  <text x="357" y="475" font-family="Georgia, serif" font-size="20" fill="#e87050">+1.03%</text>

  <text x="480" y="475" font-family="Georgia, serif" font-size="22" fill="#a08858">BTC</text>
  <text x="535" y="475" font-family="Georgia, serif" font-size="22" fill="#ffffff">$58,202</text>
  <polygon points="660,475 674,459 646,459" fill="#e87050"/>
  <text x="681" y="475" font-family="Georgia, serif" font-size="20" fill="#e87050">-3.22%</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="510" width="700" height="1" fill="#d8b878" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="545" font-family="Georgia, serif" font-size="19" fill="#d8b878" opacity="0.85">Q3 첫 분기점 — 7/3 고용보고서 · FOMC 7/28~29 · 27일 남음</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,600 92,592 100,600 92,608" fill="#d8b878" opacity="0.5"/>
  <text x="110" y="605" font-family="Georgia, serif" font-size="14" fill="#a08858">lincoln-brief.vercel.app</text>

  <!-- Right side decorative bar -->
  <rect x="1200" y="60" width="1" height="600" fill="#d8b878" opacity="0.15"/>

  <!-- Gold diamond accent top right -->
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#d8b878" opacity="0.3"/>
</svg>
