<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c05a5a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c05a5a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.20 · ECONOMY ISSUE · 01:00</text>

  <!-- 헤드라인 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 안전자산 역할 재편 —</text>
  <text x="80" y="255" font-family="Georgia, serif" font-size="66" font-weight="500" fill="#f5edd9">Gold $4,164</text>
  <text x="80" y="325" font-family="Georgia, serif" font-size="52" font-style="italic" fill="url(#gold)">낙세 vs BTC +1.12%</text>
  <text x="80" y="378" font-family="sans-serif" font-size="17" fill="#988e72">Gold −1.42% · BTC $63,273 반등 · USD/KRW 1,532.60 · WTI $76.58</text>

  <!-- 4섹터 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- Gold -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">GOLD · 안전자산</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">$4,164.00</text>
      <polygon points="0,58 14,58 7,72" fill="#c05a5a"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#c05a5a">−1.42%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">CRYPTO · BTC</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">$63,273</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+1.12%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">ENERGY · WTI</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">$76.58</text>
      <polygon points="0,58 14,58 7,72" fill="#c05a5a"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#988e72">−0.03%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">FX · USD/KRW</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">1,532.60</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+0.47%</text>
    </g>
  </g>

  <line x1="80" y1="700" x2="1200" y2="700" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
</svg>
