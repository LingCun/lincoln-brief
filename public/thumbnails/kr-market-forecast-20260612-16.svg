<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#200a08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84838"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="160" r="520" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0d8d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.12 16:00 KST · 시장 예측</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시나리오 업데이트 · SLOT 16 —</text>

  <!-- Info badge -->
  <rect x="80" y="176" width="820" height="30" rx="4" fill="#d96552" fill-opacity="0.16" stroke="#d96552" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e88070">불 35% · 베이스 40% · 베어 20% · 블랙스완 5%  ·  FOMC D-6</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#f0e8e4">KOSPI 8,123 최종</text>
  <text x="80" y="365" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#accent)">오전 고점 미유지 — 소화 국면 진입</text>
  <text x="80" y="410" font-family="sans-serif" font-size="17" fill="#a87870">ATH(8,829)까지 705pt · 8,368 단기 저항 확인 · NVDA $204.87</text>

  <!-- Divider -->
  <line x1="80" y1="445" x2="1200" y2="445" stroke="#241010" stroke-width="1"/>

  <!-- Scenario boxes -->
  <g transform="translate(80, 470)">
    <!-- 불 -->
    <rect x="0" y="0" width="230" height="80" rx="4" fill="#d96552" fill-opacity="0.15" stroke="#d96552" stroke-width="0.8"/>
    <text x="12" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#e88070">불 시나리오</text>
    <text x="12" y="48" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f0e8e4">35%</text>
    <text x="12" y="68" font-family="monospace" font-size="10" fill="#a87870">8,500→ATH 방향</text>

    <!-- 베이스 -->
    <rect x="250" y="0" width="230" height="80" rx="4" fill="#40a070" fill-opacity="0.15" stroke="#40a070" stroke-width="0.8"/>
    <text x="262" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#60c090">베이스 시나리오</text>
    <text x="262" y="48" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f0e8e4">40%</text>
    <text x="262" y="68" font-family="monospace" font-size="10" fill="#60a878">8,000~8,368 박스</text>

    <!-- 베어 -->
    <rect x="500" y="0" width="230" height="80" rx="4" fill="#e87040" fill-opacity="0.15" stroke="#e87040" stroke-width="0.8"/>
    <text x="512" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#e89060">베어 시나리오</text>
    <text x="512" y="48" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f0e8e4">20%</text>
    <text x="512" y="68" font-family="monospace" font-size="10" fill="#c07848">7,700~8,000</text>

    <!-- 블랙스완 -->
    <rect x="750" y="0" width="230" height="80" rx="4" fill="#888888" fill-opacity="0.12" stroke="#888888" stroke-width="0.8"/>
    <text x="762" y="22" font-family="monospace" font-size="11" letter-spacing="2" fill="#aaaaaa">블랙스완</text>
    <text x="762" y="48" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f0e8e4">5%</text>
    <text x="762" y="68" font-family="monospace" font-size="10" fill="#888888">7,484 재시험</text>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#5a3828">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#5a3828" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
