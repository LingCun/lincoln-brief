<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#131c28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#5677b0" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#5677b0" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#5677b0" fill-opacity="0.8"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#8fa9d6" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#5a749e" letter-spacing="2">KR MARKET · 종목 분석</text>

  <!-- Edition label -->
  <rect x="950" y="28" width="290" height="36" rx="3" fill="#5677b0" fill-opacity="0.1" stroke="#5677b0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1095" y="51" font-family="Georgia, serif" font-size="14" fill="#8fa9d6" text-anchor="middle" letter-spacing="1">2026.07.08 · 11:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,104 651,115 640,126 629,115" fill="#5677b0" fill-opacity="0.9"/>

  <!-- Eyebrow -->
  <text x="640" y="158" font-family="Georgia, serif" font-size="15" fill="#8fa9d6" text-anchor="middle" letter-spacing="3">373220 · 배터리 · 2차전지</text>

  <!-- Main ticker name -->
  <text x="640" y="230" font-family="Georgia, serif" font-size="46" fill="#ffffff" text-anchor="middle" font-weight="bold">LG에너지솔루션</text>

  <!-- Price -->
  <text x="640" y="330" font-family="Georgia, serif" font-size="80" fill="#ffffff" text-anchor="middle" font-weight="bold">321,500</text>
  <text x="810" y="330" font-family="Georgia, serif" font-size="24" fill="#909090">원</text>

  <!-- Down triangle + pct -->
  <polygon points="480,352 496,370 512,352" fill="#f87171"/>
  <text x="530" y="374" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">-3.16%</text>

  <text x="640" y="418" font-family="Georgia, serif" font-size="14" fill="#5a749e" text-anchor="middle" letter-spacing="1">top12 최대 낙폭 · 30일 신저가 경신</text>

  <!-- Divider line -->
  <line x1="80" y1="450" x2="1200" y2="450" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Stats panels -->
  <rect x="80" y="470" width="360" height="190" rx="4" fill="#5677b0" fill-opacity="0.06" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="260" y="500" font-family="Georgia, serif" font-size="14" fill="#8fa9d6" text-anchor="middle" letter-spacing="2">최근 4거래일</text>
  <text x="260" y="545" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">+2.40 → -2.21 → -6.35 → -3.16</text>
  <text x="260" y="580" font-family="Georgia, serif" font-size="12" fill="#5a749e" text-anchor="middle">사흘 연속 하락</text>
  <text x="260" y="620" font-family="Georgia, serif" font-size="12" fill="#405070" text-anchor="middle">단위: %</text>

  <rect x="460" y="470" width="360" height="190" rx="4" fill="#5677b0" fill-opacity="0.06" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="640" y="500" font-family="Georgia, serif" font-size="14" fill="#8fa9d6" text-anchor="middle" letter-spacing="2">30일 고점 대비</text>
  <text x="640" y="550" font-family="Georgia, serif" font-size="30" fill="#f87171" text-anchor="middle" font-weight="bold">-29.80%</text>
  <text x="640" y="580" font-family="Georgia, serif" font-size="12" fill="#5a749e" text-anchor="middle">고점 458,000원</text>
  <text x="640" y="620" font-family="Georgia, serif" font-size="12" fill="#405070" text-anchor="middle">저점 대비 0.00% (신저가)</text>

  <rect x="840" y="470" width="360" height="190" rx="4" fill="#5677b0" fill-opacity="0.06" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1020" y="500" font-family="Georgia, serif" font-size="14" fill="#8fa9d6" text-anchor="middle" letter-spacing="2">향후 4주 시나리오</text>
  <text x="1020" y="545" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">300,000~350,000원</text>
  <text x="1020" y="580" font-family="Georgia, serif" font-size="12" fill="#5a749e" text-anchor="middle">베이스 40% · 베어 37%</text>
  <text x="1020" y="620" font-family="Georgia, serif" font-size="12" fill="#405070" text-anchor="middle">베어 확률 상향</text>

  <!-- Bottom signature -->
  <text x="640" y="696" font-family="Georgia, serif" font-size="12" fill="#3d5070" text-anchor="middle" letter-spacing="1">lincoln-brief.vercel.app · KR Stock Analysis</text>
</svg>
