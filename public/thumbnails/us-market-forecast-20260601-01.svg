<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a100e"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e07a60"/>
      <stop offset="50%" stop-color="#c25e4a"/>
      <stop offset="100%" stop-color="#a04030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c25e4a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c25e4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="360" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#c25e4a" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5e0d8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#c25e4a">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#c25e4a" text-anchor="end">2026.06.01 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#c25e4a">— 6월 시나리오 · 4주 전망 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5e0d8">ADP → NFP → FOMC</text>
  <text x="80" y="340" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">6월 3연속 이벤트 · S&amp;P 7,580 분수령</text>
  <text x="80" y="390" font-family="Pretendard, sans-serif" font-size="18" fill="#a07868">불 케이스 27% · 베이스 34% · 베어 케이스 29%</text>

  <!-- 이벤트 타임라인 -->
  <g transform="translate(80, 455)">
    <!-- ADP -->
    <g>
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#2a1510" stroke="#c25e4a" stroke-width="1"/>
      <text x="120" y="30" font-family="monospace" font-size="11" letter-spacing="3" fill="#c25e4a" text-anchor="middle">ADP 고용</text>
      <text x="120" y="60" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0d8" text-anchor="middle">6/4</text>
      <text x="120" y="86" font-family="monospace" font-size="11" fill="#a07868" text-anchor="middle">선행 지표</text>
    </g>
    <!-- 화살표 -->
    <line x1="248" y1="50" x2="272" y2="50" stroke="#c25e4a" stroke-width="2"/>
    <polygon points="272,44 286,50 272,56" fill="#c25e4a"/>
    <!-- NFP -->
    <g transform="translate(294, 0)">
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#2a1510" stroke="#c25e4a" stroke-width="1.5"/>
      <text x="120" y="30" font-family="monospace" font-size="11" letter-spacing="3" fill="#c25e4a" text-anchor="middle">NFP 고용</text>
      <text x="120" y="60" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0d8" text-anchor="middle">6/6</text>
      <text x="120" y="86" font-family="monospace" font-size="11" fill="#a07868" text-anchor="middle">실물 확인</text>
    </g>
    <!-- 화살표 -->
    <line x1="542" y1="50" x2="566" y2="50" stroke="#c25e4a" stroke-width="2"/>
    <polygon points="566,44 580,50 566,56" fill="#c25e4a"/>
    <!-- FOMC -->
    <g transform="translate(588, 0)">
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#3a1510" stroke="#e07a60" stroke-width="2"/>
      <text x="120" y="30" font-family="monospace" font-size="11" letter-spacing="3" fill="#e07a60" text-anchor="middle">FOMC 결정</text>
      <text x="120" y="60" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5e0d8" text-anchor="middle">6/11</text>
      <text x="120" y="86" font-family="monospace" font-size="11" fill="#c07060" text-anchor="middle">★★★★★</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="608" x2="1200" y2="608" stroke="#3a1510" stroke-width="1"/>
  <text x="80" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#5a3020">S&amp;P 7,580 기준 · 불 7,750~8,000 · 베어 7,000~7,300</text>
  <text x="1200" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#5a3020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
