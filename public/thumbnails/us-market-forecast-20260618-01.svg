<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140a08"/>
      <stop offset="100%" stop-color="#1e1210"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#d96552"/>

  <!-- Left red glow panel -->
  <rect x="0" y="0" width="520" height="720" fill="url(#red-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#d96552" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1092" y="28" width="140" height="36" rx="4" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1162" y="52" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#9a7a6a" letter-spacing="1">2026.06.18 — 6/17 마감</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#d96552" fill-opacity="0.22"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#d96552" text-anchor="middle" letter-spacing="1">시장 예측</text>

  <!-- Main index -->
  <text x="48" y="220" font-family="Georgia, serif" font-size="26" fill="#c09080" font-weight="bold">S&amp;P 500 박스 방어</text>
  <text x="48" y="268" font-family="Georgia, serif" font-size="56" fill="#ffffff" font-weight="bold">7,504.28</text>
  <polygon points="48,290 62,290 55,278" fill="#e05c5c" transform="rotate(180 55 284)"/>
  <text x="72" y="296" font-family="Georgia, serif" font-size="22" fill="#e05c5c">−0.09%  보합</text>

  <!-- Divider -->
  <rect x="48" y="318" width="460" height="1" fill="#d96552" opacity="0.3"/>

  <!-- Key signal box -->
  <rect x="48" y="336" width="460" height="78" rx="6" fill="#d96552" fill-opacity="0.08" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="68" y="362" font-family="Georgia, serif" font-size="14" fill="#9a7a6a" letter-spacing="1">내부 분화 핵심</text>
  <text x="68" y="392" font-family="Georgia, serif" font-size="20" fill="#ffffff" font-weight="bold">AI 인프라 ↑  vs  AI 플랫폼 ↓</text>

  <!-- 4 paths summary -->
  <text x="48" y="445" font-family="Georgia, serif" font-size="14" fill="#9a7a6a">경로 A — AI 인프라 선별 랠리</text>
  <text x="420" y="445" font-family="Georgia, serif" font-size="14" fill="#d8b878">30%</text>

  <text x="48" y="473" font-family="Georgia, serif" font-size="14" fill="#9a7a6a">경로 B — S&amp;P 7,450~7,600 박스</text>
  <text x="420" y="473" font-family="Georgia, serif" font-size="14" fill="#ffffff" font-weight="bold">35%</text>

  <text x="48" y="501" font-family="Georgia, serif" font-size="14" fill="#9a7a6a">경로 C — 테크 전반 회귀</text>
  <text x="420" y="501" font-family="Georgia, serif" font-size="14" fill="#8ab0e0">20%</text>

  <text x="48" y="529" font-family="Georgia, serif" font-size="14" fill="#9a7a6a">경로 D — 지수 하락 전이</text>
  <text x="420" y="529" font-family="Georgia, serif" font-size="14" fill="#e05c5c">15%</text>

  <!-- Right column divider -->
  <rect x="570" y="90" width="2" height="540" fill="#d96552" opacity="0.2"/>

  <!-- Right: macro context -->
  <text x="610" y="140" font-family="Georgia, serif" font-size="14" fill="#9a7a6a" letter-spacing="2">매크로 지표</text>
  <rect x="610" y="150" width="80" height="1" fill="#d96552" opacity="0.4"/>

  <text x="610" y="198" font-family="Georgia, serif" font-size="16" fill="#c0a090">US10Y</text>
  <text x="700" y="198" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">4.434%</text>
  <text x="860" y="198" font-family="Georgia, serif" font-size="16" fill="#4adc7a">하락</text>

  <text x="610" y="248" font-family="Georgia, serif" font-size="16" fill="#c0a090">Gold</text>
  <text x="700" y="248" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$4,382</text>
  <polygon points="830,232 842,232 836,221" fill="#4adc7a"/>
  <text x="850" y="248" font-family="Georgia, serif" font-size="16" fill="#4adc7a">+1.19%</text>

  <text x="610" y="298" font-family="Georgia, serif" font-size="16" fill="#c0a090">WTI</text>
  <text x="700" y="298" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$75.58</text>
  <text x="830" y="298" font-family="Georgia, serif" font-size="16" fill="#c0c0c0">안정</text>

  <!-- Divider -->
  <rect x="610" y="320" width="620" height="1" fill="#d96552" opacity="0.25"/>

  <!-- Observation points -->
  <text x="610" y="358" font-family="Georgia, serif" font-size="14" fill="#d96552" font-weight="bold">핵심 관찰 포인트</text>
  <text x="610" y="386" font-family="Georgia, serif" font-size="13" fill="#9a7a6a">AVGO $410 유지 → 인프라 강세 확인</text>
  <text x="610" y="410" font-family="Georgia, serif" font-size="13" fill="#9a7a6a">META $550 이탈 → 플랫폼 추가 약세</text>
  <text x="610" y="434" font-family="Georgia, serif" font-size="13" fill="#9a7a6a">US10Y 4.4% 돌파 → 테크 전반 회귀</text>
  <text x="610" y="458" font-family="Georgia, serif" font-size="13" fill="#9a7a6a">S&amp;P 7,450 이탈 → 경로 D 진입</text>

  <rect x="610" y="478" width="620" height="1" fill="#d96552" opacity="0.15"/>

  <text x="610" y="508" font-family="Georgia, serif" font-size="15" fill="#d96552" font-weight="bold">Q2 실적 시즌 (7월 중순)</text>
  <text x="610" y="530" font-family="Georgia, serif" font-size="13" fill="#9a7a6a">현재 불확실성을 해소할 최종 팩트</text>

  <!-- Bottom signature -->
  <text x="610" y="640" font-family="Georgia, serif" font-size="13" fill="#6a3a2a" letter-spacing="1">lincoln-brief.vercel.app</text>
  <text x="48" y="680" font-family="Georgia, serif" font-size="12" fill="#3a2020">※ 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
