<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0d08"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.03 · KR 종목 분석</text>

  <!-- Category badge -->
  <rect x="80" y="112" width="190" height="26" rx="4" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-width="0.8"/>
  <text x="92" y="130" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878">STOCK ANALYSIS</text>

  <!-- Stock badge -->
  <rect x="80" y="160" width="360" height="30" rx="4" fill="#4db86b" fill-opacity="0.15" stroke="#4db86b" stroke-width="0.8"/>
  <text x="92" y="180" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">30일 신고가 재경신 · 삼성전자 005930.KS</text>

  <!-- Main price -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#f5edd9">360,500원</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">삼성전자 +3.30%</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#8a9898">Broadcom +4.70% · SK하이닉스 −0.13% · 반도체 이분화 이틀째</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#2a2a1a" stroke-width="1"/>

  <!-- Metrics -->
  <g transform="translate(80, 474)">
    <!-- 삼성전자 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">삼성전자</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">360,500</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+3.30%</text>
    </g>
    <!-- SK하이닉스 -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">2,360,000</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−0.13%</text>
    </g>
    <!-- AVGO -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">AVGO</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$481.57</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+4.70%</text>
    </g>
    <!-- 30일 상승률 -->
    <g transform="translate(800, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">30일 상승률</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">+68.0%</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#a89060">저점 214,500원 대비</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#2a2010" stroke-width="1"/>
  <text x="80" y="680" font-family="monospace" font-size="10" letter-spacing="2" fill="#5a4a30">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="680" font-family="monospace" font-size="10" letter-spacing="1" fill="#5a4a30" text-anchor="end">Yahoo Finance · KRX</text>
</svg>
