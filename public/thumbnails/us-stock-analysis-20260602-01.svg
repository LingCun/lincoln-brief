<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d14"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9ed4"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5890"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="380" fill="url(#glow1)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0d8f0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.02 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="80" font-weight="700" fill="#d0d8f0">NVDA</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="48" fill="url(#blue)">$224.02 · +6.10%</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="20" fill="#8090b8">어제 −1.45%에서 하루 만에 대반전 · 30일 저점 대비 +14.0%</text>

  <!-- 가격 궤적 데이터 -->
  <g transform="translate(80, 445)">
    <!-- 30일 저점 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8090b8">30일 저점</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d0d8f0">$196.50</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(220, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8090b8">30일 고점</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d0d8f0">$235.74</text>
    </g>
    <!-- 전일 종가 -->
    <g transform="translate(440, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#c95050" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8090b8">전일 종가</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d0d8f0">$211.14</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#c95050">−1.45%</text>
    </g>
    <!-- 오늘 종가 -->
    <g transform="translate(660, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8090b8">6/1 종가</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d0d8f0">$224.02</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#6ba368">+6.10%</text>
    </g>
    <!-- AI 인프라 동반 -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8090b8">MSFT / AVGO</text>
      <text x="0" y="65" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d0d8f0">+2.97%</text>
      <text x="0" y="88" font-family="Pretendard, sans-serif" font-size="12" fill="#8090b8">/ +2.67%</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#5677b0" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="710" font-family="monospace" font-size="11" fill="#8090b8" letter-spacing="2">lincoln-brief.vercel.app</text>
  <text x="1200" y="710" font-family="monospace" font-size="11" fill="#8090b8" letter-spacing="2" text-anchor="end">※ 투자 권유 아님</text>
</svg>
