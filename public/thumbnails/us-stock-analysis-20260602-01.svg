<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e14"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88b8e8"/>
      <stop offset="50%" stop-color="#6898d8"/>
      <stop offset="100%" stop-color="#4878b8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6898d8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6898d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6898d8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6898d8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="200" cy="540" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6898d8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a8c8e8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6898d8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6898d8" text-anchor="end">2026.06.02 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6898d8">— NVIDIA 종목 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="600" fill="#a8c8e8">NVDA $224.02</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#blue)">전날 −1.45% → 오늘 +6.10% 강반등</text>
  <text x="80" y="382" font-family="Pretendard, sans-serif" font-size="18" fill="#6888a8">30일 저점 $196.50 대비 +13.9%  ·  30일 신고가 경신</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 450)">
    <!-- NVDA 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6888a8">NVDA 종가</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8c8e8">$224.02</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+6.10%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6888a8">30일 저점</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8c8e8">$196.50</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+13.9% ↑</text>
    </g>
    <!-- MSFT -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6888a8">MSFT</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8c8e8">$463.60</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+2.97%</text>
    </g>
    <!-- META -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6888a8">META</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8c8e8">$605.42</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−4.28%</text>
    </g>
    <!-- S&P -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6888a8">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#a8c8e8">7,612.99</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.43%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="608" x2="1200" y2="608" stroke="#0a1828" stroke-width="1"/>
  <text x="80" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#304060">AI 칩 3종목 동반 강세  ·  30일 신고가 경신  ·  WTI +5.59% 인플레이션 역풍 주목</text>
  <text x="1200" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#304060" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
