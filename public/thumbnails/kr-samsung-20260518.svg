<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8856b"/>
      <stop offset="100%" stop-color="#a04a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 장식: 27만원 라인 시험 그래프 -->
  <g transform="translate(870, 240)" opacity="0.7">
    <!-- 27만원 기준선 -->
    <line x1="0" y1="80" x2="340" y2="80" stroke="#d8b878" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
    <text x="345" y="84" font-family="monospace" font-size="10" letter-spacing="2" fill="#d8b878" opacity="0.7">270K</text>
    <!-- 가격 라인: 시가 → 장중고점 → 장중저점(27만 이탈) → 종가 -->
    <polyline points="0,75 60,55 120,90 180,150 240,95 320,85"
              fill="none" stroke="url(#redGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 시가 -->
    <circle cx="0" cy="75" r="3" fill="#d8b878" opacity="0.6"/>
    <!-- 장중 고점 -->
    <circle cx="60" cy="55" r="4" fill="#f0d88c"/>
    <text x="60" y="40" font-family="monospace" font-size="10" letter-spacing="2" fill="#f0d88c" text-anchor="middle">272.5K</text>
    <!-- 장중 저점 (27만 깨진 자리) -->
    <circle cx="180" cy="150" r="5" fill="#e8856b"/>
    <text x="180" y="170" font-family="monospace" font-size="10" letter-spacing="2" fill="#e8856b" text-anchor="middle">265.5K</text>
    <!-- 종가 -->
    <circle cx="320" cy="85" r="6" fill="#f5edd9"/>
    <text x="320" y="70" font-family="monospace" font-size="11" letter-spacing="2" fill="#f5edd9" text-anchor="middle">CLOSE 267.5K</text>
  </g>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · STOCK ANALYSIS</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 2026.05.18 · 005930 · SAMSUNG —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">삼성전자 267,500원</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="46" font-style="italic" fill="url(#goldGrad)">27만원 첫 시험, 일단 통과</text>

  <!-- 부제 -->
  <text x="80" y="425" font-family="Pretendard, sans-serif" font-size="20" fill="#c4b89e">장중 265,500원까지 이탈 → 종가 회복 · Fwd PER 11배 매력 영역</text>

  <!-- 좌하단 데이터 -->
  <g transform="translate(80, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">종가</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">267,500</text>
    <polygon points="0,76 12,76 6,90" fill="#e8856b"/>
    <text x="20" y="88" font-family="monospace" font-size="13" fill="#e8856b">−1.11%</text>
  </g>

  <g transform="translate(280, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">장중 저점</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#e8856b">265,500</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">27만 일시 이탈</text>
  </g>

  <g transform="translate(490, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">Fwd PER</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#f5edd9">11.0x</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">5/14 12.8x → 11x</text>
  </g>

  <g transform="translate(670, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">외인 비중</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#e8856b">51.2%</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">10일 -2.3%p</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.18 · KOSPI 005930</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">SAMSUNG · CLOSE</text>
</svg>
