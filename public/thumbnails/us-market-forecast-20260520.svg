<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0c"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8836e"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#a84030"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#7a3020" stop-opacity="0.60"/>
    </linearGradient>
    <linearGradient id="barDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a3a30" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#2a1810" stop-opacity="0.50"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1000" cy="180" r="350" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0ddd8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.20 · MARKET FORECAST</text>

  <!-- 헤드라인 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 · POST-NVDA OUTLOOK —</text>
  <text x="80" y="258" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f0ddd8">NVDA 이후 —</text>
  <text x="80" y="326" font-family="Playfair Display, Georgia, serif" font-size="62" font-style="italic" fill="url(#red)">다음 2주 시나리오</text>
  <text x="80" y="374" font-family="Pretendard, sans-serif" font-size="17" fill="#a07868">S&amp;P 500  7,353.61  ·  VIX  18.06  ·  4가지 확률 경로</text>

  <!-- 시나리오 확률 바 차트 -->
  <g transform="translate(80, 420)" font-family="monospace">
    <!-- 베이스 45% -->
    <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f0ddd8">BASE  박스 유지</text>
    <rect x="260" y="0" width="450" height="18" fill="url(#barRed)" rx="2"/>
    <text x="725" y="14" font-size="15" fill="#e8836e" font-weight="600">45%</text>

    <!-- 베어 케이스 25% -->
    <g transform="translate(0, 42)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f0ddd8">BEAR  7,200 이탈</text>
      <rect x="260" y="0" width="250" height="18" fill="url(#barRed)" rx="2"/>
      <text x="525" y="14" font-size="15" fill="#e8836e" font-weight="600">25%</text>
    </g>

    <!-- 불 케이스 20% -->
    <g transform="translate(0, 84)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f0ddd8">BULL  7,600+</text>
      <rect x="260" y="0" width="200" height="18" fill="url(#barDim)" rx="2"/>
      <text x="475" y="14" font-size="14" fill="#a07868">20%</text>
    </g>

    <!-- 블랙 스완 10% -->
    <g transform="translate(0, 126)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f0ddd8">BLACK SWAN</text>
      <rect x="260" y="0" width="100" height="18" fill="url(#barDim)" rx="2"/>
      <text x="375" y="14" font-size="14" fill="#a07868">10%</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d96552" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8">KEY EVENTS · NVDA / WMT / FED MINS / CPI</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
