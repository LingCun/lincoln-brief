<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101820;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Blue accent line -->
  <rect x="0" y="0" width="6" height="720" fill="#4a90d9"/>
  <rect x="0" y="100" width="1280" height="1" fill="url(#blue-line)" opacity="0.4"/>

  <!-- Lincoln Brief mark -->
  <text x="40" y="68" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" font-weight="700" fill="#4a90d9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="40" y="92" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#4a6a9a" letter-spacing="1">KR 종목 분석</text>

  <!-- Edition label -->
  <text x="1240" y="54" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4a6a9a" text-anchor="end">6·25·2026 / 16:00 KST</text>
  <text x="1240" y="78" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#2a3a5a" text-anchor="end">stock-analysis</text>

  <!-- Diamond accent -->
  <polygon points="640,112 650,122 640,132 630,122" fill="#4a90d9" opacity="0.6"/>

  <!-- Ticker label -->
  <text x="640" y="170" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" fill="#4a90d9" text-anchor="middle" font-weight="600" letter-spacing="4">005930.KS</text>

  <!-- Main price -->
  <text x="640" y="240" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="52" font-weight="700" fill="#e0f0ff" text-anchor="middle">358,500원</text>
  <text x="640" y="290" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="30" fill="#4caf50" text-anchor="middle">+18,000원  (+5.29%)</text>
  <polygon points="730,273 718,292 742,292" fill="#4caf50"/>

  <!-- Company name -->
  <text x="640" y="145" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="28" font-weight="700" fill="#c0d8f0" text-anchor="middle">삼성전자</text>

  <!-- Divider -->
  <rect x="100" y="315" width="1080" height="1" fill="#1a2a3a"/>

  <!-- Stats grid -->
  <!-- Left column -->
  <text x="240" y="365" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4a6a9a" text-anchor="middle">30일 고점</text>
  <text x="240" y="400" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="26" font-weight="700" fill="#c0d8f0" text-anchor="middle">362,500원</text>
  <text x="240" y="430" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#e08080" text-anchor="middle">−4,000원 (−1.10%)</text>

  <!-- Center column -->
  <text x="640" y="365" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4a6a9a" text-anchor="middle">30일 저점</text>
  <text x="640" y="400" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="26" font-weight="700" fill="#c0d8f0" text-anchor="middle">270,500원</text>
  <text x="640" y="430" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4caf50" text-anchor="middle">+32.5% 이상 반등</text>

  <!-- Right column -->
  <text x="1040" y="365" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4a6a9a" text-anchor="middle">이틀간 반등</text>
  <text x="1040" y="400" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="26" font-weight="700" fill="#4caf50" text-anchor="middle">+15.6%</text>
  <text x="1040" y="430" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4a6a9a" text-anchor="middle">310,000원 저점 이후</text>

  <!-- Divider -->
  <rect x="100" y="460" width="1080" height="1" fill="#1a2a3a"/>

  <!-- Context row -->
  <text x="360" y="505" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="18" fill="#4a6a9a" text-anchor="middle">NVDA (전일)</text>
  <text x="360" y="535" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="24" font-weight="700" fill="#e08080" text-anchor="middle">$199.00</text>
  <text x="360" y="560" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#e08080" text-anchor="middle">−0.52%  /$200 이탈</text>

  <!-- VS -->
  <text x="640" y="535" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" fill="#2a3a5a" text-anchor="middle">vs</text>

  <text x="920" y="505" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="18" fill="#4a6a9a" text-anchor="middle">US10Y</text>
  <text x="920" y="535" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="24" font-weight="700" fill="#c0d8f0" text-anchor="middle">4.402%</text>
  <text x="920" y="560" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#4caf50" text-anchor="middle">금리 하락 → 기술주 수혜</text>

  <!-- Tagline -->
  <text x="640" y="615" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="20" fill="#4a6a9a" text-anchor="middle">30일 고점 362,500원까지 4,000원 — DRAM·HBM 이중 모멘텀</text>

  <!-- Bottom brand line -->
  <rect x="0" y="680" width="1280" height="40" fill="#040810"/>
  <text x="640" y="706" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#2a3a5a" text-anchor="middle">lincoln-brief.vercel.app  |  — Lincoln</text>
</svg>
