  <text x="1160" y="512" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$4,021.00 (−2.64%)</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">BTC</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">$60,432 (−3.39%)</text>
  <text x="660" y="572" font-family="Georgia, serif" font-size="13" fill="#705050">원자재·가상자산 전면 약세 vs 주식 반등 공존</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ 25,735.99</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+0.58% · 회복 전일 −2.21%</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">DOW 52,150.28</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+0.94% · 3대 지수 일제 반등</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,540.00</text>
