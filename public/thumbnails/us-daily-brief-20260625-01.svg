  <line x1="160" y1="366" x2="1120" y2="366" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- AMZN panel (left) -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#40a060" text-anchor="middle" letter-spacing="2">AMZN 12종목 최대 상승</text>
  <text x="320" y="484" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">$240.72</text>
