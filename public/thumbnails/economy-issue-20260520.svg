<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1219"/>
      <stop offset="100%" stop-color="#060810"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="50%" stop-color="#6098e8"/>
      <stop offset="100%" stop-color="#3a72c8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6098e8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2a4880" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7e6a3e" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6098e8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6098e8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="220" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="580" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6098e8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6098e8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6098e8" text-anchor="end">2026.05.20 · ECONOMY ISSUE</text>

  <!-- 헤드라인 -->
  <text x="80" y="172" font-family="monospace" font-size="13" letter-spacing="5" fill="#6098e8">— 경제 이슈 · AI INFRASTRUCTURE —</text>
  <text x="80" y="248" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#f5edd9">AI 인프라 슈퍼사이클,</text>
  <text x="80" y="308" font-family="Playfair Display, Georgia, serif" font-size="52" font-style="italic" fill="url(#blue)">첫 번째 시험</text>
  <text x="80" y="352" font-family="Pretendard, sans-serif" font-size="17" fill="#6880a8">빅테크가 쓰는 자리 vs NVDA가 버는 자리 — 구조가 가격에 들어왔다</text>

  <!-- 1년 변동 바 차트 -->
  <g transform="translate(80, 400)" font-family="monospace">
    <text x="0" y="-12" font-size="11" letter-spacing="4" fill="#6098e8">AI 수혜 구조 · 1년 주가 변동</text>

    <!-- NVDA +66.2% (만드는 쪽) -->
    <text x="0" y="14" font-size="12" letter-spacing="2" fill="#f5edd9">NVDA · AI 인프라 제조</text>
    <rect x="240" y="0" width="580" height="18" fill="url(#barGold)" rx="2"/>
    <text x="835" y="14" font-size="14" fill="#f0d88c" font-weight="600">+66.2%</text>

    <!-- AVGO +17.2% -->
    <g transform="translate(0, 40)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#f5edd9">AVGO · AI 칩 설계</text>
      <rect x="240" y="0" width="151" height="18" fill="url(#barBlue)" rx="2"/>
      <text x="406" y="14" font-size="14" fill="#8ab4f8" font-weight="600">+17.2%</text>
    </g>

    <!-- MSFT +11.5% (쓰는 쪽) -->
    <g transform="translate(0, 80)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#8899aa">MSFT · AI 구매·활용</text>
      <rect x="240" y="0" width="101" height="18" fill="url(#barBlue)" rx="2" opacity="0.5"/>
      <text x="356" y="14" font-size="14" fill="#8ab4f8" opacity="0.7">+11.5%</text>
    </g>

    <!-- GOOGL -2.0% -->
    <g transform="translate(0, 120)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#8899aa">GOOGL · 검색 + AI 딜레마</text>
      <rect x="240" y="0" width="20" height="18" fill="#d96552" rx="2" opacity="0.7"/>
      <text x="275" y="14" font-size="14" fill="#d96552" opacity="0.9">−2.0%</text>
    </g>
  </g>

  <!-- 우측 핵심 수치 -->
  <g transform="translate(980, 390)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#6098e8" stroke-width="1.5"/>
    <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#6880a8">NVDA vs 빅테크</text>
    <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f0d88c">6.6×</text>
    <text x="0" y="84" font-family="monospace" font-size="12" fill="#6880a8">1년 성과 격차</text>

    <line x1="0" y1="110" x2="60" y2="110" stroke="#6098e8" stroke-width="1.5"/>
    <text x="0" y="138" font-family="monospace" font-size="11" letter-spacing="2" fill="#6880a8">오늘 밤</text>
    <text x="0" y="170" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">NVDA 실적</text>
    <text x="0" y="196" font-family="monospace" font-size="12" fill="#6880a8">구조의 첫 감사</text>
  </g>

  <!-- 하단 선 -->
  <line x1="80" y1="685" x2="1200" y2="685" stroke="#6098e8" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="703" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a4a60">lincoln-brief.vercel.app</text>
  <text x="1200" y="703" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a4a60" text-anchor="end">— Lincoln</text>
</svg>
