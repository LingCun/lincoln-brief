<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="350" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="250" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.27 · DAILY BRIEF · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 재개장 첫날 신고가 · 새벽판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">S&amp;P 7,504 신고가</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">WTI -2.71% · 금리 4.504% 동반 하락</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#988e72">AVGO +2.03%  ·  LLY +1.16%  ·  TSLA +1.48%  ·  FOMC 5/29</text>

  <!-- 4종목 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- S&P -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">7,504</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.41%</text>
    </g>
    <!-- NASDAQ -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">NASDAQ</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">26,560</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.82%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(490, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$93.98</text>
      <polygon points="0,90 14,90 7,76" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d96552">-2.71%</text>
    </g>
    <!-- 10Y -->
    <g transform="translate(750, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">US 10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.504%</text>
      <polygon points="0,90 14,90 7,76" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#d96552">-1.18%</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a3020" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#988e72">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a5040" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
