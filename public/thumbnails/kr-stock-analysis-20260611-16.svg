<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90c8f0"/>
      <stop offset="50%" stop-color="#78aad8"/>
      <stop offset="100%" stop-color="#5088c0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#40c880" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#40c880" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3078e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3078e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="420" fill="url(#glow1)"/>
  <circle cx="160" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#78aad8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f0f8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#78aad8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#78aad8" text-anchor="end">2026.06.11 16:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#78aad8">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="520" height="30" rx="4" fill="#40c880" fill-opacity="0.15" stroke="#40c880" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#40c880">이틀 연속 반등 · KOSDAQ +4.76% 동조 · 30일 저점 방어 확인</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#e8f0f8">카카오 39,300원</text>
  <text x="80" y="352" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#blue)">KOSDAQ 급등 속 플랫폼주 반등</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#6a8898">+3.01% (+1,150원) · NAVER −1.32% · KOSDAQ +4.76%</text>

  <!-- Divider -->
  <line x1="80" y1="434" x2="1200" y2="434" stroke="#1a2030" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- 카카오 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#78aad8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6088a0">카카오</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f0f8">39,300원</text>
      <polygon points="28,88 14,72 0,88" fill="#40c880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c880">+3.01%</text>
    </g>
    <!-- NAVER -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#78aad8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6088a0">NAVER</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f0f8">224,000원</text>
      <polygon points="0,72 14,88 28,72" fill="#ff6050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#ff6050">−1.32%</text>
    </g>
    <!-- KOSDAQ -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#78aad8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6088a0">KOSDAQ</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f0f8">996.93</text>
      <polygon points="28,88 14,72 0,88" fill="#40c880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c880">+4.76%</text>
    </g>
    <!-- 30일 고점 대비 -->
    <g transform="translate(820, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#78aad8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6088a0">고점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8f0f8">−18.9%</text>
      <text x="0" y="92" font-family="monospace" font-size="12" fill="#6088a0">48,450 → 39,300</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="658" x2="1200" y2="658" stroke="#1a2030" stroke-width="1"/>
  <text x="80" y="680" font-family="monospace" font-size="10" letter-spacing="2" fill="#3a4858">lincoln-brief.vercel.app · 본 글은 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
