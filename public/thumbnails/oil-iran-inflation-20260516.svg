    <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="44" fill="#f5edd9">$105.42</text>
    <text x="0" y="100" font-family="monospace" font-size="14" fill="#ffd28a">+4.20% · 장중 $109</text>
  </g>

  <line x1="80" y1="660" x2="1200" y2="660" stroke="#f4a06a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4a06a" opacity="0.8">2026.05.16 SAT · 13:00 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#f4a06a" opacity="0.8" text-anchor="end">PHOTO · UNSPLASH</text>
