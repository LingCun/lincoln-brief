<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0804"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="barBase" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7e6a3e" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barBull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3d5a3b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barBear" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7a3a2e" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e8904a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8904a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="150" r="300" fill="url(#glow)"/>
  <circle cx="200" cy="580" r="250" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.20 · MARKET FORECAST</text>

  <!-- 헤드라인 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#e8904a">— 시장 예측 · NVDA 실적 발표일 —</text>
  <text x="80" y="258" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f5edd9">NVDA 오늘 밤,</text>
  <text x="80" y="328" font-family="Playfair Display, Georgia, serif" font-size="64" font-style="italic" fill="url(#gold)">세 갈래 시나리오</text>
  <text x="80" y="372" font-family="Pretendard, sans-serif" font-size="17" fill="#988e72">현재가 $220.61 · 고점 대비 −6.4% · KOSPI 이미 −2.60%</text>

  <!-- 시나리오 바 차트 -->
  <g transform="translate(80, 420)" font-family="monospace">
    <!-- 베이스 (40%) -->
    <text x="0" y="14" font-size="12" letter-spacing="2" fill="#d8b878">BASE 40%</text>
    <rect x="180" y="0" width="360" height="20" fill="url(#barBase)" rx="2"/>
    <text x="555" y="15" font-size="13" fill="#d8b878">컨센서스 상회 → +5~10%</text>

    <!-- 불 케이스 (25%) -->
    <g transform="translate(0, 45)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#6ba368">BULL 25%</text>
      <rect x="180" y="0" width="225" height="20" fill="url(#barBull)" rx="2"/>
      <text x="420" y="15" font-size="13" fill="#6ba368">강한 가이드 → +12~18%</text>
    </g>

    <!-- 베어 케이스 (25%) -->
    <g transform="translate(0, 90)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#d96552">BEAR 25%</text>
      <rect x="180" y="0" width="225" height="20" fill="url(#barBear)" rx="2"/>
      <text x="420" y="15" font-size="13" fill="#d96552">실망 가이드 → −10~15%</text>
    </g>

    <!-- 블랙 스완 (10%) -->
    <g transform="translate(0, 135)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#888">BLACK 10%</text>
      <rect x="180" y="0" width="90" height="20" fill="#555" rx="2"/>
      <text x="285" y="15" font-size="13" fill="#888">대형 미스 → −20%+</text>
    </g>
  </g>

  <!-- 우측 NVDA 가격 박스 -->
  <g transform="translate(950, 230)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#e8904a" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">NVDA 현재가</text>
    <text x="0" y="82" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="600" fill="#f5edd9">$220.61</text>
    <text x="0" y="110" font-family="monospace" font-size="11" fill="#d96552">고점 대비 −6.4%</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">NVDA FY2027 Q1 · EARNINGS AFTER CLOSE 2026.05.20</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">KST 2026.05.21 AM</text>
</svg>
