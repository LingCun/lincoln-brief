<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0800"/>
      <stop offset="100%" style="stop-color:#1a1208"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#a08840" letter-spacing="2">KR MARKET · 데일리 시황</text>

  <!-- Edition label -->
  <rect x="1010" y="28" width="230" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1125" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.29 · 11:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.8"/>

  <!-- KOSPI / KOSDAQ main display — divergence -->
  <text x="640" y="160" font-family="Georgia, serif" font-size="16" fill="#a08840" text-anchor="middle" letter-spacing="3">KOSPI · KOSDAQ 다이버전스</text>

  <!-- KOSPI -->
  <text x="340" y="230" font-family="Georgia, serif" font-size="13" fill="#808060" text-anchor="middle" letter-spacing="2">KOSPI</text>
  <text x="340" y="295" font-family="Georgia, serif" font-size="60" fill="#ffffff" text-anchor="middle" font-weight="bold">8,332.30</text>
  <polygon points="280,310 296,332 312,310" fill="#f87171"/>
  <text x="326" y="335" font-family="Georgia, serif" font-size="30" fill="#f87171" font-weight="bold">-0.94%</text>

  <!-- VS divider -->
  <line x1="580" y1="200" x2="580" y2="360" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="285" font-family="Georgia, serif" font-size="22" fill="#504030" text-anchor="middle">VS</text>

  <!-- KOSDAQ -->
  <text x="940" y="230" font-family="Georgia, serif" font-size="13" fill="#808060" text-anchor="middle" letter-spacing="2">KOSDAQ</text>
  <text x="940" y="295" font-family="Georgia, serif" font-size="60" fill="#ffffff" text-anchor="middle" font-weight="bold">910.42</text>
  <polygon points="878,332 894,310 910,332" fill="#4ade80"/>
  <text x="924" y="335" font-family="Georgia, serif" font-size="30" fill="#4ade80" font-weight="bold">+6.94%</text>

  <!-- Divergence highlight -->
  <rect x="320" y="355" width="640" height="32" rx="3" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="640" y="376" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="1">다이버전스 7.88%pt · LG에너지솔루션 +17.35% · 삼성전자 -5.08%</text>

  <!-- Divider -->
  <line x1="160" y1="408" x2="1120" y2="408" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: top movers -->
  <rect x="80" y="426" width="500" height="230" rx="4" fill="#d8b878" fill-opacity="0.04" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="330" y="456" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="middle" letter-spacing="2">상승 종목</text>
  <text x="100" y="484" font-family="Georgia, serif" font-size="13" fill="#808060">LG에너지솔루션</text>
  <text x="568" y="484" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">389,000원  +17.35%</text>
  <text x="100" y="509" font-family="Georgia, serif" font-size="13" fill="#808060">카카오</text>
  <text x="568" y="509" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">35,950원  +8.45%</text>
  <text x="100" y="534" font-family="Georgia, serif" font-size="13" fill="#808060">셀트리온</text>
  <text x="568" y="534" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">179,500원  +8.20%</text>
  <text x="100" y="559" font-family="Georgia, serif" font-size="13" fill="#808060">POSCO홀딩스</text>
  <text x="568" y="559" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">327,500원  +7.38%</text>
  <text x="100" y="584" font-family="Georgia, serif" font-size="13" fill="#808060">삼성바이오로직스</text>
  <text x="568" y="584" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">1,438,000원  +7.07%</text>
  <line x1="100" y1="597" x2="568" y2="597" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="100" y="618" font-family="Georgia, serif" font-size="13" fill="#808060">삼성전자 / SK하이닉스</text>
  <text x="568" y="618" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">-5.08% / -2.77%</text>

  <!-- Right panel: macro -->
  <rect x="620" y="426" width="580" height="230" rx="4" fill="#d8b878" fill-opacity="0.04" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="910" y="456" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="middle" letter-spacing="2">주요 지표</text>
  <text x="640" y="484" font-family="Georgia, serif" font-size="13" fill="#808060">USD/KRW</text>
  <text x="1180" y="484" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">1,539.88원  -0.43%</text>
  <text x="640" y="509" font-family="Georgia, serif" font-size="13" fill="#808060">NVDA (미국)</text>
  <text x="1180" y="509" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">$192.53  -1.64%</text>
  <text x="640" y="534" font-family="Georgia, serif" font-size="13" fill="#808060">MSFT (미국)</text>
  <text x="1180" y="534" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">$372.97  +5.71%</text>
  <text x="640" y="559" font-family="Georgia, serif" font-size="13" fill="#808060">GOLD</text>
  <text x="1180" y="559" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="end">$4,058.60  -0.49%</text>
  <text x="640" y="584" font-family="Georgia, serif" font-size="13" fill="#808060">WTI</text>
  <text x="1180" y="584" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">$69.56  +0.48%</text>
  <text x="640" y="609" font-family="Georgia, serif" font-size="13" fill="#808060">US10Y</text>
  <text x="1180" y="609" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="end">4.372%  -0.46%</text>

  <!-- Bottom signature -->
  <text x="640" y="700" font-family="Georgia, serif" font-size="12" fill="#403020" text-anchor="middle" letter-spacing="2">lincoln-brief.vercel.app</text>
</svg>
