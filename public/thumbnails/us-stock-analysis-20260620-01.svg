    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">AI CHIP · AVGO</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">$411.35</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+4.70%</text>
    </g>
    <!-- NVDA 비교 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">GPU · NVDA</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#f5edd9">$210.69</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+2.95%</text>
    </g>
    <!-- 30일 고점 -->
