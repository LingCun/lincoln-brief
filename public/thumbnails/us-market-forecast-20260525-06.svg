<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1319"/>
      <stop offset="100%" stop-color="#080b10"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab4d8"/>
      <stop offset="50%" stop-color="#6898c0"/>
      <stop offset="100%" stop-color="#4a78a0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6898c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6898c0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="360" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="240" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6898c0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6898c0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6898c0" text-anchor="end">2026.05.25 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6898c0">— 시장 예측 · 섹터 로테이션 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">방어주 강세 vs 성장주 조정</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#blue)">섹터 로테이션이 말하는 6월 시나리오</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#7896b8">LLY +2.24%·BRK-B +1.33%·JPM +1.12%  vs  NVDA −1.90%·GOOGL −1.21%</text>

  <!-- 시나리오 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#7896b8">베이스 50%</text>
      <text x="0" y="65" font-family="Georgia, serif" font-size="20" fill="#f5edd9">로테이션 완만</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#988e72">PCE 2.5~2.7%</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#7896b8">불 케이스 20%</text>
      <text x="0" y="65" font-family="Georgia, serif" font-size="20" fill="#f5edd9">성장주 복귀</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#6ba368">PCE 2.4% 이하</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#7896b8">베어 케이스 25%</text>
      <text x="0" y="65" font-family="Georgia, serif" font-size="20" fill="#f5edd9">로테이션 가속</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#d96552">PCE 2.8%+</text>
    </g>
    <!-- 핵심 이벤트 -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6898c0" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#7896b8">분기점</text>
      <text x="0" y="65" font-family="Georgia, serif" font-size="20" fill="#f5edd9">5/29 + 5/30</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#6898c0">회의록 + PCE</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#6898c0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#6898c0" opacity="0.8">MAY 25 · 2026 · SECTOR ROTATION FORECAST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#6898c0" opacity="0.8" text-anchor="end">SOURCE · FRED · YAHOO · FEDERAL RESERVE</text>
</svg>
