<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e0a"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.16 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 (SLOT 11) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="860" height="30" rx="4" fill="#7a9d6e" fill-opacity="0.15" stroke="#7a9d6e" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#9ab890">NVDA +3.70% · META +4.67% · US10Y 4.469% 소폭 하락 · FOMC D-2</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f5edd9">NASDAQ +3.39% 급등</text>
  <text x="80" y="362" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">AI 랠리 구조와 한국 시사점</text>
  <text x="80" y="408" font-family="sans-serif" font-size="17" fill="#7aaa80">S&P 500 +2.16% · DOW +1.62% · FOMC D-2, 시장은 이미 비둘기 반영</text>

  <!-- Divider -->
  <line x1="80" y1="442" x2="1200" y2="442" stroke="#0e1810" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 476)">
    <!-- NASDAQ -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608060">NASDAQ</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">26,683.94</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+3.39%</text>
    </g>
    <!-- S&P 500 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608060">S&amp;P 500</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">7,554.29</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+2.16%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608060">NVDA</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$212.45</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+3.70%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(860, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608060">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">4.469%</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#7aaa80">소폭 하락 ↓</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#0e1810" stroke-width="1"/>
  <text x="80" y="682" font-family="monospace" font-size="10" letter-spacing="2" fill="#486048">※ 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="682" font-family="monospace" font-size="10" letter-spacing="2" fill="#486048" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
