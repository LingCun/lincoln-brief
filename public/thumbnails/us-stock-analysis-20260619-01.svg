      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">30일 저점</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e8f0ff">$372.10</text>
      <text x="0" y="93" font-family="monospace" font-size="14" fill="#6ba368">저점 대비 +9.4%</text>
    </g>
