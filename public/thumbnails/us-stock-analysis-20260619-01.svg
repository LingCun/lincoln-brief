<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab8ff"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2a7adf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#4a9eff" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f0ff">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#4a9eff">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" text-anchor="end">2026.06.19 · STOCK ANALYSIS</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#4a9eff">— BROADCOM · AVGO —</text>
  <text x="80" y="265" font-family="Georgia, serif" font-size="72" font-weight="500" fill="#e8f0ff">$407.155</text>
  <text x="80" y="335" font-family="Georgia, serif" font-size="52" font-style="italic" fill="url(#blue)">이틀 연속 강세</text>
  <text x="80" y="385" font-family="sans-serif" font-size="18" fill="#7a9ab8">30일 저점 $372.10에서 +9.4% 반등 · AI 칩 공급자 역행 상승</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- 6/17 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">6/17 종가</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e8f0ff">$392.90</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+4.30%</text>
    </g>
    <!-- 6/18 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">6/18 종가</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e8f0ff">$407.155</text>
      <polygon points="0,72 14,72 7,58" fill="#6ba368"/>
      <text x="22" y="79" font-family="monospace" font-size="14" fill="#6ba368">+3.63%</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9ab8">30일 고점</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="32" fill="#e8f0ff">$481.57</text>
      <text x="0" y="93" font-family="monospace" font-size="14" fill="#d96552">고점 대비 −15.5%</text>
    </g>
    <!-- 30일 저점 -->
