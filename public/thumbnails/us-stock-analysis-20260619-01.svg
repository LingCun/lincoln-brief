  <!-- 하단 라인 -->
  <line x1="80" y1="680" x2="1200" y2="680" stroke="#4a9eff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="705" font-family="monospace" font-size="10" letter-spacing="2" fill="#7a9ab8">AI 칩 공급자 vs 소비자 분화 · NVDA +2.80% · META +1.89%</text>
