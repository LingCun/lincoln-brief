<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#200e0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88868"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="440" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0d8d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.11 11:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 · FOMC D-7 —</text>

  <!-- Alert badge -->
  <rect x="80" y="176" width="760" height="30" rx="4" fill="#d96552" fill-opacity="0.18" stroke="#d96552" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e88868">세 기준 미충족 · NVDA $200.42 · USD/KRW 1,527 · June 8 저점(7,484)까지 214pt</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="66" font-weight="500" fill="#f0d8d0">KOSPI 7,698 · FOMC 7일 전</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">저점 방어가 이번 주 최우선</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#a07868">S&P 500 7,266.99 −1.87% · 세 기준선 모두 미충족 유지</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#2a1210" stroke-width="1"/>

  <!-- Scenario labels -->
  <g transform="translate(80, 468)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a06040">베이스</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f0d8d0">7,500~8,000</text>
      <text x="0" y="78" font-family="monospace" font-size="13" fill="#d0a090">박스권 40%</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a06040">베어</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f0d8d0">7,300~7,484</text>
      <text x="0" y="78" font-family="monospace" font-size="13" fill="#ff6050">저점 재시험 30%</text>
    </g>
    <!-- 불 -->
    <g transform="translate(500, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a06040">불</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f0d8d0">8,000~8,400</text>
      <text x="0" y="78" font-family="monospace" font-size="13" fill="#40c880">FOMC 반등 25%</text>
    </g>
    <!-- NVDA level -->
    <g transform="translate(760, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a06040">NVDA</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#f0d8d0">$200.42</text>
      <polygon points="0,64 14,80 28,64" fill="#ff6050"/>
      <text x="36" y="79" font-family="monospace" font-size="14" fill="#ff6050">−3.94%</text>
    </g>
  </g>

  <!-- Bottom signature -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#2a1210" stroke-width="1"/>
  <text x="80" y="664" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#7a5848">— Lincoln</text>
  <text x="1200" y="664" font-family="monospace" font-size="11" letter-spacing="2" fill="#504030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
