<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0f0c08"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#d8b87800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent-line)"/>

  <!-- Left gold bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.6"/>

  <!-- Lincoln Brief brand -->
  <text x="84" y="108" font-family="Georgia, serif" font-size="22" fill="#d8b878" opacity="0.9" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="84" y="135" font-family="Georgia, serif" font-size="13" fill="#a08858" letter-spacing="2">US MARKET · 독립기념일 주말판</text>

  <!-- Edition label top right -->
  <text x="1220" y="90" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.7" text-anchor="end">2026.07.04 · SLOT 01</text>
  <text x="1220" y="110" font-family="Georgia, serif" font-size="13" fill="#a08858" text-anchor="end">3일 연휴 · 코스피 조정</text>

  <!-- Main headline -->
  <text x="84" y="220" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#ffffff">S&amp;P 보합권, 코스피는 조정</text>

  <!-- S&P 500 main data -->
  <text x="84" y="300" font-family="Georgia, serif" font-size="34" fill="#d8b878">S&amp;P 500</text>
  <text x="290" y="300" font-family="Georgia, serif" font-size="34" fill="#ffffff">7,483.24</text>
  <polygon points="450,282 470,282 460,300" fill="#a0a0a0"/>
  <text x="480" y="300" font-family="Georgia, serif" font-size="28" fill="#a0a0a0">보합</text>

  <!-- Divider line -->
  <rect x="84" y="320" width="700" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- NASDAQ row -->
  <text x="84" y="360" font-family="Georgia, serif" font-size="24" fill="#a08858">NASDAQ</text>
  <text x="260" y="360" font-family="Georgia, serif" font-size="24" fill="#ffffff">25,832.67</text>
  <polygon points="440,360 455,344 425,344" fill="#e87050"/>
  <text x="462" y="360" font-family="Georgia, serif" font-size="20" fill="#e87050">-0.80%</text>

  <!-- DOW row -->
  <text x="620" y="360" font-family="Georgia, serif" font-size="24" fill="#a08858">DOW</text>
  <text x="690" y="360" font-family="Georgia, serif" font-size="24" fill="#ffffff">52,900.07</text>
  <polygon points="850,360 865,341 835,341" fill="#6ec46e"/>
  <text x="872" y="360" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+1.14%</text>

  <!-- Divider -->
  <rect x="84" y="380" width="700" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- Secondary data row -->
  <text x="84" y="420" font-family="Georgia, serif" font-size="22" fill="#a08858">코스피</text>
  <text x="180" y="420" font-family="Georgia, serif" font-size="22" fill="#ffffff">8,088.34</text>
  <polygon points="360,420 374,404 346,404" fill="#e87050"/>
  <text x="381" y="420" font-family="Georgia, serif" font-size="20" fill="#e87050">-2.59%</text>

  <text x="560" y="420" font-family="Georgia, serif" font-size="22" fill="#a08858">코스닥</text>
  <text x="660" y="420" font-family="Georgia, serif" font-size="22" fill="#ffffff">868.41</text>
  <polygon points="800,420 814,404 786,404" fill="#e87050"/>
  <text x="821" y="420" font-family="Georgia, serif" font-size="20" fill="#e87050">-6.56%</text>

  <text x="84" y="465" font-family="Georgia, serif" font-size="22" fill="#a08858">USD/KRW</text>
  <text x="210" y="465" font-family="Georgia, serif" font-size="22" fill="#ffffff">1,530.39</text>
  <polygon points="360,449 374,465 346,465" fill="#6ec46e"/>
  <text x="381" y="465" font-family="Georgia, serif" font-size="20" fill="#6ec46e">-1.38%</text>

  <text x="560" y="465" font-family="Georgia, serif" font-size="22" fill="#a08858">Gold</text>
  <text x="630" y="465" font-family="Georgia, serif" font-size="22" fill="#ffffff">$4,182.60</text>
  <polygon points="820,449 834,465 806,465" fill="#6ec46e"/>
  <text x="841" y="465" font-family="Georgia, serif" font-size="20" fill="#6ec46e">+1.70%</text>

  <!-- Bottom accent / divider -->
  <rect x="84" y="500" width="700" height="1" fill="#d8b878" opacity="0.25"/>

  <!-- Footer note -->
  <text x="84" y="535" font-family="Georgia, serif" font-size="19" fill="#d8b878" opacity="0.85">최근 확정치는 7/2(목) 마감 · 정규장 7/6(월) 재개</text>

  <!-- Small diamond brand mark -->
  <polygon points="84,590 92,582 100,590 92,598" fill="#d8b878" opacity="0.5"/>
  <text x="110" y="595" font-family="Georgia, serif" font-size="14" fill="#a08858">lincoln-brief.vercel.app</text>

  <!-- Right side decorative bar -->
  <rect x="1200" y="60" width="1" height="600" fill="#d8b878" opacity="0.15"/>

  <!-- Gold diamond accent top right -->
  <polygon points="1240,60 1260,40 1280,60 1260,80" fill="#d8b878" opacity="0.3"/>
</svg>
