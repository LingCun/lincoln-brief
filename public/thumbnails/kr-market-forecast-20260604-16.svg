<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#140808"/>
      <stop offset="100%" style="stop-color:#1f1010"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Red accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="#e05555"/>

  <!-- Left red stripe -->
  <rect x="60" y="80" width="3" height="560" fill="#e05555" opacity="0.6"/>

  <!-- Lincoln Brief mark -->
  <text x="80" y="60" font-family="Georgia, serif" font-size="18" fill="#e05555" letter-spacing="4">LINCOLN BRIEF</text>
  <text x="80" y="80" font-family="Georgia, serif" font-size="13" fill="#e05555" opacity="0.6" letter-spacing="2">KR MARKET FORECAST</text>

  <!-- Edition label -->
  <text x="1200" y="55" font-family="Georgia, serif" font-size="14" fill="#e05555" text-anchor="end" opacity="0.8">2026.06.04</text>
  <text x="1200" y="75" font-family="Georgia, serif" font-size="12" fill="#e05555" text-anchor="end" opacity="0.5">SLOT 16:00 KST</text>

  <!-- Main headline -->
  <text x="80" y="160" font-family="Georgia, serif" font-size="40" fill="#aaaaaa">KOSPI 최종 마감</text>
  <text x="80" y="240" font-family="Georgia, serif" font-size="96" fill="#ffffff" font-weight="bold">8,639</text>

  <!-- Down arrow -->
  <polygon points="540,185 590,185 565,230" fill="#e05555"/>
  <text x="600" y="230" font-family="Georgia, serif" font-size="72" fill="#e05555" font-weight="bold">-1.84%</text>

  <!-- Divider -->
  <rect x="80" y="260" width="1120" height="1" fill="#e05555" opacity="0.3"/>

  <!-- ATH label -->
  <text x="80" y="295" font-family="Georgia, serif" font-size="22" fill="#cccccc">ATH(8,829) 이후 −190p · 8,600 지지선까지 39포인트</text>

  <!-- Scenario table header -->
  <text x="80" y="345" font-family="Georgia, serif" font-size="16" fill="#e05555" letter-spacing="2" opacity="0.8">— 향후 3~4주 시나리오 (마감 기준 업데이트)</text>

  <!-- Scenario rows -->
  <!-- Bear case highlight -->
  <rect x="80" y="360" width="1120" height="50" fill="#e05555" opacity="0.12" rx="3"/>
  <text x="100" y="392" font-family="Georgia, serif" font-size="20" fill="#e05555" font-weight="bold">베어 케이스</text>
  <text x="340" y="392" font-family="Georgia, serif" font-size="20" fill="#e05555" font-weight="bold">45%↑</text>
  <text x="480" y="392" font-family="Georgia, serif" font-size="18" fill="#cccccc">8,200~8,500 · 8,600 이탈 + USD/KRW 1,540+</text>

  <rect x="80" y="420" width="1120" height="44" fill="#ffffff" opacity="0.03" rx="3"/>
  <text x="100" y="449" font-family="Georgia, serif" font-size="20" fill="#aaaaaa">베이스</text>
  <text x="340" y="449" font-family="Georgia, serif" font-size="20" fill="#aaaaaa">35%↓</text>
  <text x="480" y="449" font-family="Georgia, serif" font-size="18" fill="#888888">8,400~8,700 · 8,600 지지 + 1,540원 미만</text>

  <rect x="80" y="474" width="1120" height="44" fill="#ffffff" opacity="0.03" rx="3"/>
  <text x="100" y="503" font-family="Georgia, serif" font-size="20" fill="#aaaaaa">불 케이스</text>
  <text x="340" y="503" font-family="Georgia, serif" font-size="20" fill="#aaaaaa">15%</text>
  <text x="480" y="503" font-family="Georgia, serif" font-size="18" fill="#888888">8,800+ · 미국 금리 4.3% + 원화 강세 전환</text>

  <rect x="80" y="528" width="1120" height="40" fill="#ffffff" opacity="0.03" rx="3"/>
  <text x="100" y="553" font-family="Georgia, serif" font-size="18" fill="#666666">블랙 스완</text>
  <text x="340" y="553" font-family="Georgia, serif" font-size="18" fill="#666666">5%</text>
  <text x="480" y="553" font-family="Georgia, serif" font-size="16" fill="#666666">8,000 이하 · 글로벌 매크로 충격</text>

  <!-- Bottom divider -->
  <rect x="0" y="590" width="1280" height="1" fill="#e05555" opacity="0.2"/>

  <!-- Watch levels -->
  <text x="80" y="625" font-family="Georgia, serif" font-size="18" fill="#e05555" opacity="0.9">내일 핵심 감시 레벨 ▶</text>
  <text x="330" y="625" font-family="Georgia, serif" font-size="18" fill="#ffffff">KOSPI 8,600 · USD/KRW 1,540 · 삼성전자 350,000원</text>

  <!-- Bottom bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#e05555"/>

  <!-- Small diamond -->
  <polygon points="640,710 645,705 650,710 645,715" fill="#e05555" opacity="0.6"/>
</svg>
