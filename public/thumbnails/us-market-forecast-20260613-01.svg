<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#120808"/>
      <stop offset="100%" style="stop-color:#1e0e0e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552"/>
      <stop offset="100%" style="stop-color:#ef8070"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left red accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d96552"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#d96552" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#d96552" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="#d96552" opacity="0.15"/>
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="none" stroke="#d96552" stroke-width="1" opacity="0.5"/>
  <text x="1140" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#d96552" text-anchor="middle">MARKET FORECAST</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">2026.06.13  |  SLOT 01  |  KST 01:00</text>

  <!-- Divider -->
  <line x1="48" y1="110" x2="700" y2="110" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <!-- Main headline -->
  <text x="48" y="186" font-family="'Georgia', serif" font-size="46" fill="#f5f0e8" font-weight="bold">S&amp;P 7,430.58</text>
  <text x="48" y="242" font-family="'Georgia', serif" font-size="30" fill="#d96552">7,400 돌파 · 비둘기 반전 38%</text>

  <!-- Scenario bars -->
  <text x="48" y="288" font-family="'Arial', sans-serif" font-size="13" fill="#888" letter-spacing="2">4주 시나리오</text>
  <line x1="48" y1="296" x2="730" y2="296" stroke="#d96552" stroke-width="1" opacity="0.2"/>

  <!-- 비둘기 반전 38% -->
  <rect x="48" y="308" width="274" height="52" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="60" y="330" font-family="'Arial', sans-serif" font-size="13" fill="#22c55e">비둘기 반전</text>
  <text x="60" y="350" font-family="'Arial', sans-serif" font-size="12" fill="#888">7,500~7,600 · CPI 완화 필요</text>
  <text x="305" y="342" font-family="'Georgia', serif" font-size="22" fill="#22c55e" text-anchor="end" font-weight="bold">38%</text>

  <!-- 중립 유지 36% -->
  <rect x="48" y="370" width="260" height="52" rx="4" fill="#1a1608" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="60" y="392" font-family="'Arial', sans-serif" font-size="13" fill="#d8b878">중립 유지</text>
  <text x="60" y="412" font-family="'Arial', sans-serif" font-size="12" fill="#888">7,300~7,500 박스</text>
  <text x="291" y="404" font-family="'Georgia', serif" font-size="22" fill="#d8b878" text-anchor="end">36%</text>

  <!-- 매파 고착 20% -->
  <rect x="48" y="432" width="210" height="52" rx="4" fill="#1a0808" stroke="#d96552" stroke-width="1" opacity="0.7"/>
  <text x="60" y="454" font-family="'Arial', sans-serif" font-size="13" fill="#d96552">매파 고착</text>
  <text x="60" y="474" font-family="'Arial', sans-serif" font-size="12" fill="#888">7,000~7,200 하방</text>
  <text x="240" y="466" font-family="'Georgia', serif" font-size="22" fill="#d96552" text-anchor="end">20%</text>

  <!-- 블랙스완 6% -->
  <rect x="48" y="494" width="140" height="52" rx="4" fill="#0a0808" stroke="#888" stroke-width="1" opacity="0.5"/>
  <text x="60" y="516" font-family="'Arial', sans-serif" font-size="13" fill="#888">블랙스완</text>
  <text x="60" y="536" font-family="'Arial', sans-serif" font-size="12" fill="#666">6,800 이하</text>
  <text x="172" y="528" font-family="'Georgia', serif" font-size="22" fill="#888" text-anchor="end">6%</text>

  <!-- Key levels -->
  <line x1="48" y1="562" x2="730" y2="562" stroke="#d96552" stroke-width="1" opacity="0.2"/>
  <text x="48" y="586" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">다음 목표: 7,500  |  지지: 7,394  |  WTI $82 주시</text>

  <!-- Right side panel -->
  <rect x="820" y="100" width="420" height="560" rx="8" fill="#0e0808" stroke="#d96552" stroke-width="1" opacity="0.3"/>
  <text x="1030" y="155" font-family="'Georgia', serif" font-size="18" fill="#d96552" text-anchor="middle" opacity="0.9">비둘기 반전 조건 점검</text>
  <line x1="860" y1="172" x2="1200" y2="172" stroke="#d96552" stroke-width="1" opacity="0.3"/>

  <text x="860" y="212" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">WTI $87 이하</text>
  <text x="1195" y="212" font-family="'Arial', sans-serif" font-size="14" fill="#22c55e" text-anchor="end">✓ $84.68</text>

  <text x="860" y="252" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">S&amp;P 7,400 돌파</text>
  <text x="1195" y="252" font-family="'Arial', sans-serif" font-size="14" fill="#22c55e" text-anchor="end">✓ 7,430</text>

  <text x="860" y="292" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">US10Y 4.4% 이하</text>
  <text x="1195" y="292" font-family="'Arial', sans-serif" font-size="14" fill="#f59e0b" text-anchor="end">△ 4.481%</text>

  <text x="860" y="332" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">CPI 에너지 완화</text>
  <text x="1195" y="332" font-family="'Arial', sans-serif" font-size="14" fill="#888" text-anchor="end">— 예비</text>

  <text x="860" y="372" font-family="'Arial', sans-serif" font-size="14" fill="#aaa">파월 인하 신호</text>
  <text x="1195" y="372" font-family="'Arial', sans-serif" font-size="14" fill="#888" text-anchor="end">— 미확인</text>

  <line x1="860" y1="395" x2="1200" y2="395" stroke="#d96552" stroke-width="1" opacity="0.2"/>

  <text x="1030" y="442" font-family="'Georgia', serif" font-size="32" fill="#d96552" text-anchor="middle" font-weight="bold">2 / 5</text>
  <text x="1030" y="472" font-family="'Arial', sans-serif" font-size="16" fill="#aaa" text-anchor="middle">조건 충족</text>

  <line x1="860" y1="496" x2="1200" y2="496" stroke="#d96552" stroke-width="1" opacity="0.2"/>

  <text x="1030" y="540" font-family="'Arial', sans-serif" font-size="15" fill="#aaa" text-anchor="middle">WTI $84.68 · 이틀 합산 −7.8%</text>
  <text x="1030" y="568" font-family="'Arial', sans-serif" font-size="15" fill="#aaa" text-anchor="middle">이란 프리미엄 소화 완료</text>

  <line x1="860" y1="590" x2="1200" y2="590" stroke="#d96552" stroke-width="1" opacity="0.2"/>
  <text x="1030" y="630" font-family="'Georgia', serif" font-size="16" fill="#d96552" text-anchor="middle" opacity="0.8">Lincoln Brief — 01:00 KST</text>
</svg>
