<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0c10"/>
      <stop offset="100%" stop-color="#080608"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c06060" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c06060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="900" cy="250" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="600" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.06 · STOCK ANALYSIS · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 종목 분석 —</text>

  <!-- 종목명 + 가격 -->
  <text x="80" y="270" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="700" fill="#e8d8a0">AVGO</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="44" font-style="italic" fill="url(#gold)">$385.73</text>

  <!-- 변화율 표시 -->
  <polygon points="590,300 575,320 605,320" fill="#c06060"/>
  <text x="620" y="320" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#c06060">−7.92%</text>

  <!-- 서브 정보 -->
  <text x="80" y="390" font-family="sans-serif" font-size="20" fill="#a09060">6/5 최종 마감 확정  |  이틀 누적 −19.5% (6/3 고점 ~$479 기준)</text>

  <!-- 이틀 데이터 표 -->
  <g transform="translate(80, 440)">
    <line x1="0" y1="0" x2="560" y2="0" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- 날짜 행 -->
    <text x="0" y="30" font-family="monospace" font-size="14" fill="#a09060">6/3 고점</text>
    <text x="200" y="30" font-family="monospace" font-size="14" fill="#e8d8a0">~$479.23</text>
    <text x="380" y="30" font-family="monospace" font-size="14" fill="#a09060">기준점</text>

    <text x="0" y="60" font-family="monospace" font-size="14" fill="#a09060">6/4 마감</text>
    <text x="200" y="60" font-family="monospace" font-size="14" fill="#c06060">$418.91</text>
    <text x="380" y="60" font-family="monospace" font-size="14" fill="#c06060">−12.59%</text>

    <text x="0" y="90" font-family="monospace" font-size="14" font-weight="700" fill="#e8d8a0">6/5 최종</text>
    <text x="200" y="90" font-family="monospace" font-size="14" font-weight="700" fill="#c06060">$385.73</text>
    <text x="380" y="90" font-family="monospace" font-size="14" font-weight="700" fill="#c06060">−7.92%</text>
    <line x1="0" y1="105" x2="560" y2="105" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.5"/>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="648" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">AI 가이던스 쇼크 + US10Y 4.536% 이중 압박</text>
  <text x="80" y="672" font-family="monospace" font-size="11" fill="#806040">lincoln-brief.vercel.app</text>
</svg>
