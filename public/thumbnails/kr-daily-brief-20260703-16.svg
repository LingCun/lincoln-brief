<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a04"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#907840" letter-spacing="2">KR MARKET · 반도체 투톱 반등 마감</text>

  <!-- Edition label -->
  <rect x="970" y="28" width="270" height="36" rx="3" fill="#d8b878" fill-opacity="0.08" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1105" y="51" font-family="Georgia, serif" font-size="14" fill="#b09050" text-anchor="middle" letter-spacing="1">2026.07.03 · 16:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,104 651,115 640,126 629,115" fill="#d8b878" fill-opacity="0.9"/>

  <!-- Main headline -->
  <text x="640" y="162" font-family="Georgia, serif" font-size="17" fill="#907840" text-anchor="middle" letter-spacing="2">SK하이닉스 +10.88%·삼성전자 +8.22% — KOSDAQ도 플러스 전환</text>

  <!-- KOSPI / KOSDAQ split display -->
  <text x="320" y="230" font-family="Georgia, serif" font-size="14" fill="#807040" text-anchor="middle" letter-spacing="2">KOSPI</text>
  <text x="320" y="295" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">8,088</text>
  <text x="320" y="325" font-family="Georgia, serif" font-size="18" fill="#909090" text-anchor="middle">.34</text>
  <!-- Up triangle for KOSPI -->
  <polygon points="224,334 236,320 248,334" fill="#4ade80"/>
  <text x="258" y="339" font-family="Georgia, serif" font-size="26" fill="#4ade80" font-weight="bold">+5.76%</text>
  <text x="320" y="375" font-family="Georgia, serif" font-size="12" fill="#405030" text-anchor="middle">마감 · 반등폭 오후 들어 확대</text>

  <!-- Vertical divider -->
  <line x1="640" y1="195" x2="640" y2="395" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- KOSDAQ -->
  <text x="960" y="230" font-family="Georgia, serif" font-size="14" fill="#807040" text-anchor="middle" letter-spacing="2">KOSDAQ</text>
  <text x="960" y="295" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">868</text>
  <text x="960" y="325" font-family="Georgia, serif" font-size="18" fill="#909090" text-anchor="middle">.41</text>
  <!-- Up triangle for KOSDAQ (flipped positive) -->
  <polygon points="890,334 902,320 914,334" fill="#4ade80"/>
  <text x="924" y="339" font-family="Georgia, serif" font-size="26" fill="#4ade80" font-weight="bold">+0.19%</text>
  <text x="960" y="375" font-family="Georgia, serif" font-size="12" fill="#304530" text-anchor="middle">오후 1시31분 -2.25%서 반전</text>

  <!-- Divider line -->
  <line x1="80" y1="410" x2="1200" y2="410" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Stats panels -->
  <rect x="80" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="260" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="260" y="500" font-family="Georgia, serif" font-size="30" fill="#ffffff" text-anchor="middle" font-weight="bold">2,425,000원</text>
  <polygon points="180,522 192,508 204,522" fill="#4ade80"/>
  <text x="218" y="527" font-family="Georgia, serif" font-size="22" fill="#4ade80" font-weight="bold">+10.88%</text>
  <text x="260" y="558" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">top12 최대 상승</text>
  <text x="260" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">삼성전자 +8.22%</text>
  <text x="260" y="622" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">반도체 동반 반등 확대</text>

  <rect x="460" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="640" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">NAVER</text>
  <text x="640" y="500" font-family="Georgia, serif" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="bold">195,800원</text>
  <polygon points="560,508 572,522 584,508" fill="#f87171"/>
  <text x="598" y="527" font-family="Georgia, serif" font-size="22" fill="#f87171" font-weight="bold">-2.05%</text>
  <text x="640" y="558" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">top12 중 유일한 하락</text>
  <text x="640" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">POSCO홀딩스 +0.79%</text>
  <text x="640" y="622" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">플러스로 전환</text>

  <rect x="840" y="426" width="360" height="240" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1020" y="454" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">USD/KRW</text>
  <text x="1020" y="500" font-family="Georgia, serif" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="bold">1,530.48원</text>
  <polygon points="940,508 952,522 964,508" fill="#f87171"/>
  <text x="978" y="527" font-family="Georgia, serif" font-size="22" fill="#f87171" font-weight="bold">-1.37%</text>
  <text x="1020" y="558" font-family="Georgia, serif" font-size="12" fill="#806040" text-anchor="middle">오후 들어 하락폭 확대</text>
  <text x="1020" y="600" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">자금 유입 확산</text>
  <text x="1020" y="622" font-family="Georgia, serif" font-size="12" fill="#605040" text-anchor="middle">해석에 힘 실려</text>

  <!-- Bottom signature -->
  <text x="640" y="696" font-family="Georgia, serif" font-size="12" fill="#605030" text-anchor="middle" letter-spacing="1">lincoln-brief.vercel.app · KR Daily Brief</text>
</svg>
