<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4b8eda" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4b8eda" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05555" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#e05555" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="420" fill="url(#glow1)"/>
  <circle cx="150" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.03 16:00 KST · KR 시장 예측</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시나리오 업데이트 —</text>

  <!-- Warning badge -->
  <rect x="80" y="176" width="380" height="30" rx="4" fill="#e05555" fill-opacity="0.15" stroke="#e05555" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e05555">⚠ 오전 경고 레벨 1,525원 → 오후 1,526원 돌파</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">KOSPI 시나리오</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">베어 케이스 25% → 30%</text>
  <text x="80" y="408" font-family="sans-serif" font-size="16" fill="#8a9898">불 케이스 20% → 15% · WTI $96.34 추가 상승</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#0e1828" stroke-width="1"/>

  <!-- Scenario table -->
  <g transform="translate(80, 468)">
    <!-- Base -->
    <g>
      <rect x="0" y="0" width="8" height="60" fill="#4b8eda"/>
      <text x="18" y="22" font-family="monospace" font-size="12" fill="#d8b878">베이스</text>
      <text x="18" y="44" font-family="monospace" font-size="16" fill="#f5edd9">8,600~9,000</text>
      <text x="18" y="62" font-family="monospace" font-size="11" fill="#4b8eda">50%</text>
    </g>
    <!-- Bull -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="8" height="60" fill="#4db86b"/>
      <text x="18" y="22" font-family="monospace" font-size="12" fill="#d8b878">불 케이스</text>
      <text x="18" y="44" font-family="monospace" font-size="16" fill="#f5edd9">9,000 돌파</text>
      <text x="18" y="62" font-family="monospace" font-size="11" fill="#4db86b">15% ▼</text>
    </g>
    <!-- Bear -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="8" height="60" fill="#e05555"/>
      <text x="18" y="22" font-family="monospace" font-size="12" fill="#d8b878">베어 케이스</text>
      <text x="18" y="44" font-family="monospace" font-size="16" fill="#f5edd9">8,300~8,700</text>
      <text x="18" y="62" font-family="monospace" font-size="11" fill="#e05555">30% ▲</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(800, 0)">
      <rect x="0" y="0" width="8" height="60" fill="#e05555"/>
      <text x="18" y="22" font-family="monospace" font-size="12" fill="#d8b878">USD/KRW</text>
      <text x="18" y="44" font-family="Playfair Display, Georgia, serif" font-size="20" fill="#e05555">1,526원</text>
      <text x="18" y="62" font-family="monospace" font-size="11" fill="#e05555">1,525 경계 돌파</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#0e1828" stroke-width="1"/>
  <text x="80" y="685" font-family="monospace" font-size="11" fill="#3a4a6a">lincoln-brief.vercel.app</text>
  <text x="1200" y="685" font-family="monospace" font-size="11" fill="#3a4a6a" text-anchor="end">정보 제공 목적 · 투자 권유 아님</text>
</svg>
