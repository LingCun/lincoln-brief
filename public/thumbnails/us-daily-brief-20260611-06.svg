  <text x="48" y="550" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">WMT</text>
  <polygon points="108,552 118,540 128,552" fill="#22c55e"/>
  <text x="133" y="550" font-family="'Arial', sans-serif" font-size="16" fill="#22c55e">+1.44%</text>
  <text x="218" y="550" font-family="'Arial', sans-serif" font-size="14" fill="#666">$120.59</text>

  <!-- AAPL positive -->
  <text x="420" y="550" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">AAPL</text>
  <polygon points="490,552 500,540 510,552" fill="#22c55e"/>
  <text x="515" y="550" font-family="'Arial', sans-serif" font-size="16" fill="#22c55e">+0.35%</text>
  <text x="600" y="550" font-family="'Arial', sans-serif" font-size="14" fill="#666">$291.58</text>

  <!-- US10Y / Gold row -->
  <text x="48" y="590" font-family="'Arial', sans-serif" font-size="14" fill="#888">US10Y</text>
  <text x="130" y="590" font-family="'Arial', sans-serif" font-size="16" fill="#d8b878" font-weight="bold">4.542%</text>
  <text x="260" y="590" font-family="'Arial', sans-serif" font-size="14" fill="#888">GOLD</text>
  <text x="320" y="590" font-family="'Arial', sans-serif" font-size="14" fill="#ef4444">$4,094  −3.89%</text>
  <text x="500" y="590" font-family="'Arial', sans-serif" font-size="14" fill="#888">USD/KRW</text>
  <text x="610" y="590" font-family="'Arial', sans-serif" font-size="14" fill="#22c55e">1,520.96</text>

  <!-- Bottom accent line -->
  <rect x="0" y="717" width="1280" height="3" fill="#d8b878" opacity="0.4"/>

  <!-- Lincoln signature -->
  <text x="1232" y="700" font-family="'Georgia', serif" font-size="16" fill="#d8b878" text-anchor="end" opacity="0.7">— Lincoln</text>
</svg>
