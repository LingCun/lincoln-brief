  <text x="420" y="514" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">NVDA</text>
  <polygon points="500,504 520,504 510,516" fill="#ef4444"/>
  <text x="525" y="514" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−3.73%</text>
  <text x="608" y="514" font-family="'Arial', sans-serif" font-size="14" fill="#666">$200.42</text>

