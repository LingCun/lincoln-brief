  <line x1="48" y1="448" x2="740" y2="448" stroke="#333" stroke-width="1"/>

  <!-- AVGO -->
  <text x="48" y="478" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">AVGO</text>
  <polygon points="130,468 150,468 140,480" fill="#ef4444"/>
  <text x="155" y="478" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444" font-weight="bold">−5.12%</text>
  <text x="248" y="478" font-family="'Arial', sans-serif" font-size="14" fill="#666">$372.10  ★ 지지선 이탈</text>

  <!-- TSLA -->
  <text x="48" y="514" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">TSLA</text>
  <polygon points="118,504 138,504 128,516" fill="#ef4444"/>
  <text x="143" y="514" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−3.80%</text>
  <text x="228" y="514" font-family="'Arial', sans-serif" font-size="14" fill="#666">$381.59</text>

