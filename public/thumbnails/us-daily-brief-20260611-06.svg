  <text x="48" y="186" font-family="'Georgia', serif" font-size="46" fill="#f5f0e8" font-weight="bold">DOW 50,000 붕괴</text>
  <text x="48" y="244" font-family="'Georgia', serif" font-size="34" fill="#d8b878">FOMC · 이란 이중 충격</text>

  <!-- Key stats row -->
  <!-- S&P 500 -->
  <rect x="48" y="292" width="218" height="92" rx="6" fill="#1e180e" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="157" y="322" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle" letter-spacing="1">S&amp;P 500</text>
  <text x="157" y="356" font-family="'Georgia', serif" font-size="26" fill="#f5f0e8" text-anchor="middle" font-weight="bold">7,266.99</text>
  <polygon points="144,368 164,368 154,380" fill="#ef4444"/>
  <text x="169" y="379" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−1.62%</text>

  <!-- NASDAQ -->
  <rect x="282" y="292" width="218" height="92" rx="6" fill="#1e180e" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="391" y="322" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle" letter-spacing="1">NASDAQ</text>
  <text x="391" y="356" font-family="'Georgia', serif" font-size="26" fill="#f5f0e8" text-anchor="middle" font-weight="bold">25,169</text>
  <polygon points="378,368 398,368 388,380" fill="#ef4444"/>
  <text x="403" y="379" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−1.98%</text>

  <!-- DOW highlight — special alert styling -->
  <rect x="516" y="282" width="230" height="112" rx="6" fill="#1a0606" stroke="#ef4444" stroke-width="2"/>
  <text x="631" y="314" font-family="'Arial', sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" letter-spacing="1">DOW ⚠ 50K 이탈</text>
  <text x="631" y="350" font-family="'Georgia', serif" font-size="28" fill="#f5f0e8" text-anchor="middle" font-weight="bold">49,918</text>
  <polygon points="618,362 638,362 628,374" fill="#ef4444"/>
  <text x="643" y="373" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444" font-weight="bold">−1.87%</text>

  <!-- WTI highlight box -->
  <rect x="762" y="282" width="470" height="224" rx="8" fill="#1a0a06" stroke="#f97316" stroke-width="2"/>
  <text x="997" y="320" font-family="'Arial', sans-serif" font-size="14" fill="#f97316" text-anchor="middle" letter-spacing="2">WTI CRUDE OIL</text>
  <text x="997" y="392" font-family="'Georgia', serif" font-size="64" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$91.85</text>
  <polygon points="950,428 970,416 990,428" fill="#f97316"/>
  <text x="997" y="448" font-family="'Arial', sans-serif" font-size="28" fill="#f97316" text-anchor="middle" font-weight="bold">+4.14%</text>
  <text x="997" y="490" font-family="'Arial', sans-serif" font-size="13" fill="#f97316" text-anchor="middle" opacity="0.8">이틀 연속 $91 이상 · 이란 지정학</text>

