<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a06"/>
      <stop offset="100%" style="stop-color:#1a140a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878"/>
      <stop offset="100%" style="stop-color:#f0d090"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d8b878"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#d8b878" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#d8b878" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="#d8b878" opacity="0.15"/>
  <rect x="1040" y="28" width="200" height="36" rx="4" fill="none" stroke="#d8b878" stroke-width="1" opacity="0.5"/>
  <text x="1140" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#d8b878" text-anchor="middle">US DAILY BRIEF</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">2026.06.11  |  SLOT 06  |  KST 06:00</text>

