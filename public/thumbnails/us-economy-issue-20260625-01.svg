<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c08"/>
      <stop offset="100%" style="stop-color:#0e1812"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50c878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#50c878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#50c878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#50c878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#50c878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#50c878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#greenLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#50c878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#308050" letter-spacing="2">US MARKET · ECONOMY ISSUE</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#50c878" fill-opacity="0.1" stroke="#50c878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#70c898" text-anchor="middle" letter-spacing="1">2026.06.25 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#50c878" fill-opacity="0.5"/>

  <!-- WTI main display -->
  <text x="640" y="168" font-family="Georgia, serif" font-size="20" fill="#70c898" text-anchor="middle" letter-spacing="4">WTI 원유 · CL=F</text>
  <text x="640" y="260" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$70.62</text>
  <polygon points="548,282 566,300 584,282" fill="#f87171"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−3.54%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">하루 −3.54% 급락 · $70 선 부근 · 매크로 신호 분석</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#50c878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: other commodities -->
  <rect x="80" y="386" width="460" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="310" y="418" font-family="Georgia, serif" font-size="15" fill="#c06060" text-anchor="middle" letter-spacing="1">원자재·가상자산 동반 하락</text>
  <text x="140" y="452" font-family="Georgia, serif" font-size="13" fill="#888888">WTI</text>
  <text x="520" y="452" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end" font-weight="bold">$70.62 (−3.54%)</text>
  <text x="140" y="482" font-family="Georgia, serif" font-size="13" fill="#888888">Gold</text>
  <text x="520" y="482" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end" font-weight="bold">$4,021.00 (−2.64%)</text>
  <text x="140" y="512" font-family="Georgia, serif" font-size="13" fill="#888888">BTC</text>
  <text x="520" y="512" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end" font-weight="bold">$60,432 (−3.39%)</text>
  <text x="140" y="546" font-family="Georgia, serif" font-size="13" fill="#888888">S&amp;P 500</text>
  <text x="520" y="546" font-family="Georgia, serif" font-size="16" fill="#4ade80" text-anchor="end" font-weight="bold">7,407.12 (+0.57%)</text>
  <text x="310" y="580" font-family="Georgia, serif" font-size="12" fill="#705050" text-anchor="middle">주식 반등 vs 실물 자산 전면 약세</text>

  <!-- Right panel: three interpretations -->
  <rect x="580" y="386" width="620" height="208" rx="4" fill="#50c878" fill-opacity="0.03" stroke="#50c878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="890" y="418" font-family="Georgia, serif" font-size="15" fill="#70c898" text-anchor="middle" letter-spacing="1">WTI 하락 해석</text>
  <text x="620" y="450" font-family="Georgia, serif" font-size="13" fill="#4ade80">① 공급 증가</text>
  <text x="1180" y="450" font-family="Georgia, serif" font-size="12" fill="#507050" text-anchor="end">인플레 완화 → Fed 금리 인하 여지 ↑</text>
  <text x="620" y="480" font-family="Georgia, serif" font-size="13" fill="#f87171">② 수요 둔화</text>
  <text x="1180" y="480" font-family="Georgia, serif" font-size="12" fill="#705050" text-anchor="end">글로벌 성장 약화 → 주식 장기 부담</text>
  <text x="620" y="510" font-family="Georgia, serif" font-size="13" fill="#d8b878">③ 달러 강세</text>
  <text x="1180" y="510" font-family="Georgia, serif" font-size="12" fill="#706040" text-anchor="end">달러 표시 원자재 일제 하락</text>
  <line x1="620" y1="524" x2="1180" y2="524" stroke="#50c878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="620" y="548" font-family="Georgia, serif" font-size="13" fill="#70c898">다음 분기점</text>
  <text x="1180" y="548" font-family="Georgia, serif" font-size="13" fill="#507050" text-anchor="end">PCE 발표 → 인플레 경로 확인</text>
  <text x="620" y="576" font-family="Georgia, serif" font-size="12" fill="#405040">Gold $4,000 선·US10Y 4.402% 동시 관찰 권장</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#50c878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#70c898" text-anchor="middle">Gold $4,021.00</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#506050" text-anchor="middle">−2.64% · $4,000 선 시험</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#70c898" text-anchor="middle">USD/KRW 1,540.00</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#506050" text-anchor="middle">+0.06% · 달러 강세 방향</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#70c898" text-anchor="middle">US10Y 4.402%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#506050" text-anchor="middle">−9.1bp · 인플레 기대 완화 신호</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#50c878" fill-opacity="0.35"/>
</svg>
