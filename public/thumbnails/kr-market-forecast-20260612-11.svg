<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#1a0c0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e87840" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e87840" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="440" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.12 11:00 KST · KR 시장예측</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— MARKET FORECAST —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="640" height="30" rx="4" fill="#e87840" fill-opacity="0.15" stroke="#e87840" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f8a870">FOMC D-6 · 불 시나리오 40% 상향 · 8,500 다음 저항</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#f5edd9">KOSPI 8,368 돌파</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">ATH(8,829)까지 461포인트 남았다</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#aa9888">June 8 저점(7,484)에서 884포인트 회복 · FOMC June 18~19</text>

  <!-- Divider -->
  <line x1="80" y1="442" x2="1200" y2="442" stroke="#281410" stroke-width="1"/>

  <!-- Scenario table -->
  <g transform="translate(80, 468)">
    <!-- 불 -->
    <rect x="0" y="0" width="220" height="70" rx="4" fill="#40e880" fill-opacity="0.12" stroke="#40e880" stroke-width="0.6"/>
    <text x="110" y="22" font-family="monospace" font-size="11" fill="#40e880" text-anchor="middle" letter-spacing="2">불 시나리오</text>
    <text x="110" y="44" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9" text-anchor="middle">40%</text>
    <text x="110" y="62" font-family="monospace" font-size="10" fill="#5ab870" text-anchor="middle">8,500 → ATH</text>

    <!-- 베이스 -->
    <rect x="240" y="0" width="220" height="70" rx="4" fill="#d8b878" fill-opacity="0.10" stroke="#d8b878" stroke-width="0.6"/>
    <text x="350" y="22" font-family="monospace" font-size="11" fill="#d8b878" text-anchor="middle" letter-spacing="2">베이스</text>
    <text x="350" y="44" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9" text-anchor="middle">35%</text>
    <text x="350" y="62" font-family="monospace" font-size="10" fill="#c8a858" text-anchor="middle">8,100~8,500 박스</text>

    <!-- 베어 -->
    <rect x="480" y="0" width="220" height="70" rx="4" fill="#e85050" fill-opacity="0.10" stroke="#e85050" stroke-width="0.6"/>
    <text x="590" y="22" font-family="monospace" font-size="11" fill="#e87070" text-anchor="middle" letter-spacing="2">베어</text>
    <text x="590" y="44" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9" text-anchor="middle">20%</text>
    <text x="590" y="62" font-family="monospace" font-size="10" fill="#c85858" text-anchor="middle">7,800~8,100 되돌림</text>

    <!-- 블랙스완 -->
    <rect x="720" y="0" width="220" height="70" rx="4" fill="#8080a8" fill-opacity="0.10" stroke="#8080a8" stroke-width="0.6"/>
    <text x="830" y="22" font-family="monospace" font-size="11" fill="#a0a0c0" text-anchor="middle" letter-spacing="2">블랙스완</text>
    <text x="830" y="44" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#f5edd9" text-anchor="middle">5%</text>
    <text x="830" y="62" font-family="monospace" font-size="10" fill="#7878a0" text-anchor="middle">7,484 재시험</text>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#483828">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#483828" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
