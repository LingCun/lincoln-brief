<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#070c18"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9de8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5590"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="420" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.01 11:00 KST · KR STOCK</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="300" height="30" rx="4" fill="#5677b0" fill-opacity="0.20" stroke="#5677b0" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#7a9de8">NAVER · 30일 신고가 재경신</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">NAVER 296,000</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#blue)">+26.50% · 이틀 연속</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#8a9898">30일 저점 191,500원 → 오늘 296,000원 (+54.6%)</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 474)">
    <!-- Price -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">오늘 종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">296,000원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+26.50%</text>
    </g>
    <!-- vs 30d low -->
    <g transform="translate(340, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">30일 저점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">+54.6%</text>
      <text x="0" y="95" font-family="monospace" font-size="13" fill="#7a9de8">191,500원 → 296,000원</text>
    </g>
    <!-- Kakao -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">카카오 동반</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">45,500원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+8.46%</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#1a2a4a" stroke-width="0.5"/>
  <text x="80" y="645" font-family="monospace" font-size="10" fill="#3a4a6a" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="645" font-family="monospace" font-size="10" fill="#5677b0" text-anchor="end">— Lincoln</text>
</svg>
