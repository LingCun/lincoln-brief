<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a10"/>
      <stop offset="100%" stop-color="#070e08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8fd48b"/>
      <stop offset="50%" stop-color="#6ba368"/>
      <stop offset="100%" stop-color="#4a7a47"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="320" fill="url(#glow1)"/>
  <circle cx="150" cy="550" r="250" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6ba368" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6ba368">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6ba368" text-anchor="end">2026.05.27 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6ba368">— 종목 분석 · AVGO —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">AVGO $422.55</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#green)">AI 칩 생태계의 조용한 선두주자</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#88a485">5/26 최대 상승  ·  커스텀 ASIC  ·  30일 +11.0%</text>

  <!-- 수치 카드 -->
  <g transform="translate(80, 440)">
    <!-- 종가 -->
    <g>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#6ba368" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#88a485">5/26 종가</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">$422.55</text>
      <polygon points="0,82 18,82 9,98" fill="#6ba368"/>
      <text x="26" y="99" font-family="monospace" font-size="15" fill="#6ba368">+2.03%</text>
    </g>
    <!-- 30일 변화 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#88a485">30일 수익률</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">+11.0%</text>
      <polygon points="0,82 18,82 9,98" fill="#d8b878"/>
      <text x="26" y="99" font-family="monospace" font-size="13" fill="#d8b878">$380→$422</text>
    </g>
    <!-- NVDA 비교 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#988e72" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#88a485">vs NVDA 30일</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">+8.8%</text>
      <text x="0" y="99" font-family="monospace" font-size="13" fill="#988e72">AVGO 우위</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1e3020" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#88a485">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#3a5040" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
