<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#070c14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7090c8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5690"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="150" cy="600" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#dce8f5">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.05.27 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 · 새벽판 —</text>

  <!-- 종목명 + 가격 -->
  <text x="80" y="270" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="600" fill="#dce8f5">AVGO</text>
  <text x="80" y="355" font-family="Playfair Display, Georgia, serif" font-size="52" fill="url(#blue)">$422.55</text>
  <g transform="translate(80, 365)">
    <polygon points="0,0 20,0 10,18" fill="#6ba368"/>
    <text x="28" y="14" font-family="monospace" font-size="22" fill="#6ba368">+2.03%</text>
    <text x="145" y="14" font-family="monospace" font-size="16" fill="#7a8a9a">오늘 최고 상승률</text>
  </g>

  <!-- 서브 헤드라인 -->
  <text x="80" y="440" font-family="Pretendard, sans-serif" font-size="20" fill="#8898a8">AI 맞춤형 실리콘 · 네트워킹 · 반도체 다변화</text>

  <!-- 통계 그리드 -->
  <g transform="translate(80, 510)">
    <!-- 30일 변화 -->
    <g>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7a8a">30일 변화</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#dce8f5">+11.0%</text>
    </g>
    <!-- 30일 시작가 -->
    <g transform="translate(220, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7a8a">30일 시작가</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#dce8f5">$380.78</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(480, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7a8a">30일 고점</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#dce8f5">$439.79</text>
    </g>
    <!-- AI 포지셔닝 -->
    <g transform="translate(730, 0)">
      <line x1="0" y1="0" x2="40" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7a8a">AI 포지션</text>
      <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#dce8f5">ASIC+NET</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1e2d3e" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#6a7a8a">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#3a4a5a" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
