<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080a12"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3070e0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3070e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.09 11:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="158" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="174" width="480" height="30" rx="4" fill="#3070e0" fill-opacity="0.18" stroke="#3070e0" stroke-width="0.8"/>
  <text x="92" y="194" font-family="monospace" font-size="12" letter-spacing="2" fill="#5090f0">SK하이닉스 · 000660.KS · KOSPI 대장주</text>

  <!-- Main title -->
  <text x="80" y="298" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">SK하이닉스</text>
  <text x="80" y="372" font-family="Playfair Display, Georgia, serif" font-size="52" font-style="italic" fill="url(#gold)">2,173,000원 +13.71%</text>
  <text x="80" y="418" font-family="sans-serif" font-size="17" fill="#8a9898">전일 −7.68% → 오늘 최대 상승 · AI 메모리 대장주 반등</text>

  <!-- Divider -->
  <line x1="80" y1="450" x2="1200" y2="450" stroke="#1a1a2a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 482)">
    <!-- 전일 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">전일 종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">1,911,000</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555" transform="rotate(180,14,80)"/>
      <text x="36" y="87" font-family="monospace" font-size="14" fill="#e05555">−7.68%</text>
    </g>
    <!-- 오늘 종가 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5090f0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#5090f0">오늘 종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">2,173,000</text>
      <polygon points="0,88 14,72 28,88" fill="#40d870" transform="rotate(180,14,80)"/>
      <text x="36" y="87" font-family="monospace" font-size="14" fill="#40d870">+13.71%</text>
    </g>
    <!-- 30일 고점 -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">30일 고점</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">2,363,000</text>
      <text x="0" y="87" font-family="monospace" font-size="14" fill="#d8b878">고점 대비 −8.1%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">NVDA</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$208.64</text>
      <polygon points="0,88 14,72 28,88" fill="#40d870" transform="rotate(180,14,80)"/>
      <text x="36" y="87" font-family="monospace" font-size="14" fill="#40d870">+1.73%</text>
    </g>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#1a1a2a" stroke-width="0.5"/>
  <text x="80" y="708" font-family="monospace" font-size="10" letter-spacing="2" fill="#6a5a40">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
