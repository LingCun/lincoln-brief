  <rect x="600" y="394" width="600" height="200" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">주요 낙폭</text>
  <text x="680" y="466" font-family="Georgia, serif" font-size="15" fill="#888888">현대차</text>
  <text x="1150" y="466" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−8.95%</text>
  <text x="680" y="494" font-family="Georgia, serif" font-size="15" fill="#888888">NAVER</text>
  <text x="1150" y="494" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−6.76%</text>
  <text x="680" y="522" font-family="Georgia, serif" font-size="15" fill="#888888">기아</text>
  <text x="1150" y="522" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−6.67%</text>
  <text x="680" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">삼성전자</text>
  <text x="1150" y="550" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−5.30%</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="13" fill="#705050">top12 中 10종목 하락</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">KOSDAQ 918.15</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−5.19% · 900선 위험</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,533.78원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.16% · 유일한 안전신호</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">GOOGL −4.99%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">AVGO −4.67% · 빅테크 급락</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
