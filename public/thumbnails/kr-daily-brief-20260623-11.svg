  <line x1="160" y1="372" x2="1120" y2="372" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- SK하이닉스 panel -->
  <rect x="80" y="394" width="480" height="200" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="320" y="490" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">2,713,000</text>
  <text x="320" y="514" font-family="Georgia, serif" font-size="14" fill="#d06060" text-anchor="middle">원</text>
  <polygon points="272,538 288,554 304,538" fill="#f87171"/>
  <text x="316" y="554" font-family="Georgia, serif" font-size="28" fill="#f87171" font-weight="bold">−7.06%</text>
