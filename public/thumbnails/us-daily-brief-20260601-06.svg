<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#08070a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.01 · DAILY BRIEF · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 5월 마감 최종 정리 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="600" fill="#e8d8a0">S&amp;P 7,580 · DOW 51,032</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#gold)">AI 인프라 쌍끌이 vs 비AI 소외</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="18" fill="#a09060">MSFT +5.44%  ·  AVGO +4.73%  ·  GOOGL −2.51%  ·  WMT −2.65%</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 445)">
    <!-- S&P -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">7,580.06</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.22%</text>
    </g>
    <!-- NASDAQ -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">NASDAQ</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">26,972</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.20%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">GOLD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$4,593</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+2.08%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$87.36</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−1.73%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(840, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">4.453%</text>
      <polygon points="0,90 14,90 7,76" fill="#c25e4a"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c25e4a">−0.04%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="608" x2="1200" y2="608" stroke="#2a1e08" stroke-width="1"/>
  <text x="80" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#504020">ADP(6/4) · NFP(6/6) · FOMC(6/11) — 이번 주 3대 이벤트가 6월 방향을 결정</text>
  <text x="1200" y="640" font-family="monospace" font-size="11" letter-spacing="2" fill="#504020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
