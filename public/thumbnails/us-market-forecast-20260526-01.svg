<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0d"/>
      <stop offset="100%" stop-color="#0d0807"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84830"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="150" r="360" fill="url(#glow1)"/>
  <circle cx="160" cy="600" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5ddd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.26 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 주간 시장 예측 · 새벽판 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="270" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#f5ddd9">FOMC 회의록 · PCE</text>
  <text x="80" y="340" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#red)">S&amp;P 7,473이 버티는 조건 vs 무너지는 조건</text>
  <text x="80" y="390" font-family="Pretendard, sans-serif" font-size="18" fill="#b08880">5/29 회의록 03:00 KST  ·  5/30 PCE 21:30 KST</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 450)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b08880">베이스</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5ddd9">45%</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#b08880">박스권</text>
    </g>
    <!-- 불 -->
    <g transform="translate(200, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b08880">불 케이스</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#6ba368">20%</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#6ba368">7,700+</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(420, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b08880">베어 케이스</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d96552">30%</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#d96552">7,000~7,200</text>
    </g>
    <!-- 10Y -->
    <g transform="translate(680, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b08880">10년물</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5ddd9">4.558%</text>
      <text x="0" y="88" font-family="monospace" font-size="12" fill="#b08880">FRED 5/21</text>
    </g>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a2020" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#a05040">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#503030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
