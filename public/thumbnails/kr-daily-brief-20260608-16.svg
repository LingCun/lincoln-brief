<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0808"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e03030" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e03030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="450" fill="url(#glow1)"/>
  <circle cx="200" cy="600" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.08 16:00 KST · KR DAILY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 6월 8일 마감 시황 —</text>

  <!-- Alert badge -->
  <rect x="80" y="176" width="700" height="30" rx="4" fill="#e03030" fill-opacity="0.20" stroke="#e03030" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e05555">KOSPI −8.29% 저가 마감 · KOSDAQ −9.08% · 오후 추가 167p 하락</text>

  <!-- Main title -->
  <text x="80" y="308" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="500" fill="#f5edd9">KOSPI 7,484</text>
  <text x="80" y="372" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">오후장 반등 없이 최저가 마감</text>
  <text x="80" y="420" font-family="sans-serif" font-size="17" fill="#8a9898">삼성전자 −10.18% · KB금융 −11.71% · NAVER +9.20%</text>

  <!-- Divider -->
  <line x1="80" y1="450" x2="1200" y2="450" stroke="#2a1a1a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 484)">
    <!-- KOSPI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">7,484</text>
      <polygon points="0,90 14,74 28,90" fill="#e05555"/>
      <text x="36" y="89" font-family="monospace" font-size="16" fill="#e05555">−8.29%</text>
    </g>
    <!-- KOSDAQ -->
    <g transform="translate(260, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSDAQ</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">911.39</text>
      <polygon points="0,90 14,74 28,90" fill="#e05555"/>
      <text x="36" y="89" font-family="monospace" font-size="16" fill="#e05555">−9.08%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(520, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,534</text>
      <polygon points="0,74 14,90 28,74" fill="#50c878"/>
      <text x="36" y="89" font-family="monospace" font-size="16" fill="#50c878">+0.10%</text>
    </g>
    <!-- ATH label -->
    <g transform="translate(780, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">ATH 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e05555">−15.2%</text>
      <text x="0" y="89" font-family="monospace" font-size="13" fill="#6a7878">8,829 → 7,484 (9일)</text>
    </g>
  </g>

  <!-- Bottom brand line -->
  <line x1="80" y1="700" x2="1200" y2="700" stroke="#2a1a1a" stroke-width="0.8"/>
  <text x="80" y="715" font-family="monospace" font-size="10" letter-spacing="2" fill="#5a4a3a">lincoln-brief.vercel.app</text>
  <text x="1200" y="715" font-family="monospace" font-size="10" letter-spacing="2" fill="#5a4a3a" text-anchor="end">KR MARKET CLOSE</text>
</svg>
