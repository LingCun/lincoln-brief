      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a09060">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$96.15</text>
