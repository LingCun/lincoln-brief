<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#141820"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="427" y1="0" x2="427" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="853" y1="0" x2="853" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7050" letter-spacing="2">KR STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1060" y="28" width="180" height="36" rx="3" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1150" y="51" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="1">2026.06.18 · 16:00</text>

  <!-- Diamond -->
  <polygon points="640,108 648,116 640,124 632,116" fill="#d8b878" fill-opacity="0.6"/>

  <!-- Ticker label -->
  <text x="640" y="158" font-family="Georgia, serif" font-size="20" fill="#8a7050" text-anchor="middle" letter-spacing="4">SK하이닉스 · 000660.KS</text>

  <!-- Main price -->
  <text x="640" y="262" font-family="Georgia, serif" font-size="100" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-2">268.5만원</text>

  <!-- Final close label -->
  <text x="640" y="296" font-family="Georgia, serif" font-size="16" fill="#8a7050" text-anchor="middle" letter-spacing="2">최종 종가 2,685,000원</text>

  <!-- Change indicator -->
  <polygon points="548,322 560,306 572,322" fill="#4ade80"/>
  <text x="582" y="323" font-family="Georgia, serif" font-size="26" fill="#4ade80" font-weight="bold">+6.51%   +164,000원</text>

  <!-- Gold separator -->
  <line x1="160" y1="360" x2="1120" y2="360" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Key metrics row -->
  <!-- June 8 저점 대비 -->
  <text x="213" y="412" font-family="Georgia, serif" font-size="14" fill="#8a7050" text-anchor="middle" letter-spacing="1">June 8 저점 대비</text>
  <text x="213" y="450" font-family="Georgia, serif" font-size="28" fill="#4ade80" text-anchor="middle" font-weight="bold">+40.50%</text>
  <text x="213" y="476" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">1,911,000원 → 2,685,000원</text>

  <line x1="427" y1="382" x2="427" y2="490" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 270만원 -->
  <text x="640" y="412" font-family="Georgia, serif" font-size="14" fill="#8a7050" text-anchor="middle" letter-spacing="1">270만원 라운드 넘버까지</text>
  <text x="640" y="450" font-family="Georgia, serif" font-size="28" fill="#d8b878" text-anchor="middle" font-weight="bold">15,000원</text>
  <text x="640" y="476" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">+0.56% 앞</text>

  <line x1="853" y1="382" x2="853" y2="490" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 삼성전자 -->
  <text x="1067" y="412" font-family="Georgia, serif" font-size="14" fill="#8a7050" text-anchor="middle" letter-spacing="1">삼성전자</text>
  <text x="1067" y="450" font-family="Georgia, serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">362,500원</text>
  <polygon points="1044,470 1056,456 1068,470" fill="#4ade80"/>
  <text x="1078" y="472" font-family="Georgia, serif" font-size="16" fill="#4ade80">+4.62%</text>

  <!-- Gold separator -->
  <line x1="160" y1="510" x2="1120" y2="510" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Scenario summary -->
  <text x="160" y="552" font-family="Georgia, serif" font-size="15" fill="#8a7050" letter-spacing="2">향후 2주 시나리오</text>

  <!-- Scenario bar -->
  <rect x="160" y="566" width="400" height="28" rx="3" fill="#4ade80" fill-opacity="0.2" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
  <text x="360" y="585" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle">불 — 280만원 탐색  40%</text>

  <rect x="580" y="566" width="280" height="28" rx="3" fill="#d8b878" fill-opacity="0.15" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="720" y="585" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle">베이스 박스  38%</text>

  <rect x="880" y="566" width="200" height="28" rx="3" fill="#f87171" fill-opacity="0.12" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="980" y="585" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="middle">베어 250만 재시험  17%</text>

  <!-- 4거래일 역행 badge -->
  <rect x="160" y="618" width="380" height="36" rx="4" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="350" y="641" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="middle" letter-spacing="1">NVDA·S&amp;P 500 역행 4거래일 연속</text>

  <!-- Bottom tagline -->
  <text x="640" y="700" font-family="Georgia, serif" font-size="13" fill="#8a7050" text-anchor="middle" letter-spacing="2">lincoln-brief.vercel.app</text>
</svg>
