<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#070c14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5588cc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5588cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="150" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.28 16:00 KST · KR FORECAST</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시장 예측 —</text>

  <!-- Top badge -->
  <rect x="80" y="176" width="360" height="30" rx="4" fill="#5588cc" fill-opacity="0.20" stroke="#5588cc" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#88aadd">베이스 50% · 불 20% · 베어 25% · 블랙스완 5%</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">KOSPI V자 회복</text>
  <text x="80" y="355" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">8,000선 재탈환의 의미</text>
  <text x="80" y="403" font-family="sans-serif" font-size="17" fill="#8a9898">오전 7,939 베어 진입 → 마감 8,185 베이스 복귀 · 향후 3~4주 시나리오</text>

  <!-- Divider -->
  <line x1="80" y1="435" x2="1200" y2="435" stroke="#2a3a5a" stroke-width="1"/>

  <!-- Scenario blocks -->
  <g transform="translate(80, 465)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="2" fill="#a89060">베이스 50%</text>
      <text x="0" y="55" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5edd9">8,100~8,500</text>
      <text x="0" y="80" font-family="monospace" font-size="13" fill="#88aadd">반도체+배터리 동반</text>
    </g>
    <!-- 불 케이스 -->
    <g transform="translate(330, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4db86b" stroke-width="1.5"/>
      <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="2" fill="#4db86b">불 케이스 20%</text>
      <text x="0" y="55" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5edd9">8,600~9,000</text>
      <text x="0" y="80" font-family="monospace" font-size="13" fill="#4db86b">외국인 순매수 재개</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(680, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e05555" stroke-width="1.5"/>
      <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="2" fill="#e05555">베어 케이스 25%</text>
      <text x="0" y="55" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5edd9">7,700~8,000</text>
      <text x="0" y="80" font-family="monospace" font-size="13" fill="#e05555">SK하이닉스 재이탈</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0a0808" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7870">SK하이닉스 +2.05% · LG에너지솔루션 +15.25% · KOSDAQ −2.54% · USD/KRW 1,500.30</text>
</svg>
