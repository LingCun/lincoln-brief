<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a12"/>
      <stop offset="100%" stop-color="#08100a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6ba368"/>
      <stop offset="100%" stop-color="#4a7a47"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#d8b878" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6ba368"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6ba368" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="350" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.20 · STOCK ANALYSIS</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#6ba368">— 종목 분석 · ELI LILLY —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="600" fill="#6ba368">$1,021</text>
  <text x="80" y="340" font-family="Playfair Display, Georgia, serif" font-size="52" font-style="italic" fill="url(#gold)">$1,000 재돌파</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="17" fill="#8aa882">빨간 시장 속 홀로 +3.37% — 저점 $851 대비 +20% 회복</text>

  <!-- 회복 타임라인 -->
  <g transform="translate(80, 460)">
    <line x1="0" y1="50" x2="1120" y2="50" stroke="url(#chartLine)" stroke-width="2"/>

    <!-- 저점 노드 -->
    <circle cx="120" cy="50" r="14" fill="#d96552" stroke="#0f1a12" stroke-width="3"/>
    <text x="120" y="20" font-family="monospace" font-size="11" letter-spacing="2" fill="#988e72" text-anchor="middle">저점</text>
    <text x="120" y="92" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9" text-anchor="middle">$851</text>
    <text x="120" y="114" font-family="monospace" font-size="10" fill="#988e72" text-anchor="middle">약 3주 전</text>

    <!-- $1,000 돌파 노드 -->
    <circle cx="680" cy="50" r="9" fill="#d8b878" stroke="#0f1a12" stroke-width="3"/>
    <text x="680" y="20" font-family="monospace" font-size="11" letter-spacing="2" fill="#988e72" text-anchor="middle">$1,000 돌파</text>
    <text x="680" y="92" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#c4b89e" text-anchor="middle">$1,015</text>

    <!-- 오늘 노드 -->
    <circle cx="1080" cy="50" r="16" fill="#6ba368" stroke="#0f1a12" stroke-width="3"/>
    <text x="1080" y="20" font-family="monospace" font-size="11" letter-spacing="2" fill="#6ba368" text-anchor="middle">오늘</text>
    <text x="1080" y="92" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9" text-anchor="middle">$1,021</text>
    <text x="1080" y="114" font-family="monospace" font-size="10" fill="#6ba368" text-anchor="middle">+3.37%</text>
  </g>

  <!-- 우측 회복률 박스 -->
  <g transform="translate(960, 200)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#6ba368" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#8aa882">RECOVERY</text>
    <text x="0" y="88" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="600" fill="#6ba368">+20%</text>
    <text x="0" y="114" font-family="monospace" font-size="11" fill="#8aa882">저점 대비 회복률</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">ELI LILLY · LLY · NYSE · 2026.05.19</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">GLP-1 · MOUNJARO · ZEPBOUND</text>
</svg>
