<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1220"/>
      <stop offset="100%" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ecfff"/>
      <stop offset="50%" stop-color="#5aabf0"/>
      <stop offset="100%" stop-color="#3a8ad8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5aabf0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5aabf0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5aabf0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5aabf0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5aabf0" text-anchor="end">2026.05.27 11:00 KST · KR STOCK</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5aabf0">— 종목 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="290" height="30" rx="4" fill="#4db86b" fill-opacity="0.20" stroke="#4db86b" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">이틀 연속 폭등 · 저점 대비 +33%</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">SK하이닉스 232만원</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#blue)">+13.40%, HBM 주도주</text>
  <text x="80" y="398" font-family="sans-serif" font-size="17" fill="#7aaccc">삼성전자 +6.69% 동반 · 반도체 섹터 집중 수급</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#1e3050" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- SK하이닉스 오늘 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5aabf0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">오늘 종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">2,327,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+13.40%</text>
    </g>
    <!-- 저점 대비 -->
    <g transform="translate(300, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5aabf0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">저점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,745,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+33.4%</text>
    </g>
    <!-- 삼성전자 -->
    <g transform="translate(600, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5aabf0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">삼성전자</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">319,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+6.69%</text>
    </g>
    <!-- 30일 수익 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5aabf0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#7090a0">30일 수익률</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">+123.8%</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">HBM 모멘텀</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#070a12" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#4a6a80">KOSPI 8,411.3 +4.52% · USD/KRW 1,499.52 · US10Y 4.493% · WTI $91.99</text>
</svg>
