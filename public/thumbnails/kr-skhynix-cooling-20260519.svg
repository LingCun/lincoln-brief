  <line x1="80" y1="660" x2="1200" y2="660" stroke="#5677b0" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8">MAY 19 · 2026 · NVDA EARNINGS D-1</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" opacity="0.8" text-anchor="end">CONSENSUS · STRONG BUY · 38 ANALYSTS</text>
