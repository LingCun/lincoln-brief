<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1320"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88a4d0"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5a90"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="360" r="380" fill="url(#glow)"/>

  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.05.19 · STOCK ANALYSIS</text>

  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 · SK하이닉스 —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f5edd9">1년 +810%,</text>
  <text x="80" y="338" font-family="Playfair Display, Georgia, serif" font-size="62" font-style="italic" fill="url(#blue)">첫 큰 한 호흡</text>
  <text x="80" y="388" font-family="Pretendard, sans-serif" font-size="18" fill="#c4b89e">분기 영업이익률 71.5% / EPS +397% — 펀더멘털은 역대급</text>

  <g transform="translate(80, 480)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#5677b0" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">SK HYNIX CLOSE</text>
    <text x="0" y="78" font-family="Playfair Display, Georgia, serif" font-size="50" fill="#f5edd9">₩1,745,000</text>
    <g transform="translate(0, 100)">
      <polygon points="0,12 16,12 8,0" fill="#d96552"/>
      <text x="26" y="13" font-family="monospace" font-size="16" fill="#d96552">−5.16%  ·  −₩95,000</text>
    </g>
