  <g transform="translate(750, 480)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#5677b0" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72">52W CHANGE</text>
    <text x="0" y="78" font-family="Playfair Display, Georgia, serif" font-size="50" fill="url(#blue)">+810.9%</text>
    <text x="0" y="108" font-family="monospace" font-size="13" fill="#988e72">KOSPI 의 4.3배</text>
