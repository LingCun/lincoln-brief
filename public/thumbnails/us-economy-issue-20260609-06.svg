<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091208"/>
      <stop offset="100%" stop-color="#06090a"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90be88"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7d4e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.09 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 · 원자재 · FOMC D-2 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="600" fill="#e8d8a0">WTI $91.28 · GOLD $4,354</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#green)">FOMC 전 동반 상승 — 인플레인가, 리스크온인가</text>
  <text x="80" y="375" font-family="sans-serif" font-size="18" fill="#a09060">BTC $63,667(+0.68%) · USD/KRW 1,526.62(−1.79%)</text>

  <!-- 원자재 데이터 그리드 -->
  <g transform="translate(80, 440)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aa080">WTI CRUDE</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">$91.28</text>
      <polygon points="0,90 14,90 7,76" fill="#7a9d6e"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#7a9d6e">+0.82%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aa080">GOLD</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">$4,354</text>
      <polygon points="0,90 14,90 7,76" fill="#d8b878"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#d8b878">+0.39%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(460, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aa080">BTC/USD</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">$63,667</text>
      <polygon points="0,90 14,90 7,76" fill="#7a9d6e"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#7a9d6e">+0.68%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aa080">USD/KRW</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">1,526</text>
      <polygon points="7,90 0,76 14,76" fill="#7a9d6e"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#7a9d6e">−1.79%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(940, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#a09060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aa080">US10Y</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">4.552%</text>
      <polygon points="0,90 14,90 7,76" fill="#a09060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#a09060">유지</text>
    </g>
  </g>

  <!-- 이중 해석 레이블 -->
  <rect x="80" y="588" width="500" height="40" rx="3" fill="#0a1f0a" fill-opacity="0.8"/>
  <text x="100" y="613" font-family="monospace" font-size="13" fill="#7a9d6e">인플레 재부상 신호 → FOMC 매파 압력</text>

  <rect x="620" y="588" width="500" height="40" rx="3" fill="#0a1f0a" fill-opacity="0.8"/>
  <text x="640" y="613" font-family="monospace" font-size="13" fill="#d8b878">리스크온 수요 낙관 → 경기 연착륙 신호</text>

  <!-- 하단 구분선 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#7a9d6e" stroke-width="0.5" stroke-dasharray="4,6"/>
  <text x="80" y="690" font-family="monospace" font-size="10" letter-spacing="2" fill="#406040">CPI 6/10이 이중 해석을 정리 · FOMC 6/11 · FRED DCOILWTICO $95.96(6/1)</text>
</svg>
