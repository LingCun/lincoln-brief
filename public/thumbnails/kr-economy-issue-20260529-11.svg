<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1510"/>
      <stop offset="100%" stop-color="#080e08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a0d090"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7a50"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e05555" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e05555" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="150" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e0f0e0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.29 11:00 KST · KR 경제이슈</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 원유 · 에너지 매크로 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="340" height="30" rx="4" fill="#e05555" fill-opacity="0.15" stroke="#e05555" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#e09080">WTI 사흘 만에 −10.3% 급락</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="500" fill="#e0f0e0">WTI $87.57</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#green)">무역수지 호재</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#8a9898">FRED 5/26 $97.63 → 오늘 $87.57 · USD/KRW 1,502원</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#1a2a1a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 474)">
    <!-- WTI today -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aaa80">WTI 오늘</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e0f0e0">$87.57</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−1.50%</text>
    </g>
    <!-- FRED 5/26 -->
    <g transform="translate(270, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aaa80">FRED 5/26</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e0f0e0">$97.63</text>
      <text x="0" y="87" font-family="monospace" font-size="14" fill="#e05555">3일 낙폭 −10.3%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aaa80">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e0f0e0">1,502원</text>
      <text x="0" y="87" font-family="monospace" font-size="14" fill="#8aacaa">−0.03% 보합</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#8aaa80">미국 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e0f0e0">4.455%</text>
      <polygon points="0,88 14,72 28,88" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.58%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <line x1="80" y1="670" x2="600" y2="670" stroke="#1a2a1a" stroke-width="0.5"/>
  <text x="80" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#4a6040">lincoln-brief.vercel.app</text>
  <text x="1200" y="694" font-family="monospace" font-size="10" letter-spacing="2" fill="#4a6040" text-anchor="end">정보 제공 목적 · 투자 권유 아님</text>
</svg>
