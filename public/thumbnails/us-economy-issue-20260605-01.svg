<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1210"/>
      <stop offset="100%" stop-color="#080a08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88cc99"/>
      <stop offset="50%" stop-color="#66aa77"/>
      <stop offset="100%" stop-color="#448855"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#66aa77" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#66aa77" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c06060" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c06060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="580" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#66aa77" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#b0d8b8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#66aa77">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#66aa77" text-anchor="end">2026.06.05 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 카테고리 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#66aa77">— 경제 이슈 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="268" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="600" fill="#c8e8d0">AI 인프라 투자 사이클</text>
  <text x="80" y="326" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="url(#green)">기대와 현실의 격차 — AVGO −12% 경고</text>
  <text x="80" y="374" font-family="Pretendard, sans-serif" font-size="17" fill="#80a888">Q2 실적 견고 · 2027 AI 가이던스 동결 → 역대 미국 상장사 단일 하락 3위권</text>

  <!-- 구조 분석 -->
  <g transform="translate(80, 420)">
    <text x="0" y="0" font-family="monospace" font-size="12" letter-spacing="4" fill="#66aa77">AI 사이클 단계 전환</text>
    <line x1="0" y1="12" x2="700" y2="12" stroke="#66aa77" stroke-width="0.5" stroke-opacity="0.4"/>

    <text x="0" y="46" font-family="monospace" font-size="14" fill="#88c888">1단계 (2023~2024)</text>
    <text x="220" y="46" font-family="monospace" font-size="14" fill="#a0b8a0">수요 폭발 — 모든 AI주 동반 상승</text>

    <text x="0" y="78" font-family="monospace" font-size="14" fill="#88c888">2단계 (2024~2026)</text>
    <text x="220" y="78" font-family="monospace" font-size="14" fill="#a0b8a0">기대 경쟁 — 가이던스 상향 주도</text>

    <text x="0" y="110" font-family="monospace" font-size="14" fill="#e07070">3단계 (2026 현재)</text>
    <text x="220" y="110" font-family="monospace" font-size="14" fill="#e07070">기대 vs 실현 검증 — AVGO 쇼크</text>

    <line x1="0" y1="126" x2="700" y2="126" stroke="#66aa77" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="0" y="152" font-family="monospace" font-size="13" fill="#80c888">AI 수익화 활용자(META·GOOGL) 공급자(AVGO·NVDA) 대비 선호 심화</text>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#66aa77" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="80" y="668" font-family="monospace" font-size="11" fill="#508060">NFP (6/6)  ·  FOMC (6/11)  ·  AI 인프라 투자 사이클 검증 지속</text>
  <text x="1200" y="668" font-family="monospace" font-size="11" fill="#508060" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
