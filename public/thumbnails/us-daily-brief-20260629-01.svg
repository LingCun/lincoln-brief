  <text x="348" y="432" font-family="Georgia, serif" font-size="16" fill="#52c87a">+1.63%</text>

  <text x="88" y="468" font-family="Georgia, serif" font-size="18" fill="#d8b878">WTI</text>
  <text x="200" y="468" font-family="Georgia, serif" font-size="18" fill="#f0e8d8">$69.23</text>
  <polygon points="330,473 348,449 312,449" fill="#e05252"/>
  <text x="358" y="468" font-family="Georgia, serif" font-size="16" fill="#e05252">−3.74%</text>

  <text x="88" y="504" font-family="Georgia, serif" font-size="18" fill="#d8b878">US10Y</text>
  <text x="200" y="504" font-family="Georgia, serif" font-size="18" fill="#f0e8d8">4.372%</text>
  <text x="320" y="504" font-family="Georgia, serif" font-size="16" fill="#c0b090">소폭 하락</text>

  <text x="88" y="540" font-family="Georgia, serif" font-size="18" fill="#d8b878">USD/KRW</text>
  <text x="230" y="540" font-family="Georgia, serif" font-size="18" fill="#f0e8d8">1,535</text>
  <polygon points="320,545 338,521 302,521" fill="#e05252"/>
  <text x="348" y="540" font-family="Georgia, serif" font-size="16" fill="#e05252">−0.74%</text>

