<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a10"/>
      <stop offset="100%" style="stop-color:#0f1520"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4a90d9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#4a90d9" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#4a90d9" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#4a90d9" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#4a90d9" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#2a5080" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#4a90d9" fill-opacity="0.1" stroke="#4a90d9" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#6aafe9" text-anchor="middle" letter-spacing="1">2026.06.24 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4a90d9" fill-opacity="0.5"/>

  <!-- TSLA main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#6aafe9" text-anchor="middle" letter-spacing="4">TESLA · TSLA</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$382.70</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−5.52%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#504040" text-anchor="middle">12종목 최대 낙폭 · 30일 저점 · 전일 $405.05</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#4a90d9" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left: news context -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="15" fill="#d06060" text-anchor="middle" letter-spacing="1">오늘 3가지 신호</text>
  <text x="100" y="466" font-family="Georgia, serif" font-size="13" fill="#887070">▲ 유럽 BYD 대전 재점화</text>
  <text x="100" y="494" font-family="Georgia, serif" font-size="13" fill="#887070">▼ 신규 충돌 조사 개시</text>
  <text x="100" y="522" font-family="Georgia, serif" font-size="13" fill="#887070">▲ NatPower Megapack 유럽 계약</text>
  <text x="320" y="572" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="middle">시장: 부정 요인 우선 반영</text>

  <!-- Right: 30-day & scenario -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#4a90d9" fill-opacity="0.04" stroke="#4a90d9" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="15" fill="#4a90d9" text-anchor="middle" letter-spacing="1">30일 궤적 &amp; 시나리오</text>
  <text x="620" y="466" font-family="Georgia, serif" font-size="14" fill="#888888">30일 고점</text>
  <text x="1160" y="466" font-family="Georgia, serif" font-size="14" fill="#c0c0c0" text-anchor="end">$445.00</text>
  <text x="620" y="492" font-family="Georgia, serif" font-size="14" fill="#888888">30일 낙폭</text>
  <text x="1160" y="492" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−14.0%</text>
  <text x="620" y="518" font-family="Georgia, serif" font-size="14" fill="#888888">베이스(43%)</text>
  <text x="1160" y="518" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="end">$360~$400 박스</text>
  <text x="620" y="544" font-family="Georgia, serif" font-size="14" fill="#888888">하방(30%)</text>
  <text x="1160" y="544" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$330~$360</text>
  <text x="620" y="570" font-family="Georgia, serif" font-size="14" fill="#888888">상방(15%)</text>
  <text x="1160" y="570" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">$410 회복</text>

  <!-- Bottom bar -->
  <rect x="0" y="690" width="1280" height="30" fill="#4a90d9" fill-opacity="0.04"/>
  <text x="640" y="710" font-family="Georgia, serif" font-size="13" fill="#2a5080" text-anchor="middle" letter-spacing="1">유럽 EV 경쟁 심화·충돌 조사·Megapack 성장 — 복합 구도</text>
</svg>
