<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#200f0f"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d95b5b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d95b5b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d95b5b"/>

  <!-- Top line -->
  <rect x="6" y="72" width="900" height="1" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="36" y="48" font-family="Georgia, serif" font-size="22" fill="#d95b5b" letter-spacing="3" font-weight="bold">LINCOLN BRIEF</text>

  <!-- Edition -->
  <text x="1244" y="40" font-family="Georgia, serif" font-size="18" fill="#8a5a5a" text-anchor="end">2026.06.17 — SLOT 06</text>
  <text x="1244" y="62" font-family="Georgia, serif" font-size="14" fill="#6a4a4a" text-anchor="end">시장 예측</text>

  <!-- Category label -->
  <rect x="36" y="90" width="210" height="32" rx="4" fill="#d95b5b" fill-opacity="0.15" stroke="#d95b5b" stroke-width="1"/>
  <text x="141" y="111" font-family="Georgia, serif" font-size="14" fill="#d95b5b" text-anchor="middle" letter-spacing="2">MARKET FORECAST</text>

  <!-- Headline -->
  <text x="36" y="188" font-family="Georgia, serif" font-size="44" fill="#f0e0e0" font-weight="bold">AI 반도체 — 2주 시나리오</text>

  <!-- Diamond divider -->
  <polygon points="36,210 44,218 36,226 28,218" fill="#d95b5b"/>

  <!-- NVDA & AVGO current price row -->
  <text x="36" y="275" font-family="Georgia, serif" font-size="20" fill="#8a5a5a">NVDA</text>
  <text x="36" y="315" font-family="Georgia, serif" font-size="54" fill="#f0e0e0" font-weight="bold">$207.41</text>
  <polygon points="222,284 238,284 230,300" fill="#e05555"/>
  <text x="246" y="300" font-family="Georgia, serif" font-size="28" fill="#e05555" font-weight="bold">−2.37%</text>

  <text x="450" y="275" font-family="Georgia, serif" font-size="20" fill="#8a5a5a">AVGO</text>
  <text x="450" y="315" font-family="Georgia, serif" font-size="54" fill="#f0e0e0" font-weight="bold">$376.71</text>
  <polygon points="636,284 652,284 644,300" fill="#e05555"/>
  <text x="660" y="300" font-family="Georgia, serif" font-size="28" fill="#e05555" font-weight="bold">−4.37%</text>

  <!-- Horizontal line -->
  <rect x="36" y="340" width="650" height="1" fill="#3a1a1a"/>

  <!-- 4 scenario boxes -->
  <text x="36" y="378" font-family="Georgia, serif" font-size="16" fill="#8a5a5a" letter-spacing="1">2주 시나리오</text>

  <!-- Scenario A -->
  <rect x="36" y="392" width="148" height="80" rx="4" fill="#1a2a1a" stroke="#55aa77" stroke-width="1"/>
  <text x="110" y="415" font-family="Georgia, serif" font-size="13" fill="#55aa77" text-anchor="middle">경로 A</text>
  <text x="110" y="436" font-family="Georgia, serif" font-size="11" fill="#8aaa8a" text-anchor="middle">AI 내러티브 회귀</text>
  <text x="110" y="458" font-family="Georgia, serif" font-size="20" fill="#55aa77" text-anchor="middle" font-weight="bold">30%</text>

  <!-- Scenario B -->
  <rect x="196" y="392" width="148" height="80" rx="4" fill="#1a1a2a" stroke="#4a90d9" stroke-width="1"/>
  <text x="270" y="415" font-family="Georgia, serif" font-size="13" fill="#4a90d9" text-anchor="middle">경로 B</text>
  <text x="270" y="436" font-family="Georgia, serif" font-size="11" fill="#8a8aaa" text-anchor="middle">섹터 로테이션 지속</text>
  <text x="270" y="458" font-family="Georgia, serif" font-size="20" fill="#4a90d9" text-anchor="middle" font-weight="bold">30%</text>

  <!-- Scenario C -->
  <rect x="356" y="392" width="148" height="80" rx="4" fill="#2a1a1a" stroke="#d95b5b" stroke-width="1"/>
  <text x="430" y="415" font-family="Georgia, serif" font-size="13" fill="#d95b5b" text-anchor="middle">경로 C</text>
  <text x="430" y="436" font-family="Georgia, serif" font-size="11" fill="#aa8a8a" text-anchor="middle">테크 추가 조정</text>
  <text x="430" y="458" font-family="Georgia, serif" font-size="20" fill="#d95b5b" text-anchor="middle" font-weight="bold">25%</text>

  <!-- Scenario D -->
  <rect x="516" y="392" width="148" height="80" rx="4" fill="#1a1a14" stroke="#d8b878" stroke-width="1"/>
  <text x="590" y="415" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle">경로 D</text>
  <text x="590" y="436" font-family="Georgia, serif" font-size="11" fill="#aaa08a" text-anchor="middle">급반등</text>
  <text x="590" y="458" font-family="Georgia, serif" font-size="20" fill="#d8b878" text-anchor="middle" font-weight="bold">15%</text>

  <!-- Key metrics bottom left -->
  <text x="36" y="526" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">핵심 관찰 지표</text>
  <text x="36" y="558" font-family="Georgia, serif" font-size="22" fill="#d95b5b" font-weight="bold">AVGO $372 지지  ·  US10Y 4.4% 이탈</text>
  <text x="36" y="592" font-family="Georgia, serif" font-size="18" fill="#8a5a5a">Q2 실적 시즌 7월 14일 (JPM) 시작</text>

  <!-- Right panel — key watch indicators -->
  <rect x="720" y="90" width="524" height="590" rx="8" fill="#140808" stroke="#3a1a1a" stroke-width="1"/>

  <text x="982" y="140" font-family="Georgia, serif" font-size="20" fill="#d95b5b" text-anchor="middle" letter-spacing="2">KEY WATCH</text>
  <rect x="760" y="152" width="444" height="1" fill="#3a1a1a"/>

  <!-- US10Y -->
  <text x="760" y="198" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">US 10Y 금리</text>
  <text x="760" y="235" font-family="Georgia, serif" font-size="42" fill="#f0e0e0" font-weight="bold">4.428%</text>
  <text x="1000" y="220" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="end">목표 → 4.4% 이하</text>
  <rect x="760" y="248" width="444" height="1" fill="#2a1a1a"/>

  <!-- NASDAQ -->
  <text x="760" y="285" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">NASDAQ</text>
  <text x="760" y="322" font-family="Georgia, serif" font-size="42" fill="#f0e0e0" font-weight="bold">26,376</text>
  <text x="1200" y="307" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="end">지지 → 26,200</text>
  <rect x="760" y="335" width="444" height="1" fill="#2a1a1a"/>

  <!-- WTI -->
  <text x="760" y="372" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">WTI 원유</text>
  <text x="760" y="409" font-family="Georgia, serif" font-size="42" fill="#f0e0e0" font-weight="bold">$75.83</text>
  <text x="1200" y="394" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="end">위험선 → $70 이하</text>
  <rect x="760" y="422" width="444" height="1" fill="#2a1a1a"/>

  <!-- AVGO support -->
  <text x="760" y="459" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">AVGO 30일 저점</text>
  <text x="760" y="496" font-family="Georgia, serif" font-size="42" fill="#f0e0e0" font-weight="bold">$372.10</text>
  <text x="1200" y="481" font-family="Georgia, serif" font-size="16" fill="#d95b5b" text-anchor="end">이탈 시 하방 가속</text>
  <rect x="760" y="508" width="444" height="1" fill="#2a1a1a"/>

  <!-- Q2 earnings -->
  <text x="760" y="548" font-family="Georgia, serif" font-size="16" fill="#8a5a5a">다음 촉매</text>
  <text x="760" y="580" font-family="Georgia, serif" font-size="24" fill="#d8b878" font-weight="bold">7월 14일 JPM Q2 실적</text>
  <text x="760" y="605" font-family="Georgia, serif" font-size="18" fill="#6a5a5a">7월 말 GOOGL·META·MSFT 실적</text>

  <!-- Bottom bar -->
  <rect x="0" y="700" width="1280" height="20" fill="#0a0404"/>
  <text x="640" y="714" font-family="Georgia, serif" font-size="11" fill="#4a2a2a" text-anchor="middle" letter-spacing="1">※ 본 글은 정보 제공 목적이며 투자 권유가 아닙니다 — LINCOLN BRIEF</text>
</svg>
