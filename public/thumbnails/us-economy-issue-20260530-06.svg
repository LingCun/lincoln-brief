<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a10"/>
      <stop offset="100%" stop-color="#070d08"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9dc890"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#587050"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="350" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="230" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d8f0d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.30 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="54" font-weight="500" fill="#d8f0d0">USD/KRW 1,507 달러 강세</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" fill="url(#green)">금리 인하 기대에도 달러가 버티는 이유</text>
  <text x="80" y="378" font-family="Pretendard, sans-serif" font-size="17" fill="#809870">FOMC 비둘기  ·  금 $4,569(+1.57%) 동반 강세  ·  한국 수입물가 시사점</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 430)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#809870">USD/KRW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d8f0d0">1,507.13</text>
      <polygon points="0,76 14,76 7,90" fill="#c06050"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c06050">+0.79%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#809870">GOLD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d8f0d0">$4,569</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+1.57%</text>
    </g>
    <!-- 10Y -->
    <g transform="translate(460, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#809870">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d8f0d0">4.453%</text>
      <polygon points="0,90 14,90 7,76" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">−0.04%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(680, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#809870">BTC</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#d8f0d0">$73,390</text>
      <polygon points="0,90 14,90 7,76" fill="#c06050"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c06050">−0.20%</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#203020" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#809870">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#405040" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
