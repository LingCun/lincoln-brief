  <text x="80" y="608" font-family="monospace" font-size="11" fill="#508050" letter-spacing="2">6/8 US CLOSE · 달러 약세 전환 · 리스크온 · FOMC 6/11 D-2 · S&amp;P +0.71%</text>
  <text x="80" y="635" font-family="monospace" font-size="10" fill="#406040">SLOT 01 · 1ST UPDATE · lincoln-brief.vercel.app</text>
