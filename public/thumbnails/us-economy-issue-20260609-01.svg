  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="600" fill="#c0e8c0">USD/KRW 1,526.07 달러 후퇴</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#green)">6/5 '달러 러쉬'에서 리스크온으로 — 패턴 전환</text>
