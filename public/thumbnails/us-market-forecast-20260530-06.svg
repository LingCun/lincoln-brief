<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0c"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84838"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5e0dc">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.30 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#f5e0dc">PCE 발표 당일 — 오늘 21:30 KST</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" fill="url(#red)">S&amp;P 7,580 기준 4주 시나리오 최종 점검</text>
  <text x="80" y="378" font-family="Pretendard, sans-serif" font-size="17" fill="#a08070">MSFT $450(+5.44%)·AVGO +4.73% 선반영 확대  ·  10년물 4.453%</text>

  <!-- 시나리오 확률 바 -->
  <g transform="translate(80, 430)">
    <!-- 불 케이스 -->
    <rect x="0" y="0" width="300" height="40" rx="4" fill="#6ba36820"/>
    <rect x="0" y="0" width="300" height="40" rx="4" fill="none" stroke="#6ba368" stroke-width="1"/>
    <text x="15" y="26" font-family="monospace" font-size="13" fill="#6ba368">불 케이스 30%  →  S&amp;P 7,750~8,000</text>

    <!-- 베이스 -->
    <rect x="0" y="52" width="330" height="40" rx="4" fill="#d8b87820"/>
    <rect x="0" y="52" width="330" height="40" rx="4" fill="none" stroke="#d8b878" stroke-width="1"/>
    <text x="15" y="78" font-family="monospace" font-size="13" fill="#d8b878">베이스 33%  →  S&amp;P 7,450~7,750 박스</text>

    <!-- 베어 케이스 -->
    <rect x="0" y="104" width="300" height="40" rx="4" fill="#d9655220"/>
    <rect x="0" y="104" width="300" height="40" rx="4" fill="none" stroke="#d96552" stroke-width="1"/>
    <text x="15" y="130" font-family="monospace" font-size="13" fill="#d96552">베어 케이스 27%  →  S&amp;P 7,000~7,300</text>

    <!-- 블랙 스완 -->
    <rect x="0" y="156" width="260" height="40" rx="4" fill="#88448420"/>
    <rect x="0" y="156" width="260" height="40" rx="4" fill="none" stroke="#884484" stroke-width="1"/>
    <text x="15" y="182" font-family="monospace" font-size="13" fill="#884484">블랙 스완 10%  →  6,500 이하</text>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="645" x2="1200" y2="645" stroke="#3a2020" stroke-width="1"/>
  <text x="80" y="673" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#a08070">— Lincoln</text>
  <text x="1200" y="673" font-family="monospace" font-size="12" fill="#5a3030" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
