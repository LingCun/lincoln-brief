<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88c8f8"/>
      <stop offset="50%" stop-color="#4888c8"/>
      <stop offset="100%" stop-color="#2858a8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4888c8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4888c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="150" cy="550" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4888c8" text-anchor="end">2026.06.03 · STOCK ANALYSIS · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#4888c8">— AVGO 종목 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="600" fill="#e8d8a0">AVGO $481.57</text>
  <text x="80" y="325" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#blue)">+4.70% — 30일 신고가 경신</text>
  <text x="80" y="378" font-family="Pretendard, sans-serif" font-size="18" fill="#8098b8">AI ASIC 맞춤형 칩 · 데이터센터 네트워킹 · 하이퍼스케일러 수요 강세</text>

  <!-- 비교 데이터 그리드 -->
  <g transform="translate(80, 440)">
    <!-- AVGO -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4888c8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8098b8">AVGO</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$481.57</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+4.70%</text>
    </g>
    <!-- NVDA 비교 -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4888c8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8098b8">NVDA</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$222.82</text>
      <polygon points="7,76 0,90 14,90" fill="#c06060"/>
