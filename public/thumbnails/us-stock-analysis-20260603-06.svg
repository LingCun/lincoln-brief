      <line x1="0" y1="0" x2="50" y2="0" stroke="#4888c8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8098b8">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">4.455%</text>
      <polygon points="7,76 0,90 14,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">−0.45%</text>
    </g>
    <!-- S&P 500 -->
    <g transform="translate(1060, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4888c8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#8098b8">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">7,609</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.13%</text>
    </g>
