  <!-- 하단 구분선 -->
  <line x1="80" y1="625" x2="1200" y2="625" stroke="#4888c8" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="650" font-family="monospace" font-size="10" letter-spacing="2" fill="#506080">Lincoln Brief · lincoln-brief.vercel.app · 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
