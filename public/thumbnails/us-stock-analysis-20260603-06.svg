      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$441.31</text>
      <polygon points="7,76 0,90 14,90" fill="#c06060"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c06060">−4.17%</text>
    </g>
    <!-- 30일 저점 -->
