<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7898d8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5890"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4080e8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4080e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="500" fill="url(#glow1)"/>
  <circle cx="200" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d0d8f0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.12 16:00 KST · 종목 분석</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 삼성전자 · SLOT 16 —</text>

  <!-- Info badge -->
  <rect x="80" y="176" width="820" height="30" rx="4" fill="#5677b0" fill-opacity="0.18" stroke="#5677b0" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#7898d8">30일 저점 220,500원 → 오늘 322,500원 (+46.3%) · SK하이닉스 대비 3배 상승</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#e8eef8">삼성전자</text>
  <text x="80" y="365" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#e8eef8">322,500원</text>
  <text x="80" y="415" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#accent)">HBM 사이클 진입 기대 · +7.86%</text>
  <text x="80" y="456" font-family="sans-serif" font-size="17" fill="#6878a8">30일 고점 360,500원 대비 −10.5% · NVDA $204.87(+2.22%) 연동</text>

  <!-- Divider -->
  <line x1="80" y1="490" x2="1200" y2="490" stroke="#141c2c" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 520)">
    <!-- 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506890">종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8eef8">322,500원</text>
      <polygon points="28,88 14,72 0,88" fill="#40c870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c870">+7.86%</text>
    </g>
    <!-- SK하이닉스 비교 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506890">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8eef8">2,150,000원</text>
      <polygon points="28,88 14,72 0,88" fill="#70a870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#70a870">+2.33%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(600, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506890">NVDA</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8eef8">$204.87</text>
      <polygon points="28,88 14,72 0,88" fill="#40c870"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c870">+2.22%</text>
    </g>
    <!-- 30일 고점 대비 -->
    <g transform="translate(860, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#506890">고점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#e8eef8">360,500원</text>
      <polygon points="0,88 14,72 28,88" fill="#e07060"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07060">−10.5%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#3a4860">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#3a4860" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
