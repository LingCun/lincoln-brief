<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0808"/>
      <stop offset="100%" style="stop-color:#1a1010"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#f87171;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#f87171" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#f87171" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#f87171" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#f87171" fill-opacity="0.1" stroke="#f87171" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#c08080" text-anchor="middle" letter-spacing="1">2026.06.26 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#f87171" fill-opacity="0.5"/>

  <!-- AAPL main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c08080" text-anchor="middle" letter-spacing="4">APPLE · AAPL</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$274.45</text>
  <polygon points="548,284 566,302 584,284" fill="#f87171"/>
  <text x="596" y="305" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−6.36%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">12종목 최대 낙폭 · 30일 신저점</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: context -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#c05050" text-anchor="middle" letter-spacing="1">오늘 하락 배경</text>
  <text x="100" y="452" font-family="Georgia, serif" font-size="14" fill="#d09090">▪ Mac·iPad 가격 인상 발표</text>
  <text x="100" y="476" font-family="Georgia, serif" font-size="14" fill="#d09090">▪ 메모리 공급 쇼티지 (AI 수요 경쟁)</text>
  <text x="100" y="500" font-family="Georgia, serif" font-size="14" fill="#d09090">▪ 팀 쿡 CEO "100년에 한 번의 홍수"</text>
  <text x="100" y="532" font-family="Georgia, serif" font-size="13" fill="#906060">전일 종가: $293.08 → 오늘: $274.45</text>
  <text x="100" y="552" font-family="Georgia, serif" font-size="13" fill="#906060">당일 손실: −$18.64</text>
  <text x="100" y="572" font-family="Georgia, serif" font-size="13" fill="#906060">30일 고점 $315.20에서 −13.3%</text>

  <!-- Right panel: valuation -->
  <rect x="600" y="386" width="600" height="208" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="420" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">밸류에이션 현황</text>
  <text x="660" y="456" font-family="Georgia, serif" font-size="15" fill="#888888">P/E (TTM)</text>
  <text x="1160" y="456" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="end">33.48</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="15" fill="#888888">시가총액</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="end">$4.062조</text>
  <text x="660" y="512" font-family="Georgia, serif" font-size="15" fill="#888888">52주 고점</text>
  <text x="1160" y="512" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="end">$317.40</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">애널리스트 목표</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$315.09 (+14.8%)</text>
  <text x="660" y="572" font-family="Georgia, serif" font-size="13" fill="#507050">52주 저가 $199.26 · 메모리 충격 일시적 가능성</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">S&amp;P 500</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#707070" text-anchor="middle">7,365.21 (+0.09%)</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">25,354.76 (−0.48%)</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">US10Y</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="middle">4.382% (↓ 11.8bp)</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#f87171" fill-opacity="0.35"/>
</svg>
