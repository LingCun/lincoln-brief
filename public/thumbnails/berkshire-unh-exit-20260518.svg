<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#d8b878" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6ba368" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="320" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.18 · ECONOMY ISSUE</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 · BERKSHIRE 13F —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">버핏 없는 버크셔의</text>
  <text x="80" y="333" font-family="Playfair Display, Georgia, serif" font-size="56" font-style="italic" fill="url(#gold)">첫 카드 — UNH 청산</text>
  <text x="80" y="375" font-family="Pretendard, sans-serif" font-size="17" fill="#988e72">9개월 만에 +45% 챙기고 전량 매도 — 그답지 않은 속도</text>

  <!-- 타임라인 -->
  <g transform="translate(80, 460)">
    <!-- 가로 라인 -->
    <line x1="0" y1="50" x2="1120" y2="50" stroke="url(#path)" stroke-width="2"/>

    <!-- 진입 노드 (좌) -->
    <circle cx="80" cy="50" r="14" fill="#d96552" stroke="#1a1410" stroke-width="3"/>
    <text x="80" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72" text-anchor="middle">ENTRY · 2025 Q2</text>
    <text x="80" y="92" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9" text-anchor="middle">$273</text>
    <text x="80" y="116" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">52W LOW</text>

    <!-- 중간 노드 (CEO 교체) -->
    <circle cx="560" cy="50" r="9" fill="#d8b878" stroke="#1a1410" stroke-width="3"/>
    <text x="560" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72" text-anchor="middle">CEO CHANGE · 2025 Q4</text>
    <text x="560" y="92" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#c4b89e" text-anchor="middle">Hemsley 복귀</text>

    <!-- 청산 노드 (우) -->
    <circle cx="1040" cy="50" r="14" fill="#6ba368" stroke="#1a1410" stroke-width="3"/>
    <text x="1040" y="20" font-family="monospace" font-size="11" letter-spacing="3" fill="#988e72" text-anchor="middle">EXIT · 2026 Q1</text>
    <text x="1040" y="92" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9" text-anchor="middle">$391</text>
    <text x="1040" y="116" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">13F · 5/15 공시</text>
  </g>

  <!-- 우측 수익률 박스 -->
  <g transform="translate(940, 195)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="28" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">9-MONTH RETURN</text>
    <text x="0" y="76" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="600" fill="#f5edd9">+45%</text>
    <text x="0" y="106" font-family="monospace" font-size="11" fill="#988e72">≈ $1.4B 청산</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">BERKSHIRE 13F · FILED 2026.05.15</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">BUFFETT AVG HOLD PERIOD · ~10Y</text>
</svg>
