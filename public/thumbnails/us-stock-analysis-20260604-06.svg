<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d18"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a9fd8"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5890"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c06060" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c06060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="560" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a0b8d8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.04 · STOCK ANALYSIS · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— 종목 분석 —</text>

  <!-- 티커 강조 -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="96" font-weight="700" fill="url(#blue)" opacity="0.12">NVDA</text>
  <text x="80" y="285" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="700" fill="#c8e0ff">NVDA</text>

  <!-- 가격 데이터 -->
  <text x="80" y="345" font-family="Playfair Display, Georgia, serif" font-size="44" font-weight="600" fill="#a0b8d8">$214.75</text>
  <polygon points="510,313 530,313 520,333" fill="#c06060"/>
  <text x="540" y="343" font-family="monospace" font-size="38" font-weight="700" fill="#c06060">−3.62%</text>

  <!-- 서브 헤드라인 -->
  <text x="80" y="398" font-family="Pretendard, sans-serif" font-size="20" fill="#7090b8">30일 고점 $235.74 대비 −8.9% · AI 칩 밸류에이션 재조정</text>
  <text x="80" y="428" font-family="Pretendard, sans-serif" font-size="17" fill="#506890">WTI $96.20(+2.60%) · US10Y 4.491% 매크로 역풍 집중</text>

  <!-- 비교 데이터 그리드 -->
  <g transform="translate(80, 478)">
    <g>
      <text x="0" y="18" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">NVDA</text>
      <text x="0" y="50" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#c8e0ff">$214.75</text>
      <polygon points="7,56 0,70 14,70" fill="#c06060"/>
      <text x="20" y="73" font-family="monospace" font-size="13" fill="#c06060">−3.62%</text>
    </g>
    <g transform="translate(180, 0)">
      <text x="0" y="18" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">AVGO</text>
      <text x="0" y="50" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#c8e0ff">$479.23</text>
      <polygon points="7,56 0,70 14,70" fill="#c06060"/>
      <text x="20" y="73" font-family="monospace" font-size="13" fill="#a0a0a0">−0.49%</text>
    </g>
    <g transform="translate(360, 0)">
      <text x="0" y="18" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">MSFT</text>
      <text x="0" y="50" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#c8e0ff">$427.34</text>
      <polygon points="7,56 0,70 14,70" fill="#c06060"/>
      <text x="20" y="73" font-family="monospace" font-size="13" fill="#c06060">−3.17%</text>
    </g>
    <g transform="translate(540, 0)">
      <text x="0" y="18" font-family="monospace" font-size="12" letter-spacing="2" fill="#5677b0">META</text>
      <text x="0" y="50" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#c8e0ff">$622.98</text>
      <polygon points="0,70 7,56 14,70" fill="#6ba368"/>
      <text x="20" y="73" font-family="monospace" font-size="13" fill="#6ba368">+4.24%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#5677b0" stroke-width="0.5" opacity="0.4"/>
  <text x="80" y="670" font-family="monospace" font-size="11" fill="#405070">AI 공급자 vs 수익화자 평가 분화 지속  ·  ADP 21:30 KST</text>
  <text x="1200" y="670" font-family="monospace" font-size="11" fill="#405070" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
