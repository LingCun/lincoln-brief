<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8856b"/>
      <stop offset="100%" stop-color="#a04a3a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 장식: 일중 변동 라인 -->
  <g transform="translate(870, 230)" opacity="0.7">
    <!-- 일중 변동 차트: 8,046 (장중 고점) → 7,371 (저점) → 7,493 (종가) -->
    <polyline points="0,80 60,5 120,30 180,55 240,150 300,200 360,165"
              fill="none" stroke="url(#redGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 8,046 마커 -->
    <circle cx="60" cy="5" r="5" fill="#f0d88c"/>
    <text x="60" y="-12" font-family="monospace" font-size="11" letter-spacing="2" fill="#f0d88c" text-anchor="middle">8,046 HIGH</text>
    <!-- 종가 마커 -->
    <circle cx="360" cy="165" r="5" fill="#e8856b"/>
    <text x="360" y="185" font-family="monospace" font-size="11" letter-spacing="2" fill="#e8856b" text-anchor="middle">CLOSE</text>
    <!-- 저점 마커 -->
    <circle cx="300" cy="200" r="3" fill="#a04a3a" opacity="0.7"/>
    <text x="300" y="220" font-family="monospace" font-size="9" letter-spacing="2" fill="#a04a3a" text-anchor="middle" opacity="0.85">7,371 LOW</text>
  </g>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · DAILY BRIEF</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#e8856b">— 2026.05.15 · BLACK FRIDAY —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">사상 첫 8,000,</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">그리고 −6.11%</text>
  <text x="80" y="425" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#goldGrad)">검은 금요일</text>

  <!-- 부제 -->
  <text x="80" y="475" font-family="Pretendard, sans-serif" font-size="20" fill="#c4b89e">장중 8,046 터치 · 종가 7,493.18 · 일중 −675P 변동</text>

  <!-- 좌하단 데이터 -->
  <g transform="translate(80, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">KOSPI</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">7,493</text>
    <polygon points="0,76 12,76 6,90" fill="#e8856b"/>
    <text x="20" y="88" font-family="monospace" font-size="13" fill="#e8856b">−6.11%</text>
  </g>

  <g transform="translate(260, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">KOSDAQ</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">1,129</text>
    <polygon points="0,76 12,76 6,90" fill="#e8856b"/>
    <text x="20" y="88" font-family="monospace" font-size="13" fill="#e8856b">−5.12%</text>
  </g>

  <g transform="translate(440, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">USD/KRW</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#f5edd9">1,500↑</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">한 달 만 돌파</text>
  </g>

  <g transform="translate(640, 535)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">외국인 매도</text>
    <text x="0" y="58" font-family="Playfair Display, Georgia, serif" font-size="34" fill="#e8856b">−5.56조</text>
    <text x="0" y="88" font-family="monospace" font-size="11" fill="#988e72">7거래일 연속</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.15 · 15:30 KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">KOSPI · CLOSE</text>
</svg>
