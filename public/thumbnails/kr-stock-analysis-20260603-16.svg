<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0d08"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.03 16:00 KST · KR 종목 분석</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 금융주 분석 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="380" height="30" rx="4" fill="#4db86b" fill-opacity="0.15" stroke="#4db86b" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">2일 연속 KOSPI 최강 섹터 · 이틀째 아웃퍼폼</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f5edd9">신한지주</text>
  <text x="80" y="362" font-family="Playfair Display, Georgia, serif" font-size="44" fill="url(#gold)">96,400원</text>
  <text x="80" y="412" font-family="sans-serif" font-size="18" fill="#4db86b">+3,800원 (+4.10%) · top12 최대 상승</text>
  <text x="80" y="446" font-family="sans-serif" font-size="15" fill="#8a9898">KB금융 +2.96% · 금융 섹터 이틀 연속 강세</text>

  <!-- Divider -->
  <line x1="80" y1="476" x2="1200" y2="476" stroke="#2a2018" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 508)">
    <!-- 현재가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">마감가</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">96,400원</text>
      <polygon points="0,70 14,86 28,70" fill="#4db86b"/>
      <text x="36" y="85" font-family="monospace" font-size="15" fill="#4db86b">+4.10%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">30일 저점</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">92,600원</text>
      <text x="0" y="86" font-family="monospace" font-size="15" fill="#4db86b">저점 대비 +4.11%</text>
    </g>
    <!-- KB금융 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">KB금융</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">156,600원</text>
      <polygon points="0,70 14,86 28,70" fill="#4db86b"/>
      <text x="36" y="85" font-family="monospace" font-size="15" fill="#4db86b">+2.96%</text>
    </g>
    <!-- KOSPI -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">KOSPI</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">8,801</text>
      <polygon points="0,70 14,86 28,70" fill="#4db86b"/>
      <text x="36" y="85" font-family="monospace" font-size="15" fill="#4db86b">+0.15%</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#2a2018" stroke-width="1"/>
  <text x="80" y="685" font-family="monospace" font-size="11" fill="#6a5a40">lincoln-brief.vercel.app</text>
  <text x="1200" y="685" font-family="monospace" font-size="11" fill="#6a5a40" text-anchor="end">정보 제공 목적 · 투자 권유 아님</text>
</svg>
