  <!-- 하단 구분선 + NFP 경보 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="648" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">▶ 오늘 21:30 KST · NFP 발표</text>
  <text x="80" y="672" font-family="monospace" font-size="11" fill="#806040">lincoln-brief.vercel.app</text>
