<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · DAILY BRIEF</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.24 · 01:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- S&P 500 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">S&amp;P 500</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">7,400.18</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−0.97%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#705050" text-anchor="middle">NASDAQ −1.46% · DOW +0.20% · TSLA −5.52%</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- TSLA panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">TSLA 30일 저점</text>
  <text x="320" y="496" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">$382.70</text>
  <polygon points="272,520 288,536 304,520" fill="#f87171"/>
  <text x="316" y="538" font-family="Georgia, serif" font-size="28" fill="#f87171" font-weight="bold">−5.52%</text>
  <text x="320" y="572" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">NVDA −3.13% · AVGO −2.61%</text>

  <!-- Right panel: sector rotation -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">방어주 역행 상승</text>
  <text x="620" y="468" font-family="Georgia, serif" font-size="15" fill="#888888">WMT</text>
  <text x="1160" y="468" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+2.14%</text>
  <text x="620" y="496" font-family="Georgia, serif" font-size="15" fill="#888888">MSFT</text>
  <text x="1160" y="496" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+1.58%</text>
  <text x="620" y="524" font-family="Georgia, serif" font-size="15" fill="#888888">JPM</text>
  <text x="1160" y="524" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">+1.05%</text>
  <text x="620" y="552" font-family="Georgia, serif" font-size="15" fill="#888888">WTI</text>
  <text x="1160" y="552" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−2.17%</text>
  <text x="620" y="578" font-family="Georgia, serif" font-size="15" fill="#888888">US10Y</text>
  <text x="1160" y="578" font-family="Georgia, serif" font-size="15" fill="#c0a060" text-anchor="end">4.477%</text>

  <!-- Bottom bar -->
  <rect x="0" y="690" width="1280" height="30" fill="#d8b878" fill-opacity="0.04"/>
  <text x="640" y="710" font-family="Georgia, serif" font-size="13" fill="#6a5830" text-anchor="middle" letter-spacing="1">DOW·NASDAQ 분화 확대 — 섹터 로테이션 진행 중</text>
</svg>
