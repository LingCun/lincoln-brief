<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a0d"/>
      <stop offset="100%" stop-color="#070f07"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="140" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="300" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.28 16:00 KST · KR DAILY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 5월 28일 마감 시황 —</text>

  <!-- KOSPI badge (green - recovery) -->
  <rect x="80" y="176" width="360" height="30" rx="4" fill="#4db86b" fill-opacity="0.20" stroke="#4db86b" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">KOSPI V자 반등 · 오전 7,939 → 마감 8,185</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#f5edd9">KOSPI 8,185</text>
  <text x="80" y="350" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">오후 V자 회복</text>
  <text x="80" y="398" font-family="sans-serif" font-size="17" fill="#8a9898">LG에너지솔루션 +15.25% · SK하이닉스 +2.05% · NAVER +3.12%</text>

  <!-- Divider -->
  <line x1="80" y1="432" x2="1200" y2="432" stroke="#2a4a2a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- KOSPI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">8,185</text>
      <polygon points="0,88 14,72 28,88" fill="#e05555"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e05555">−0.53%</text>
    </g>
    <!-- LG엔솔 -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">LG에너지솔루션</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">442,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+15.25%</text>
    </g>
    <!-- SK하이닉스 -->
    <g transform="translate(560, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">2,289,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+2.05%</text>
    </g>
    <!-- 원화 -->
    <g transform="translate(880, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,500</text>
      <polygon points="0,88 14,72 28,88" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.34%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#0a0808" fill-opacity="0.8"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#6a7870">WTI $90.56 +2.12% · GOLD $4,420.60 · BTC $73,251 · US 10Y 4.481% · S&amp;P 7,520.36</text>
</svg>
