<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1208"/>
      <stop offset="100%" stop-color="#080a06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88e8a8"/>
      <stop offset="50%" stop-color="#48c878"/>
      <stop offset="100%" stop-color="#289848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#48c878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#48c878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="160" cy="560" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#48c878" text-anchor="end">2026.06.03 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#48c878">— 경제 이슈 분석 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="262" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="600" fill="#e8d8a0">WTI $93.39</text>
  <text x="80" y="320" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="url(#green)">유가 $100 근접 — FOMC 딜레마</text>
  <text x="80" y="373" font-family="Pretendard, sans-serif" font-size="18" fill="#60a070">FRED 5/26 최근 고점 $97.63  ·  US10Y 4.455% (−0.45%)  ·  Gold $4,519 (+0.98%)</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 440)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">WTI</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$93.39</text>
      <polygon points="0,76 14,76 7,90" fill="#e8a830"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#e8a830">+1.33%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">Gold</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$4,519</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">+0.98%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">US10Y</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">4.455%</text>
      <polygon points="7,76 0,90 14,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#6ba368">−0.45%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">USD/KRW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">1,516</text>
      <polygon points="0,76 14,76 7,90" fill="#c06060"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c06060">+0.32%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(860, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">BTC</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#e8d8a0">$67,552</text>
      <polygon points="7,76 0,90 14,90" fill="#c06060"/>
      <text x="22" y="93" font-family="monospace" font-size="13" fill="#c06060">−4.77%</text>
    </g>
    <!-- FOMC -->
    <g transform="translate(1060, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#48c878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#60a070">FOMC</text>
      <text x="0" y="52" font-family="Playfair Display, Georgia, serif" font-size="18" fill="#e8d8a0">6/11 예정</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#e8a830">ADP 내일(6/4)</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="625" x2="1200" y2="625" stroke="#48c878" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="650" font-family="monospace" font-size="10" letter-spacing="2" fill="#406050">Lincoln Brief · lincoln-brief.vercel.app · 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
