<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c08"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#d8b878"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="600" fill="#d8b878" opacity="0.3"/>

  <!-- Edition label top right -->
  <rect x="1050" y="36" width="190" height="32" rx="4" fill="#d8b878" opacity="0.15"/>
  <text x="1145" y="57" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle" letter-spacing="2">US DAILY BRIEF</text>

  <!-- Date -->
  <text x="88" y="100" font-family="Georgia, serif" font-size="16" fill="#d8b878" opacity="0.7" letter-spacing="3">2026.06.27 · SLOT 01</text>

  <!-- Diamond separator -->
  <polygon points="88,118 95,125 88,132 81,125" fill="#d8b878"/>

  <!-- Main headline -->
  <text x="88" y="190" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="#f0e8d8">S&amp;P 500</text>
  <text x="88" y="265" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#d8b878">7,367.96</text>

  <!-- Change indicator -->
  <polygon points="430,248 448,272 412,272" fill="#52c47a"/>
  <text x="460" y="270" font-family="Georgia, serif" font-size="28" fill="#52c47a" font-weight="bold">+0.14%</text>

  <!-- Subtitle -->
  <text x="88" y="315" font-family="Georgia, serif" font-size="22" fill="#c0b090" opacity="0.85">LLY +6.40% 독주 · MSFT +4.35% 반등 · WTI $69 붕괴</text>

  <!-- Divider line -->
  <line x1="88" y1="348" x2="700" y2="348" stroke="#d8b878" stroke-width="1" opacity="0.4"/>

  <!-- Key data grid -->
  <!-- Row 1 -->
  <text x="88" y="390" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">NASDAQ</text>
  <text x="88" y="415" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">25,393.97</text>
  <polygon points="230,400 240,414 220,414" fill="#52c47a"/>
  <text x="245" y="415" font-family="Georgia, serif" font-size="16" fill="#52c47a">+0.14%</text>

  <text x="380" y="390" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">DOW</text>
  <text x="380" y="415" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">51,936.67</text>
  <polygon points="510,400 520,414 500,414" fill="#52c47a"/>
  <text x="525" y="415" font-family="Georgia, serif" font-size="16" fill="#52c47a">+0.03%</text>

  <!-- Row 2 -->
  <text x="88" y="460" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">LLY</text>
  <text x="88" y="485" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">$1,199.83</text>
  <polygon points="230,470 240,484 220,484" fill="#52c47a"/>
  <text x="245" y="485" font-family="Georgia, serif" font-size="16" fill="#52c47a">+6.40%</text>

  <text x="380" y="460" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">MSFT</text>
  <text x="380" y="485" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">$368.18</text>
  <polygon points="474,470 484,484 464,484" fill="#52c47a"/>
  <text x="489" y="485" font-family="Georgia, serif" font-size="16" fill="#52c47a">+4.35%</text>

  <!-- Row 3 -->
  <text x="88" y="530" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">WTI</text>
  <text x="88" y="555" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">$69.12</text>
  <polygon points="177,555 167,541 187,541" fill="#e05252"/>
  <text x="192" y="555" font-family="Georgia, serif" font-size="16" fill="#e05252">−3.89%</text>

  <text x="380" y="530" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.6" letter-spacing="1">GOLD</text>
  <text x="380" y="555" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0e8d8">$4,103.20</text>
  <polygon points="502,540 512,554 492,554" fill="#52c47a"/>
  <text x="517" y="555" font-family="Georgia, serif" font-size="16" fill="#52c47a">+1.80%</text>

  <!-- Bottom macro row -->
  <line x1="88" y1="582" x2="700" y2="582" stroke="#d8b878" stroke-width="1" opacity="0.2"/>
  <text x="88" y="608" font-family="Georgia, serif" font-size="14" fill="#c0b090" opacity="0.7">USD/KRW 1,534.74 (−0.52%)   US10Y 4.376%   BTC $60,081 (+0.60%)</text>

  <!-- PCE alert -->
  <rect x="88" y="630" width="480" height="40" rx="4" fill="#d8b878" opacity="0.12"/>
  <text x="98" y="655" font-family="Georgia, serif" font-size="15" fill="#d8b878">▶ 오늘 PCE 발표 — 4주 방향의 핵심 분기점</text>

  <!-- Right panel - Lincoln Brief branding -->
  <text x="1220" y="680" font-family="Georgia, serif" font-size="13" fill="#d8b878" opacity="0.5" text-anchor="end" letter-spacing="2">LINCOLN BRIEF</text>

  <!-- Decorative right element -->
  <circle cx="1050" cy="360" r="180" fill="none" stroke="#d8b878" stroke-width="1" opacity="0.06"/>
  <circle cx="1050" cy="360" r="140" fill="none" stroke="#d8b878" stroke-width="1" opacity="0.06"/>
  <circle cx="1050" cy="360" r="100" fill="none" stroke="#d8b878" stroke-width="1" opacity="0.06"/>
  <text x="1050" y="340" font-family="Georgia, serif" font-size="14" fill="#d8b878" opacity="0.4" text-anchor="middle" letter-spacing="2">NVDA</text>
  <text x="1050" y="370" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#e05252" text-anchor="middle">$194.41</text>
  <text x="1050" y="398" font-family="Georgia, serif" font-size="14" fill="#e05252" text-anchor="middle">$200 이탈 지속</text>
</svg>
