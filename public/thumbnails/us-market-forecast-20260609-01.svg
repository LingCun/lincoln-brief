<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#0a0608"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88888"/>
      <stop offset="50%" stop-color="#d86868"/>
      <stop offset="100%" stop-color="#b84848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d86868" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d86868" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="220" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d86868" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0c0c0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d86868">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d86868" text-anchor="end">2026.06.09 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d86868">— FOMC(6/11) D-2 · 점도표 시나리오 재점검 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="46" font-weight="600" fill="#f0d0d0">FOMC 6/11 — 이틀 앞</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#red)">6/8 리스크온 이후 시나리오 재점검</text>
  <text x="80" y="370" font-family="sans-serif" font-size="18" fill="#b09090">동결 확정 · 진짜 변수는 점도표 연내 인하 횟수  |  USD/KRW 1,526 달러 약세</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 445)">
    <!-- 강한 비둘기 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#60a060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b09090">강한 비둘기</text>
      <text x="0" y="62" font-family="Georgia, serif" font-size="22" fill="#f0d0d0">2회+ 인하</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#60a060">10%</text>
    </g>
    <!-- 온건 비둘기 -->
    <g transform="translate(210, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#8888d8" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b09090">온건 비둘기</text>
      <text x="0" y="62" font-family="Georgia, serif" font-size="22" fill="#f0d0d0">1회 인하</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#8888d8">35%</text>
    </g>
    <!-- 중립 -->
    <g transform="translate(430, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#c0a060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b09090">중립 (베이스)</text>
      <text x="0" y="62" font-family="Georgia, serif" font-size="22" fill="#f0d0d0">0회 동결</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#c0a060">40%</text>
    </g>
    <!-- 매파 -->
    <g transform="translate(640, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d86868" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b09090">매파</text>
      <text x="0" y="62" font-family="Georgia, serif" font-size="22" fill="#f0d0d0">인상 언급</text>
      <text x="0" y="90" font-family="monospace" font-size="13" fill="#d86868">15%</text>
    </g>
    <!-- S&P 기준 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#a09060" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#b09090">현재 S&amp;P</text>
      <text x="0" y="62" font-family="Georgia, serif" font-size="22" fill="#f0d0d0">7,436</text>
      <polygon points="0,90 14,90 7,76" fill="#60a060"/>
      <text x="22" y="90" font-family="monospace" font-size="13" fill="#60a060">+0.71%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="580" x2="1200" y2="580" stroke="#d86868" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="608" font-family="monospace" font-size="11" fill="#806060" letter-spacing="2">6/8 US CLOSE · TSLA +5.28% · 달러 약세 리스크온 · US10Y 4.556% · FOMC 6/11</text>
  <text x="80" y="635" font-family="monospace" font-size="10" fill="#604848">SLOT 01 · 1ST UPDATE · lincoln-brief.vercel.app</text>
</svg>
