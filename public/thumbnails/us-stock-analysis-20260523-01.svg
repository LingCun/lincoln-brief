  <line x1="80" y1="660" x2="1200" y2="660" stroke="#4a9eff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" opacity="0.8">MAY 23 · 2026 · NEXT: FED MINUTES 5/29</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE · FRED</text>
