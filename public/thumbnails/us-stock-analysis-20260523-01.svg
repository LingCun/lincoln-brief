<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#070b12"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7ec8f8"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2a7fd4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="360" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="280" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#4a9eff" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8f4ff">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#4a9eff">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a9eff" text-anchor="end">2026.05.23 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#4a9eff">— 종목 분석 : Tesla —</text>

  <!-- 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="72" font-weight="500" fill="#e8f4ff">TSLA $428.95</text>
  <polygon points="90,290 120,290 105,268" fill="#6ba368"/>
  <text x="130" y="335" font-family="Playfair Display, Georgia, serif" font-size="50" font-style="italic" fill="url(#blue)">+2.66%</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#6a8aaa">30일 저점 $352.42 대비  +21.7% 회복</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 전일 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8aaa">PREV CLOSE</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#e8f4ff">$417.85</text>
    </g>
    <!-- 30일 최고 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8aaa">30D HIGH</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#e8f4ff">$445.27</text>
    </g>
    <!-- 30일 최저 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8aaa">30D LOW</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#e8f4ff">$352.42</text>
    </g>
    <!-- S&P -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8aaa">S&amp;P 500</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#e8f4ff">7,445.72</text>
    </g>
