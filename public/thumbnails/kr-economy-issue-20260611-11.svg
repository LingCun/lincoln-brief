<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080e08"/>
      <stop offset="100%" stop-color="#0e180e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ac090"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#587050"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="440" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d8f0d0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.11 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 · 6월 11일 —</text>

  <!-- Alert badge -->
  <rect x="80" y="176" width="760" height="30" rx="4" fill="#e07030" fill-opacity="0.18" stroke="#e07030" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#ff9060">WTI $90.84 +0.90% · US10Y 4.542% · TSLA −6.69% · AVGO −6.18%</text>

  <!-- Main title -->
  <text x="80" y="296" font-family="Playfair Display, Georgia, serif" font-size="60" font-weight="500" fill="#d8f0d0">WTI $90.84 · US10Y 4.54%</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#green)">고유가·고금리 이중 압박</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#7a9878">한국 에너지 수입국 구조적 취약성 · 인플레이션 재점화 경보</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#142010" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 474)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608050">WTI 원유</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d8f0d0">$90.84</text>
      <polygon points="28,72 14,56 0,72" fill="#40c880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c880">+0.90%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(230, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608050">US10Y</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d8f0d0">4.542%</text>
      <text x="0" y="87" font-family="monospace" font-size="13" fill="#a0b890">고금리 유지</text>
    </g>
    <!-- TSLA -->
    <g transform="translate(470, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608050">TSLA</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d8f0d0">$381.59</text>
      <polygon points="0,72 14,88 28,72" fill="#ff6050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#ff6050">−6.69%</text>
    </g>
    <!-- GOLD -->
    <g transform="translate(720, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#608050">GOLD</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#d8f0d0">$4,115</text>
      <polygon points="28,72 14,56 0,72" fill="#40c880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40c880">+0.17%</text>
    </g>
  </g>

  <!-- Bottom signature -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#142010" stroke-width="1"/>
  <text x="80" y="664" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#507060">— Lincoln</text>
  <text x="1200" y="664" font-family="monospace" font-size="11" letter-spacing="2" fill="#384830" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
