<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140c04"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="100%" stop-color="#e0a030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e0a030" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e0a030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="480" fill="url(#glow1)"/>
  <circle cx="200" cy="580" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.15 11:00 KST · KR ECONOMY</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 (SLOT 11) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="820" height="30" rx="4" fill="#e0a030" fill-opacity="0.16" stroke="#e0a030" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#f0c060">달러 약세 구조화 — GOLD·BTC 동반 상승, WTI 이틀 연속 급락</text>

  <!-- Main title -->
  <text x="80" y="305" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#f5edd9">GOLD $4,329</text>
  <text x="80" y="365" font-family="Playfair Display, Georgia, serif" font-size="40" font-style="italic" fill="url(#gold)">달러 약세 가속 — 한국 자산 구조 변화</text>
  <text x="80" y="415" font-family="sans-serif" font-size="17" fill="#c09850">WTI $80.90(−4.69%) · BTC $65,885(+2.27%) · USD/KRW 1,512.28(−0.34%)</text>
  <text x="80" y="445" font-family="sans-serif" font-size="15" fill="#907040">FOMC D-3 — 비둘기/매파 결과가 달러 방향 결정</text>

  <!-- Divider -->
  <line x1="80" y1="478" x2="1200" y2="478" stroke="#2a1a04" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 512)">
    <!-- GOLD -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">GOLD</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$4,329.80</text>
      <polygon points="28,84 14,68 0,84" fill="#f0c060"/>
      <text x="36" y="83" font-family="monospace" font-size="15" fill="#f0c060">+2.72%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">WTI</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$80.90</text>
      <polygon points="0,84 14,68 28,84" fill="#e07050"/>
      <text x="36" y="83" font-family="monospace" font-size="15" fill="#e07050">−4.69%</text>
    </g>
    <!-- BTC -->
    <g transform="translate(540, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">BTC</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">$65,885</text>
      <polygon points="28,84 14,68 0,84" fill="#f0c060"/>
      <text x="36" y="83" font-family="monospace" font-size="15" fill="#f0c060">+2.27%</text>
    </g>
    <!-- USD/KRW -->
    <g transform="translate(820, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">USD/KRW</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f5edd9">1,512.28</text>
      <polygon points="0,84 14,68 28,84" fill="#5ab870"/>
      <text x="36" y="83" font-family="monospace" font-size="15" fill="#5ab870">−0.34%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#5a4020">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#5a4020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
