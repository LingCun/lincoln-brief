<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f0c"/>
      <stop offset="100%" style="stop-color:#101a14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#52c87a"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="600" fill="#52c87a" opacity="0.3"/>

  <!-- Edition label top right -->
  <rect x="990" y="36" width="250" height="32" rx="4" fill="#52c87a" opacity="0.12"/>
  <text x="1115" y="57" font-family="Georgia, serif" font-size="13" fill="#52c87a" text-anchor="middle" letter-spacing="2">US ECONOMY ISSUE</text>

  <!-- Date + slot -->
  <text x="88" y="100" font-family="Georgia, serif" font-size="16" fill="#52c87a" opacity="0.7" letter-spacing="3">2026.06.30 · SLOT 06</text>

  <!-- Diamond separator -->
  <polygon points="88,118 95,125 88,132 81,125" fill="#52c87a"/>

  <!-- Ticker label -->
  <text x="88" y="185" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#90d8a8">LLY · Eli Lilly</text>
  <text x="88" y="232" font-family="Georgia, serif" font-size="22" fill="#70b888" opacity="0.85">비만치료제(GLP-1) 경제학</text>

  <!-- Main price -->
  <text x="88" y="318" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#52c87a">$1,229.93</text>

  <!-- Change indicator (up) -->
  <polygon points="580,292 598,316 562,316" fill="#52c87a"/>
  <text x="608" y="312" font-family="Georgia, serif" font-size="28" fill="#52c87a" font-weight="bold">+1.81%</text>

  <!-- Divider -->
  <line x1="88" y1="348" x2="720" y2="348" stroke="#52c87a" stroke-width="1" opacity="0.4"/>

  <!-- 30-day badge -->
  <rect x="88" y="360" width="220" height="34" rx="4" fill="#52c87a" opacity="0.15"/>
  <text x="198" y="382" font-family="Georgia, serif" font-size="15" fill="#52c87a" text-anchor="middle" font-weight="bold">30일 +22.4%</text>

  <!-- SP500 comparison badge -->
  <rect x="328" y="360" width="280" height="34" rx="4" fill="#d8b878" opacity="0.12"/>
  <text x="468" y="382" font-family="Georgia, serif" font-size="15" fill="#d8b878" text-anchor="middle" font-weight="bold">S&amp;P 500 동기간 +1.2%</text>

  <!-- Data rows -->
  <text x="88" y="438" font-family="Georgia, serif" font-size="18" fill="#52c87a">30일 전</text>
  <text x="260" y="438" font-family="Georgia, serif" font-size="18" fill="#b0e8c8">$1,004.92</text>
  <polygon points="460,419 478,443 442,443" fill="#52c87a"/>
  <text x="486" y="438" font-family="Georgia, serif" font-size="16" fill="#52c87a">+22.4%</text>

  <text x="88" y="474" font-family="Georgia, serif" font-size="18" fill="#52c87a">핵심 테마</text>
  <text x="260" y="474" font-family="Georgia, serif" font-size="18" fill="#b0e8c8">GLP-1 · Medicare 급여화</text>

  <text x="88" y="510" font-family="Georgia, serif" font-size="18" fill="#52c87a">다음 촉매</text>
  <text x="260" y="510" font-family="Georgia, serif" font-size="18" fill="#b0e8c8">Q2 실적 (7월 하순)</text>

  <text x="88" y="546" font-family="Georgia, serif" font-size="18" fill="#52c87a">베이스(40%)</text>
  <text x="260" y="546" font-family="Georgia, serif" font-size="18" fill="#b0e8c8">$1,100~$1,300 박스</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#52c87a" opacity="0.07"/>
  <text x="88" y="706" font-family="Georgia, serif" font-size="14" fill="#52c87a" opacity="0.6">lincoln-brief.vercel.app</text>
  <text x="1192" y="706" font-family="Georgia, serif" font-size="14" fill="#52c87a" opacity="0.6" text-anchor="end">— Lincoln</text>
</svg>
