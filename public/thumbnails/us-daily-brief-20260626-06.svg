<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · DAILY BRIEF</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.26 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- S&P 500 main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">S&amp;P 500</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">7,357.49</text>
  <polygon points="542,284 560,302 578,284" fill="#f87171"/>
  <text x="590" y="298" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−0.01%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#607060" text-anchor="middle">NASDAQ −0.46% · DOW +0.14% · 분화 확정</text>

  <!-- Divider -->
  <line x1="160" y1="366" x2="1120" y2="366" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: tech selloff -->
  <rect x="80" y="386" width="480" height="208" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.22" stroke-width="1"/>
  <text x="320" y="420" font-family="Georgia, serif" font-size="16" fill="#c05050" text-anchor="middle" letter-spacing="2">기술주 이중 타격 확정</text>
  <text x="160" y="456" font-family="Georgia, serif" font-size="14" fill="#888888">AAPL</text>
  <text x="520" y="456" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$275.15 (−6.12%)</text>
  <text x="160" y="484" font-family="Georgia, serif" font-size="14" fill="#888888">MSFT</text>
  <text x="520" y="484" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$352.83 (−3.46%)</text>
  <text x="160" y="512" font-family="Georgia, serif" font-size="14" fill="#888888">AMZN</text>
  <text x="520" y="512" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$227.01 (−3.10%)</text>
  <text x="160" y="540" font-family="Georgia, serif" font-size="14" fill="#888888">NVDA</text>
  <text x="520" y="540" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">$195.74 (−1.64%)</text>
  <text x="320" y="576" font-family="Georgia, serif" font-size="12" fill="#705050" text-anchor="middle">메모리 쇼티지 + AI 투자 재평가</text>

  <!-- Right panel: defensive + commodities -->
  <rect x="600" y="386" width="600" height="208" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="420" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">방어주 · 실물 강세</text>
  <text x="660" y="456" font-family="Georgia, serif" font-size="15" fill="#888888">Gold</text>
  <text x="1160" y="456" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$4,041.60 (+1.29%)</text>
  <text x="660" y="484" font-family="Georgia, serif" font-size="15" fill="#888888">WTI</text>
  <text x="1160" y="484" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$71.47 (+1.61%)</text>
  <text x="660" y="512" font-family="Georgia, serif" font-size="15" fill="#888888">LLY</text>
  <text x="1160" y="512" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$1,127.69 (+0.93%)</text>
  <text x="660" y="540" font-family="Georgia, serif" font-size="15" fill="#888888">JPM</text>
  <text x="1160" y="540" font-family="Georgia, serif" font-size="15" fill="#4ade80" text-anchor="end">$335.12 (+0.50%)</text>
  <text x="900" y="572" font-family="Georgia, serif" font-size="13" fill="#507050" text-anchor="middle">US10Y 4.392% · BTC $59,614 (−2.26%)</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">NASDAQ 25,358.60</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">−0.46% · 기술주 약세</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">DOW 51,920.62</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#506040" text-anchor="middle">+0.14% · 방어주 지탱</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,544.73</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.13% · 원화 소폭 약세</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
