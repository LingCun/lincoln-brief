<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#160808"/>
      <stop offset="100%" stop-color="#0a0606"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f09090"/>
      <stop offset="50%" stop-color="#e85555"/>
      <stop offset="100%" stop-color="#c03030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e85555" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e85555" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="180" r="380" fill="url(#glow1)"/>
  <circle cx="180" cy="580" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#e85555" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f0c8c8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#e85555">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#e85555" text-anchor="end">2026.06.08 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#e85555">— FOMC(6/11) D-3 시나리오 지도 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="600" fill="#f0c8c8">FOMC 6월 11일</text>
  <text x="80" y="322" font-family="Playfair Display, Georgia, serif" font-size="30" font-style="italic" fill="url(#red)">점도표 · 파월 발언이 기술주 방향을 가른다</text>
  <text x="80" y="372" font-family="sans-serif" font-size="18" fill="#b07070">S&amp;P 7,383.74 출발  |  US10Y 4.536%  |  안도 25% · 박스권 45% · 하락 25%</text>

  <!-- 데이터 그리드 — S&P 레벨 지도 -->
  <g transform="translate(80, 445)">
    <!-- 현재 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e85555" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b07070">현재</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#f0c8c8">7,383</text>
      <text x="0" y="90" font-family="monospace" font-size="11" fill="#b07070">−2.64%</text>
    </g>
    <!-- 반등 목표 -->
    <g transform="translate(220, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4caf50" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#70b070">비둘기시</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#a0f0a0">7,500+</text>
      <polygon points="0,90 7,76 14,90" fill="#4caf50"/>
      <text x="22" y="90" font-family="monospace" font-size="11" fill="#4caf50">25%</text>
    </g>
    <!-- 박스권 -->
    <g transform="translate(440, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b09060">중립시</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#e8d8a0">박스권</text>
      <text x="0" y="90" font-family="monospace" font-size="11" fill="#d8b878">7,300~7,500  45%</text>
    </g>
    <!-- 하락 시나리오 -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e85555" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#b07070">매파시</text>
      <text x="0" y="68" font-family="Georgia, serif" font-size="28" fill="#f0c8c8">7,200~</text>
      <polygon points="7,90 0,76 14,76" fill="#e85555"/>
      <text x="22" y="90" font-family="monospace" font-size="11" fill="#e85555">지지선테스트  25%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#e85555" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="648" font-family="monospace" font-size="12" letter-spacing="2" fill="#e85555">▶ 6/11 점도표 — 연내 인하 횟수 조정 여부가 핵심</text>
  <text x="80" y="672" font-family="monospace" font-size="11" fill="#804040">lincoln-brief.vercel.app</text>
</svg>
