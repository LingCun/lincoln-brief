<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0806"/>
      <stop offset="100%" style="stop-color:#1a100a"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d96552;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d96552;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#804030" letter-spacing="2">KR MARKET · MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle" letter-spacing="1">2026.06.23 · 16:00</text>

  <!-- Diamond -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#fbbf24" fill-opacity="0.7"/>

  <!-- Main: KOSPI forecast -->
  <text x="640" y="166" font-family="Georgia, serif" font-size="20" fill="#c06050" text-anchor="middle" letter-spacing="3">베어 시나리오 실현 → 다음 관문</text>
  <text x="640" y="258" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">8,203.84</text>
  <polygon points="548,274 566,292 584,274" fill="#f87171"/>
  <text x="596" y="294" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−9.99%</text>
  <text x="640" y="338" font-family="Georgia, serif" font-size="17" fill="#905050" text-anchor="middle">오전 베어 시나리오 (8,000~8,500) 실현 · 다음: 8,000 지지 테스트</text>

  <!-- Divider -->
  <line x1="160" y1="368" x2="1120" y2="368" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <rect x="80" y="390" width="1120" height="44" rx="3" fill="#d96552" fill-opacity="0.12" stroke="#d96552" stroke-opacity="0.3" stroke-width="1"/>
  <text x="200" y="418" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle">시나리오</text>
  <text x="440" y="418" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle">확률</text>
  <text x="750" y="418" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle">가격 범위</text>
  <text x="1060" y="418" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle">핵심 조건</text>

  <!-- Row 1: 불 -->
  <rect x="80" y="434" width="1120" height="40" fill="#6ee7b7" fill-opacity="0.04"/>
  <text x="200" y="459" font-family="Georgia, serif" font-size="13" fill="#6ee7b7" text-anchor="middle">불 (20%)</text>
  <text x="440" y="459" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">20%</text>
  <text x="750" y="459" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">8,400~8,500</text>
  <text x="1060" y="459" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">미국 빅테크 급반등</text>

  <!-- Row 2: 베이스 -->
  <rect x="80" y="474" width="1120" height="40" fill="#fbbf24" fill-opacity="0.06"/>
  <text x="200" y="499" font-family="Georgia, serif" font-size="13" fill="#fbbf24" text-anchor="middle">베이스 (45%)</text>
  <text x="440" y="499" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">45%</text>
  <text x="750" y="499" font-family="Georgia, serif" font-size="13" fill="#ffffff" text-anchor="middle">8,000~8,400</text>
  <text x="1060" y="499" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">환율 안정·저점 매수 유입</text>

  <!-- Row 3: 베어 -->
  <rect x="80" y="514" width="1120" height="40" fill="#f87171" fill-opacity="0.06"/>
  <text x="200" y="539" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="middle">베어 (30%)</text>
  <text x="440" y="539" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">30%</text>
  <text x="750" y="539" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="middle">7,800~8,000</text>
  <text x="1060" y="539" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">빅테크 추가 하락·1,550원 돌파</text>

  <!-- Row 4: 블랙스완 -->
  <rect x="80" y="554" width="1120" height="40" fill="#a855f7" fill-opacity="0.04"/>
  <text x="200" y="579" font-family="Georgia, serif" font-size="13" fill="#a855f7" text-anchor="middle">블랙 스완 (5%)</text>
  <text x="440" y="579" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">5%</text>
  <text x="750" y="579" font-family="Georgia, serif" font-size="13" fill="#a855f7" text-anchor="middle">7,500 이하</text>
  <text x="1060" y="579" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">외국인 패닉 이탈 전면화</text>

  <!-- Bottom divider -->
  <line x1="80" y1="600" x2="1200" y2="600" stroke="#d96552" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Key variables -->
  <text x="640" y="630" font-family="Georgia, serif" font-size="14" fill="#c06050" text-anchor="middle" letter-spacing="1">핵심 변수</text>
  <text x="640" y="655" font-family="Georgia, serif" font-size="13" fill="#888888" text-anchor="middle">① AVGO·GOOGL 다음 거래일 방향  ② USD/KRW 1,550원 돌파 여부  ③ US10Y 4.509% 방향</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#000000" fill-opacity="0.4"/>
  <text x="640" y="706" font-family="Georgia, serif" font-size="13" fill="#804030" text-anchor="middle" letter-spacing="1">USD/KRW 1,537.18원 방어 · KOSDAQ 891.52 (−7.94%) · 8,000 심리선까지 −2.5%</text>
</svg>
