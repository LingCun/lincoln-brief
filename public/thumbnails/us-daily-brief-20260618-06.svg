<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c08"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="gold-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#d8b878"/>

  <!-- Left side glow panel -->
  <rect x="0" y="0" width="560" height="720" fill="url(#gold-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#d8b878" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1092" y="28" width="140" height="36" rx="4" fill="#d8b878" fill-opacity="0.12" stroke="#d8b878" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1162" y="52" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle" letter-spacing="2">US 06:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#8a7a5a" letter-spacing="1">2026.06.18 — 6/17 마감</text>

  <!-- Category label -->
  <rect x="48" y="128" width="130" height="28" rx="3" fill="#d8b878" fill-opacity="0.2"/>
  <text x="113" y="147" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle" letter-spacing="1">데일리 시황</text>

  <!-- Main headline — S&P -->
  <text x="48" y="230" font-family="Georgia, serif" font-size="54" fill="#ffffff" font-weight="bold">S&amp;P 7,420</text>
  <polygon points="400,202 416,202 408,216" fill="#e05c5c"/>
  <text x="424" y="230" font-family="Georgia, serif" font-size="30" fill="#e05c5c" font-weight="bold">−1.21%</text>

  <!-- Sub-indices row -->
  <text x="48" y="278" font-family="Georgia, serif" font-size="22" fill="#c0b090">NASDAQ</text>
  <text x="190" y="278" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">26,021</text>
  <polygon points="348,266 360,266 354,278" fill="#e05c5c"/>
  <text x="368" y="278" font-family="Georgia, serif" font-size="20" fill="#e05c5c">−1.34%</text>

  <text x="48" y="318" font-family="Georgia, serif" font-size="22" fill="#c0b090">DOW</text>
  <text x="130" y="318" font-family="Georgia, serif" font-size="22" fill="#ffffff" font-weight="bold">51,492</text>
  <polygon points="290,306 302,306 296,318" fill="#e05c5c"/>
  <text x="310" y="318" font-family="Georgia, serif" font-size="20" fill="#e05c5c">−0.98%</text>

  <!-- Divider -->
  <rect x="48" y="344" width="500" height="1" fill="#d8b878" opacity="0.3"/>

  <!-- Key divergence box -->
  <rect x="48" y="362" width="500" height="110" rx="6" fill="#d8b878" fill-opacity="0.07" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="68" y="390" font-family="Georgia, serif" font-size="14" fill="#8a7a5a" letter-spacing="1">오늘의 분화</text>
  <text x="68" y="422" font-family="Georgia, serif" font-size="28" fill="#4adc7a" font-weight="bold">AVGO +4.30%</text>
  <text x="68" y="455" font-family="Georgia, serif" font-size="20" fill="#e05c5c">META −5.44% · MSFT −3.79% · AMZN −3.46%</text>

  <!-- Right panel — macro data -->
  <rect x="620" y="100" width="1" height="540" fill="#d8b878" opacity="0.2"/>

  <text x="660" y="130" font-family="Georgia, serif" font-size="14" fill="#8a7a5a" letter-spacing="2">MACRO</text>

  <!-- Gold -->
  <text x="660" y="200" font-family="Georgia, serif" font-size="18" fill="#c0b090">Gold</text>
  <text x="660" y="238" font-family="Georgia, serif" font-size="42" fill="#d8b878" font-weight="bold">$4,276</text>
  <polygon points="808,226 820,226 814,238" fill="#e05c5c"/>
  <text x="828" y="238" font-family="Georgia, serif" font-size="24" fill="#e05c5c">−1.26%</text>
  <text x="660" y="264" font-family="Georgia, serif" font-size="14" fill="#8a7a5a">전일 대비 반락</text>

  <rect x="660" y="284" width="560" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- WTI -->
  <text x="660" y="316" font-family="Georgia, serif" font-size="16" fill="#c0b090">WTI</text>
  <text x="720" y="316" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$75.01</text>
  <polygon points="808,304 820,304 814,316" fill="#e05c5c"/>
  <text x="828" y="316" font-family="Georgia, serif" font-size="20" fill="#e05c5c">−1.37%</text>

  <!-- USD/KRW -->
  <text x="660" y="356" font-family="Georgia, serif" font-size="16" fill="#c0b090">USD/KRW</text>
  <text x="810" y="356" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">1,527</text>
  <polygon points="924,344 936,344 930,332" fill="#4adc7a"/>
  <text x="944" y="356" font-family="Georgia, serif" font-size="20" fill="#4adc7a">+1.09%</text>

  <rect x="660" y="374" width="560" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- US10Y -->
  <text x="660" y="406" font-family="Georgia, serif" font-size="16" fill="#c0b090">US10Y</text>
  <text x="780" y="406" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">4.463%</text>
  <polygon points="908,394 920,394 914,382" fill="#e05c5c"/>
  <text x="928" y="406" font-family="Georgia, serif" font-size="18" fill="#e05c5c">+3.5bp</text>

  <rect x="660" y="424" width="560" height="1" fill="#d8b878" opacity="0.2"/>

  <!-- BTC -->
  <text x="660" y="456" font-family="Georgia, serif" font-size="16" fill="#c0b090">BTC</text>
  <text x="720" y="456" font-family="Georgia, serif" font-size="24" fill="#ffffff" font-weight="bold">$64,216</text>
  <polygon points="858,444 870,444 864,456" fill="#e05c5c"/>
  <text x="878" y="456" font-family="Georgia, serif" font-size="20" fill="#e05c5c">−2.11%</text>

  <!-- Bottom insight -->
  <rect x="48" y="580" width="1184" height="80" rx="4" fill="#d8b878" fill-opacity="0.05" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="80" y="610" font-family="Georgia, serif" font-size="15" fill="#c0b090">AI 인프라 공급자(AVGO +4.30%) vs AI 서비스 소비자(META −5.44%) — 분화 3일 연속 확인</text>
  <text x="80" y="642" font-family="Georgia, serif" font-size="15" fill="#8a7a5a">달러 독주 리스크오프 세션 · FOMC 결정 대기 · S&amp;P 7,400 지지선 관찰</text>

  <!-- Diamond decorations -->
  <polygon points="1232,680 1240,672 1248,680 1240,688" fill="#d8b878" opacity="0.4"/>
  <polygon points="1208,680 1216,672 1224,680 1216,688" fill="#d8b878" opacity="0.2"/>
</svg>
