<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060a0c"/>
      <stop offset="100%" style="stop-color:#101518"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a8d8;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#60a8d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a8d8;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#60a8d8" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a8d8" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#60a8d8" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#60a8d8" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#406880" letter-spacing="2">US MARKET · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <rect x="1030" y="28" width="210" height="36" rx="3" fill="#60a8d8" fill-opacity="0.1" stroke="#60a8d8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1135" y="51" font-family="Georgia, serif" font-size="14" fill="#60a8d8" text-anchor="middle" letter-spacing="1">2026.06.23 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a8d8" fill-opacity="0.5"/>

  <!-- MSFT main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#a0c8e0" text-anchor="middle" letter-spacing="4">MICROSOFT · MSFT</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$367.34</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−3.18%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#506070" text-anchor="middle">30일 고점 $460.52 대비 −20.2% · AI 집중 리스크 경고</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#60a8d8" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 52주 저가 panel (left) -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#f87171" fill-opacity="0.05" stroke="#f87171" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">52주 저가 근접</text>
  <text x="320" y="492" font-family="Georgia, serif" font-size="46" fill="#ffffff" text-anchor="middle" font-weight="bold">$356.28</text>
  <text x="320" y="530" font-family="Georgia, serif" font-size="20" fill="#a06060" text-anchor="middle">← 52주 저가</text>
  <text x="320" y="560" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="middle">현재 $367.34 · 거리 $11.06</text>
  <text x="320" y="586" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">약 3% 위 · 기술적 바닥 미확인</text>

  <!-- Right panel: scenario -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#60a8d8" fill-opacity="0.03" stroke="#60a8d8" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#a0c8e0" text-anchor="middle" letter-spacing="2">4주 시나리오</text>
  <text x="680" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">$390 반등</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#60a8d8" text-anchor="end">18%</text>
  <text x="680" y="494" font-family="Georgia, serif" font-size="14" fill="#d8b878">$355~$375 박스 (베이스)</text>
  <text x="1150" y="494" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="end">42%</text>
  <text x="680" y="520" font-family="Georgia, serif" font-size="14" fill="#888888">$330~$355 추가 하락</text>
  <text x="1150" y="520" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">30%</text>
  <text x="680" y="546" font-family="Georgia, serif" font-size="14" fill="#888888">$300 이하</text>
  <text x="1150" y="546" font-family="Georgia, serif" font-size="14" fill="#888888" text-anchor="end">10%</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="12" fill="#506070">MS·Chevron 가스 발전 데이터센터 발표 병존</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#60a8d8" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#a0c8e0" text-anchor="middle">30일 고점</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">$460.52</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#a0c8e0" text-anchor="middle">US10Y</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="14" fill="#ffffff" text-anchor="middle">4.509% 고공</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#a0c8e0" text-anchor="middle">YTD 수익률</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle">+23.71%</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a8d8" fill-opacity="0.35"/>
</svg>
