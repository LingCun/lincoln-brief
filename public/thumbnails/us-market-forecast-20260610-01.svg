<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140808"/>
      <stop offset="100%" stop-color="#08070a"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e87060"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04838"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="160" r="360" fill="url(#glow1)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e0a898">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.10 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— FOMC(6/11) D-1 · 시나리오 재보정 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="600" fill="#f0e0d8">FOMC D-1</text>
  <text x="80" y="325" font-family="Playfair Display, Georgia, serif" font-size="30" font-style="italic" fill="url(#red)">S&amp;P 7,277 · WTI −5.21% 반영 시나리오</text>
  <text x="80" y="370" font-family="sans-serif" font-size="18" fill="#a08878">중립(40%) · 온건비둘기(28%) · 매파(22%)</text>

  <!-- 시나리오 테이블 -->
  <g transform="translate(80, 420)">
    <!-- 온건 비둘기 -->
    <rect x="0" y="0" width="260" height="80" rx="4" fill="#2a4020" fill-opacity="0.7"/>
    <text x="16" y="28" font-family="monospace" font-size="12" fill="#60c060">온건 비둘기</text>
    <text x="16" y="50" font-family="Georgia, serif" font-size="20" fill="#80e080">28%</text>
    <text x="16" y="70" font-family="monospace" font-size="11" fill="#60c060">7,350~7,450 반등</text>

    <!-- 중립 -->
    <rect x="280" y="0" width="260" height="80" rx="4" fill="#2a2820" fill-opacity="0.7"/>
    <text x="296" y="28" font-family="monospace" font-size="12" fill="#d8b878">중립 (베이스)</text>
    <text x="296" y="50" font-family="Georgia, serif" font-size="20" fill="#e8cc88">40%</text>
    <text x="296" y="70" font-family="monospace" font-size="11" fill="#d8b878">7,200~7,300 횡보</text>

    <!-- 매파 -->
    <rect x="560" y="0" width="260" height="80" rx="4" fill="#2a1414" fill-opacity="0.7"/>
    <text x="576" y="28" font-family="monospace" font-size="12" fill="#e06060">매파</text>
    <text x="576" y="50" font-family="Georgia, serif" font-size="20" fill="#f08080">22%</text>
    <text x="576" y="70" font-family="monospace" font-size="11" fill="#e06060">7,100~7,200 테스트</text>

    <!-- 강한 비둘기 -->
    <rect x="840" y="0" width="260" height="80" rx="4" fill="#1a2a20" fill-opacity="0.7"/>
    <text x="856" y="28" font-family="monospace" font-size="12" fill="#40a060">강한 비둘기</text>
    <text x="856" y="50" font-family="Georgia, serif" font-size="20" fill="#60c080">10%</text>
    <text x="856" y="70" font-family="monospace" font-size="11" fill="#40a060">7,450~7,600 반등</text>
  </g>

  <!-- 핵심 변수 -->
  <text x="80" y="560" font-family="sans-serif" font-size="16" fill="#d0c0b8">핵심 변수 — 파월의 점도표 + 기자회견 뉘앙스</text>
  <text x="80" y="585" font-family="monospace" font-size="13" fill="#a09088">WTI −5.21% 급락으로 인플레이션 완화 조건 형성 · 비둘기 여지 소폭 확대</text>

  <!-- 하단 구분선 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="650" font-family="monospace" font-size="11" fill="#a08878">US10Y 4.526% · USD/KRW 1,531.11(−1.50%) · 결과 확인 후 대응</text>
  <text x="1200" y="650" font-family="monospace" font-size="11" fill="#d96552" text-anchor="end">© Lincoln Brief</text>
</svg>
