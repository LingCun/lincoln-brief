<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark-fill" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#5677b0"/>

  <!-- Left blue glow -->
  <rect x="0" y="0" width="520" height="720" fill="url(#blue-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#5677b0" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1100" y="28" width="132" height="36" rx="4" fill="#5677b0" fill-opacity="0.12" stroke="#5677b0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1166" y="52" font-family="Georgia, serif" font-size="13" fill="#5677b0" text-anchor="middle" letter-spacing="2">US 06:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#5a6a8a" letter-spacing="1">2026.06.16 — 6/15 세션</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#5677b0" fill-opacity="0.2"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#5677b0" text-anchor="middle" letter-spacing="1">종목 분석</text>

  <!-- Main ticker -->
  <text x="48" y="205" font-family="Georgia, serif" font-size="42" fill="#7a9ec0" font-weight="bold" letter-spacing="4">NVDA</text>
  <text x="48" y="275" font-family="Georgia, serif" font-size="68" fill="#ffffff" font-weight="bold">$212.45</text>

  <!-- Change badge -->
  <rect x="48" y="294" width="190" height="46" rx="6" fill="#4adc7a" fill-opacity="0.15" stroke="#4adc7a" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="68,316 80,316 74,304" fill="#4adc7a"/>
  <text x="92" y="324" font-family="Georgia, serif" font-size="24" fill="#4adc7a" font-weight="bold">+3.54%</text>

  <!-- Prev close note -->
  <text x="48" y="368" font-family="Georgia, serif" font-size="16" fill="#5a6a8a">전일 $205.19 → +$7.26</text>

  <!-- Divider line -->
  <rect x="48" y="394" width="400" height="1" fill="#5677b0" opacity="0.3"/>

  <!-- 30-day sparkline -->
  <text x="48" y="424" font-family="Georgia, serif" font-size="14" fill="#5a6a8a" letter-spacing="1">30일 궤적</text>

  <!-- Sparkline: rise to peak then decline then recovery -->
  <polyline
    points="48,520 68,516 88,506 108,500 128,494 148,488 168,485 188,480 208,470 228,476 248,480 268,484 288,481 308,486 328,492 348,498 368,502 388,500 408,504 428,492 448,494 468,500 488,496 508,508 528,505 548,506 568,516 588,511 608,510 628,500"
    fill="none"
    stroke="#5677b0"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <polygon
    points="48,520 68,516 88,506 108,500 128,494 148,488 168,485 188,480 208,470 228,476 248,480 268,484 288,481 308,486 328,492 348,498 368,502 388,500 408,504 428,492 448,494 468,500 488,496 508,508 528,505 548,506 568,516 588,511 608,510 628,500 628,555 48,555"
    fill="url(#spark-fill)"
  />
  <!-- Peak marker -->
  <circle cx="208" cy="470" r="4" fill="#5677b0" opacity="0.9"/>
  <text x="175" y="460" font-family="Georgia, serif" font-size="11" fill="#5677b0">$235.74 고점</text>
  <!-- Low marker -->
  <circle cx="568" cy="516" r="4" fill="#ff6060" opacity="0.8"/>
  <text x="540" y="532" font-family="Georgia, serif" font-size="11" fill="#ff6060">$200 저점</text>
  <!-- Current marker -->
  <circle cx="628" cy="500" r="5" fill="#4adc7a"/>
  <text x="608" y="490" font-family="Georgia, serif" font-size="11" fill="#4adc7a">$212</text>

  <!-- X-axis -->
  <rect x="48" y="555" width="590" height="1" fill="#5677b0" opacity="0.2"/>

  <!-- Right panel divider -->
  <rect x="680" y="90" width="2" height="540" fill="#5677b0" opacity="0.2"/>

  <text x="720" y="140" font-family="Georgia, serif" font-size="14" fill="#5a6a8a" letter-spacing="2">종목 현황</text>
  <rect x="720" y="150" width="80" height="1" fill="#5677b0" opacity="0.4"/>

  <!-- 30-day stats -->
  <text x="720" y="198" font-family="Georgia, serif" font-size="15" fill="#7a8aa0">30일 최고점 대비</text>
  <text x="720" y="234" font-family="Georgia, serif" font-size="30" fill="#ff8888">−9.9%</text>
  <text x="850" y="234" font-family="Georgia, serif" font-size="16" fill="#5a6a8a">($235.74 고점)</text>

  <rect x="720" y="256" width="520" height="1" fill="#5677b0" opacity="0.2"/>

  <!-- Recent trough recovery -->
  <text x="720" y="296" font-family="Georgia, serif" font-size="15" fill="#7a8aa0">최근 저점 반등</text>
  <text x="720" y="332" font-family="Georgia, serif" font-size="28" fill="#4adc7a" font-weight="bold">+6.0%</text>
  <text x="820" y="332" font-family="Georgia, serif" font-size="16" fill="#5a6a8a">$200.42 → $212.45</text>

  <rect x="720" y="354" width="520" height="1" fill="#5677b0" opacity="0.2"/>

  <!-- NASDAQ context -->
  <text x="720" y="394" font-family="Georgia, serif" font-size="15" fill="#7a8aa0">당일 NASDAQ 대비</text>
  <text x="720" y="430" font-family="Georgia, serif" font-size="28" fill="#ffffff" font-weight="bold">NVDA +3.54%</text>
  <text x="720" y="458" font-family="Georgia, serif" font-size="16" fill="#5a6a8a">vs NASDAQ +3.07%</text>

  <rect x="720" y="476" width="520" height="1" fill="#5677b0" opacity="0.2"/>

  <!-- US10Y context -->
  <text x="720" y="516" font-family="Georgia, serif" font-size="15" fill="#7a8aa0">금리 환경 (US10Y)</text>
  <text x="720" y="552" font-family="Georgia, serif" font-size="28" fill="#4adc7a">4.469%</text>
  <text x="830" y="552" font-family="Georgia, serif" font-size="16" fill="#4adc7a">↓ 성장주 우호</text>

  <!-- Bottom highlight box -->
  <rect x="720" y="576" width="520" height="72" rx="6" fill="#5677b0" fill-opacity="0.1" stroke="#5677b0" stroke-width="1" stroke-opacity="0.3"/>
  <text x="748" y="606" font-family="Georgia, serif" font-size="14" fill="#7a8aa0">고점 재돌파 목표까지</text>
  <text x="748" y="634" font-family="Georgia, serif" font-size="22" fill="#d8b878" font-weight="bold">+11.0% 남음 ($235.74)</text>

  <!-- Bottom bar -->
  <rect x="0" y="694" width="1280" height="26" fill="#5677b0" fill-opacity="0.06"/>
  <text x="640" y="712" font-family="Georgia, serif" font-size="12" fill="#5a6a8a" text-anchor="middle" letter-spacing="2">lincoln-brief.vercel.app — 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
