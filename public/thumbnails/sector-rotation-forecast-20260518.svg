<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181214"/>
      <stop offset="100%" stop-color="#0a0708"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7e6a3e" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="barDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b5f48" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3d3526" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="240" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="1100" cy="540" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.05.18 · MARKET FORECAST</text>

  <!-- 헤드라인 -->
  <text x="80" y="170" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 시장 예측 · SECTOR ROTATION —</text>
  <text x="80" y="250" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">성장에서 가치로,</text>
  <text x="80" y="318" font-family="Playfair Display, Georgia, serif" font-size="58" font-style="italic" fill="url(#gold)">다음 한 달의 지도</text>
  <text x="80" y="360" font-family="Pretendard, sans-serif" font-size="17" fill="#988e72">4섹터 대표 종목의 1년 변동 — 같은 강세장, 다른 도착선</text>

  <!-- 바 차트 (4섹터 1년 변동률) -->
  <g transform="translate(80, 410)" font-family="monospace">
    <!-- NVDA +66.2% (max bar 600px) -->
    <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f5edd9">NVDA · TECH</text>
    <rect x="180" y="0" width="600" height="18" fill="url(#barGold)" rx="2"/>
    <text x="795" y="14" font-size="14" fill="#f0d88c" font-weight="600">+66.2%</text>

    <!-- XOM +48.3% -->
    <g transform="translate(0, 40)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f5edd9">XOM · ENERGY</text>
      <rect x="180" y="0" width="438" height="18" fill="url(#barGold)" rx="2"/>
      <text x="633" y="14" font-size="14" fill="#f0d88c" font-weight="600">+48.3%</text>
    </g>

    <!-- S&P +24.2% (시장 평균선) -->
    <g transform="translate(0, 80)">
      <text x="0" y="14" font-size="12" letter-spacing="2" fill="#988e72">S&amp;P 500 · MARKET</text>
      <rect x="180" y="0" width="219" height="18" fill="url(#barDim)" rx="2"/>
      <text x="414" y="14" font-size="13" fill="#988e72">+24.2%</text>
    </g>

    <!-- UNH +24.7% -->
    <g transform="translate(0, 120)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f5edd9">UNH · HEALTH</text>
      <rect x="180" y="0" width="224" height="18" fill="url(#barGold)" rx="2"/>
      <text x="419" y="14" font-size="14" fill="#f0d88c" font-weight="600">+24.7%</text>
    </g>

    <!-- JPM +12.4% -->
    <g transform="translate(0, 160)">
      <text x="0" y="14" font-size="13" letter-spacing="2" fill="#f5edd9">JPM · FIN</text>
      <rect x="180" y="0" width="112" height="18" fill="url(#barGold)" rx="2"/>
      <text x="307" y="14" font-size="14" fill="#f0d88c" font-weight="600">+12.4%</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">52-WEEK TOTAL RETURN · AS OF 2026.05.18</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">SCENARIO · BASE 45% · BEAR 25%</text>
</svg>
