<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a06"/>
      <stop offset="100%" style="stop-color:#1a140a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878"/>
      <stop offset="100%" style="stop-color:#f0d090"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Left gold accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="#d8b878"/>

  <!-- Top label bar -->
  <rect x="0" y="0" width="1280" height="3" fill="#d8b878" opacity="0.6"/>

  <!-- LINCOLN BRIEF wordmark -->
  <text x="48" y="56" font-family="'Georgia', serif" font-size="18" letter-spacing="6" fill="#d8b878" opacity="0.9">LINCOLN BRIEF</text>

  <!-- Edition label top-right -->
  <rect x="1060" y="28" width="180" height="36" rx="4" fill="#d8b878" opacity="0.15"/>
  <rect x="1060" y="28" width="180" height="36" rx="4" fill="none" stroke="#d8b878" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="52" font-family="'Arial', sans-serif" font-size="13" letter-spacing="2" fill="#d8b878" text-anchor="middle">US DAILY BRIEF</text>

  <!-- Date -->
  <text x="48" y="92" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">2026.06.11  |  SLOT 01  |  KST 01:00</text>

  <!-- Divider line -->
  <line x1="48" y1="110" x2="640" y2="110" stroke="#d8b878" stroke-width="1" opacity="0.3"/>

  <!-- Main headline -->
  <text x="48" y="188" font-family="'Georgia', serif" font-size="52" fill="#f5f0e8" font-weight="bold">FOMC 동결 · 매파 점도표</text>
  <text x="48" y="252" font-family="'Georgia', serif" font-size="40" fill="#d8b878">3대 지수 전면 하락</text>

  <!-- Key stats row -->
  <!-- S&P 500 -->
  <rect x="48" y="300" width="220" height="90" rx="6" fill="#1e180e" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="158" y="330" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle" letter-spacing="1">S&amp;P 500</text>
  <text x="158" y="362" font-family="'Georgia', serif" font-size="26" fill="#f5f0e8" text-anchor="middle" font-weight="bold">7,302.61</text>
  <!-- Down triangle -->
  <polygon points="145,374 165,374 155,386" fill="#ef4444"/>
  <text x="170" y="385" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−1.14%</text>

  <!-- NASDAQ -->
  <rect x="286" y="300" width="220" height="90" rx="6" fill="#1e180e" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="396" y="330" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle" letter-spacing="1">NASDAQ</text>
  <text x="396" y="362" font-family="'Georgia', serif" font-size="26" fill="#f5f0e8" text-anchor="middle" font-weight="bold">25,293</text>
  <polygon points="383,374 403,374 393,386" fill="#ef4444"/>
  <text x="408" y="385" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−1.50%</text>

  <!-- DOW -->
  <rect x="524" y="300" width="220" height="90" rx="6" fill="#1e180e" stroke="#d8b878" stroke-width="1" opacity="0.7"/>
  <text x="634" y="330" font-family="'Arial', sans-serif" font-size="13" fill="#888" text-anchor="middle" letter-spacing="1">DOW</text>
  <text x="634" y="362" font-family="'Georgia', serif" font-size="26" fill="#f5f0e8" text-anchor="middle" font-weight="bold">50,175</text>
  <polygon points="621,374 641,374 631,386" fill="#ef4444"/>
  <text x="646" y="385" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−1.37%</text>

  <!-- WTI highlight box -->
  <rect x="762" y="290" width="470" height="220" rx="8" fill="#1a0a06" stroke="#f97316" stroke-width="2"/>
  <text x="997" y="328" font-family="'Arial', sans-serif" font-size="14" fill="#f97316" text-anchor="middle" letter-spacing="2">WTI CRUDE OIL</text>
  <text x="997" y="395" font-family="'Georgia', serif" font-size="64" fill="#f5f0e8" text-anchor="middle" font-weight="bold">$91.34</text>
  <!-- Up triangle (WTI up) -->
  <polygon points="950,430 970,418 990,430" fill="#f97316"/>
  <text x="997" y="450" font-family="'Arial', sans-serif" font-size="28" fill="#f97316" text-anchor="middle" font-weight="bold">+3.56%</text>
  <text x="997" y="490" font-family="'Arial', sans-serif" font-size="13" fill="#f97316" text-anchor="middle" opacity="0.8">스태그플레이션 우려 재부상</text>

  <!-- Mover highlights -->
  <text x="48" y="440" font-family="'Arial', sans-serif" font-size="14" fill="#888" letter-spacing="1">TOP MOVERS</text>
  <line x1="48" y1="448" x2="740" y2="448" stroke="#333" stroke-width="1"/>

  <!-- AVGO -->
  <text x="48" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">AVGO</text>
  <polygon points="130,470 150,470 140,482" fill="#ef4444"/>
  <text x="155" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444" font-weight="bold">−4.55%</text>
  <text x="240" y="480" font-family="'Arial', sans-serif" font-size="14" fill="#666">$374.33</text>

  <!-- TSLA -->
  <text x="330" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">TSLA</text>
  <polygon points="412,470 432,470 422,482" fill="#ef4444"/>
  <text x="437" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−3.32%</text>
  <text x="520" y="480" font-family="'Arial', sans-serif" font-size="14" fill="#666">$383.52</text>

  <!-- NVDA -->
  <text x="610" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">NVDA</text>
  <polygon points="692,470 712,470 702,482" fill="#ef4444"/>
  <text x="717" y="480" font-family="'Arial', sans-serif" font-size="16" fill="#ef4444">−2.84%</text>

  <!-- AAPL positive -->
  <text x="48" y="520" font-family="'Arial', sans-serif" font-size="16" fill="#ccc">AAPL</text>
  <polygon points="118,522 128,510 138,522" fill="#22c55e"/>
  <text x="143" y="520" font-family="'Arial', sans-serif" font-size="16" fill="#22c55e">+0.84%</text>
  <text x="228" y="520" font-family="'Arial', sans-serif" font-size="14" fill="#666">$292.98</text>

  <!-- US10Y / USD/KRW row -->
  <text x="48" y="570" font-family="'Arial', sans-serif" font-size="14" fill="#888">US10Y</text>
  <text x="130" y="570" font-family="'Arial', sans-serif" font-size="16" fill="#d8b878" font-weight="bold">4.542%</text>
  <text x="260" y="570" font-family="'Arial', sans-serif" font-size="14" fill="#888">USD/KRW</text>
  <text x="380" y="570" font-family="'Arial', sans-serif" font-size="16" fill="#22c55e">1,519.86</text>
  <text x="500" y="570" font-family="'Arial', sans-serif" font-size="14" fill="#888">BTC</text>
  <text x="548" y="570" font-family="'Arial', sans-serif" font-size="16" fill="#d8b878">$61,805</text>

  <!-- Bottom accent line -->
  <rect x="0" y="717" width="1280" height="3" fill="#d8b878" opacity="0.4"/>

  <!-- Lincoln signature -->
  <text x="1232" y="700" font-family="'Georgia', serif" font-size="16" fill="#d8b878" text-anchor="end" opacity="0.7">— Lincoln</text>
</svg>
