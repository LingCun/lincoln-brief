<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180808"/>
      <stop offset="100%" stop-color="#100505"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e88070"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b04538"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="150" cy="600" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8b0a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.06.04 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 시장 예측 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="50" font-weight="600" fill="#ffe8e0">오늘 21:30 KST — ADP 발표</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="34" font-style="italic" fill="url(#red)">WTI $96.15 · US10Y 4.491% 급등</text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="18" fill="#c08878">4가지 시나리오별 경로 · USD/KRW 1,529.50 (1,530 근접)</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 435)">
    <!-- 불 케이스 -->
    <g>
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#1a3010" stroke="#6ba368" stroke-width="1" stroke-opacity="0.6"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#6ba368">불 케이스</text>
      <text x="14" y="56" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#b0d8a0">S&amp;P 7,650+</text>
      <text x="14" y="80" font-family="monospace" font-size="11" fill="#6ba368">약한 ADP → 18%</text>
    </g>
    <!-- 베이스 -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#18200a" stroke="#a0b060" stroke-width="1" stroke-opacity="0.6"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#a0b060">베이스</text>
      <text x="14" y="56" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#c8d880">7,500~7,650</text>
      <text x="14" y="80" font-family="monospace" font-size="11" fill="#a0b060">컨센서스 → 34%</text>
    </g>
    <!-- 베어 케이스 -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#200808" stroke="#d96552" stroke-width="1" stroke-opacity="0.8"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#d96552">베어 케이스</text>
      <text x="14" y="56" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#e88870">S&amp;P 7,400-</text>
      <text x="14" y="80" font-family="monospace" font-size="11" fill="#d96552">강한 ADP → 34%</text>
    </g>
    <!-- 블랙 스완 -->
    <g transform="translate(780, 0)">
      <rect x="0" y="0" width="240" height="100" rx="4" fill="#100808" stroke="#804040" stroke-width="1" stroke-opacity="0.6"/>
      <text x="14" y="28" font-family="monospace" font-size="11" letter-spacing="2" fill="#804040">블랙 스완</text>
      <text x="14" y="56" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#c07060">이란 충격</text>
      <text x="14" y="80" font-family="monospace" font-size="11" fill="#804040">WTI $100+ → 14%</text>
    </g>
  </g>

  <!-- 하단 구분선 -->
  <line x1="80" y1="625" x2="1200" y2="625" stroke="#d96552" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="650" font-family="monospace" font-size="10" letter-spacing="2" fill="#604040">Lincoln Brief · lincoln-brief.vercel.app · 본 자료는 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
