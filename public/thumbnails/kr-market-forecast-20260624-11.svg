<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110806"/>
      <stop offset="100%" style="stop-color:#1e100e"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d96552;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d96552;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d96552;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d96552" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d96552" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#804030" letter-spacing="2">KR MARKET · MARKET FORECAST</text>

  <!-- Edition label -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#d96552" fill-opacity="0.1" stroke="#d96552" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#c08070" text-anchor="middle" letter-spacing="1">2026.06.24 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d96552" fill-opacity="0.7"/>

  <!-- KOSPI headline -->
  <text x="640" y="170" font-family="Georgia, serif" font-size="20" fill="#c08070" text-anchor="middle" letter-spacing="4">KOSPI 4주 시나리오</text>
  <text x="640" y="258" font-family="Georgia, serif" font-size="80" fill="#ffffff" text-anchor="middle" font-weight="bold">8,233.24</text>
  <text x="640" y="308" font-family="Georgia, serif" font-size="22" fill="#c08070" text-anchor="middle">바이오 vs 반도체 — 분화 장세 지속</text>

  <!-- Divider -->
  <line x1="160" y1="344" x2="1120" y2="344" stroke="#d96552" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <rect x="80" y="364" width="1120" height="44" rx="4" fill="#d96552" fill-opacity="0.08" stroke="#d96552" stroke-opacity="0.3" stroke-width="1"/>
  <text x="180" y="392" font-family="Georgia, serif" font-size="15" fill="#d96552" font-weight="bold">시나리오</text>
  <text x="380" y="392" font-family="Georgia, serif" font-size="15" fill="#d96552" font-weight="bold">확률</text>
  <text x="520" y="392" font-family="Georgia, serif" font-size="15" fill="#d96552" font-weight="bold">핵심 조건</text>
  <text x="900" y="392" font-family="Georgia, serif" font-size="15" fill="#d96552" font-weight="bold">KOSPI 경로</text>

  <!-- Bull row -->
  <text x="100" y="432" font-family="Georgia, serif" font-size="14" fill="#4ade80">불 — 8,500 탐색</text>
  <text x="380" y="432" font-family="Georgia, serif" font-size="15" fill="#4ade80" font-weight="bold">20%</text>
  <text x="520" y="432" font-family="Georgia, serif" font-size="13" fill="#888888">NVDA 반등 + 바이오 지속</text>
  <text x="900" y="432" font-family="Georgia, serif" font-size="13" fill="#4ade80">8,233 → 8,400 → 8,500</text>

  <!-- Base row -->
  <text x="100" y="468" font-family="Georgia, serif" font-size="14" fill="#d8b878">베이스 — 박스권</text>
  <text x="380" y="468" font-family="Georgia, serif" font-size="15" fill="#d8b878" font-weight="bold">45%</text>
  <text x="520" y="468" font-family="Georgia, serif" font-size="13" fill="#888888">섹터 분화 지속, 외부 충격 없음</text>
  <text x="900" y="468" font-family="Georgia, serif" font-size="13" fill="#d8b878">8,000 ~ 8,400 구간 등락</text>

  <!-- Bear row -->
  <text x="100" y="504" font-family="Georgia, serif" font-size="14" fill="#f87171">베어 — 8,000 이탈</text>
  <text x="380" y="504" font-family="Georgia, serif" font-size="15" fill="#f87171" font-weight="bold">30%</text>
  <text x="520" y="504" font-family="Georgia, serif" font-size="13" fill="#888888">NVDA $190 이탈 · US10Y 4.6%+</text>
  <text x="900" y="504" font-family="Georgia, serif" font-size="13" fill="#f87171">8,000 이탈 → 7,800 탐색</text>

  <!-- Black Swan row -->
  <text x="100" y="540" font-family="Georgia, serif" font-size="14" fill="#a05050">블랙 스완</text>
  <text x="380" y="540" font-family="Georgia, serif" font-size="15" fill="#a05050" font-weight="bold">5%</text>
  <text x="520" y="540" font-family="Georgia, serif" font-size="13" fill="#555555">글로벌 패닉 · 원화 1,580원+</text>
  <text x="900" y="540" font-family="Georgia, serif" font-size="13" fill="#a05050">7,500 이하 급락</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="582" x2="1120" y2="582" stroke="#d96552" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="618" font-family="Georgia, serif" font-size="14" fill="#c08070" text-anchor="middle">핵심 변수</text>
  <text x="260" y="640" font-family="Georgia, serif" font-size="13" fill="#804030" text-anchor="middle">NVDA $200 방어 여부</text>
  <text x="640" y="618" font-family="Georgia, serif" font-size="14" fill="#c08070" text-anchor="middle">US10Y 4.493%</text>
  <text x="640" y="640" font-family="Georgia, serif" font-size="13" fill="#804030" text-anchor="middle">4.5% 돌파 여부 주시</text>
  <text x="1020" y="618" font-family="Georgia, serif" font-size="14" fill="#c08070" text-anchor="middle">USD/KRW 1,539원</text>
  <text x="1020" y="640" font-family="Georgia, serif" font-size="13" fill="#804030" text-anchor="middle">1,540 이탈 시 외국인 압력</text>

  <!-- Key dividers -->
  <line x1="160" y1="660" x2="1120" y2="660" stroke="#d96552" stroke-opacity="0.08" stroke-width="1"/>
  <text x="640" y="688" font-family="Georgia, serif" font-size="13" fill="#804030" text-anchor="middle">셀트리온 +8.41% · 삼성바이오로직스 +5.73% vs SK하이닉스 −2.50%</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d96552" fill-opacity="0.5"/>
</svg>
