<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#101828"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="#5677b0"/>

  <!-- Left side blue glow panel -->
  <rect x="0" y="0" width="520" height="720" fill="url(#blue-glow)"/>

  <!-- Lincoln Brief logo -->
  <text x="48" y="58" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <rect x="48" y="66" width="160" height="1.5" fill="#5677b0" opacity="0.5"/>

  <!-- Edition label -->
  <rect x="1092" y="28" width="140" height="36" rx="4" fill="#5677b0" fill-opacity="0.12" stroke="#5677b0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1162" y="52" font-family="Georgia, serif" font-size="13" fill="#5677b0" text-anchor="middle" letter-spacing="2">US 01:00</text>

  <!-- Date -->
  <text x="48" y="106" font-family="Georgia, serif" font-size="14" fill="#6a7a9a" letter-spacing="1">2026.06.18 — 6/17 마감</text>

  <!-- Category label -->
  <rect x="48" y="128" width="120" height="28" rx="3" fill="#5677b0" fill-opacity="0.22"/>
  <text x="108" y="147" font-family="Georgia, serif" font-size="13" fill="#5677b0" text-anchor="middle" letter-spacing="1">종목 분석</text>

  <!-- Ticker hero -->
  <text x="48" y="195" font-family="Georgia, serif" font-size="36" fill="#8ab0e0" font-weight="bold" letter-spacing="4">AVGO</text>
  <text x="220" y="195" font-family="Georgia, serif" font-size="22" fill="#8a9ab0">Broadcom</text>

  <!-- Price hero -->
  <text x="48" y="270" font-family="Georgia, serif" font-size="64" fill="#ffffff" font-weight="bold">$396.72</text>

  <!-- Change badge -->
  <rect x="48" y="290" width="200" height="44" rx="6" fill="#4adc7a" fill-opacity="0.15" stroke="#4adc7a" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="70,316 82,316 76,305" fill="#4adc7a"/>
  <text x="92" y="320" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">+5.31%</text>

  <!-- Context note -->
  <text x="48" y="366" font-family="Georgia, serif" font-size="16" fill="#6a7a9a">12종목 최대 상승 · 빅테크 약세 역주행</text>

  <!-- Divider -->
  <rect x="48" y="388" width="460" height="1" fill="#5677b0" opacity="0.3"/>

  <!-- Key metrics -->
  <text x="48" y="424" font-family="Georgia, serif" font-size="15" fill="#6a7a9a">52주 최고점</text>
  <text x="185" y="424" font-family="Georgia, serif" font-size="20" fill="#ffffff" font-weight="bold">$495.00</text>

  <text x="48" y="460" font-family="Georgia, serif" font-size="15" fill="#6a7a9a">애널리스트 목표가</text>
  <text x="210" y="460" font-family="Georgia, serif" font-size="20" fill="#5677b0" font-weight="bold">$522.06</text>

  <text x="48" y="496" font-family="Georgia, serif" font-size="15" fill="#6a7a9a">배당락일</text>
  <text x="148" y="496" font-family="Georgia, serif" font-size="20" fill="#ffffff" font-weight="bold">6월 22일 ($0.65)</text>

  <!-- Right column divider -->
  <rect x="570" y="90" width="2" height="540" fill="#5677b0" opacity="0.2"/>

  <!-- Right panel: vs peers -->
  <text x="610" y="140" font-family="Georgia, serif" font-size="14" fill="#6a7a9a" letter-spacing="2">동일 세션 비교</text>
  <rect x="610" y="150" width="80" height="1" fill="#5677b0" opacity="0.4"/>

  <text x="610" y="198" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">AVGO</text>
  <text x="700" y="198" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">+5.31%</text>
  <polygon points="790,182 802,182 796,171" fill="#4adc7a"/>

  <text x="610" y="238" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">JPM</text>
  <text x="700" y="238" font-family="Georgia, serif" font-size="22" fill="#4adc7a" font-weight="bold">+1.59%</text>

  <text x="610" y="278" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">NVDA</text>
  <text x="700" y="278" font-family="Georgia, serif" font-size="22" fill="#c0c0c0">−0.11%</text>

  <text x="610" y="318" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">MSFT</text>
  <text x="700" y="318" font-family="Georgia, serif" font-size="22" fill="#e05c5c">−2.29%</text>

  <text x="610" y="358" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">GOOGL</text>
  <text x="700" y="358" font-family="Georgia, serif" font-size="22" fill="#e05c5c">−2.22%</text>

  <text x="610" y="398" font-family="Georgia, serif" font-size="16" fill="#b0c0d8">META</text>
  <text x="700" y="398" font-family="Georgia, serif" font-size="22" fill="#e05c5c" font-weight="bold">−3.48%</text>
  <polygon points="790,382 802,382 796,371" fill="#e05c5c" transform="rotate(180 796 376.5)"/>

  <!-- Divider -->
  <rect x="610" y="420" width="620" height="1" fill="#5677b0" opacity="0.25"/>

  <!-- Story context -->
  <text x="610" y="462" font-family="Georgia, serif" font-size="15" fill="#5677b0" font-weight="bold">AI 인프라 수요 선별 반영</text>
  <text x="610" y="490" font-family="Georgia, serif" font-size="13" fill="#6a7a9a">30일 저점 $372 → 현재 $396 회복</text>
  <text x="610" y="514" font-family="Georgia, serif" font-size="13" fill="#6a7a9a">시가총액 $1.89T · P/E 65.95</text>

  <!-- Bottom signature -->
  <text x="610" y="640" font-family="Georgia, serif" font-size="13" fill="#3a4a6a" letter-spacing="1">lincoln-brief.vercel.app</text>
  <text x="48" y="680" font-family="Georgia, serif" font-size="12" fill="#2a3040">※ 정보 제공 목적이며 투자 권유가 아닙니다</text>
</svg>
