<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a090"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#a84030"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="160" r="360" fill="url(#glow1)"/>
  <circle cx="150" cy="580" r="240" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.27 · ECONOMY ISSUE · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 경제 이슈 · 유가 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#f5edd9">WTI $93.98</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#red)">유가 급락이 보내는 경기 경고음</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#ba8a7a">S&amp;P +0.41%와 정반대 방향  ·  실물 수요 둔화 신호</text>

  <!-- 데이터 카드 -->
  <g transform="translate(80, 450)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d96552" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#ba8a7a">WTI 원유</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">$93.98</text>
      <polygon points="0,82 18,82 9,98" fill="#d96552" transform="rotate(180, 9, 90)"/>
      <text x="26" y="99" font-family="monospace" font-size="15" fill="#d96552">−2.71%</text>
    </g>
    <!-- S&P -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#6ba368" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#ba8a7a">S&amp;P 500</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="36" fill="#f5edd9">7,503</text>
      <polygon points="0,82 18,82 9,98" fill="#6ba368"/>
      <text x="26" y="99" font-family="monospace" font-size="15" fill="#6ba368">+0.41%</text>
    </g>
    <!-- 불일치 메모 -->
    <g transform="translate(560, 12)">
      <rect x="0" y="0" width="380" height="78" rx="4" fill="#2a1510" stroke="#d96552" stroke-width="1" stroke-opacity="0.5"/>
      <text x="16" y="28" font-family="Georgia, serif" font-size="15" fill="#f5edd9">주식: 미래 기대를 사다</text>
      <text x="16" y="52" font-family="Georgia, serif" font-size="15" fill="#d98472">원유: 현재 수요를 팔다</text>
      <text x="16" y="72" font-family="monospace" font-size="11" fill="#988e72">→ 5/30 PCE 가 분기점</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#3a1a10" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#ba8a7a">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#5a3020" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
