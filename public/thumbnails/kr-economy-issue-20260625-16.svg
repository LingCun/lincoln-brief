<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101a10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg-grad)"/>

  <!-- Green accent line -->
  <rect x="0" y="0" width="6" height="720" fill="#4caf50"/>
  <rect x="0" y="100" width="1280" height="1" fill="url(#green-line)" opacity="0.4"/>

  <!-- Lincoln Brief mark -->
  <text x="40" y="68" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" font-weight="700" fill="#4caf50" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="40" y="92" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#3a7a3a" letter-spacing="1">KR 경제 이슈</text>

  <!-- Edition label -->
  <text x="1240" y="54" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#3a7a3a" text-anchor="end">6·25·2026 / 16:00 KST</text>
  <text x="1240" y="78" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#1a3a1a" text-anchor="end">economy-issue</text>

  <!-- Diamond accent -->
  <polygon points="640,112 650,122 640,132 630,122" fill="#4caf50" opacity="0.6"/>

  <!-- Main headline -->
  <text x="640" y="170" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="26" font-weight="700" fill="#b0d0b0" text-anchor="middle">반도체 집중 랠리의 양극화 구조</text>

  <!-- Two big numbers with VS -->
  <!-- KOSPI -->
  <text x="320" y="270" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="28" fill="#3a7a3a" text-anchor="middle" font-weight="600">KOSPI</text>
  <text x="320" y="340" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="64" font-weight="700" fill="#4caf50" text-anchor="middle">+5.42%</text>
  <polygon points="320,360 306,380 334,380" fill="#4caf50"/>
  <text x="320" y="415" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" fill="#4caf50" text-anchor="middle">8,930.3</text>

  <!-- VS divider -->
  <rect x="628" y="200" width="2" height="240" fill="#1a3a1a"/>
  <text x="640" y="310" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="28" fill="#1a3a1a" text-anchor="middle">vs</text>

  <!-- KOSDAQ -->
  <text x="960" y="270" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="28" fill="#7a3a3a" text-anchor="middle" font-weight="600">KOSDAQ</text>
  <text x="960" y="340" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="64" font-weight="700" fill="#e55555" text-anchor="middle">−2.36%</text>
  <polygon points="960,380 946,360 974,360" fill="#e55555"/>
  <text x="960" y="415" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" fill="#e55555" text-anchor="middle">887.81</text>

  <!-- Gap label -->
  <text x="640" y="460" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="22" fill="#6a9a6a" text-anchor="middle">하루 격차  +7.78%p</text>

  <!-- Divider -->
  <rect x="100" y="480" width="1080" height="1" fill="#1a3a1a"/>

  <!-- Key movers row -->
  <text x="320" y="524" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#c8d8c8" text-anchor="middle">SK하이닉스 · 삼성전자</text>
  <polygon points="380,510 368,524 392,524" fill="#4caf50"/>
  <text x="490" y="524" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="20" font-weight="700" fill="#4caf50">+11.29% / +5.29%</text>

  <!-- Separator -->
  <text x="700" y="524" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="18" fill="#1a3a1a" text-anchor="middle">|</text>

  <text x="870" y="524" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="16" fill="#d8c8c8" text-anchor="middle">LG에너지·POSCO</text>
  <polygon points="1010,524 998,510 1022,510" fill="#e55555"/>
  <text x="1110" y="524" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="20" font-weight="700" fill="#e55555">−3.69% / −2.56%</text>

  <!-- Tagline -->
  <text x="640" y="600" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="20" fill="#3a7a3a" text-anchor="middle">반도체 집중 구조 — 온기는 두 종목에서 멈추고 있다</text>

  <!-- Bottom brand line -->
  <rect x="0" y="680" width="1280" height="40" fill="#040a04"/>
  <text x="640" y="706" font-family="'Apple SD Gothic Neo','Malgun Gothic',Arial,sans-serif" font-size="14" fill="#1a3a1a" text-anchor="middle">lincoln-brief.vercel.app  |  — Lincoln</text>
</svg>
