<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4080e8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4080e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="180" r="450" fill="url(#glow1)"/>
  <circle cx="200" cy="600" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.12 11:00 KST · KR 종목분석</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— STOCK ANALYSIS —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="580" height="30" rx="4" fill="#4080e8" fill-opacity="0.18" stroke="#4080e8" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#7ab8f8">top12 최대 상승 · IT·AI 대장주 · NASDAQ +2.54% 수혜</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="80" font-weight="500" fill="#f5edd9">NAVER</text>
  <text x="80" y="365" font-family="Playfair Display, Georgia, serif" font-size="42" font-style="italic" fill="url(#gold)">250,500원 — 오늘 top12 폭등 1위</text>
  <text x="80" y="412" font-family="sans-serif" font-size="17" fill="#7898aa">30일 저점(191,500) 대비 +30.8% · 30일 고점(280,500) 대비 −10.7%</text>

  <!-- Divider -->
  <line x1="80" y1="448" x2="1200" y2="448" stroke="#141828" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 482)">
    <!-- 오늘 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">NAVER 종가</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">250,500원</text>
      <polygon points="28,88 14,72 0,88" fill="#5ab0f8"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#5ab0f8">+11.83%</text>
    </g>
    <!-- 전일 대비 -->
    <g transform="translate(280, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">전일 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">+26,500원</text>
      <polygon points="28,88 14,72 0,88" fill="#5ab0f8"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#5ab0f8">224,000 → 250,500</text>
    </g>
    <!-- NASDAQ -->
    <g transform="translate(680, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#a89060">NASDAQ</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">25,809.66</text>
      <polygon points="28,88 14,72 0,88" fill="#40e880"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#40e880">+2.54%</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="700" font-family="monospace" font-size="10" fill="#383848">Lincoln Brief · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="700" font-family="monospace" font-size="10" fill="#383848" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
