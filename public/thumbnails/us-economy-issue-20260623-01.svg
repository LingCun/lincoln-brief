<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="greenLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4ade80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#4ade80" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top green accent bar (economy-issue = green) -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#greenLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">US MARKET · ECONOMY ISSUE</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#4ade80" fill-opacity="0.1" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#6abe80" text-anchor="middle" letter-spacing="1">2026.06.23 · 01:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#4ade80" fill-opacity="0.5"/>

  <!-- WTI main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#6abe80" text-anchor="middle" letter-spacing="4">WTI 원유</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">$73.75</text>
  <polygon points="548,296 566,314 584,296" fill="#f87171"/>
  <text x="596" y="310" font-family="Georgia, serif" font-size="36" fill="#f87171" font-weight="bold">−3.72%</text>
  <text x="640" y="352" font-family="Georgia, serif" font-size="18" fill="#405850" text-anchor="middle">미-이란 긴장 완화 · 호르무즈 해협 안정 기대</text>

  <!-- Divider -->
  <line x1="160" y1="378" x2="1120" y2="378" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Left panel: geopolitical context -->
  <rect x="80" y="398" width="480" height="196" rx="4" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="432" font-family="Georgia, serif" font-size="16" fill="#6abe80" text-anchor="middle" letter-spacing="2">지정학 프리미엄 제거</text>
  <text x="108" y="468" font-family="Georgia, serif" font-size="14" fill="#c0a060">호르무즈 해협</text>
  <text x="108" y="490" font-family="Georgia, serif" font-size="13" fill="#607060">전 세계 석유 수송 ~20% 통과</text>
  <line x1="108" y1="506" x2="520" y2="506" stroke="#4ade80" stroke-opacity="0.15" stroke-width="1"/>
  <text x="108" y="530" font-family="Georgia, serif" font-size="14" fill="#c0a060">긴장 완화 효과</text>
  <text x="108" y="552" font-family="Georgia, serif" font-size="13" fill="#607060">공급 차질 우려 해소 → 유가 프리미엄↓</text>
  <text x="320" y="582" font-family="Georgia, serif" font-size="13" fill="#405850" text-anchor="middle">한국 중동산 원유 수입 비용 완화</text>

  <!-- Right panel: impact -->
  <rect x="600" y="398" width="600" height="196" rx="4" fill="#c0a060" fill-opacity="0.03" stroke="#c0a060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="900" y="432" font-family="Georgia, serif" font-size="16" fill="#c0a060" text-anchor="middle" letter-spacing="2">섹터 영향</text>
  <text x="628" y="468" font-family="Georgia, serif" font-size="14" fill="#888888">항공 (연료비)</text>
  <text x="1150" y="468" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">비용 절감 ↑</text>
  <text x="628" y="496" font-family="Georgia, serif" font-size="14" fill="#888888">정유 (재고 손실)</text>
  <text x="1150" y="496" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">단기 부담</text>
  <text x="628" y="524" font-family="Georgia, serif" font-size="14" fill="#888888">인플레이션</text>
  <text x="1150" y="524" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="end">재완화 기대</text>
  <text x="628" y="552" font-family="Georgia, serif" font-size="14" fill="#888888">Gold</text>
  <text x="1150" y="552" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end">−0.43% 동반</text>
  <text x="628" y="578" font-family="Georgia, serif" font-size="13" fill="#705050">협상 결렬 시 $78+ 반등 리스크</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">Gold $4,206.10</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−0.43% · 안전자산 수요 약화</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">BTC $64,535</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+2.05% · 역방향 반등</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,537.18</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−0.02% · 보합</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#4ade80" fill-opacity="0.35"/>
</svg>
