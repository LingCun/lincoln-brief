<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0e"/>
      <stop offset="100%" stop-color="#0d0808"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f09070"/>
      <stop offset="50%" stop-color="#e06040"/>
      <stop offset="100%" stop-color="#c04020"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e06040" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e06040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="160" r="340" fill="url(#glow)"/>
  <circle cx="200" cy="600" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#e06040" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#faf0ee">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#e06040">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#e06040" text-anchor="end">2026.05.21 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#e06040">— 시장 예측 · 다음 4주 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="262" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#faf0ee">DJIA 50K 이후,</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="48" font-style="italic" fill="url(#red)">여름 랠리를 결정할 4가지</text>
  <text x="80" y="382" font-family="Pretendard, sans-serif" font-size="18" fill="#b08070">S&amp;P 500  7,432.97  ·  10년물  4.67%  ·  금  $4,534</text>

  <!-- 시나리오 표 -->
  <g transform="translate(80, 430)">
    <!-- 헤더 -->
    <text x="0" y="18" font-family="monospace" font-size="11" letter-spacing="3" fill="#e06040">4주 시나리오 확률</text>

    <!-- 베이스 -->
    <rect x="0" y="32" width="220" height="56" rx="3" fill="#2a1a16" stroke="#e06040" stroke-width="1" stroke-opacity="0.4"/>
    <text x="12" y="55" font-family="monospace" font-size="12" fill="#e06040">BASE · 45%</text>
    <text x="12" y="76" font-family="Pretendard, sans-serif" font-size="13" fill="#faf0ee">7,350~7,550 횡보</text>

    <!-- 불 케이스 -->
    <rect x="235" y="32" width="220" height="56" rx="3" fill="#162614" stroke="#6ba368" stroke-width="1" stroke-opacity="0.6"/>
    <text x="247" y="55" font-family="monospace" font-size="12" fill="#6ba368">BULL · 25%</text>
    <text x="247" y="76" font-family="Pretendard, sans-serif" font-size="13" fill="#faf0ee">7,600+ 신고가</text>

    <!-- 베어 케이스 -->
    <rect x="470" y="32" width="220" height="56" rx="3" fill="#261614" stroke="#d96552" stroke-width="1" stroke-opacity="0.6"/>
    <text x="482" y="55" font-family="monospace" font-size="12" fill="#d96552">BEAR · 20%</text>
    <text x="482" y="76" font-family="Pretendard, sans-serif" font-size="13" fill="#faf0ee">7,200 이탈</text>

    <!-- 블랙 스완 -->
    <rect x="705" y="32" width="220" height="56" rx="3" fill="#1a1220" stroke="#9966cc" stroke-width="1" stroke-opacity="0.6"/>
    <text x="717" y="55" font-family="monospace" font-size="12" fill="#9966cc">BLACK SWAN · 10%</text>
    <text x="717" y="76" font-family="Pretendard, sans-serif" font-size="13" fill="#faf0ee">7,000 이탈</text>
  </g>

  <!-- 핵심 이벤트 -->
  <text x="80" y="575" font-family="monospace" font-size="12" letter-spacing="2" fill="#e06040">KEY EVENTS ▶</text>
  <text x="230" y="575" font-family="Pretendard, sans-serif" font-size="13" fill="#faf0ee">Fed 회의록 5/29  ·  PCE 5/30  ·  CPI 6/11</text>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#e06040" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#e06040" opacity="0.8">MAY 21 · 2026 · THU · 4-WEEK OUTLOOK</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#e06040" opacity="0.8" text-anchor="end">SOURCE · FRED · YAHOO FINANCE</text>
</svg>
