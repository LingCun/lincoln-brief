<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a0f"/>
      <stop offset="100%" stop-color="#060a06"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9cc48e"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7a50"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="330" fill="url(#glow)"/>
  <circle cx="200" cy="570" r="270" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#dff0d8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.05.21 · ECONOMY ISSUE</text>

  <!-- 헤드라인 -->
  <text x="80" y="180" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 원유 시장 경제 이슈 —</text>
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="#dff0d8">WTI</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="60" font-style="italic" fill="url(#green)">$99.08</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#80a070">$100 심리선 이탈  ·  −4.87%  ·  전일 $103.94</text>

  <!-- 데이터 그리드 -->
  <g transform="translate(80, 460)">
    <!-- WTI -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#80a070">WTI TODAY</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dff0d8">$99.08</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#d96552">−4.87%</text>
    </g>
    <!-- Brent -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#80a070">BRENT TODAY</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dff0d8">$105.51</text>
      <polygon points="0,86 14,86 7,72" fill="#d96552"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#d96552">−5.19%</text>
    </g>
    <!-- Gold -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#80a070">GOLD</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#dff0d8">$4,532</text>
      <polygon points="0,76 14,76 7,90" fill="#6ba368"/>
      <text x="22" y="93" font-family="monospace" font-size="14" fill="#6ba368">+0.48%</text>
    </g>
    <!-- Fed 영향 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#80a070">FED SIGNAL</text>
      <text x="0" y="62" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#dff0d8">인하 여지</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#7a9d6e">CPI 하강 기대</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#7a9d6e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" opacity="0.8">MAY 21 · 2026 · THU · ENERGY &amp; INFLATION</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" opacity="0.8" text-anchor="end">SOURCE · YAHOO FINANCE</text>
</svg>
