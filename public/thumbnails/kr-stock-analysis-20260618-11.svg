<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#101520"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5677b0;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#5677b0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5677b0;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#5677b0" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#5677b0" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="427" y1="0" x2="427" y2="720" stroke="#5677b0" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="853" y1="0" x2="853" y2="720" stroke="#5677b0" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#5677b0" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#3a5080" letter-spacing="2">KR MARKET · STOCK ANALYSIS</text>

  <!-- Edition label (top right) -->
  <rect x="1060" y="28" width="180" height="36" rx="3" fill="#5677b0" fill-opacity="0.12" stroke="#5677b0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1150" y="51" font-family="Georgia, serif" font-size="14" fill="#5677b0" text-anchor="middle" letter-spacing="1">2026.06.18 · 11:00</text>

  <!-- Diamond decorative element -->
  <polygon points="640,110 648,118 640,126 632,118" fill="#5677b0" fill-opacity="0.8"/>

  <!-- Stock name -->
  <text x="640" y="175" font-family="Georgia, serif" font-size="32" fill="#5677b0" text-anchor="middle" letter-spacing="4">SK 하이닉스 (000660)</text>

  <!-- Main price number -->
  <text x="640" y="290" font-family="Georgia, serif" font-size="100" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="-2">267만원</text>

  <!-- Change indicator -->
  <polygon points="560,318 574,300 588,318" fill="#4ade80"/>
  <text x="600" y="320" font-family="Georgia, serif" font-size="30" fill="#4ade80" font-weight="bold">+6.11%  +154,000원</text>

  <!-- Gold separator line -->
  <line x1="160" y1="365" x2="1120" y2="365" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ATH badge -->
  <rect x="468" y="378" width="344" height="38" rx="4" fill="#5677b0" fill-opacity="0.15" stroke="#5677b0" stroke-opacity="0.5" stroke-width="1"/>
  <text x="640" y="403" font-family="Georgia, serif" font-size="16" fill="#88aadd" text-anchor="middle" letter-spacing="2">★ 역사적 신고점 · June 8 저점 대비 +39.97%</text>

  <!-- Three metrics -->
  <!-- June 8 저점 -->
  <text x="213" y="460" font-family="Georgia, serif" font-size="14" fill="#3a5080" text-anchor="middle" letter-spacing="1">June 8 저점</text>
  <text x="213" y="498" font-family="Georgia, serif" font-size="26" fill="#aaaaaa" text-anchor="middle">191만원</text>
  <text x="213" y="526" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle">+39.97%↑</text>

  <!-- Divider -->
  <line x1="427" y1="440" x2="427" y2="540" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 270만원 목표 -->
  <text x="640" y="460" font-family="Georgia, serif" font-size="14" fill="#3a5080" text-anchor="middle" letter-spacing="1">다음 라운드 넘버</text>
  <text x="640" y="498" font-family="Georgia, serif" font-size="26" fill="#ffffff" text-anchor="middle">270만원</text>
  <text x="640" y="526" font-family="Georgia, serif" font-size="14" fill="#88aadd" text-anchor="middle">25,000원 앞 (+0.93%)</text>

  <!-- Divider -->
  <line x1="853" y1="440" x2="853" y2="540" stroke="#5677b0" stroke-opacity="0.2" stroke-width="1"/>

  <!-- 삼성전자 비교 -->
  <text x="1067" y="460" font-family="Georgia, serif" font-size="14" fill="#3a5080" text-anchor="middle" letter-spacing="1">삼성전자 비교</text>
  <text x="1067" y="498" font-family="Georgia, serif" font-size="26" fill="#aaaaaa" text-anchor="middle">353,500원</text>
  <text x="1067" y="526" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle">+2.02% (격차 4.09%pt)</text>

  <!-- Gold separator line -->
  <line x1="160" y1="556" x2="1120" y2="556" stroke="#5677b0" stroke-opacity="0.25" stroke-width="1"/>

  <!-- NVDA reverse callout -->
  <text x="640" y="605" font-family="Georgia, serif" font-size="19" fill="#88aadd" text-anchor="middle" letter-spacing="1">NVDA −1.33% · S&amp;P 500 −1.21% — 3거래일 연속 역행</text>

  <!-- Bottom disclaimer -->
  <text x="640" y="690" font-family="Georgia, serif" font-size="12" fill="#2a3a50" text-anchor="middle">lincoln-brief.vercel.app  ·  정보 제공 목적, 투자 권유 아님</text>

  <!-- Bottom blue accent -->
  <rect x="0" y="716" width="1280" height="4" fill="url(#blueLine)"/>
</svg>
