<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0804"/>
      <stop offset="100%" stop-color="#1a0e06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e06820" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e06820" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="300" r="380" fill="url(#glow1)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.09 16:00 KST · 시장 예측</text>

  <!-- Category badge -->
  <rect x="80" y="118" width="200" height="28" rx="4" fill="#e06820" fill-opacity="0.20" stroke="#e06820" stroke-width="0.8"/>
  <text x="92" y="136" font-family="monospace" font-size="12" letter-spacing="2" fill="#ff9950">MARKET FORECAST</text>

  <!-- Main headline -->
  <text x="80" y="242" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f5edd9">이틀 연속 양봉</text>
  <text x="80" y="300" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#gold)">추세 확인 기준 △△✗ — 아직 진행 중</text>
  <text x="80" y="344" font-family="sans-serif" font-size="17" fill="#8a9898">KOSPI 7,484 → 8,047 → 8,097 · NVDA $208.64(기준 $210 미달)</text>

  <!-- Divider -->
  <line x1="80" y1="378" x2="1200" y2="378" stroke="#2a1a0a" stroke-width="1"/>

  <!-- Scenario table -->
  <g transform="translate(80, 408)">
    <text x="0" y="18" font-family="monospace" font-size="13" letter-spacing="3" fill="#a89060">향후 2~4주 시나리오</text>

    <!-- Bear case row -->
    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="580" height="36" rx="3" fill="#e06820" fill-opacity="0.10"/>
      <text x="12" y="22" font-family="monospace" font-size="13" fill="#ff9950">베이스 45%</text>
      <text x="140" y="22" font-family="monospace" font-size="13" fill="#f5edd9">7,900~8,400 횡보</text>
      <text x="400" y="22" font-family="monospace" font-size="12" fill="#888">NVDA $210 + 외국인 지속</text>
    </g>

    <!-- Bull case row -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="580" height="36" rx="3" fill="#30c060" fill-opacity="0.10"/>
      <text x="12" y="22" font-family="monospace" font-size="13" fill="#40d870">불 케이스 20%</text>
      <text x="140" y="22" font-family="monospace" font-size="13" fill="#f5edd9">8,400~8,830 ATH 재시험</text>
      <text x="400" y="22" font-family="monospace" font-size="12" fill="#888">NVDA $215 + USD/KRW 1,500원대</text>
    </g>

    <!-- Bear case row -->
    <g transform="translate(0, 124)">
      <rect x="0" y="0" width="580" height="36" rx="3" fill="#e02040" fill-opacity="0.10"/>
      <text x="12" y="22" font-family="monospace" font-size="13" fill="#ff5070">베어 케이스 30%</text>
      <text x="140" y="22" font-family="monospace" font-size="13" fill="#f5edd9">7,300~7,800 재하락</text>
      <text x="400" y="22" font-family="monospace" font-size="12" fill="#888">NVDA 재하락 + 원화 재약세</text>
    </g>
  </g>

  <!-- Right side: KOSPI path visual -->
  <g transform="translate(780, 360)">
    <text x="0" y="-10" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">KOSPI 경로</text>
    <!-- Path line -->
    <line x1="0" y1="160" x2="380" y2="160" stroke="#2a2010" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Points -->
    <circle cx="0" cy="160" r="6" fill="#e02040"/>
    <text x="-10" y="185" font-family="monospace" font-size="11" fill="#ff5070" text-anchor="middle">7,484</text>
    <text x="-10" y="198" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">6/8</text>

    <circle cx="190" cy="60" r="6" fill="#d8b878"/>
    <text x="190" y="85" font-family="monospace" font-size="11" fill="#d8b878" text-anchor="middle">8,047</text>
    <text x="190" y="98" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">14시</text>

    <circle cx="380" cy="40" r="7" fill="#40d870"/>
    <text x="380" y="65" font-family="monospace" font-size="11" fill="#40d870" text-anchor="middle">8,097</text>
    <text x="380" y="78" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">종가</text>

    <!-- Connecting line -->
    <polyline points="0,160 190,60 380,40" fill="none" stroke="#40d870" stroke-width="2.5" stroke-linejoin="round" stroke-opacity="0.7"/>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="690" x2="1200" y2="690" stroke="#2a1a0a" stroke-width="0.5"/>
  <text x="80" y="708" font-family="monospace" font-size="10" letter-spacing="2" fill="#6a5a40">lincoln-brief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
</svg>
