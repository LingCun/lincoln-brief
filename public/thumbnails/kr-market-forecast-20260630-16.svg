<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100804"/>
      <stop offset="100%" style="stop-color:#1c1008"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05030;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e05030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e05030;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#e05030" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#e05030" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#e08060" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#906040" letter-spacing="2">KR MARKET · 시장 예측</text>

  <!-- Edition label -->
  <rect x="970" y="28" width="270" height="36" rx="3" fill="#e05030" fill-opacity="0.08" stroke="#e05030" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1105" y="51" font-family="Georgia, serif" font-size="14" fill="#c07050" text-anchor="middle" letter-spacing="1">2026.06.30 · 16:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,104 651,115 640,126 629,115" fill="#e08060" fill-opacity="0.9"/>

  <!-- Main headline -->
  <text x="640" y="158" font-family="Georgia, serif" font-size="18" fill="#c07050" text-anchor="middle" letter-spacing="2">H1 종가 확정 · Q3 방향을 결정할 세 변수</text>

  <!-- KOSPI H1 Final display -->
  <text x="320" y="224" font-family="Georgia, serif" font-size="14" fill="#806040" text-anchor="middle" letter-spacing="2">H1 최종 마감</text>
  <text x="320" y="290" font-family="Georgia, serif" font-size="64" fill="#ffffff" text-anchor="middle" font-weight="bold">8,476</text>
  <text x="320" y="320" font-family="Georgia, serif" font-size="18" fill="#909090" text-anchor="middle">.48  +0.97%</text>
  <text x="320" y="352" font-family="Georgia, serif" font-size="13" fill="#604030" text-anchor="middle">오전 고점 8,662.69 → 186pt 반납</text>

  <!-- Vertical divider -->
  <line x1="640" y1="195" x2="640" y2="380" stroke="#e05030" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Three variables -->
  <text x="960" y="220" font-family="Georgia, serif" font-size="14" fill="#806040" text-anchor="middle" letter-spacing="2">Q3 핵심 변수</text>
  <text x="680" y="258" font-family="Georgia, serif" font-size="13" fill="#a08060">① NVDA</text>
  <text x="1200" y="258" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="end" font-weight="bold">$194.97  $190 방어</text>
  <text x="680" y="292" font-family="Georgia, serif" font-size="13" fill="#a08060">② 삼성전자</text>
  <text x="1200" y="292" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="end" font-weight="bold">334,000원  330,000 지지</text>
  <text x="680" y="326" font-family="Georgia, serif" font-size="13" fill="#a08060">③ USD/KRW</text>
  <text x="1200" y="326" font-family="Georgia, serif" font-size="14" fill="#f87171" text-anchor="end" font-weight="bold">1,550.40원  관찰선 돌파</text>

  <!-- Divider line -->
  <line x1="120" y1="396" x2="1160" y2="396" stroke="#e05030" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Scenario table -->
  <text x="640" y="430" font-family="Georgia, serif" font-size="15" fill="#e08060" text-anchor="middle" letter-spacing="2">향후 4주 KOSPI 시나리오</text>

  <!-- Bull -->
  <rect x="80" y="450" width="260" height="216" rx="4" fill="#e05030" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="210" y="476" font-family="Georgia, serif" font-size="13" fill="#4ade80" text-anchor="middle">불 (15%)</text>
  <text x="210" y="506" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">8,700+</text>
  <text x="210" y="534" font-family="Georgia, serif" font-size="11" fill="#406030" text-anchor="middle">NVDA $200 돌파</text>
  <text x="210" y="554" font-family="Georgia, serif" font-size="11" fill="#406030" text-anchor="middle">삼성전자 350,000원</text>
  <text x="210" y="574" font-family="Georgia, serif" font-size="11" fill="#406030" text-anchor="middle">원화 1,540원대 복귀</text>

  <!-- Base -->
  <rect x="360" y="450" width="260" height="216" rx="4" fill="#e05030" fill-opacity="0.04" stroke="#d8b878" stroke-opacity="0.4" stroke-width="2"/>
  <text x="490" y="476" font-family="Georgia, serif" font-size="13" fill="#d8b878" text-anchor="middle">베이스 (48%)</text>
  <text x="490" y="506" font-family="Georgia, serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">8,200~8,700</text>
  <text x="490" y="534" font-family="Georgia, serif" font-size="11" fill="#806040" text-anchor="middle">NVDA $185~$200</text>
  <text x="490" y="554" font-family="Georgia, serif" font-size="11" fill="#806040" text-anchor="middle">섹터 교대 지속</text>
  <text x="490" y="574" font-family="Georgia, serif" font-size="11" fill="#806040" text-anchor="middle">원화 1,540~1,560원</text>

  <!-- Bear -->
  <rect x="640" y="450" width="260" height="216" rx="4" fill="#e05030" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="770" y="476" font-family="Georgia, serif" font-size="13" fill="#f87171" text-anchor="middle">베어 (27%)</text>
  <text x="770" y="506" font-family="Georgia, serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">8,000</text>
  <text x="770" y="534" font-family="Georgia, serif" font-size="11" fill="#603030" text-anchor="middle">NVDA $180 이하</text>
  <text x="770" y="554" font-family="Georgia, serif" font-size="11" fill="#603030" text-anchor="middle">원화 1,570원 이상</text>
  <text x="770" y="574" font-family="Georgia, serif" font-size="11" fill="#603030" text-anchor="middle">외국인 이탈 가속</text>

  <!-- Black Swan -->
  <rect x="920" y="450" width="260" height="216" rx="4" fill="#e05030" fill-opacity="0.04" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1050" y="476" font-family="Georgia, serif" font-size="13" fill="#ef4444" text-anchor="middle">블랙 스완 (10%)</text>
  <text x="1050" y="506" font-family="Georgia, serif" font-size="22" fill="#ef4444" text-anchor="middle" font-weight="bold">8,000 이탈</text>
  <text x="1050" y="534" font-family="Georgia, serif" font-size="11" fill="#602020" text-anchor="middle">미국 경기 충격</text>
  <text x="1050" y="554" font-family="Georgia, serif" font-size="11" fill="#602020" text-anchor="middle">원화 1,600원+</text>
  <text x="1050" y="574" font-family="Georgia, serif" font-size="11" fill="#602020" text-anchor="middle">섹터 동반 급락</text>

  <!-- Bottom signature -->
  <text x="640" y="696" font-family="Georgia, serif" font-size="12" fill="#604030" text-anchor="middle" letter-spacing="1">lincoln-brief.vercel.app · KR Market Forecast</text>
</svg>
