<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c08;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1510;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#gold-line)" />

  <!-- Lincoln Brief logo area -->
  <text x="60" y="65" font-family="Georgia, serif" font-size="20" fill="#d8b878" letter-spacing="4" opacity="0.9">LINCOLN BRIEF</text>
  <polygon points="52,58 57,48 62,58" fill="#d8b878" opacity="0.9"/>

  <!-- Edition label top right -->
  <rect x="1050" y="32" width="200" height="36" rx="4" fill="#d8b878" fill-opacity="0.15" stroke="#d8b878" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1150" y="55" font-family="Arial, sans-serif" font-size="14" fill="#d8b878" text-anchor="middle" letter-spacing="2">6/20 · 06:00 KST</text>

  <!-- Category label -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="13" fill="#d8b878" letter-spacing="3" opacity="0.7">DAILY BRIEF · 데일리 시황</text>

  <!-- Main headline -->
  <text x="60" y="210" font-family="Georgia, serif" font-size="62" fill="#ffffff" font-weight="bold">6/19 마감 확정</text>
  <text x="60" y="285" font-family="Georgia, serif" font-size="44" fill="#d8b878">AI 공급자 + 소비자 동반 랠리</text>

  <!-- Divider -->
  <rect x="60" y="318" width="480" height="2" fill="#d8b878" opacity="0.5"/>

  <!-- Key metrics grid -->
  <!-- S&P 500 -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="15" fill="#a09080" letter-spacing="1">S&amp;P 500</text>
  <text x="60" y="416" font-family="Arial, sans-serif" font-size="38" fill="#ffffff" font-weight="bold">7,500.58</text>
  <text x="240" y="416" font-family="Arial, sans-serif" font-size="22" fill="#4dcc88">+1.08%</text>

  <!-- NASDAQ -->
  <text x="60" y="470" font-family="Arial, sans-serif" font-size="15" fill="#a09080" letter-spacing="1">NASDAQ</text>
  <text x="60" y="506" font-family="Arial, sans-serif" font-size="38" fill="#ffffff" font-weight="bold">26,517.93</text>
  <text x="280" y="506" font-family="Arial, sans-serif" font-size="22" fill="#4dcc88">+1.91%</text>

  <!-- DOW -->
  <text x="60" y="560" font-family="Arial, sans-serif" font-size="15" fill="#a09080" letter-spacing="1">DOW</text>
  <text x="60" y="596" font-family="Arial, sans-serif" font-size="38" fill="#ffffff" font-weight="bold">51,564.70</text>
  <text x="278" y="596" font-family="Arial, sans-serif" font-size="22" fill="#4dcc88">+0.14%</text>

  <!-- Right panel: Top movers -->
  <rect x="620" y="140" width="610" height="540" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#d8b878" stroke-width="1" stroke-opacity="0.2"/>

  <text x="645" y="180" font-family="Arial, sans-serif" font-size="13" fill="#d8b878" letter-spacing="2" opacity="0.8">TOP MOVERS</text>

  <!-- AVGO row -->
  <rect x="635" y="196" width="580" height="56" rx="4" fill="#4dcc88" fill-opacity="0.07"/>
  <text x="655" y="228" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">AVGO</text>
  <text x="655" y="246" font-family="Arial, sans-serif" font-size="13" fill="#a09080">Broadcom</text>
  <text x="1100" y="230" font-family="Arial, sans-serif" font-size="24" fill="#4dcc88" font-weight="bold" text-anchor="end">+4.70%</text>
  <text x="1195" y="230" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="end">$411.35</text>

  <!-- NVDA row -->
  <rect x="635" y="258" width="580" height="56" rx="4" fill="#4dcc88" fill-opacity="0.04"/>
  <text x="655" y="290" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">NVDA</text>
  <text x="655" y="308" font-family="Arial, sans-serif" font-size="13" fill="#a09080">NVIDIA</text>
  <text x="1100" y="292" font-family="Arial, sans-serif" font-size="24" fill="#4dcc88" font-weight="bold" text-anchor="end">+2.95%</text>
  <text x="1195" y="292" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="end">$210.69</text>

  <!-- AMZN row -->
  <rect x="635" y="320" width="580" height="56" rx="4" fill="#4dcc88" fill-opacity="0.04"/>
  <text x="655" y="352" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">AMZN</text>
  <text x="655" y="370" font-family="Arial, sans-serif" font-size="13" fill="#a09080">Amazon</text>
  <text x="1100" y="354" font-family="Arial, sans-serif" font-size="24" fill="#4dcc88" font-weight="bold" text-anchor="end">+2.90%</text>
  <text x="1195" y="354" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="end">$244.39</text>

  <!-- JPM row (loser) -->
  <rect x="635" y="382" width="580" height="56" rx="4" fill="#cc4d4d" fill-opacity="0.07"/>
  <text x="655" y="414" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">JPM</text>
  <text x="655" y="432" font-family="Arial, sans-serif" font-size="13" fill="#a09080">JPMorgan</text>
  <text x="1100" y="416" font-family="Arial, sans-serif" font-size="24" fill="#cc6666" font-weight="bold" text-anchor="end">−2.47%</text>
  <text x="1195" y="416" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="end">$325.22</text>

  <!-- Macro section -->
  <text x="645" y="480" font-family="Arial, sans-serif" font-size="13" fill="#d8b878" letter-spacing="2" opacity="0.8">MACRO</text>

  <text x="655" y="515" font-family="Arial, sans-serif" font-size="15" fill="#a09080">Gold</text>
  <text x="740" y="515" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">$4,172.90</text>
  <text x="890" y="515" font-family="Arial, sans-serif" font-size="16" fill="#cc6666">−1.21%</text>

  <text x="655" y="548" font-family="Arial, sans-serif" font-size="15" fill="#a09080">USD/KRW</text>
  <text x="775" y="548" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">1,530.20</text>
  <text x="890" y="548" font-family="Arial, sans-serif" font-size="16" fill="#4dcc88">−0.48%</text>

  <text x="655" y="581" font-family="Arial, sans-serif" font-size="15" fill="#a09080">US10Y</text>
  <text x="740" y="581" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">4.451%</text>
  <text x="890" y="581" font-family="Arial, sans-serif" font-size="16" fill="#4dcc88">↓ 하락</text>

  <text x="655" y="614" font-family="Arial, sans-serif" font-size="15" fill="#a09080">BTC</text>
  <text x="700" y="614" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">$63,035</text>
  <text x="890" y="614" font-family="Arial, sans-serif" font-size="16" fill="#4dcc88">+0.22%</text>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#000000" fill-opacity="0.3"/>
  <text x="60" y="705" font-family="Arial, sans-serif" font-size="13" fill="#a09080">데이터: Yahoo Finance · FRED · CoinGecko · Frankfurter</text>
  <text x="1220" y="705" font-family="Arial, sans-serif" font-size="13" fill="#d8b878" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
