<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081008"/>
      <stop offset="100%" style="stop-color:#101a10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#52c87a"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="4" height="600" fill="#52c87a" opacity="0.3"/>

  <!-- Edition label top right -->
  <rect x="1010" y="36" width="230" height="32" rx="4" fill="#52c87a" opacity="0.15"/>
  <text x="1125" y="57" font-family="Georgia, serif" font-size="13" fill="#52c87a" text-anchor="middle" letter-spacing="2">US ECONOMY ISSUE</text>

  <!-- Date -->
  <text x="88" y="100" font-family="Georgia, serif" font-size="16" fill="#52c87a" opacity="0.7" letter-spacing="3">2026.06.29 · SLOT 01</text>

  <!-- Diamond separator -->
  <polygon points="88,118 95,125 88,132 81,125" fill="#52c87a"/>

  <!-- Main headline left: Gold -->
  <text x="88" y="185" font-family="Georgia, serif" font-size="36" fill="#a8d8b8" opacity="0.9">GOLD</text>
  <text x="88" y="265" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#52c87a">$4,096.30</text>
  <polygon points="440,248 460,272 420,272" fill="#52c87a"/>
  <text x="472" y="268" font-family="Georgia, serif" font-size="28" fill="#52c87a" font-weight="bold">+1.63%</text>

  <!-- VS separator -->
  <text x="88" y="310" font-family="Georgia, serif" font-size="28" fill="#d8f0e8" opacity="0.5">vs</text>

  <!-- WTI section -->
  <text x="88" y="355" font-family="Georgia, serif" font-size="36" fill="#a8d8b8" opacity="0.9">WTI 원유</text>
  <text x="88" y="430" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#e05252">$69.23</text>
  <polygon points="430,436 448,412 412,412" fill="#e05252"/>
  <text x="460" y="430" font-family="Georgia, serif" font-size="28" fill="#e05252" font-weight="bold">−3.74%</text>

  <!-- Divider line -->
  <line x1="88" y1="460" x2="750" y2="460" stroke="#52c87a" stroke-width="1" opacity="0.4"/>

  <!-- Interpretation -->
  <text x="88" y="498" font-family="Georgia, serif" font-size="18" fill="#52c87a" opacity="0.9">Gold ↑ + WTI ↓ → 수요 둔화 우려 + 안전자산 선호 공존</text>
  <text x="88" y="530" font-family="Georgia, serif" font-size="17" fill="#a8d8b8">이란 확전 시: WTI 역방향 반전 → Gold ↑ + WTI ↑ 구도 전환</text>

  <!-- Supporting data -->
  <line x1="88" y1="558" x2="750" y2="558" stroke="#52c87a" stroke-width="1" opacity="0.2"/>
  <text x="88" y="588" font-family="Georgia, serif" font-size="17" fill="#52c87a">US10Y</text>
  <text x="200" y="588" font-family="Georgia, serif" font-size="17" fill="#f0f8f4">4.372%</text>
  <text x="320" y="588" font-family="Georgia, serif" font-size="16" fill="#a8d8b8">소폭 하락 (PCE 완화 신호)</text>

  <text x="88" y="618" font-family="Georgia, serif" font-size="17" fill="#52c87a">USD/KRW</text>
  <text x="220" y="618" font-family="Georgia, serif" font-size="17" fill="#f0f8f4">1,535</text>
  <text x="320" y="618" font-family="Georgia, serif" font-size="16" fill="#a8d8b8">달러 약세 (−0.74%)</text>

  <!-- Lincoln Brief mark -->
  <text x="88" y="678" font-family="Georgia, serif" font-size="20" fill="#52c87a" opacity="0.5" letter-spacing="2">LINCOLN BRIEF</text>

  <!-- Bottom accent line -->
  <rect x="0" y="717" width="1280" height="3" fill="#52c87a" opacity="0.4"/>
</svg>
