<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#0a0907"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="100%" stop-color="#b89a5a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#8c7448"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bgGrad)"/>

  <!-- 우측 장식: 전력 수요 막대 차트 -->
  <g transform="translate(880, 280)" opacity="0.85">
    <!-- baseline -->
    <line x1="0" y1="240" x2="320" y2="240" stroke="#988e72" stroke-width="1" opacity="0.6"/>

    <!-- 막대들 (2025 → 2030) -->
    <rect x="0"   y="180" width="42" height="60"  fill="#3a3025"/>
    <rect x="55"  y="160" width="42" height="80"  fill="#5a4830"/>
    <rect x="110" y="125" width="42" height="115" fill="#8c7448"/>
    <rect x="165" y="85"  width="42" height="155" fill="#b89a5a"/>
    <rect x="220" y="50"  width="42" height="190" fill="#d8b878"/>
    <rect x="275" y="20"  width="42" height="220" fill="url(#barGrad)"/>

    <!-- 라벨 -->
    <text x="21"  y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'25</text>
    <text x="76"  y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'26</text>
    <text x="131" y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'27</text>
    <text x="186" y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'28</text>
    <text x="241" y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'29</text>
    <text x="296" y="262" font-family="monospace" font-size="11" fill="#988e72" text-anchor="middle">'30</text>

    <!-- 차트 헤더 -->
    <text x="0" y="-10" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">DATA CENTER · TWh</text>
    <text x="0" y="14"  font-family="Playfair Display, Georgia, serif" font-size="22" fill="#f5edd9">17 → 50 TWh</text>
  </g>

  <!-- 좌상단 장식: 번개 -->
  <g transform="translate(820, 200)" opacity="0.55">
    <polygon points="20,0 0,42 14,42 6,72 28,30 14,30 22,0" fill="url(#boltGrad)"/>
  </g>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>

  <!-- 우상단 에디션 -->
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">EDITION · ECONOMY ISSUE</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— AI · POWER · INFRASTRUCTURE —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">AI가 한국 전력을</text>
  <text x="80" y="360" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">다 마실 수 있을까</text>
  <text x="80" y="425" font-family="Playfair Display, Georgia, serif" font-size="32" font-style="italic" fill="url(#goldGrad)">데이터센터의 새로운 위기</text>

  <!-- 부제 -->
  <text x="80" y="475" font-family="Pretendard, sans-serif" font-size="20" fill="#988e72">2030년까지 +25~30 GW 신규 발전 필요</text>

  <!-- 좌하단 종목 진영 -->
  <g transform="translate(80, 540)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="10" letter-spacing="3" fill="#988e72">KEY PLAYERS</text>
    <text x="0" y="55" font-family="Pretendard, sans-serif" font-size="18" fill="#f5edd9">두산에너빌리티 · HD현대일렉 · 한전KPS · 한국전력</text>
    <text x="0" y="85" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">HD현대일렉 12M +226% · 단 5/15 −6.95%</text>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8">2026.05.15 · KST</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" opacity="0.8" text-anchor="end">UTILITY · NUCLEAR · SMR</text>
</svg>
