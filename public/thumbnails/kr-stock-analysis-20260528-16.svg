  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">오전 +11.47% → 마감 +15.25% 확대</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="56" font-weight="500" fill="#f5edd9">LG에너지솔루션</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="46" font-style="italic" fill="url(#gold)">442,000원 +15.25%</text>
  <text x="80" y="405" font-family="sans-serif" font-size="17" fill="#8a9898">오전 강세가 오후에도 이어진 배터리 모멘텀 · top12 압도적 1위</text>

  <!-- Divider -->
  <line x1="80" y1="435" x2="1200" y2="435" stroke="#2a4a2a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- LG에너지솔루션 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#4db86b" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#4db86b">LG에너지솔루션 마감</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">442,000원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+15.25%</text>
    </g>
    <!-- 30일 저점 -->
    <g transform="translate(360, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="2" fill="#a89060">30일 저점 대비</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">383,500원</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+15.25%</text>
    </g>
