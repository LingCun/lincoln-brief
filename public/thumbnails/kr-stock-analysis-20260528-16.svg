      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">484,500원</text>
      <polygon points="0,88 14,72 28,88" fill="#e07050"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e07050">−8.77%</text>
    </g>
