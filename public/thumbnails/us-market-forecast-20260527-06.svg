<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#070a0f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab8e8"/>
      <stop offset="50%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2a6aaa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="340" fill="url(#glow1)"/>
  <circle cx="150" cy="560" r="280" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#4a90d9" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#4a90d9">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#4a90d9" text-anchor="end">2026.05.27 · MARKET FORECAST · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#4a90d9">— 시장 예측 · 골디락스 신호 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="52" font-weight="500" fill="#f5edd9">반도체 어닝 + 금리 완화</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#blue)">골디락스 초기 신호 점등</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#7aa8c8">Micron +19.29%  ·  10Y 4.493%  ·  5/29·5/30 이벤트 대기</text>

  <!-- 시나리오 테이블 -->
  <g transform="translate(80, 440)">
    <!-- 골디락스 -->
    <g>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#6ba368" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aa8c8">골디락스</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#6ba368">25%</text>
      <text x="0" y="99" font-family="monospace" font-size="12" fill="#88a485">S&amp;P 7,650~7,750</text>
    </g>
    <!-- 베이스 -->
    <g transform="translate(240, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#4a90d9" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aa8c8">베이스</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#4a90d9">40%</text>
      <text x="0" y="99" font-family="monospace" font-size="12" fill="#7aa8c8">7,400~7,600 박스</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(480, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d96552" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aa8c8">베어 케이스</text>
      <text x="0" y="72" font-family="Playfair Display, Georgia, serif" font-size="32" fill="#d96552">30%</text>
      <text x="0" y="99" font-family="monospace" font-size="12" fill="#c08070">PCE 상회 시</text>
    </g>
    <!-- 이벤트 -->
    <g transform="translate(740, 0)">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#d8b878" stroke-width="2"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#7aa8c8">분기점</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8b878">5/29 FOMC</text>
      <text x="0" y="99" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#d8b878">5/30 PCE</text>
    </g>
  </g>

  <!-- 하단 구분선 + 서명 -->
  <line x1="80" y1="640" x2="1200" y2="640" stroke="#1a2030" stroke-width="1"/>
  <text x="80" y="668" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#7aa8c8">— Lincoln</text>
  <text x="1200" y="668" font-family="monospace" font-size="12" fill="#3a4858" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
