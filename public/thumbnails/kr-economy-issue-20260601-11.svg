<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1408"/>
      <stop offset="100%" stop-color="#060e05"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ac08a"/>
      <stop offset="50%" stop-color="#7a9d6e"/>
      <stop offset="100%" stop-color="#5a7d50"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7a9d6e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a9d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e09040" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e09040" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="260" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#7a9d6e" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#7a9d6e">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#7a9d6e" text-anchor="end">2026.06.01 11:00 KST · KR ECONOMY</text>

  <!-- Category label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#7a9d6e">— 경제 이슈 —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="400" height="30" rx="4" fill="#7a9d6e" fill-opacity="0.20" stroke="#7a9d6e" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#9ac08a">원화 약세 + 유가 반등 · 무역수지 역풍</text>

  <!-- Main title -->
  <text x="80" y="290" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#f5edd9">원화 1,512원 + WTI $89</text>
  <text x="80" y="352" font-family="Playfair Display, Georgia, serif" font-size="38" font-style="italic" fill="url(#green)">무역수지 호재 서사 반전</text>
  <text x="80" y="400" font-family="sans-serif" font-size="17" fill="#8a9898">USD/KRW +1.13% · WTI +2.68% · 이중 압박 재개</text>

  <!-- Divider -->
  <line x1="80" y1="434" x2="1200" y2="434" stroke="#1a3018" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 468)">
    <!-- USD/KRW -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8d60">USD/KRW</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">1,512.26원</text>
      <polygon points="0,88 14,72 28,88" fill="#e09040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e09040">+1.13%</text>
    </g>
    <!-- WTI -->
    <g transform="translate(360, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8d60">WTI 원유</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">$89.70</text>
      <polygon points="0,88 14,72 28,88" fill="#e09040"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#e09040">+2.68%</text>
    </g>
    <!-- US10Y -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#7a9d6e" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6a8d60">미국 10년물</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="28" fill="#f5edd9">4.453%</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">−0.04%</text>
    </g>
  </g>

  <!-- Bottom line -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#1a3018" stroke-width="0.5"/>
  <text x="80" y="645" font-family="monospace" font-size="10" fill="#3a5030" letter-spacing="2">lincolnbrief.vercel.app · 정보 제공 목적, 투자 권유 아님</text>
  <text x="1200" y="645" font-family="monospace" font-size="10" fill="#7a9d6e" text-anchor="end">— Lincoln</text>
</svg>
