<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#100c14"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80a0e0"/>
      <stop offset="50%" stop-color="#6080c0"/>
      <stop offset="100%" stop-color="#4060a0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6080c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6080c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c06060" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#c06060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="400" fill="url(#glow1)"/>
  <circle cx="150" cy="600" r="250" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#6080c0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#a0b8e0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#6080c0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080c0" text-anchor="end">2026.06.06 · STOCK ANALYSIS · SLOT 01</text>

  <!-- 카테고리 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#6080c0">— 종목 분석 —</text>

  <!-- 종목명 -->
  <text x="80" y="250" font-family="monospace" font-size="22" letter-spacing="8" fill="#a0b8e0">AVGO · BROADCOM</text>

  <!-- 가격 및 변화 -->
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="70" font-weight="700" fill="#e0e8f8">$394.06</text>
  <polygon points="80,380 95,355 110,380" fill="#c06060"/>
  <text x="120" y="380" font-family="monospace" font-size="36" fill="#c06060">−5.93%</text>

  <!-- 서브텍스트 -->
  <text x="80" y="430" font-family="sans-serif" font-size="20" fill="#8090b0">6/4(−12.59%) 에 이어 6/5에도 추가 하락</text>
  <text x="80" y="460" font-family="sans-serif" font-size="18" fill="#6070a0">6/4 직전 고점 $479.23 → 이틀 누적 −17.8%</text>

  <!-- 데이터 박스 -->
  <g transform="translate(80, 510)">
    <!-- 6/4 -->
    <rect x="0" y="0" width="240" height="72" rx="4" fill="#1a1420" stroke="#6080c0" stroke-width="1" stroke-opacity="0.4"/>
    <text x="16" y="24" font-family="monospace" font-size="11" fill="#6080c0" letter-spacing="2">6/4 일간</text>
    <text x="16" y="56" font-family="Georgia, serif" font-size="26" fill="#e0d8d0">−12.59%</text>

    <!-- 6/5 -->
    <rect x="256" y="0" width="240" height="72" rx="4" fill="#1a1420" stroke="#c06060" stroke-width="1" stroke-opacity="0.6"/>
    <text x="272" y="24" font-family="monospace" font-size="11" fill="#c06060" letter-spacing="2">6/5 일간</text>
    <text x="272" y="56" font-family="Georgia, serif" font-size="26" fill="#e0d8d0">−5.93%</text>

    <!-- 누적 -->
    <rect x="512" y="0" width="240" height="72" rx="4" fill="#1a1420" stroke="#e87070" stroke-width="1.5" stroke-opacity="0.8"/>
    <text x="528" y="24" font-family="monospace" font-size="11" fill="#e87070" letter-spacing="2">이틀 누적</text>
    <text x="528" y="56" font-family="Georgia, serif" font-size="26" fill="#e0d8d0">−17.8%</text>
  </g>

  <!-- 원인 태그 -->
  <text x="80" y="650" font-family="monospace" font-size="12" fill="#506090">AI 가이던스 쇼크  ·  US10Y 4.544% 금리 역풍  ·  기술주 전반 매도</text>

  <!-- 우하단 -->
  <text x="1200" y="690" font-family="monospace" font-size="10" letter-spacing="2" fill="#404060" text-anchor="end">lincoln-brief.vercel.app</text>
</svg>
