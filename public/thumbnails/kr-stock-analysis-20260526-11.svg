<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab8f0"/>
      <stop offset="50%" stop-color="#5a9cd8"/>
      <stop offset="100%" stop-color="#3a78b8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="100%" stop-color="#d8b878"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5a9cd8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5a9cd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4db86b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4db86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="200" r="360" fill="url(#glow1)"/>
  <circle cx="200" cy="560" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5a9cd8" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f5edd9">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5a9cd8">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5a9cd8" text-anchor="end">2026.05.26 11:00 KST · STOCK ANALYSIS</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5a9cd8">— 종목 분석 —</text>

  <!-- HBM badge -->
  <rect x="80" y="176" width="220" height="30" rx="4" fill="#4db86b" fill-opacity="0.20" stroke="#4db86b" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#4db86b">HBM · KOSPI top 상승주</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f5edd9">SK하이닉스</text>
  <text x="80" y="358" font-family="Playfair Display, Georgia, serif" font-size="46" font-style="italic" fill="url(#blue)">208만 원 +7.16%</text>
  <text x="80" y="406" font-family="sans-serif" font-size="17" fill="#7090b8">저점 1,745,000원 대비 +19.2% · 반도체 섹터 전체 동반 상승</text>

  <!-- Divider -->
  <line x1="80" y1="440" x2="1200" y2="440" stroke="#1a2a4a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 476)">
    <!-- SK하이닉스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9cd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">SK하이닉스</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">2,080,000</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+7.16%</text>
    </g>
    <!-- 삼성전자 -->
    <g transform="translate(350, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9cd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">삼성전자</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">300,500</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+2.74%</text>
    </g>
    <!-- KOSPI -->
    <g transform="translate(700, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5a9cd8" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#6080a0">KOSPI</text>
      <text x="0" y="66" font-family="Playfair Display, Georgia, serif" font-size="30" fill="#f5edd9">8,085.95</text>
      <polygon points="0,72 14,88 28,72" fill="#4db86b"/>
      <text x="36" y="87" font-family="monospace" font-size="16" fill="#4db86b">+3.04%</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="680" width="1280" height="40" fill="#06090e" fill-opacity="0.9"/>
  <text x="80" y="706" font-family="monospace" font-size="11" letter-spacing="2" fill="#4a6080">USD/KRW 1,507.33 · WTI $92.02 (−4.74%) · US 10Y 4.558%</text>
