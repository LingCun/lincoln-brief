<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c10"/>
      <stop offset="100%" style="stop-color:#101820"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#60a5fa" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#blueLine)"/>

  <!-- Lincoln Brief mark -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · FORECAST</text>

  <!-- Edition label -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#60a5fa" fill-opacity="0.1" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#80c0f0" text-anchor="middle" letter-spacing="1">2026.06.22 · 16:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#60a5fa" fill-opacity="0.5"/>

  <!-- Main headline -->
  <text x="640" y="170" font-family="Georgia, serif" font-size="20" fill="#80c0f0" text-anchor="middle" letter-spacing="3">주간 마감 · 다음 주 시나리오</text>
  <text x="640" y="248" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">KOSPI 9,114</text>
  <text x="640" y="292" font-family="Georgia, serif" font-size="26" fill="#60a5fa" text-anchor="middle">SK하이닉스 300만원까지 81,000원</text>
  <text x="640" y="336" font-family="Georgia, serif" font-size="16" fill="#406080" text-anchor="middle">3일 연속 9,000선 유지 · 안착 조건 5개 中 1개 충족</text>

  <!-- Divider -->
  <line x1="160" y1="364" x2="1120" y2="364" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenario table -->
  <text x="640" y="398" font-family="Georgia, serif" font-size="16" fill="#80c0f0" text-anchor="middle" letter-spacing="2">다음 주 시나리오</text>

  <!-- Bull -->
  <rect x="80" y="414" width="260" height="150" rx="4" fill="#4ade80" fill-opacity="0.07" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
  <text x="210" y="442" font-family="Georgia, serif" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="bold">불 (Bull)</text>
  <text x="210" y="464" font-family="Georgia, serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">40%</text>
  <text x="210" y="490" font-family="Georgia, serif" font-size="12" fill="#608060" text-anchor="middle">9,200 탐색</text>
  <text x="210" y="510" font-family="Georgia, serif" font-size="11" fill="#507050" text-anchor="middle">300만원 돌파</text>
  <text x="210" y="530" font-family="Georgia, serif" font-size="11" fill="#507050" text-anchor="middle">USD/KRW 1,520원대</text>
  <text x="210" y="550" font-family="Georgia, serif" font-size="11" fill="#507050" text-anchor="middle">AVGO/NVDA 강세</text>

  <!-- Base -->
  <rect x="360" y="414" width="260" height="150" rx="4" fill="#d8b878" fill-opacity="0.06" stroke="#d8b878" stroke-opacity="0.3" stroke-width="1"/>
  <text x="490" y="442" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" font-weight="bold">베이스 (Base)</text>
  <text x="490" y="464" font-family="Georgia, serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">40%</text>
  <text x="490" y="490" font-family="Georgia, serif" font-size="12" fill="#907840" text-anchor="middle">9,000~9,150 박스</text>
  <text x="490" y="510" font-family="Georgia, serif" font-size="11" fill="#706030" text-anchor="middle">SK하이닉스 소화</text>
  <text x="490" y="530" font-family="Georgia, serif" font-size="11" fill="#706030" text-anchor="middle">현 조건 유지</text>

  <!-- Bear -->
  <rect x="640" y="414" width="260" height="150" rx="4" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="770" y="442" font-family="Georgia, serif" font-size="14" fill="#d06060" text-anchor="middle" font-weight="bold">베어 (Bear)</text>
  <text x="770" y="464" font-family="Georgia, serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">15%</text>
  <text x="770" y="490" font-family="Georgia, serif" font-size="12" fill="#905050" text-anchor="middle">8,800 되돌림</text>
  <text x="770" y="510" font-family="Georgia, serif" font-size="11" fill="#705050" text-anchor="middle">SK하이닉스 급락</text>
  <text x="770" y="530" font-family="Georgia, serif" font-size="11" fill="#705050" text-anchor="middle">USD/KRW 1,540 돌파</text>

  <!-- Black Swan -->
  <rect x="920" y="414" width="260" height="150" rx="4" fill="#888888" fill-opacity="0.05" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1050" y="442" font-family="Georgia, serif" font-size="14" fill="#808080" text-anchor="middle" font-weight="bold">블랙 스완</text>
  <text x="1050" y="464" font-family="Georgia, serif" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">5%</text>
  <text x="1050" y="490" font-family="Georgia, serif" font-size="12" fill="#606060" text-anchor="middle">8,500 이탈</text>

  <!-- Bottom stats -->
  <line x1="160" y1="590" x2="1120" y2="590" stroke="#60a5fa" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="620" font-family="Georgia, serif" font-size="14" fill="#80c0f0" text-anchor="middle">1순위 변수</text>
  <text x="260" y="642" font-family="Georgia, serif" font-size="12" fill="#406080" text-anchor="middle">SK하이닉스 300만원 돌파</text>
  <text x="640" y="620" font-family="Georgia, serif" font-size="14" fill="#80c0f0" text-anchor="middle">2순위 변수</text>
  <text x="640" y="642" font-family="Georgia, serif" font-size="12" fill="#406080" text-anchor="middle">AVGO $411.35 / NVDA $210.69</text>
  <text x="1020" y="620" font-family="Georgia, serif" font-size="14" fill="#80c0f0" text-anchor="middle">3순위 변수</text>
  <text x="1020" y="642" font-family="Georgia, serif" font-size="12" fill="#406080" text-anchor="middle">USD/KRW 1,537.30 → 1,520원</text>

  <text x="640" y="686" font-family="Georgia, serif" font-size="13" fill="#304050" text-anchor="middle">월요일 AVGO/NVDA 방향이 다음 주를 결정한다</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#60a5fa" fill-opacity="0.35"/>
</svg>
