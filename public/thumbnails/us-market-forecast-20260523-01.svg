<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb074"/>
      <stop offset="50%" stop-color="#ff7b54"/>
      <stop offset="100%" stop-color="#d95c35"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff7b54" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff7b54" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="360" fill="url(#glow)"/>
  <circle cx="180" cy="580" r="280" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#ff7b54" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#fff0e8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#ff7b54">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#ff7b54" text-anchor="end">2026.05.23 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#ff7b54">— 4주 시나리오 점검 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="260" font-family="Playfair Display, Georgia, serif" font-size="58" font-weight="500" fill="#fff0e8">5/29 Fed 회의록</text>
  <text x="80" y="330" font-family="Playfair Display, Georgia, serif" font-size="46" font-style="italic" fill="url(#orange)">여름 랠리의 열쇠</text>
  <text x="80" y="385" font-family="Pretendard, sans-serif" font-size="18" fill="#aa8070">S&amp;P 500 7,445  ·  10Y 4.57%  ·  USD/KRW 1,517.55</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 435)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#ff7b54" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#aa8070">BASE · 50%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#fff0e8">7,300~7,600</text>
      <text x="0" y="82" font-family="monospace" font-size="11" fill="#aa8070">회의록 중립</text>
    </g>
    <!-- 불 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#aa8070">BULL · 20%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#6ba368">7,700+</text>
      <text x="0" y="82" font-family="monospace" font-size="11" fill="#aa8070">PCE 2.2% 이하</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#aa8070">BEAR · 25%</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d96552">7,100~7,200</text>
      <text x="0" y="82" font-family="monospace" font-size="11" fill="#aa8070">PCE 3.0%+</text>
    </g>
    <!-- 다음 이벤트 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#ff7b54" stroke-width="1.5"/>
      <text x="0" y="25" font-family="monospace" font-size="11" letter-spacing="2" fill="#aa8070">NEXT EVENT</text>
      <text x="0" y="55" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#fff0e8">5/29 회의록</text>
      <text x="0" y="78" font-family="Playfair Display, Georgia, serif" font-size="22" fill="#fff0e8">5/30 PCE</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#ff7b54" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#ff7b54" opacity="0.8">MAY 23 · 2026 · MEMORIAL DAY WEEK</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#ff7b54" opacity="0.8" text-anchor="end">SOURCE · FRED · FEDERAL RESERVE</text>
</svg>
