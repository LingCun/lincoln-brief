<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1010"/>
      <stop offset="100%" stop-color="#0a0606"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0a090"/>
      <stop offset="50%" stop-color="#d96552"/>
      <stop offset="100%" stop-color="#b84532"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d96552" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d96552" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="200" r="340" fill="url(#glow)"/>
  <circle cx="200" cy="560" r="260" fill="url(#glow)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d96552" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#f8e8e0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d96552">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" text-anchor="end">2026.05.25 · MARKET FORECAST · SLOT 01</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d96552">— 메모리얼 데이 이후 더블 이벤트 —</text>

  <!-- 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="64" font-weight="500" fill="#f8e8e0">5/29 회의록 · 5/30 PCE</text>
  <text x="80" y="335" font-family="Playfair Display, Georgia, serif" font-size="44" font-style="italic" fill="url(#red)">48시간이 6월 방향을 결정한다</text>
  <text x="80" y="383" font-family="Pretendard, sans-serif" font-size="18" fill="#a87870">WTI $112.25 에너지 압력  ·  S&amp;P 7,473 고점  ·  10Y 4.57%</text>

  <!-- 시나리오 그리드 -->
  <g transform="translate(80, 455)">
    <!-- 베이스 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d8b878" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a87870">베이스 50%</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f8e8e0">7,300~7,600</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#a87870">PCE 2.5~2.7%</text>
    </g>
    <!-- 불 -->
    <g transform="translate(290, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#6ba368" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a87870">불 20%</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f8e8e0">7,700+</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#6ba368">PCE 2.4% 이하</text>
    </g>
    <!-- 베어 -->
    <g transform="translate(580, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a87870">베어 25%</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f8e8e0">7,100~7,200</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#d96552">PCE 2.8%+</text>
    </g>
    <!-- 블랙 스완 -->
    <g transform="translate(870, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#d96552" stroke-width="1.5"/>
      <text x="0" y="28" font-family="monospace" font-size="11" letter-spacing="3" fill="#a87870">블랙 스완 5%</text>
      <text x="0" y="68" font-family="Playfair Display, Georgia, serif" font-size="26" fill="#f8e8e0">7,000 이탈</text>
      <text x="0" y="93" font-family="monospace" font-size="12" fill="#d96552">신용 이벤트</text>
    </g>
  </g>

  <!-- 하단 메타 -->
  <line x1="80" y1="660" x2="1200" y2="660" stroke="#d96552" stroke-opacity="0.3" stroke-width="1"/>
  <text x="80" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8">MAY 25 · 2026 · FED MINUTES + PCE COUNTDOWN</text>
  <text x="1200" y="690" font-family="monospace" font-size="11" letter-spacing="3" fill="#d96552" opacity="0.8" text-anchor="end">SOURCE · FEDERAL RESERVE · FRED</text>
</svg>
