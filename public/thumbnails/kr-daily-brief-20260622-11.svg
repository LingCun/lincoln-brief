<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a06"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d8b878;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#d8b878;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d8b878;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="720" stroke="#d8b878" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#goldLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#d8b878" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#8a7040" letter-spacing="2">KR MARKET · DAILY BRIEF</text>

  <!-- Edition label (top right) -->
  <rect x="1040" y="28" width="200" height="36" rx="3" fill="#d8b878" fill-opacity="0.1" stroke="#d8b878" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1140" y="51" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle" letter-spacing="1">2026.06.22 · 11:00</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#d8b878" fill-opacity="0.5"/>

  <!-- KOSPI main display -->
  <text x="640" y="174" font-family="Georgia, serif" font-size="20" fill="#c0a060" text-anchor="middle" letter-spacing="4">KOSPI</text>
  <text x="640" y="262" font-family="Georgia, serif" font-size="88" fill="#ffffff" text-anchor="middle" font-weight="bold">9,125.72</text>
  <polygon points="548,286 566,268 584,286" fill="#4ade80"/>
  <text x="596" y="298" font-family="Georgia, serif" font-size="36" fill="#4ade80" font-weight="bold">+0.81%</text>
  <text x="640" y="340" font-family="Georgia, serif" font-size="18" fill="#7a9060" text-anchor="middle">+73.30포인트 · 3일 연속 9,000선 위</text>

  <!-- Divider -->
  <line x1="160" y1="372" x2="1120" y2="372" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Two key panels -->
  <!-- SK하이닉스 panel -->
  <rect x="80" y="394" width="480" height="200" rx="4" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1"/>
  <text x="320" y="428" font-family="Georgia, serif" font-size="16" fill="#6ab880" text-anchor="middle" letter-spacing="2">SK하이닉스</text>
  <text x="320" y="492" font-family="Georgia, serif" font-size="52" fill="#ffffff" text-anchor="middle" font-weight="bold">2,922,000</text>
  <text x="320" y="518" font-family="Georgia, serif" font-size="14" fill="#6ab880" text-anchor="middle">원</text>
  <polygon points="272,540 288,524 304,540" fill="#4ade80"/>
  <text x="316" y="554" font-family="Georgia, serif" font-size="28" fill="#4ade80" font-weight="bold">+5.72%</text>
  <text x="320" y="578" font-family="Georgia, serif" font-size="13" fill="#507050" text-anchor="middle">top12 유일 상승 · HBM 수요 연동</text>

  <!-- Sector panel -->
  <rect x="600" y="394" width="600" height="200" rx="4" fill="#f87171" fill-opacity="0.04" stroke="#f87171" stroke-opacity="0.2" stroke-width="1"/>
  <text x="900" y="428" font-family="Georgia, serif" font-size="16" fill="#d06060" text-anchor="middle" letter-spacing="2">섹터 혼조 현황</text>
  <text x="680" y="466" font-family="Georgia, serif" font-size="15" fill="#888888">삼성바이오로직스</text>
  <text x="1150" y="466" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−5.90%</text>
  <text x="680" y="494" font-family="Georgia, serif" font-size="15" fill="#888888">현대차</text>
  <text x="1150" y="494" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−5.06%</text>
  <text x="680" y="522" font-family="Georgia, serif" font-size="15" fill="#888888">LG에너지솔루션</text>
  <text x="1150" y="522" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−4.45%</text>
  <text x="680" y="550" font-family="Georgia, serif" font-size="15" fill="#888888">NAVER</text>
  <text x="1150" y="550" font-family="Georgia, serif" font-size="15" fill="#f87171" text-anchor="end">−2.83%</text>
  <text x="680" y="578" font-family="Georgia, serif" font-size="13" fill="#705050">top12 中 10종목 하락</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#d8b878" stroke-opacity="0.15" stroke-width="1"/>
  <text x="260" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">KOSDAQ 968.05</text>
  <text x="260" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">+0.15% · 1,000선 미회복</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">USD/KRW 1,537.18원</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">−0.02% · 보합</text>
  <text x="1020" y="644" font-family="Georgia, serif" font-size="14" fill="#c0a060" text-anchor="middle">전일 AVGO +4.70%</text>
  <text x="1020" y="666" font-family="Georgia, serif" font-size="13" fill="#706040" text-anchor="middle">NVDA +2.95% · AI 연동</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#d8b878" fill-opacity="0.35"/>
</svg>
