<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#100806"/>
      <stop offset="100%" style="stop-color:#1e1008"/>
    </linearGradient>
    <linearGradient id="redLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e87060;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#e87060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e87060;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#e87060" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="480" x2="1280" y2="480" stroke="#e87060" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Top red accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#redLine)"/>

  <!-- Lincoln Brief mark (top left) -->
  <text x="48" y="54" font-family="Georgia, serif" font-size="18" fill="#e87060" font-weight="bold" letter-spacing="3">LINCOLN BRIEF</text>
  <text x="48" y="76" font-family="Georgia, serif" font-size="13" fill="#804838" letter-spacing="2">US MARKET · MARKET FORECAST</text>

  <!-- Edition label (top right) -->
  <rect x="1020" y="28" width="220" height="36" rx="3" fill="#e87060" fill-opacity="0.1" stroke="#e87060" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1130" y="51" font-family="Georgia, serif" font-size="14" fill="#e09080" text-anchor="middle" letter-spacing="1">2026.06.25 · 06:00 KST</text>

  <!-- Diamond decorative -->
  <polygon points="640,108 649,117 640,126 631,117" fill="#e87060" fill-opacity="0.5"/>

  <!-- Main title -->
  <text x="640" y="160" font-family="Georgia, serif" font-size="22" fill="#e09080" text-anchor="middle" letter-spacing="3">4주 시나리오 업데이트</text>

  <!-- Level bars visualization -->
  <!-- Bar: morning high 7407 -->
  <rect x="160" y="202" width="960" height="30" rx="2" fill="#e87060" fill-opacity="0.08" stroke="#e87060" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="160" y="202" width="680" height="30" rx="2" fill="#e87060" fill-opacity="0.12"/>
  <text x="170" y="223" font-family="Georgia, serif" font-size="14" fill="#e09080">장중 고점 → 저항</text>
  <text x="1110" y="223" font-family="Georgia, serif" font-size="16" fill="#e87060" text-anchor="end" font-weight="bold">7,407</text>

  <!-- Bar: close 7358 -->
  <rect x="160" y="242" width="960" height="30" rx="2" fill="#f87171" fill-opacity="0.08" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="160" y="242" width="600" height="30" rx="2" fill="#f87171" fill-opacity="0.18"/>
  <text x="170" y="263" font-family="Georgia, serif" font-size="14" fill="#e87070">현재 마감</text>
  <text x="1110" y="263" font-family="Georgia, serif" font-size="16" fill="#f87171" text-anchor="end" font-weight="bold">7,358.22 (−0.10%)</text>

  <!-- Bar: support 7300 -->
  <rect x="160" y="282" width="960" height="30" rx="2" fill="#d8b878" fill-opacity="0.06" stroke="#d8b878" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="160" y="282" width="520" height="30" rx="2" fill="#d8b878" fill-opacity="0.12"/>
  <text x="170" y="303" font-family="Georgia, serif" font-size="14" fill="#b89040">지지선 1</text>
  <text x="1110" y="303" font-family="Georgia, serif" font-size="16" fill="#d8b878" text-anchor="end" font-weight="bold">7,300 (−0.8%)</text>

  <!-- Bar: bear zone 7200 -->
  <rect x="160" y="322" width="960" height="30" rx="2" fill="#888888" fill-opacity="0.06" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="160" y="322" width="420" height="30" rx="2" fill="#888888" fill-opacity="0.08"/>
  <text x="170" y="343" font-family="Georgia, serif" font-size="14" fill="#706060">지지선 2</text>
  <text x="1110" y="343" font-family="Georgia, serif" font-size="16" fill="#888888" text-anchor="end" font-weight="bold">7,200 (베어 시나리오)</text>

  <!-- Divider -->
  <line x1="160" y1="374" x2="1120" y2="374" stroke="#e87060" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Scenarios table -->
  <text x="640" y="408" font-family="Georgia, serif" font-size="16" fill="#e09080" text-anchor="middle" letter-spacing="2">4주 시나리오 확률</text>

  <!-- Scenario A -->
  <rect x="80" y="422" width="270" height="72" rx="3" fill="#d8b878" fill-opacity="0.06" stroke="#d8b878" stroke-opacity="0.25" stroke-width="1"/>
  <text x="215" y="448" font-family="Georgia, serif" font-size="13" fill="#b89040" text-anchor="middle">A · 박스 소화 (베이스)</text>
  <text x="215" y="474" font-family="Georgia, serif" font-size="22" fill="#d8b878" text-anchor="middle" font-weight="bold">38%</text>
  <text x="215" y="492" font-family="Georgia, serif" font-size="11" fill="#706040" text-anchor="middle">7,200~7,400</text>

  <!-- Scenario B -->
  <rect x="370" y="422" width="270" height="72" rx="3" fill="#4ade80" fill-opacity="0.04" stroke="#4ade80" stroke-opacity="0.2" stroke-width="1"/>
  <text x="505" y="448" font-family="Georgia, serif" font-size="13" fill="#40a060" text-anchor="middle">B · 7,600+ 반등</text>
  <text x="505" y="474" font-family="Georgia, serif" font-size="22" fill="#4ade80" text-anchor="middle" font-weight="bold">18%</text>
  <text x="505" y="492" font-family="Georgia, serif" font-size="11" fill="#407050" text-anchor="middle">PCE 하회 + US10Y 4.3%↓</text>

  <!-- Scenario C -->
  <rect x="660" y="422" width="270" height="72" rx="3" fill="#f87171" fill-opacity="0.06" stroke="#f87171" stroke-opacity="0.3" stroke-width="1"/>
  <text x="795" y="448" font-family="Georgia, serif" font-size="13" fill="#a04040" text-anchor="middle">C · 7,200 이하</text>
  <text x="795" y="474" font-family="Georgia, serif" font-size="22" fill="#f87171" text-anchor="middle" font-weight="bold">32%</text>
  <text x="795" y="492" font-family="Georgia, serif" font-size="11" fill="#705050" text-anchor="middle">US10Y 4.6%+ 돌파</text>

  <!-- Scenario D -->
  <rect x="950" y="422" width="270" height="72" rx="3" fill="#888888" fill-opacity="0.04" stroke="#888888" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1085" y="448" font-family="Georgia, serif" font-size="13" fill="#606060" text-anchor="middle">D · 급락</text>
  <text x="1085" y="474" font-family="Georgia, serif" font-size="22" fill="#888888" text-anchor="middle" font-weight="bold">12%</text>
  <text x="1085" y="492" font-family="Georgia, serif" font-size="11" fill="#505050" text-anchor="middle">외생 충격</text>

  <!-- Bottom stats bar -->
  <line x1="160" y1="514" x2="1120" y2="514" stroke="#e87060" stroke-opacity="0.15" stroke-width="1"/>

  <!-- NVDA info -->
  <text x="640" y="550" font-family="Georgia, serif" font-size="17" fill="#e09080" text-anchor="middle">NVDA $199.00(−0.52%) $200 이탈 확인 · 핵심 관찰 포인트</text>
  <text x="640" y="580" font-family="Georgia, serif" font-size="15" fill="#707050" text-anchor="middle">US10Y 4.402% 유지 · NASDAQ 25,476.64(−0.43%) · PCE 발표가 다음 분기점</text>

  <!-- Bottom stats -->
  <line x1="160" y1="614" x2="1120" y2="614" stroke="#e87060" stroke-opacity="0.15" stroke-width="1"/>
  <text x="320" y="644" font-family="Georgia, serif" font-size="14" fill="#e09080" text-anchor="middle">저항: 7,407</text>
  <text x="320" y="666" font-family="Georgia, serif" font-size="13" fill="#705040" text-anchor="middle">오전 고점 = 단기 매도벽</text>
  <text x="640" y="644" font-family="Georgia, serif" font-size="14" fill="#d8b878" text-anchor="middle">핵심 이벤트: PCE + 7월 FOMC</text>
  <text x="640" y="666" font-family="Georgia, serif" font-size="13" fill="#705050" text-anchor="middle">Q2 실적 시즌 7월 중순 시작</text>
  <text x="960" y="644" font-family="Georgia, serif" font-size="14" fill="#e09080" text-anchor="middle">지지: 7,300 → 7,200</text>
  <text x="960" y="666" font-family="Georgia, serif" font-size="13" fill="#705040" text-anchor="middle">PCE 전 방어적 관찰 구간</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="716" width="1280" height="4" fill="#e87060" fill-opacity="0.35"/>
</svg>
