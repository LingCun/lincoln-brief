<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa0e0"/>
      <stop offset="50%" stop-color="#5677b0"/>
      <stop offset="100%" stop-color="#3a5590"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5677b0" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5677b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#40e880" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#40e880" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="180" r="520" fill="url(#glow1)"/>
  <circle cx="180" cy="600" r="280" fill="url(#glow2)"/>

  <!-- Header -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#5677b0" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#d8e8f8">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#5677b0">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0" text-anchor="end">2026.06.17 16:00 KST · 종목 분석</text>

  <!-- Edition label -->
  <text x="80" y="160" font-family="monospace" font-size="13" letter-spacing="5" fill="#5677b0">— SK하이닉스 분석 종가 (SLOT 16) —</text>

  <!-- Badge -->
  <rect x="80" y="176" width="880" height="30" rx="4" fill="#40e880" fill-opacity="0.14" stroke="#40e880" stroke-width="0.8"/>
  <text x="92" y="196" font-family="monospace" font-size="12" letter-spacing="2" fill="#40e880">250만원 안착 확인 · 252만원 종가 · 6/8 저점 대비 +31.9%</text>

  <!-- Main title -->
  <text x="80" y="295" font-family="Playfair Display, Georgia, serif" font-size="62" font-weight="500" fill="#d8e8f8">SK하이닉스</text>
  <text x="80" y="370" font-family="Playfair Display, Georgia, serif" font-size="68" font-weight="500" fill="url(#blue)">2,521,000원</text>
  <text x="80" y="426" font-family="Playfair Display, Georgia, serif" font-size="36" font-style="italic" fill="#7aa0e0">+5.84% — 250만원 안착 후 252만원</text>
  <text x="80" y="468" font-family="sans-serif" font-size="17" fill="#6888aa">NVDA $207.41(−2.37%) 역행 이틀째 · 삼성전자 +1.02%와 격차 4.82%p</text>

  <!-- Divider -->
  <line x1="80" y1="502" x2="1200" y2="502" stroke="#14203a" stroke-width="1"/>

  <!-- Metrics row -->
  <g transform="translate(80, 536)">
    <!-- 오늘 종가 -->
    <g>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0">종가</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8e8f8">2,521,000원</text>
      <polygon points="28,80 14,64 0,80" fill="#40e880"/>
      <text x="36" y="79" font-family="monospace" font-size="14" fill="#40e880">+5.84%</text>
    </g>
    <!-- 6/8 저점 -->
    <g transform="translate(330, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0">6/8 저점</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8e8f8">1,911,000원</text>
      <text x="0" y="82" font-family="monospace" font-size="14" fill="#40e880">+31.9% 회복</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(660, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0">NVDA</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8e8f8">$207.41</text>
      <polygon points="14,64 28,80 0,80" fill="#e05050"/>
      <text x="36" y="79" font-family="monospace" font-size="14" fill="#e05050">−2.37%</text>
    </g>
    <!-- 삼성전자 -->
    <g transform="translate(960, 0)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5677b0" stroke-width="1.5"/>
      <text x="0" y="26" font-family="monospace" font-size="11" letter-spacing="3" fill="#5677b0">삼성전자</text>
      <text x="0" y="60" font-family="Playfair Display, Georgia, serif" font-size="24" fill="#d8e8f8">346,500원</text>
      <polygon points="28,80 14,64 0,80" fill="#40e880"/>
      <text x="36" y="79" font-family="monospace" font-size="14" fill="#40e880">+1.02%</text>
    </g>
  </g>
</svg>
