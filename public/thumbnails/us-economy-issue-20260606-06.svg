<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a10"/>
      <stop offset="100%" stop-color="#070609"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8cc88"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#b89848"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8040c0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8040c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d8b878" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d8b878" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="200" r="380" fill="url(#glow1)"/>
  <circle cx="150" cy="600" r="200" fill="url(#glow2)"/>

  <!-- 좌상단 브랜드 -->
  <line x1="80" y1="80" x2="200" y2="80" stroke="#d8b878" stroke-width="1"/>
  <text x="220" y="84" font-family="Georgia, serif" font-style="italic" font-size="20" fill="#e8d8a0">Lincoln</text>
  <text x="310" y="84" font-family="Georgia, serif" font-size="12" letter-spacing="6" fill="#d8b878">BRIEF</text>
  <text x="1200" y="84" font-family="monospace" font-size="11" letter-spacing="3" fill="#d8b878" text-anchor="end">2026.06.06 · ECONOMY ISSUE · SLOT 06</text>

  <!-- 에디션 라벨 -->
  <text x="80" y="175" font-family="monospace" font-size="13" letter-spacing="5" fill="#d8b878">— 경제 이슈 —</text>

  <!-- 메인 헤드라인 -->
  <text x="80" y="265" font-family="Playfair Display, Georgia, serif" font-size="42" font-weight="600" fill="#e8d8a0">AI 인프라 투자 사이클 재조정</text>
  <text x="80" y="318" font-family="Playfair Display, Georgia, serif" font-size="28" font-style="italic" fill="url(#gold)">AVGO 가이던스 쇼크가 제기한 구조적 질문</text>
  <text x="80" y="368" font-family="sans-serif" font-size="17" fill="#a09060">빅테크 AI 캐팩스 속도 조절 우려 확산  |  NASDAQ −4.18%</text>

  <!-- AI 종목 그리드 -->
  <g transform="translate(80, 415)">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>

    <!-- AVGO -->
    <g>
      <text x="0" y="30" font-family="monospace" font-size="14" fill="#a09060">AVGO</text>
      <text x="130" y="30" font-family="monospace" font-size="14" fill="#e8d8a0">$385.73</text>
      <polygon points="280,22 273,10 287,10" fill="#c06060"/>
      <text x="295" y="30" font-family="monospace" font-size="14" fill="#c06060">−7.92%</text>
    </g>
    <!-- TSLA -->
    <g transform="translate(0, 38)">
      <text x="0" y="30" font-family="monospace" font-size="14" fill="#a09060">TSLA</text>
      <text x="130" y="30" font-family="monospace" font-size="14" fill="#e8d8a0">$391.00</text>
      <polygon points="280,22 273,10 287,10" fill="#c06060"/>
      <text x="295" y="30" font-family="monospace" font-size="14" fill="#c06060">−6.56%</text>
    </g>
    <!-- NVDA -->
    <g transform="translate(0, 76)">
      <text x="0" y="30" font-family="monospace" font-size="14" fill="#a09060">NVDA</text>
      <text x="130" y="30" font-family="monospace" font-size="14" fill="#e8d8a0">$205.10</text>
      <polygon points="280,22 273,10 287,10" fill="#c06060"/>
      <text x="295" y="30" font-family="monospace" font-size="14" fill="#c06060">−6.20%</text>
    </g>
    <!-- META -->
    <g transform="translate(0, 114)">
      <text x="0" y="30" font-family="monospace" font-size="14" fill="#a09060">META</text>
      <text x="130" y="30" font-family="monospace" font-size="14" fill="#e8d8a0">$593.00</text>
      <polygon points="280,22 273,10 287,10" fill="#c06060"/>
      <text x="295" y="30" font-family="monospace" font-size="14" fill="#c06060">−5.51%</text>
    </g>

    <line x1="0" y1="157" x2="800" y2="157" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
  </g>

  <!-- 하단 -->
  <line x1="80" y1="620" x2="1200" y2="620" stroke="#d8b878" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="80" y="648" font-family="monospace" font-size="12" letter-spacing="2" fill="#d8b878">다음 확인: NVDA·META·MSFT 실적 (7~8월)</text>
  <text x="80" y="672" font-family="monospace" font-size="11" fill="#806040">lincoln-brief.vercel.app</text>
