<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1812"/>
      <stop offset="100%" stop-color="#100c08"/>
    </linearGradient>
    <linearGradient id="gold-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d88c"/>
      <stop offset="50%" stop-color="#d8b878"/>
      <stop offset="100%" stop-color="#8a7438"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#d8b878" stroke-width="0.6" opacity="0.18"/>
    </pattern>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#d8b878" stroke-width="0.5" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Paper bg -->
  <rect width="600" height="720" fill="url(#paper)"/>
  <rect width="600" height="720" fill="url(#hatch2)"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="560" height="680" fill="none" stroke="#d8b878" stroke-width="1.5"/>
  <rect x="30" y="30" width="540" height="660" fill="none" stroke="#d8b878" stroke-width="0.5" opacity="0.5"/>

  <!-- Corner ornaments -->
  <g fill="#d8b878">
    <circle cx="20" cy="20" r="4"/>
    <circle cx="580" cy="20" r="4"/>
    <circle cx="20" cy="700" r="4"/>
    <circle cx="580" cy="700" r="4"/>
  </g>

  <!-- Header text -->
  <text x="300" y="80" font-family="Playfair Display, Georgia, serif" font-style="italic" font-size="22" fill="#f5edd9" text-anchor="middle">Lincoln</text>
  <line x1="240" y1="95" x2="360" y2="95" stroke="#d8b878" stroke-width="0.8"/>
  <text x="300" y="115" font-family="monospace" font-size="10" letter-spacing="5" fill="#d8b878" text-anchor="middle">EDITOR · BRIEF</text>

  <!-- Portrait region - simplified engraved Lincoln silhouette -->
  <g transform="translate(300, 380)">
    <!-- Oval frame -->
    <ellipse cx="0" cy="0" rx="180" ry="220" fill="none" stroke="#d8b878" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="172" ry="212" fill="none" stroke="#d8b878" stroke-width="0.4" opacity="0.5"/>

    <!-- Top hat -->
    <g fill="#0a0907" stroke="#d8b878" stroke-width="1.2">
      <!-- Brim -->
      <ellipse cx="0" cy="-160" rx="110" ry="14"/>
      <!-- Crown -->
      <path d="M -75,-160 L -68,-260 L 68,-260 L 75,-160 Z" fill="#0a0907"/>
      <!-- Hat band -->
      <rect x="-72" y="-180" width="144" height="6" fill="#d8b878" opacity="0.7"/>
    </g>

    <!-- Face: simplified portrait silhouette -->
    <g fill="url(#hatch)" stroke="#d8b878" stroke-width="0.8">
      <!-- Hair sides under hat -->
      <path d="M -70,-160 Q -80,-100 -75,-50 L -68,-30 L -72,0 L -55,30 L -50,50 L -40,60 Q -20,68 0,68 Q 20,68 40,60 L 50,50 L 55,30 L 72,0 L 68,-30 L 75,-50 Q 80,-100 70,-160 Z" fill="#1a1510" stroke="#d8b878" stroke-width="1.2"/>
      <!-- Forehead highlight -->
      <path d="M -45,-110 Q 0,-130 45,-110 L 50,-50 L -50,-50 Z" fill="url(#hatch)" opacity="0.4"/>
      <!-- Cheekbones -->
      <path d="M -50,-50 Q -35,-30 -25,-15 L -30,5 Q -45,0 -55,-15 Z" fill="#0a0907" opacity="0.5"/>
      <path d="M 50,-50 Q 35,-30 25,-15 L 30,5 Q 45,0 55,-15 Z" fill="#0a0907" opacity="0.5"/>
      <!-- Eye sockets -->
      <ellipse cx="-22" cy="-65" rx="10" ry="4" fill="#0a0907"/>
      <ellipse cx="22" cy="-65" rx="10" ry="4" fill="#0a0907"/>
      <!-- Eyes pupils -->
      <circle cx="-22" cy="-65" r="2" fill="#d8b878"/>
      <circle cx="22" cy="-65" r="2" fill="#d8b878"/>
      <!-- Nose -->
      <path d="M 0,-58 L -8,-20 L 0,-12 L 8,-20 Z" fill="#0a0907" opacity="0.6" stroke="#d8b878" stroke-width="0.6"/>
      <!-- Mouth (subtle, between beard) -->
      <line x1="-12" y1="8" x2="12" y2="8" stroke="#d8b878" stroke-width="0.8"/>
      <!-- Beard (signature Lincoln beard - chin only, no mustache) -->
      <path d="M -35,15 Q -30,30 -25,40 L -20,55 Q -10,70 0,70 Q 10,70 20,55 L 25,40 Q 30,30 35,15 Q 30,25 0,28 Q -30,25 -35,15 Z" fill="#0a0907" stroke="#d8b878" stroke-width="1"/>
      <!-- Beard texture lines -->
      <g stroke="#d8b878" stroke-width="0.4" opacity="0.5" fill="none">
        <path d="M -28,20 Q -22,35 -15,50"/>
        <path d="M -18,20 Q -14,38 -8,55"/>
        <path d="M -8,22 Q -6,40 -3,58"/>
        <path d="M 8,22 Q 6,40 3,58"/>
        <path d="M 18,20 Q 14,38 8,55"/>
        <path d="M 28,20 Q 22,35 15,50"/>
      </g>
    </g>

    <!-- Shoulders / collar -->
    <g fill="#0a0907" stroke="#d8b878" stroke-width="1">
      <path d="M -160,150 L -120,90 L -60,75 L 0,80 L 60,75 L 120,90 L 160,150 L 160,220 L -160,220 Z" fill="#0a0907"/>
      <!-- Bow tie / collar -->
      <path d="M -25,75 L 0,90 L 25,75 L 20,95 L 0,100 L -20,95 Z" fill="#d8b878" opacity="0.7"/>
      <!-- Lapel highlights -->
      <line x1="-60" y1="75" x2="-30" y2="180" stroke="#d8b878" stroke-width="0.6" opacity="0.5"/>
      <line x1="60" y1="75" x2="30" y2="180" stroke="#d8b878" stroke-width="0.6" opacity="0.5"/>
    </g>
  </g>

  <!-- Bottom text -->
  <line x1="150" y1="640" x2="450" y2="640" stroke="#d8b878" stroke-width="0.8"/>
  <text x="300" y="665" font-family="Playfair Display, Georgia, serif" font-size="16" fill="#f5edd9" text-anchor="middle">"진짜 실력은 기다림에서."</text>
  <text x="300" y="685" font-family="monospace" font-size="9" letter-spacing="4" fill="#d8b878" text-anchor="middle">— LINCOLN BRIEF, EDITOR'S WORD</text>

  <!-- Vignette -->
  <rect width="600" height="720" fill="url(#vignette)" pointer-events="none"/>
</svg>
