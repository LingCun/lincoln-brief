name: Refresh market snapshot

# 10분마다 시장 데이터 새로고침.
#
# 발화 경로 — 이중화:
#   1. **외부 cron 트리거 (주력)** — cron-job.org 가 workflow_dispatch API 를 1~10분 단위로 호출.
#      GitHub Actions schedule trigger 가 free tier 에서 70~80% 누락되는 한계를 우회.
#      설정 절차: docs/EXTERNAL-CRON.md
#   2. **GitHub schedule (백업)** — 외부 트리거가 죽어도 시간당 1~2회는 통과.
#
# 변화가 있을 때만 커밋 → 사용자 push 알림과 Vercel 빌드 횟수를 절약.
# concurrency 차단으로 외부+schedule 동시 발화돼도 한 번만 실행됨.
on:
  schedule:
    # 매시 정각/30분은 GitHub Actions 부하 피크 → 5분씩 미뤄서 신뢰성 ↑
    - cron: '5,15,25,35,45,55 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# 동시 실행 차단 — cron 이 겹쳐도 한 번에 하나만.
concurrency:
  group: refresh-market
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Fetch market data
        # Yahoo 일시 차단 시 스냅샷이 빈 상태로 갱신되는 걸 막기 위해 스크립트가 warning + exit 0 으로 빠짐.
        # 이 워크플로 자체는 그 결과를 봐서 "변경 없음 → skip" 으로 자연스럽게 흘러가야 함.
        continue-on-error: true
        env:
          # 알트 소스 — secret 미등록이면 스크립트가 자동으로 skip.
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: npm run fetch:market

      - name: Commit & push if changed
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"
          git add src/data/market-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          TS=$(date -u -d "+9 hours" +"%Y-%m-%d %H:%M KST")
          git commit -m "data: refresh market snapshot ($TS)"
          git push
