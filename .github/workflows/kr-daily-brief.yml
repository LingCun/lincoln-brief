name: Daily Market Brief (KR)

# 평일 16:00 KST (= 07:00 UTC) — 한국 마감 (15:30 KST) 직후 4개 카테고리 초안 생성.
# 한국시간 16:00 = UTC 07:00 (-9시간). cron 은 UTC 기준이므로 07:00 UTC, 월~금.
on:
  schedule:
    - cron: '0 7 * * 1-5'  # 월~금 16:00 KST (UTC 월~금 07:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Fetch market data
        run: npm run fetch:market

      - name: Generate KR daily brief drafts (4 categories)
        env:
          MARKET: KR
        run: npm run generate:daily-brief

      - name: Commit & push
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"
          git add src/data/market-snapshot.json src/content/blog/*.md public/thumbnails/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u -d "+9 hours" +"%Y-%m-%d")  # KST
          git commit -m "data: KR daily brief drafts for $DATE"
          git push
