name: KR Daily Prep (Generate to staging)

# 평일 KST — 11:00 / 16:00 슬롯 글 작성 → staging push.
# prep 가 끝나면 publish 워크플로가 workflow_run 으로 자동 발사 → main 머지.
# cron 을 슬롯당 3개 분산 발사 (GitHub Actions 크론 지연 흡수) + 이미 발행된 슬롯 즉시 skip.
on:
  schedule:
    # 11:00 KST 슬롯 — 10:00 / 10:30 / 11:00 KST (3중 백업)
    - cron: '0 1 * * 1-5'   # 10:00 KST
    - cron: '30 1 * * 1-5'  # 10:30 KST
    - cron: '0 2 * * 1-5'   # 11:00 KST (최후 안전망)
    # 16:00 KST 슬롯 — 15:00 / 15:30 / 16:00 KST
    - cron: '0 6 * * 1-5'   # 15:00 KST
    - cron: '30 6 * * 1-5'  # 15:30 KST
    - cron: '0 7 * * 1-5'   # 16:00 KST (최후 안전망)
  workflow_dispatch:
    inputs:
      slot:
        description: '발행 슬롯 (11 or 16)'
        required: true
        type: choice
        options: ['11', '16']

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Derive staging branch
        id: meta
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            H=$(date -u +%H)
            case $H in
              01|02) SLOT=11 ;;
              06|07) SLOT=16 ;;
              *) echo "::error::Unknown UTC hour $H — schedule mismatch?"; exit 1 ;;
            esac
          fi
          KST_DATE=$(TZ=Asia/Seoul date +%Y%m%d)
          BRANCH="staging/kr-${KST_DATE}-${SLOT}"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "kst_date=$KST_DATE" >> "$GITHUB_OUTPUT"
          echo "::notice::Prep for slot ${SLOT}:00 KST → branch $BRANCH"

      - name: Skip if today's slot already published or staging has content
        id: skip_check
        run: |
          KST_DATE="${{ steps.meta.outputs.kst_date }}"
          SLOT="${{ steps.meta.outputs.slot }}"
          BRANCH="${{ steps.meta.outputs.branch }}"

          # main 에 이미 오늘 슬롯 글이 있으면 skip (중복 발사 방지)
          if git ls-tree -r origin/main --name-only 2>/dev/null \
              | grep -q "src/content/blog/kr-daily-brief-${KST_DATE}-${SLOT}\.md"; then
            echo "::notice::main 에 이미 오늘 ${SLOT}:00 KST 글 발행됨. Prep skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # staging 에 이미 콘텐츠가 있으면 skip (다른 cron 백업이 먼저 끝낸 경우)
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH":"refs/remotes/origin/precheck_tmp" 2>/dev/null || true
            EXISTING=$(git diff --name-only origin/main...refs/remotes/origin/precheck_tmp \
              -- 'src/content/blog/*.md' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$EXISTING" != "0" ]; then
              echo "::notice::$BRANCH 에 이미 콘텐츠 있음 (다른 cron 이 처리). Prep skip — publish 가 처리할 것."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Secrets 가드
        if: steps.skip_check.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret 미등록."
            exit 1
          fi

      - name: Install project deps
        if: steps.skip_check.outputs.skip != 'true'
        run: npm ci --no-audit --no-fund --silent

      - name: Configure git
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"

      - name: Create staging branch
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git checkout -b "${{ steps.meta.outputs.branch }}"
          git push -u origin "${{ steps.meta.outputs.branch }}" --force

      - name: Refresh market snapshot (Yahoo + 알트 9종)
        if: steps.skip_check.outputs.skip != 'true'
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/fetch-market.mjs

      - name: Load generation prompt
        if: steps.skip_check.outputs.skip != 'true'
        id: load_prompt
        env:
          MARKET: KR
          SLOT: ${{ steps.meta.outputs.slot }}
        run: |
          {
            echo "PROMPT<<PROMPT_EOF"
            echo "MARKET=${MARKET}"
            echo "SLOT=${SLOT}"
            echo ""
            cat scripts/generation-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate 4 articles via Claude Code
        if: steps.skip_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          MARKET: KR
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 80
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(git:*),Bash(node:*),Bash(TZ=*:*),Read,Write,Edit,WebFetch"
          prompt: ${{ steps.load_prompt.outputs.PROMPT }}

      - name: Verify build (safety net)
        if: steps.skip_check.outputs.skip != 'true'
        run: npx astro build

      - name: Summary
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "- Phase: **PREP** (generate → staging)"
            echo "- Slot: ${{ steps.meta.outputs.slot }}:00 KST"
            echo "- Staging branch: \`${{ steps.meta.outputs.branch }}\`"
            echo "- Skipped: ${{ steps.skip_check.outputs.skip }}"
            echo "- prep 성공 시 \`kr-daily-publish.yml\` 이 workflow_run 으로 자동 발사 → main 머지."
          } >> "$GITHUB_STEP_SUMMARY"
