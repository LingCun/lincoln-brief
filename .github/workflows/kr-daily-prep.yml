name: KR Daily Prep (Generate to staging)

# 평일 KST — 11:00 / 16:00 슬롯 글 작성 → staging push.
# prep 가 끝나면 publish 워크플로가 workflow_run 으로 자동 발사 → main 머지.
# cron 을 슬롯당 3개 분산 발사 (GitHub Actions 크론 지연 흡수) + 이미 발행된 슬롯 즉시 skip.
on:
  schedule:
    # 11:00 KST 슬롯 — 10:00 / 10:30 / 11:00 KST (3중 백업)
    - cron: '0 1 * * 1-5'   # 10:00 KST
    - cron: '30 1 * * 1-5'  # 10:30 KST
    - cron: '0 2 * * 1-5'   # 11:00 KST (최후 안전망)
    # 16:00 KST 슬롯 — 15:00 / 15:30 / 16:00 KST
    - cron: '0 6 * * 1-5'   # 15:00 KST
    - cron: '30 6 * * 1-5'  # 15:30 KST
    - cron: '0 7 * * 1-5'   # 16:00 KST (최후 안전망)
  workflow_dispatch:
    inputs:
      slot:
        description: '발행 슬롯 (11 or 16)'
        required: true
        type: choice
        options: ['11', '16']

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

# 같은 (market, slot) 조합의 동시 실행 차단. 30분 간격 백업 cron 이 첫 실행 끝나기 전에 발사돼도
# 큐에 대기 → 첫 실행이 끝나면 skip_check 가 통과·즉시 종료. Claude 호출 중복 방지.
# slot 은 cron 스케줄 패턴에서 추출 (UTC 시각으로 매핑).
concurrency:
  group: prep-kr-${{ inputs.slot || ((contains(github.event.schedule, ' 1 ') || contains(github.event.schedule, ' 2 ')) && '11' || '16') }}
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Derive staging branch
        id: meta
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            H=$(date -u +%H)
            case $H in
              01|02) SLOT=11 ;;
              06|07) SLOT=16 ;;
              *) echo "::error::Unknown UTC hour $H — schedule mismatch?"; exit 1 ;;
            esac
          fi
          KST_DATE=$(TZ=Asia/Seoul date +%Y%m%d)
          BRANCH="staging/kr-${KST_DATE}-${SLOT}"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "kst_date=$KST_DATE" >> "$GITHUB_OUTPUT"
          echo "::notice::Prep for slot ${SLOT}:00 KST → branch $BRANCH"

      - name: Skip if today's slot already published or staging has content
        id: skip_check
        run: |
          KST_DATE="${{ steps.meta.outputs.kst_date }}"
          SLOT="${{ steps.meta.outputs.slot }}"
          BRANCH="${{ steps.meta.outputs.branch }}"

          # 4개 카테고리 다 main 에 있을 때만 skip — 1편만 있고 3편 누락된 부분 발행 상태는 skip 하지 않음.
          EXISTING=$(git ls-tree -r origin/main --name-only 2>/dev/null \
            | grep -cE "^src/content/blog/kr-(daily-brief|stock-analysis|market-forecast|economy-issue)-${KST_DATE}-${SLOT}\.md$" || true)
          if [ "$EXISTING" = "4" ]; then
            echo "::notice::main 에 오늘 ${SLOT}:00 KST 4편 모두 발행됨. Prep skip."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$EXISTING" != "0" ]; then
            echo "::warning::main 에 ${SLOT}:00 KST 슬롯 ${EXISTING}/4편만 있음 — 누락분 보충하러 Prep 진행."
          fi

          # staging 에 이미 콘텐츠가 있으면 skip (다른 cron 백업이 먼저 끝낸 경우)
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH":"refs/remotes/origin/precheck_tmp" 2>/dev/null || true
            EXISTING=$(git diff --name-only origin/main...refs/remotes/origin/precheck_tmp \
              -- 'src/content/blog/*.md' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$EXISTING" != "0" ]; then
              echo "::notice::$BRANCH 에 이미 콘텐츠 있음 (다른 cron 이 처리). Prep skip — publish 가 처리할 것."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Secrets 가드
        if: steps.skip_check.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret 미등록."
            exit 1
          fi

      - name: Install project deps
        if: steps.skip_check.outputs.skip != 'true'
        run: npm ci --no-audit --no-fund --silent

      - name: Configure git
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"

      - name: Create staging branch
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git checkout -b "${{ steps.meta.outputs.branch }}"
          git push -u origin "${{ steps.meta.outputs.branch }}" --force

      # market-snapshot refresh 는 `refresh-market.yml` 이 10분마다 main 에 commit 함.
      # 여기서 따로 안 돌림 — staging 에 commit 안 하면 어차피 사이트엔 안 올라가고,
      # main 의 snapshot 은 최대 10~15 분만 stale (일일 브리핑엔 충분).

      - name: Load generation prompt
        if: steps.skip_check.outputs.skip != 'true'
        id: load_prompt
        env:
          MARKET: KR
          SLOT: ${{ steps.meta.outputs.slot }}
        run: |
          {
            echo "PROMPT<<PROMPT_EOF"
            echo "MARKET=${MARKET}"
            echo "SLOT=${SLOT}"
            echo ""
            cat scripts/generation-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate 4 articles via Claude Code
        if: steps.skip_check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          MARKET: KR
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 80
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(git:*),Bash(node:*),Bash(TZ=*:*),Read,Write,Edit,WebFetch"
          prompt: ${{ steps.load_prompt.outputs.PROMPT }}

      - name: Verify build (safety net)
        if: steps.skip_check.outputs.skip != 'true'
        run: npx astro build

      # 빌드 실패 = staging 에 broken 콘텐츠가 push 된 상태.
      # 그대로 두면 cron publish 안전망 (11·16·17 KST) 가 main 으로 머지 → 사이트 깨짐.
      # → staging 강제 삭제. 다음 cron 백업 또는 watchdog 가 처음부터 다시 생성.
      - name: Clean staging on failure
        if: failure() && steps.skip_check.outputs.skip != 'true'
        run: |
          BRANCH="${{ steps.meta.outputs.branch }}"
          echo "::warning::Prep 실패 → staging $BRANCH 강제 삭제 (broken 콘텐츠 main 유입 차단)"
          git push origin --delete "$BRANCH" || echo "::warning::Failed to delete $BRANCH (이미 사라졌을 수 있음)"

      - name: Summary
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "- Phase: **PREP** (generate → staging)"
            echo "- Slot: ${{ steps.meta.outputs.slot }}:00 KST"
            echo "- Staging branch: \`${{ steps.meta.outputs.branch }}\`"
            echo "- Skipped: ${{ steps.skip_check.outputs.skip }}"
            echo "- prep 성공 시 \`kr-daily-publish.yml\` 이 workflow_run 으로 자동 발사 → main 머지."
          } >> "$GITHUB_STEP_SUMMARY"
