name: US Daily Publish (Merge staging to main)

# prep 워크플로 성공 → workflow_run 으로 즉시 자동 발사. 사용자 dispatch 불필요.
# 백업: cron (01:00, 06:00, 07:00 KST) + workflow_dispatch.
# 오늘 KST 날짜의 staging/us-* 브랜치 전체를 자동 탐지·머지·삭제.
on:
  workflow_run:
    workflows: ["US Daily Prep (Generate to staging)"]
    types: [completed]
  schedule:
    - cron: '0 16 * * 0-4'  # 01:00 KST 안전망
    - cron: '0 21 * * 0-4'  # 06:00 KST 안전망
    - cron: '0 22 * * 0-4'  # 07:00 KST 최후 안전망 (prep 지연 흡수)
  workflow_dispatch:
    inputs:
      slot:
        description: '발행 슬롯 (auto = 오늘 모든 슬롯 자동 머지)'
        required: true
        default: 'auto'
        type: choice
        options: ['auto', '01', '06']

permissions:
  contents: write

# 동시 실행 차단 — prep 3중 cron 의 workflow_run 트리거가 동시에 발화해도 한 번에 하나만.
# cancel-in-progress: false 로 큐잉 → 첫 publish 가 staging 머지·삭제 끝내면, 다음 publish 는
# "staging 없음" 으로 즉시 종료.
concurrency:
  group: publish-us
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"

      - name: Find and merge today's staging branches
        run: |
          KST_DATE=$(TZ=Asia/Seoul date +%Y%m%d)
          MARKET="us"
          PATTERN_PREFIX="staging/${MARKET}-${KST_DATE}-"

          SLOT_INPUT="${{ inputs.slot }}"
          if [ -n "$SLOT_INPUT" ] && [ "$SLOT_INPUT" != "auto" ]; then
            CANDIDATES="${PATTERN_PREFIX}${SLOT_INPUT}"
          else
            CANDIDATES=$(git ls-remote --heads origin "${PATTERN_PREFIX}*" 2>/dev/null \
              | awk '{print $2}' | sed 's|refs/heads/||' | sort)
          fi

          if [ -z "$CANDIDATES" ]; then
            echo "::warning::오늘(${KST_DATE}) staging/${MARKET}-* 브랜치 없음. Skip."
            exit 0
          fi

          MERGED_COUNT=0
          FAILED_COUNT=0
          for STAGING in $CANDIDATES; do
            echo "::group::Processing $STAGING"

            if ! git ls-remote --exit-code --heads origin "$STAGING" >/dev/null 2>&1; then
              echo "::notice::$STAGING 이미 사라짐. Skip."
              echo "::endgroup::"
              continue
            fi

            git fetch origin "$STAGING":"refs/remotes/origin/staging_tmp"
            git fetch origin main

            NEW_FILES=$(git diff --name-only origin/main...refs/remotes/origin/staging_tmp \
              -- 'src/content/blog/*.md' 'public/thumbnails/*.svg' 2>/dev/null | wc -l | tr -d ' ')

            if [ "$NEW_FILES" = "0" ]; then
              echo "::warning::$STAGING 빈 브랜치. 정리만 하고 skip."
              git push origin --delete "$STAGING" || echo "::warning::Failed to delete $STAGING"
              echo "::endgroup::"
              continue
            fi

            # main push 가 non-fast-forward 로 실패할 수 있음 (refresh-market 동시 commit 등).
            # → 최대 3회 재시도: 매번 origin/main 재패치 + reset + 재머지 + push.
            PUSHED=false
            for attempt in 1 2 3; do
              git checkout main
              git fetch origin main
              git reset --hard origin/main
              if ! git merge --no-ff -X ours "refs/remotes/origin/staging_tmp" \
                  -m "publish: merge $STAGING to main"; then
                echo "::warning::merge 실패 (attempt $attempt) for $STAGING"
                git merge --abort 2>/dev/null || true
                sleep 2
                continue
              fi
              if git push origin main; then
                PUSHED=true
                break
              fi
              echo "::warning::push attempt $attempt 실패 — origin/main 갱신됨. 재시도."
              sleep 2
            done

            if [ "$PUSHED" = "true" ]; then
              git push origin --delete "$STAGING" || echo "::warning::Failed to delete $STAGING"
              echo "::notice::Published $STAGING → main ($NEW_FILES new files)"
              MERGED_COUNT=$((MERGED_COUNT+1))
            else
              echo "::error::$STAGING 머지 3회 시도 실패 — staging 보존, 다음 publish 가 재시도."
              FAILED_COUNT=$((FAILED_COUNT+1))
            fi
            echo "::endgroup::"
          done

          if [ "$MERGED_COUNT" = "0" ] && [ "$FAILED_COUNT" = "0" ]; then
            echo "::notice::머지할 신규 staging 없음."
          else
            echo "::notice::총 ${MERGED_COUNT}개 머지 완료, ${FAILED_COUNT}개 실패."
          fi
          if [ "$FAILED_COUNT" != "0" ]; then
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "- Phase: **PUBLISH** (merge → main)"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- KST date: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          } >> "$GITHUB_STEP_SUMMARY"
