name: US Daily Publish (Merge staging to main)

# 평일 KST 01:00 + 06:00 — 정시 퍼블리시.
# 30분 전 prep 워크플로가 push 해둔 staging/us-{YYYYMMDD}-{slot} 브랜치를
# main 으로 fast-forward (또는 merge -X ours) 머지 → Vercel 재배포.
# staging 미존재 (prep 실패) 시 warning + 무동작 (지난 main 그대로).
on:
  schedule:
    - cron: '0 16 * * 0-4'  # 일~목 16:00 UTC = 월~금 01:00 KST
    - cron: '0 21 * * 0-4'  # 일~목 21:00 UTC = 월~금 06:00 KST
  workflow_dispatch:
    inputs:
      slot:
        description: '발행 슬롯 (01 or 06)'
        required: true
        type: choice
        options: ['01', '06']

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Derive staging branch
        id: meta
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            H=$(date -u +%H)
            case $H in
              16) SLOT=01 ;;
              21) SLOT=06 ;;
              *) echo "::error::Unknown UTC hour $H — schedule mismatch?"; exit 1 ;;
            esac
          fi
          KST_DATE=$(TZ=Asia/Seoul date +%Y%m%d)
          BRANCH="staging/us-${KST_DATE}-${SLOT}"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"

      - name: Merge staging into main
        run: |
          STAGING="${{ steps.meta.outputs.branch }}"

          if ! git ls-remote --exit-code --heads origin "$STAGING" >/dev/null 2>&1; then
            echo "::warning::Staging branch $STAGING 미존재. Prep 가 실패했거나 실행되지 않음. Publish skip."
            exit 0
          fi

          git fetch origin "$STAGING":"$STAGING"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          # -X ours: 충돌 시 main 우선 (refresh-market 이 main 에 더 최신 스냅샷 commit 했으면
          # 그게 살아남음). 새 글 .md / 썸네일 .svg 는 main 에 없는 파일이라 자연스럽게 추가됨.
          git merge --no-ff -X ours "$STAGING" \
            -m "publish: merge $STAGING to main"

          git push origin main

          # 정리 — 머지된 staging 은 제거. 실패해도 다음 prep 가 --force 로 덮음.
          git push origin --delete "$STAGING" || echo "::warning::Failed to delete $STAGING (자동 정리 실패, 무시 가능)."

          echo "::notice::Published $STAGING → main"

      - name: Summary
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "- Phase: **PUBLISH** (merge → main)"
            echo "- Slot: ${{ steps.meta.outputs.slot }}:00 KST"
            echo "- Source branch: \`${{ steps.meta.outputs.branch }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
