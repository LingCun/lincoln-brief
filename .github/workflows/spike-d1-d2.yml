name: Spike D1 (Gemini, manual)

# Day-0 차단 요인 검증 전용 (Gemini Free Tier 기반).
# schedule 없음. 마스터님이 Actions 페이지에서 수동 실행.
# 참조: docs/superpowers/specs/2026-05-20-lincoln-brief-mcp-pipeline-scope-v2.md

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Secrets 가드
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret 이 등록되지 않음. https://aistudio.google.com/apikey 에서 발급 후 GitHub repo Settings → Secrets and variables → Actions 에 추가."
            exit 1
          fi
          echo "GEMINI_API_KEY 존재 (길이=$(echo -n "$GEMINI_API_KEY" | wc -c))"

      - name: Install Google Generative AI SDK (spike 전용, package.json 변경 없음)
        run: npm install --no-save --no-package-lock @google/generative-ai@latest

      - name: Run spike
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/spike-d1-d2.mjs

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Spike D1 (Gemini) 결과"
            echo ""
            echo "- 워크플로: ${{ github.workflow }} / ${{ github.run_id }}"
            echo "- Node: $(node --version)"
            echo "- 자세한 PASS/FAIL 은 상단 'Run spike' step 로그 참고"
          } >> "$GITHUB_STEP_SUMMARY"
