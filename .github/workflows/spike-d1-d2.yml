name: Spike D1 (Groq, manual)

# Day-0 차단 요인 검증 (Groq Free Tier, Llama 3.3 70B).
# schedule 없음. 마스터님이 Actions 페이지에서 수동 실행.
# 참조: docs/superpowers/specs/2026-05-20-lincoln-brief-mcp-pipeline-scope-v2.md

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Secrets 가드
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "::error::GROQ_API_KEY secret 이 등록되지 않음. https://console.groq.com/keys 에서 발급 후 GitHub repo Settings → Secrets and variables → Actions 에 추가."
            exit 1
          fi
          echo "GROQ_API_KEY 존재 (길이=$(echo -n "$GROQ_API_KEY" | wc -c))"

      - name: Install Groq SDK (spike 전용, package.json 변경 없음)
        run: npm install --no-save --no-package-lock groq-sdk@latest

      - name: Run spike
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/spike-d1-d2.mjs

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Spike D1 (Groq Llama 3.3 70B) 결과"
            echo ""
            echo "- 워크플로: ${{ github.workflow }} / ${{ github.run_id }}"
            echo "- Node: $(node --version)"
            echo "- 한국어 품질은 'Run spike' step 의 응답 본문 확인"
          } >> "$GITHUB_STEP_SUMMARY"
