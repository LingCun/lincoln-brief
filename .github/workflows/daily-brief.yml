name: Daily Market Brief (US)

# 평일 06:00 KST (= 일~목 21:00 UTC) — 미국 마감 직후 4개 카테고리 초안 생성.
# 미국시간 마감(16:00 EST = 21:00 UTC) 직후 = 한국시간 다음날 06:00 KST.
on:
  schedule:
    - cron: '0 21 * * 0-4'  # 일~목 21:00 UTC = 월~금 06:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Fetch market data
        run: npm run fetch:market

      - name: Generate US daily brief drafts (4 categories)
        env:
          MARKET: US
        run: npm run generate:daily-brief

      - name: Commit & push
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"
          git add src/data/market-snapshot.json src/content/blog/*.md public/thumbnails/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u -d "+9 hours" +"%Y-%m-%d")  # KST
          git commit -m "data: US daily brief drafts for $DATE"
          git push
