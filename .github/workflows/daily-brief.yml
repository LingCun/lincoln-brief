name: Daily Market Brief (US, Claude Code)

# 평일 KST 01:00 + 06:00 — 미국 시장 글 4편 자동 생성 (하루 2회).
# Claude Code Action 이 STYLE.md + 최근 글을 참고해 인간 작성 수준으로 4편 발행.
# Pro/Max 구독 quota 사용 (추가 비용 없음). CLAUDE_CODE_OAUTH_TOKEN secret 필요.
on:
  schedule:
    - cron: '0 16 * * 0-4'  # 일~목 16:00 UTC = 월~금 01:00 KST
    - cron: '0 21 * * 0-4'  # 일~목 21:00 UTC = 월~금 06:00 KST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # Claude Code Action OIDC 인증에 필수

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Secrets 가드
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret 미등록. https://docs.claude.com/en/docs/claude-code/github-actions 참고."
            exit 1
          fi
          echo "CLAUDE_CODE_OAUTH_TOKEN 존재 (길이=$(echo -n "$CLAUDE_CODE_OAUTH_TOKEN" | wc -c))"

      - name: Install project deps
        run: npm install --no-audit --no-fund --silent

      - name: Refresh market snapshot (yahoo-finance2)
        run: node scripts/fetch-market.mjs

      - name: Configure git
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"
          git add src/data/market-snapshot.json || true
          if ! git diff --staged --quiet; then
            git commit -m "data: refresh market snapshot ($(TZ=Asia/Seoul date +"%Y-%m-%d %H:%M KST"))"
          fi

      - name: Load generation prompt
        id: load_prompt
        env:
          MARKET: US
        run: |
          {
            echo "PROMPT<<PROMPT_EOF"
            echo "MARKET=${MARKET}"
            echo ""
            cat scripts/generation-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate 4 daily-brief articles via Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          MARKET: US
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 80
            --allowedTools "Bash(npm:*),Bash(npx:*),Bash(git:*),Bash(node:*),Bash(TZ=*:*),Read,Write,Edit,WebFetch"
          prompt: ${{ steps.load_prompt.outputs.PROMPT }}

      - name: Verify build (safety net)
        run: npx astro build

      # Commit & push 는 Claude Code Action 이 내부적으로 처리 (Step 10 of generation-prompt.md).
      # 이전엔 outer step 으로 한 번 더 시도했으나 Action 이 이미 푸시한 뒤라 항상 "변경 없음"
      # false-alarm 노티스가 떴음 → 제거. 진짜 0편 발행 케이스 식별은 Action 의 Output report 로.

      - name: Job summary
        if: always()
        run: |
          {
            echo ""
            echo "---"
            echo "- 워크플로: ${{ github.workflow }} / run ${{ github.run_id }}"
            echo "- Node: $(node --version)"
            echo "- 발행 모드: Claude Code Action (Pro/Max quota)"
          } >> "$GITHUB_STEP_SUMMARY"
