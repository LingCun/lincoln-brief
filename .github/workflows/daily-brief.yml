name: Daily Market Brief (US, Yahoo legacy fallback)

# 폴백 전용. 평소엔 `daily-market-brief-us-groq` (Groq 기반) 이 06:00 KST cron 으로 자동 실행.
# 이 워크플로는 schedule 제거됨 — Groq 경로 장애 시 수동 트리거(workflow_dispatch)로만 사용.
# 참조: docs/superpowers/specs/2026-05-20-lincoln-brief-mcp-pipeline-scope-v2.md
on:
  # schedule 제거됨 (Groq 워크플로와 충돌 방지). 응급용 수동 트리거만 유지.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Fetch market data
        run: npm run fetch:market

      - name: Generate US daily brief drafts (4 categories)
        env:
          MARKET: US
        run: npm run generate:daily-brief

      - name: Commit & push
        run: |
          git config user.name "Lincoln Brief Bot"
          git config user.email "bot@lincolnbrief.local"
          git add src/data/market-snapshot.json src/content/blog/*.md public/thumbnails/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u -d "+9 hours" +"%Y-%m-%d")  # KST
          git commit -m "data: US daily brief drafts for $DATE"
          git push
